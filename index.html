<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jabri Complex</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --primary:#1d2940;
  --text:#1a2238;
  --muted:#7b8497;
  --radius:22px;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:var(--bg);
}

/* center like mobile app */
.app{
  max-width:420px;
  margin:auto;
  min-height:100vh;
}

/* header */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
  background:white;
  border-bottom:1px solid #eee;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:42px;
  height:42px;
  border-radius:12px;
}

.title{
  font-weight:700;
}

.subtitle{
  font-size:12px;
  color:var(--muted);
}

/* card */
.card{
  background:var(--card);
  margin:15px;
  padding:20px;
  border-radius:var(--radius);
  box-shadow:0 5px 20px rgba(0,0,0,0.04);
}

/* input */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
  margin-bottom:10px;
  font-size:16px;
}

/* button */
button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:var(--primary);
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

/* stats */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  padding:20px;
  border-radius:18px;
  text-align:center;
}

.num{
  font-size:26px;
  font-weight:bold;
  margin-bottom:6px;
}

/* colors */
.blue{background:#eef4ff;color:#2f6fed;}
.green{background:#edf8f1;color:#18a957;}
.purple{background:#f5eefc;color:#8d3df2;}
.orange{background:#fff6ea;color:#d68a1d;}

.hidden{display:none;}

.error{
  color:red;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="logo_complex.png">
    <div>
      <div class="title">Jabri Complex</div>
      <div class="subtitle">Tenant Portal</div>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="card">
  <h3>تسجيل الدخول</h3>
  <input id="code" placeholder="JC-01">
  <button onclick="login()">دخول</button>
  <div id="error" class="error hidden">رمز غير صحيح</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">

  <h2 id="name"></h2>
  <div id="codeText" style="color:#777;margin-bottom:10px"></div>

  <div class="grid">

    <div class="box blue">
      <div id="debit" class="num">0</div>
      المدين
    </div>

    <div class="box green">
      <div id="credit" class="num">0</div>
      الدائن
    </div>

    <div class="box purple">
      <div id="balance" class="num">0</div>
      الرصيد
    </div>

    <div class="box orange">
      <div id="rent" class="num">0</div>
      الإيجار
    </div>

  </div>

  <button style="margin-top:15px;background:#eee;color:#000" onclick="logout()">
    تسجيل خروج
  </button>

</div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
'https://gzukfvxcpfblzqyjzkoz.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

function format(n){
  return Number(n || 0).toLocaleString()
}

window.login = async function(){

  const code = document.getElementById('code').value.trim().toUpperCase()
  document.getElementById('error').classList.add('hidden')

  const { data: t } = await supabase
    .from('tenants')
    .select('*')
    .eq('tenant_code', code)
    .maybeSingle()

  if(!t){
    document.getElementById('error').classList.remove('hidden')
    return
  }

  const { data: s } = await supabase
    .from('tenant_summary')
    .select('*')
    .eq('رمز_المستأجر', code)
    .maybeSingle()

  document.getElementById('login').classList.add('hidden')
  document.getElementById('dashboard').classList.remove('hidden')

  document.getElementById('name').innerText = t.tenant_name
  document.getElementById('codeText').innerText = t.tenant_code

  document.getElementById('debit').innerText = format(s["إجمالي_المدين"])
  document.getElementById('credit').innerText = format(s["إجمالي_الدائن"])
  document.getElementById('balance').innerText = format(s["الرصيد"])
  document.getElementById('rent').innerText = format(s["إيجار_السنة"])

  localStorage.setItem("tenant", code)
}

window.logout = function(){
  localStorage.removeItem("tenant")
  location.reload()
}

// auto login
const saved = localStorage.getItem("tenant")
if(saved){
  document.getElementById('code').value = saved
  login()
}
</script>

</body>
</html>
