<script>
  const SUPABASE_URL = "https://djdppjhldfiwxmmfjpbs.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_t_-7lfamWxQn9plAEhDB6Q_VOqhlfvr";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function login() {
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const result = document.getElementById("result");

    if (!phone || !password) {
      result.innerHTML = "يرجى إدخال رقم الهاتف وكلمة المرور";
      return;
    }

    const cleanPhone = phone.replace(/\s+/g, "");
    const email = cleanPhone + "@jabri.com";

    const { data, error } = await client.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      result.innerHTML = "فشل تسجيل الدخول: " + error.message;
      return;
    }

    const { data: tenant, error: tenantError } = await client
      .from("tenants")
      .select("*")
      .eq("phone", cleanPhone)
      .single();

    if (tenantError || !tenant) {
      result.innerHTML = "تم تسجيل الدخول لكن لا توجد بيانات للمستأجر";
    } else {
      result.innerHTML = `
        مرحباً ${tenant.name}<br><br>
        رصيدك الحالي: ${tenant.balance} دينار
      `;
    }
  }
</script>
