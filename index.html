<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مجمع جبري</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f7f4ee;
      text-align: center;
    }

    .page {
      max-width: 520px;
      margin: auto;
      padding: 30px 15px;
    }

    .hero {
      background: linear-gradient(135deg, #f4ede1, #efe4cf);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 95%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #c89f3d, #e8cb74);
      font-size: 16px;
      cursor: pointer;
    }

    .hidden { display: none; }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

  </style>
</head>

<body>

<div class="page">

  <div class="hero">
    <h3>مرحباً بك في تطبيق مجمع جبري</h3>
    <p>تابع رصيدك وكشف حسابك بسهولة</p>
  </div>

  <!-- LOGIN -->
  <div class="login-card" id="loginBox">
    <h3>تسجيل الدخول</h3>

    <input id="phone" placeholder="رقم الهاتف">
    <input id="password" type="password" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>

    <p id="result"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardBox" class="hidden">
    <h3 id="welcomeName"></h3>
    <p>رقم المحل: <span id="shopNo"></span></p>
    <p>الرصيد: <span id="balanceValue"></span></p>
    <p>آخر دفعة: <span id="lastPayment"></span></p>
    <p>الحالة: <span id="accountStatus"></span></p>
  </div>

  <!-- TABLE -->
  <table id="statementBox" class="hidden">
    <thead>
      <tr>
        <th>التاريخ</th>
        <th>البيان</th>
        <th>مدين</th>
        <th>دائن</th>
        <th>الرصيد</th>
      </tr>
    </thead>
    <tbody id="statementBody"></tbody>
  </table>

</div>

<script>
  const SUPABASE_URL = "https://djdppjhldfiwxmmfjpbs.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_t_-7lfamWxQn9plAEhDB6Q_VOqhlfvr";
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function login() {
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const result = document.getElementById("result");

    if (!phone || !password) {
      result.innerHTML = "يرجى إدخال البيانات";
      return;
    }

    const { data: tenant, error } = await client
      .from("المستأجرين")
      .select("*")
      .eq("رقم_الهاتف", phone)
      .eq("كلمة_المرور", password)
      .single();

    if (error || !tenant) {
      result.innerHTML = "بيانات غير صحيحة";
      return;
    }

    const { data: statements } = await client
      .from("كشف_الحساب")
      .select("*")
      .eq("رقم_المستأجر", tenant.رقم_المستأجر)
      .order("التاريخ");

    let balance = 0;
    let lastPayment = 0;

    const tbody = document.getElementById("statementBody");
    tbody.innerHTML = "";

    statements.forEach(row => {
      let debit = 0;
      let credit = 0;

      if (row.البيان && row.البيان.includes("إيجار")) {
        debit = row.المبلغ;
        balance += debit;
      } else {
        credit = row.المبلغ;
        balance -= credit;
        lastPayment = credit;
      }

      tbody.innerHTML += `
        <tr>
          <td>${row.التاريخ}</td>
          <td>${row.البيان}</td>
          <td>${debit}</td>
          <td>${credit}</td>
          <td>${balance}</td>
        </tr>
      `;
    });

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboardBox").classList.remove("hidden");
    document.getElementById("statementBox").classList.remove("hidden");

    document.getElementById("welcomeName").innerHTML = "مرحباً " + tenant.اسم_المستأجر;
    document.getElementById("shopNo").innerHTML = tenant.رقم_المحل;
    document.getElementById("balanceValue").innerHTML = balance + " د.أ";
    document.getElementById("lastPayment").innerHTML = lastPayment + " د.أ";
    document.getElementById("accountStatus").innerHTML = balance > 0 ? "غير مسدد" : "مسدد";

    result.innerHTML = "";
  }
</script>

</body>
</html>
