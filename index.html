<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجمع جبري</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f4ee;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: 80px auto;
  background: #fffdfa;
  padding: 20px;
  border-radius: 20px;
  border: 1px solid #e7decd;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #c89f3d, #e8cb74);
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.password-box {
  position: relative;
}

.password-box input {
  padding-left: 40px;
}

.toggle-password {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h2>تسجيل الدخول</h2>

  <input type="text" id="phone" placeholder="رقم الهاتف">

  <div class="password-box">
    <input type="password" id="password" placeholder="كلمة المرور">
    <span class="toggle-password" onclick="togglePassword()">👁</span>
  </div>

  <button onclick="login()">دخول</button>
  <p id="result"></p>
</div>

<div class="container hidden" id="dashboardBox">
  <h2 id="name"></h2>
  <p id="shop"></p>
  <p id="balance"></p>
  <button onclick="logout()">تسجيل خروج</button>
</div>

<script>
const SUPABASE_URL = "https://djdppjhldfiwxmmfjpbs.supabase.co";
const SUPABASE_KEY = "sb_publishable_t_-7lfamWxQn9plAEhDB6Q_VOqhlfvr";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}

function logout() {
  document.getElementById("loginBox").classList.remove("hidden");
  document.getElementById("dashboardBox").classList.add("hidden");
}

async function login() {
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const result = document.getElementById("result");

  if (!phone || !password) {
    result.innerText = "ادخل البيانات";
    return;
  }

  // 🔥 نبحث بالهاتف (المهم التعديل هنا)
  const { data, error } = await client
    .from("المستأجرين")
    .select("*")
    .eq("الهاتف", phone);

  if (error) {
    result.innerText = "خطأ في الاتصال";
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    result.innerText = "رقم غير موجود";
    return;
  }

  const user = data[0];

  if (String(user["كلمة_المرور"]) !== password) {
    result.innerText = "كلمة المرور خطأ";
    return;
  }

  // ✅ نجاح تسجيل الدخول
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboardBox").classList.remove("hidden");

  document.getElementById("name").innerText = user["اسم_المستأجر"];
  document.getElementById("shop").innerText = "المحل: " + user["رقم_المحل"];

  // جلب كشف الحساب
  const { data: payments } = await client
    .from("كشف_الحساب")
    .select("*")
    .eq("رقم_المستأجر", user["رقم_المستأجر"]);

  let balance = 0;

  (payments || []).forEach(p => {
    const amount = Number(p["المبلغ"] || 0);

    if (p["البيان"].includes("إيجار")) {
      balance += amount;
    } else {
      balance -= amount;
    }
  });

  document.getElementById("balance").innerText =
    "الرصيد: " + balance + " د.أ";

  result.innerText = "";
}
</script>

</body>
</html>
