<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jabri App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; padding:20px;">

<h2>Login</h2>

<div id="login">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
  <h2 id="name"></h2>
  <h3>Balance: <span id="balance"></span></h3>

  <canvas id="chart" width="300"></canvas>

  <h3>Transactions</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Debit</th>
        <th>Credit</th>
      </tr>
    </thead>
    <tbody id="transactions"></tbody>
  </table>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

// 🔴 ضع بياناتك هنا
const supabase = createClient(
  'https://YOUR_PROJECT.supabase.co',
  'YOUR_ANON_KEY'
)

async function login() {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  })

  if (error) return alert("Login error")

  loadUser(email)
}

async function loadUser(email) {

  // get tenant_code
  const { data: user } = await supabase
    .from('tenant_users')
    .select('*')
    .eq('email', email)
    .single()

  const tenant_code = user.tenant_code

  // get tenant name
  const { data: tenant } = await supabase
    .from('tenants')
    .select('*')
    .eq('tenant_code', tenant_code)
    .single()

  document.getElementById("name").innerText = tenant.tenant_name

  // get balance
  const { data: balanceData } = await supabase
    .from('tenant_balances')
    .select('*')
    .eq('tenant_code', tenant_code)
    .single()

  document.getElementById("balance").innerText = balanceData.balance

  // chart
  new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: ['Debit', 'Credit', 'Balance'],
      datasets: [{
        data: [
          balanceData.total_debit,
          balanceData.total_credit,
          balanceData.balance
        ]
      }]
    }
  })

  // transactions
  const { data: trx } = await supabase
    .from('tenant_transactions')
    .select('*')
    .eq('tenant_code', tenant_code)

  let html = ""
  trx.forEach(t => {
    html += `<tr>
      <td>${t.trx_date}</td>
      <td>${t.description}</td>
      <td>${t.debit}</td>
      <td>${t.credit}</td>
    </tr>`
  })

  document.getElementById("transactions").innerHTML = html

  document.getElementById("login").style.display = "none"
  document.getElementById("dashboard").style.display = "block"
}
</script>

</body>
</html>
