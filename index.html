<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jabri Complex Debug</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #182033;
    }
    .topbar {
      background: #fff;
      padding: 18px;
      border-bottom: 1px solid #eee;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 12px;
    }
    .brand-title {
      font-weight: bold;
      font-size: 18px;
    }
    .page {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 15px;
      border: 1px solid #eceff5;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #182033;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      display: none;
    }
    .name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .code {
      color: #667085;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    .box {
      padding: 20px;
      border-radius: 16px;
      text-align: center;
    }
    .blue { background: #eef4ff; color:#2f6fed; }
    .green { background: #edf8f1; color:#18a957; }
    .purple { background: #f5eefc; color:#8d3df2; }
    .orange { background: #fff6ea; color:#d68a1d; }
    .num {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .label {
      font-size: 15px;
      color: #4b5563;
      font-weight: bold;
    }
    .error {
      color: #c62828;
      margin-top: 10px;
      font-weight: bold;
      white-space: pre-wrap;
    }
    .ok {
      color: #1b8f4d;
      font-weight: bold;
      white-space: pre-wrap;
    }
    .debugbox {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      white-space: pre-wrap;
      font-size: 14px;
      direction: ltr;
      text-align: left;
      overflow-x: auto;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="logo_complex.png" alt="logo">
      <div class="brand-title">Jabri Complex</div>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <h3>بحث المستأجر</h3>
      <input id="tenantCode" placeholder="JC-01" value="JC-01">
      <button id="searchBtn">بحث</button>
      <div id="msg" class="error"></div>
    </div>

    <div class="card">
      <h3>تشخيص الاتصال</h3>
      <div id="status" class="debugbox">Loading...</div>
    </div>

    <div id="result" class="card result">
      <div class="name" id="name"></div>
      <div class="code" id="code"></div>

      <div class="grid">
        <div class="box blue">
          <div id="debit" class="num">0</div>
          <div class="label">إجمالي المدين</div>
        </div>

        <div class="box green">
          <div id="credit" class="num">0</div>
          <div class="label">إجمالي الدائن</div>
        </div>

        <div class="box purple">
          <div id="balance" class="num">0</div>
          <div class="label">الرصيد</div>
        </div>

        <div class="box orange">
          <div id="rent" class="num">0</div>
          <div class="label">إيجار السنة</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://gzukfvxcpfblzqyjzkoz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
    )

    const msg = document.getElementById('msg')
    const statusBox = document.getElementById('status')
    const result = document.getElementById('result')
    const searchBtn = document.getElementById('searchBtn')

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('en-US')
    }

    async function runDiagnostics() {
      let report = []

      report.push('Testing connection...\n')

      const tenantsTest = await supabase
        .from('tenants')
        .select('tenant_code, tenant_name')
        .limit(5)

      if (tenantsTest.error) {
        report.push('TENANTS ERROR:')
        report.push(tenantsTest.error.message)
      } else {
        report.push('TENANTS OK')
        report.push(JSON.stringify(tenantsTest.data, null, 2))
      }

      report.push('\n----------------------\n')

      const summaryTest = await supabase
        .from('tenant_summary')
        .select('*')
        .limit(5)

      if (summaryTest.error) {
        report.push('TENANT_SUMMARY ERROR:')
        report.push(summaryTest.error.message)
      } else {
        report.push('TENANT_SUMMARY OK')
        report.push(JSON.stringify(summaryTest.data, null, 2))
      }

      statusBox.textContent = report.join('\n')
    }

    async function searchTenant() {
      const code = document.getElementById('tenantCode').value.trim()
      msg.textContent = ''
      result.style.display = 'none'

      if (!code) {
        msg.textContent = 'أدخل رمز المستأجر'
        return
      }

      const tenantRes = await supabase
        .from('tenants')
        .select('tenant_code, tenant_name')
        .eq('tenant_code', code)
        .maybeSingle()

      if (tenantRes.error) {
        msg.textContent = 'خطأ في جدول tenants: ' + tenantRes.error.message
        console.error('tenants error', tenantRes.error)
        return
      }

      if (!tenantRes.data) {
        msg.textContent = 'الرمز غير موجود في tenants'
        return
      }

      const summaryRes = await supabase
        .from('tenant_summary')
        .select('*')
        .eq('رمز_المستأجر', code)
        .maybeSingle()

      if (summaryRes.error) {
        msg.textContent = 'خطأ في tenant_summary: ' + summaryRes.error.message
        console.error('tenant_summary error', summaryRes.error)
        return
      }

      if (!summaryRes.data) {
        msg.textContent = 'الرمز موجود في tenants لكنه غير موجود في tenant_summary'
        return
      }

      const t = tenantRes.data
      const s = summaryRes.data

      document.getElementById('name').textContent = t.tenant_name || ''
      document.getElementById('code').textContent = t.tenant_code || ''
      document.getElementById('debit').textContent = formatNumber(s["إجمالي_المدين"])
      document.getElementById('credit').textContent = formatNumber(s["إجمالي_الدائن"])
      document.getElementById('balance').textContent = formatNumber(s["الرصيد"])
      document.getElementById('rent').textContent = formatNumber(s["إيجار_السنة"])

      result.style.display = 'block'
      msg.textContent = ''
    }

    searchBtn.addEventListener('click', searchTenant)
    document.getElementById('tenantCode').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchTenant()
    })

    runDiagnostics()
  </script>

</body>
</html>
