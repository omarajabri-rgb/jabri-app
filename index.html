<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jabri Complex</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --primary:#1d2940;
  --text:#1a2238;
  --muted:#7b8497;
  --line:#e8edf4;

  --green:#18a957;
  --red:#e05252;
}

body{
  margin:0;
  font-family:-apple-system,Segoe UI;
  background:var(--bg);
}

.app{
  max-width:430px;
  margin:auto;
}

/* 🔥 HEADER FIXED STYLE */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(10px);
  text-align:center;
  padding:18px 10px 12px;
  border-bottom:1px solid var(--line);
}

/* 🔥 LOGO PERFECT SIZE */
.header-logo{
  width:100px;
  height:100px;
  object-fit:contain;
  margin-bottom:8px;
}

.title{
  font-size:24px;
  font-weight:900;
}

.subtitle{
  font-size:12px;
  color:var(--muted);
}

.section{
  background:#fff;
  margin:16px;
  padding:20px;
  border-radius:20px;
}

/* INPUT */
input{
  width:100%;
  height:50px;
  border-radius:15px;
  border:1px solid #ccc;
  padding:10px;
}

button{
  width:100%;
  height:50px;
  border-radius:15px;
  border:none;
  background:#1d2940;
  color:#fff;
  margin-top:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.blue{background:#eef4ff}
.green{background:#edf8f1}
.purple{background:#f5eefc}
.orange{background:#fff6ea}

.big{
  font-size:26px;
  font-weight:900;
}

.remaining{color:#e05252}
.paid{color:#18a957}

.chart-wrap{
  max-width:250px;
  margin:auto;
}

.legend{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

.hidden{display:none}

</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <img src="logo_complex.png" class="header-logo">
  <div class="title">Jabri Complex</div>
  <div class="subtitle">Tenant Portal</div>
</div>

<!-- LOGIN -->
<div id="loginCard" class="section">
  <h3>تسجيل الدخول</h3>
  <input id="code" placeholder="JC-01">
  <button onclick="login()">دخول</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="section">
  <h2 id="name"></h2>
  <div id="lastUpdated"></div>
</div>

<div class="section">
  <div class="grid">
    <div class="box blue">
      <div>المدين</div>
      <div id="debit" class="big"></div>
    </div>

    <div class="box green">
      <div>الدائن</div>
      <div id="credit" class="big"></div>
    </div>

    <div class="box purple">
      <div>الرصيد</div>
      <div id="balance" class="big"></div>
    </div>

    <div class="box orange">
      <div>الإيجار</div>
      <div id="rent" class="big"></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <div class="legend">
    <div>🟢 مدفوع</div>
    <div>🔴 متبقي</div>
  </div>

  <button onclick="logout()">تسجيل خروج</button>
</div>

</div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
'https://gzukfvxcpfblzqyjzkoz.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

let chart

window.login = async function(){

let code = document.getElementById('code').value.trim().toUpperCase()

let {data:tenant} = await supabase
.from('tenants')
.select('*')
.eq('tenant_code',code)
.single()

let {data:summary} = await supabase
.from('tenant_summary')
.select('*')
.eq('رمز_المستأجر',code)
.single()

document.getElementById('loginCard').style.display='none'
document.getElementById('dashboard').classList.remove('hidden')

document.getElementById('name').innerText = tenant.tenant_name
document.getElementById('lastUpdated').innerText =
"آخر تحديث: " + new Date().toLocaleString()

let debit = summary["إجمالي_المدين"]
let credit = summary["إجمالي_الدائن"]
let balance = summary["الرصيد"]
let rent = summary["إيجار_السنة"]

document.getElementById('debit').innerText = debit
document.getElementById('credit').innerText = credit
document.getElementById('rent').innerText = rent

let balanceEl = document.getElementById('balance')
balanceEl.innerText = balance
balanceEl.style.color = balance > 0 ? "#e05252" : "#18a957"

if(chart) chart.destroy()

chart = new Chart(document.getElementById('chart'),{
type:'pie',
data:{
labels:['مدفوع','متبقي'],
datasets:[{
data:[credit,balance],
backgroundColor:[
'#18a957',
'#e05252'
]
}]
}
})

}

window.logout = function(){
location.reload()
}

</script>

</body>
</html>
