<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | بوابة الدخول</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #08111f;
            --navy: #0f172a;
            --gold: #d4af37;
            --text: #ffffff;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --card-bg: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 45px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-area { margin-bottom: 35px; }
        .logo-area h1 { 
            color: var(--gold); 
            font-size: 30px; 
            margin: 0; 
            font-weight: 900; 
            letter-spacing: 1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .logo-area p { 
            color: var(--muted); 
            font-size: 11px; 
            margin-top: 8px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group { margin-bottom: 25px; text-align: right; }
        label { 
            display: block; 
            font-size: 12px; 
            color: var(--gold); 
            margin-bottom: 10px; 
            font-weight: 800; 
            padding-right: 5px; 
        }
        
        input {
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04); 
            color: #fff; 
            font-size: 18px; 
            font-weight: 700;
            outline: none; 
            transition: 0.3s; 
            text-align: center;
            letter-spacing: 1px;
        }
        input:focus { 
            border-color: var(--gold); 
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(212,175,55,0.1);
        }

        .btn-login {
            width: 100%; 
            padding: 18px; 
            border-radius: 18px; 
            border: none;
            background: var(--gold); 
            color: var(--navy); 
            font-size: 17px; 
            font-weight: 900;
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            box-shadow: 0 10px 20px rgba(212,175,55,0.2);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(212,175,55,0.3); }
        .btn-login:active { transform: scale(0.96); }

        #error_msg { 
            margin-top: 20px; 
            color: #f87171; 
            font-size: 13px; 
            font-weight: 800; 
            display: none;
            padding: 10px;
            background: rgba(248,113,113,0.1);
            border-radius: 12px;
        }

        #loader { 
            position: fixed; inset: 0; 
            display: flex; align-items: center; justify-content: center; 
            background: var(--bg); z-index: 9999; 
        }
        .spinner { 
            width: 35px; height: 35px; 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top-color: var(--gold); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="login-card">
        <div class="logo-area">
            <h1>JABRI COMPLEX</h1>
            <p>بوابة المستأجرين الرقمية</p>
        </div>

        <div class="form-group">
            <label>أدخل كود الوحدة الخاص بك</label>
            <input type="text" id="tenant_code_input" placeholder="مثلاً: JC-01" autocomplete="off" spellcheck="false">
        </div>

        <button class="btn-login" onclick="handleLogin()">
            دخول للمنصة <i data-lucide="log-in" size="18"></i>
        </button>

        <div id="error_msg">عذراً، هذا الكود غير مسجل لدينا.</div>
        
        <div style="margin-top: 40px; font-size: 10px; color: var(--muted); font-weight: 800; letter-spacing: 1px;">
            © 2026 JABRI INDUSTRIAL COMPLEX
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient('https://gzukfvxcpfblzqyjzkoz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU');

        window.onload = () => {
            document.body.style.opacity = "1";
            document.getElementById('loader').style.display = 'none';
            if (window.lucide) lucide.createIcons();
            
            // تحويل النص للكبير تلقائياً عند الكتابة
            document.getElementById('tenant_code_input').addEventListener('input', function() {
                this.value = this.value.toUpperCase();
            });
        };

        async function handleLogin() {
            const code = document.getElementById('tenant_code_input').value.trim();
            const errorEl = document.getElementById('error_msg');
            
            if (!code) return;

            errorEl.style.display = "none";
            
            const { data, error } = await supabaseClient
                .from('tenants')
                .select('tenant_code, name')
                .eq('tenant_code', code)
                .single();

            if (data) {
                localStorage.setItem('jabri_tenant_session', 'active');
                localStorage.setItem('jabri_tenant_code', data.tenant_code);
                window.location.href = "tenant.html";
            } else {
                errorEl.style.display = "block";
                // رجة خفيفة للكرت عند الخطأ
                document.querySelector('.login-card').style.animation = "shake 0.4s ease";
                setTimeout(() => document.querySelector('.login-card').style.animation = "", 400);
            }
        }

        // إضافة أنيميشن "الرجة" للخطأ
        const style = document.createElement('style');
        style.innerHTML = `@keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }`;
        document.head.appendChild(style);

        document.getElementById('tenant_code_input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
