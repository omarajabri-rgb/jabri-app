<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | بوابة الدخول</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.76);
            --border: rgba(201,164,107,0.22);
            --text: #2f2a24;
            --muted: #7d7468;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --danger: #cc5a50;
            --success: #2f9e6f;
            --shadow: 0 18px 40px rgba(120,95,56,0.12);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            color: var(--text);
            opacity: 0;
            transition: opacity 0.5s ease;
            background:
                radial-gradient(circle at top left, rgba(201,164,107,0.12), transparent 24%),
                radial-gradient(circle at bottom right, rgba(177,138,82,0.10), transparent 24%),
                linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            padding: 34px 28px;
            border-radius: 32px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo-area { margin-bottom: 28px; }

        .logo-area h1 {
            margin: 0;
            font-size: 31px;
            color: var(--gold-deep);
            font-weight: 900;
            letter-spacing: 0.6px;
        }

        .logo-area p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.6px;
        }

        .glass-line {
            width: 78px;
            height: 3px;
            border-radius: 999px;
            margin: 16px auto 0;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--gold-deep);
            margin-bottom: 10px;
            font-weight: 900;
            padding-right: 4px;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.72);
            color: var(--text);
            font-size: 18px;
            font-weight: 800;
            outline: none;
            text-align: center;
            transition: 0.25s ease;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201,164,107,0.10);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            box-shadow: 0 14px 24px rgba(201,164,107,0.22);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 14px;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.7;
            display: none;
            white-space: pre-wrap;
        }

        #error_msg {
            color: var(--danger);
            background: rgba(204,90,80,0.10);
            border: 1px solid rgba(204,90,80,0.12);
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            z-index: 9999;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid rgba(201,164,107,0.18);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="login-card">
        <div class="logo-area">
            <h1>JABRI COMPLEX</h1>
            <p>بوابة المستأجرين الرقمية</p>
            <div class="glass-line"></div>
        </div>

        <div class="form-group">
            <label>رقم الجوال</label>
            <input
                type="tel"
                id="phone_input"
                placeholder="مثلاً: 0791234567"
                autocomplete="username"
                inputmode="numeric"
                spellcheck="false"
            >
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input
                type="password"
                id="password_input"
                placeholder="آخر 4 أرقام"
                autocomplete="current-password"
                inputmode="numeric"
                maxlength="4"
                spellcheck="false"
            >
        </div>

        <!-- تذكرني checkbox -->
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;margin-bottom:18px;">
            <input type="checkbox" id="remember_me" style="width:auto;">
            <label style="margin:0;font-size:12px;font-weight:800;color:#7a6c59;">تذكرني</label>
        </div>

        <button class="btn-login" id="login_btn" onclick="handleLogin()">
            دخول للمنصة
            <i data-lucide="log-in" size="18"></i>
        </button>

        <div id="error_msg" class="status-box"></div>

        <div style="margin-top:28px; font-size:10px; color:var(--muted); font-weight:800; letter-spacing:1px;">
            © 2026 JABRI INDUSTRIAL COMPLEX
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        window.onload = async () => {
            document.body.style.opacity = '1';
            document.getElementById('loader').style.display = 'none';
            if (window.lucide) lucide.createIcons();

            const phoneInput = document.getElementById('phone_input');
            const passwordInput = document.getElementById('password_input');

            phoneInput.addEventListener('input', function () {
                this.value = this.value.replace(/[^\d]/g, '');
            });

            passwordInput.addEventListener('input', function () {
                this.value = this.value.replace(/[^\d]/g, '').slice(0, 4);
            });

            [phoneInput, passwordInput].forEach(input => {
                input.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') handleLogin();
                });
            });

            // 🔥 Auto Login إذا كان "تذكرني" مفعلاً
            const remember = localStorage.getItem('jabri_remember');
            // جعل checkbox محددًا تلقائيًا إذا كان التذكر مفعلاً
            document.getElementById('remember_me').checked = remember === 'yes';

            if (remember === 'yes') {
                const savedPhone = localStorage.getItem('jabri_phone');
                const savedPass = localStorage.getItem('jabri_pass');
                if (savedPhone && savedPass) {
                    document.getElementById('phone_input').value = savedPhone;
                    document.getElementById('password_input').value = savedPass;
                    setTimeout(() => {
                        handleLogin();
                    }, 300);
                }
            }
        };

        async function handleLogin() {
            const phone = document.getElementById('phone_input').value.trim();
            const password = document.getElementById('password_input').value.trim();
            const errorEl = document.getElementById('error_msg');
            const loginBtn = document.getElementById('login_btn');
            const card = document.querySelector('.login-card');

            if (!phone) {
                showError('يرجى إدخال رقم الجوال.');
                shakeCard(card);
                return;
            }

            if (!password) {
                showError('يرجى إدخال كلمة المرور.');
                shakeCard(card);
                return;
            }

            errorEl.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'جاري التحقق...';

            try {
                const { data, error } = await supabaseClient
                    .from('tenants')
                    .select('tenant_code, tenant_name, shop_no, phone, password')
                    .eq('phone', phone)
                    .eq('password', password)
                    .maybeSingle();

                if (error) {
                    showError('خطأ من قاعدة البيانات:\n' + error.message);
                    shakeCard(card);
                    return;
                }

                if (!data) {
                    showError('رقم الجوال أو كلمة المرور غير صحيحة.');
                    shakeCard(card);
                    return;
                }

                // حفظ بيانات "تذكرني"
                const remember = document.getElementById('remember_me').checked;
                if (remember) {
                    localStorage.setItem('jabri_remember', 'yes');
                    localStorage.setItem('jabri_phone', phone);
                    localStorage.setItem('jabri_pass', password);
                } else {
                    localStorage.removeItem('jabri_remember');
                    localStorage.removeItem('jabri_phone');
                    localStorage.removeItem('jabri_pass');
                }

                localStorage.setItem('jabri_tenant_session', 'active');
                localStorage.setItem('jabri_tenant_code', data.tenant_code);
                localStorage.setItem('jabri_tenant_name', data.tenant_name || '');
                localStorage.setItem('jabri_tenant_unit', data.shop_no || '');

                window.location.href = 'tenant.html';
            } catch (err) {
                console.error(err);
                showError('حدث خطأ في الاتصال:\n' + err.message);
                shakeCard(card);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'دخول للمنصة <i data-lucide="log-in" size="18"></i>';
                if (window.lucide) lucide.createIcons();
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('error_msg');
            errorEl.innerText = message;
            errorEl.style.display = 'block';
        }

        function shakeCard(card) {
            card.style.animation = 'shake 0.35s ease';
            setTimeout(() => {
                card.style.animation = '';
            }, 350);
        }
    </script>
</body>
</html>
