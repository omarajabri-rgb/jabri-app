<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jabri Complex</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: gold;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 280px;
      border-radius: 6px;
      border: 1px solid #555;
      font-size: 16px;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      background: gold;
      color: black;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    #result {
      margin-top: 20px;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Jabri Complex</h1>
    <p>بوابة المستأجرين</p>

    <input type="tel" id="phone" placeholder="رقم الهاتف مثل +9627XXXXXXXX">
    <button onclick="sendCode()">إرسال رمز التحقق</button>

    <input type="text" id="otp" placeholder="أدخل رمز التحقق">
    <button onclick="verifyCode()">تأكيد الرمز</button>

    <div id="result"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://djdppjhldfiwxmmfjpbs.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_t_-7lfamWxQn9plAEhDB6Q_VOqhlfvr";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function sendCode() {
      const phone = document.getElementById("phone").value.trim();
      const result = document.getElementById("result");

      const { error } = await client.auth.signInWithOtp({
        phone: phone
      });

      if (error) {
        result.innerHTML = "فشل إرسال الرمز: " + error.message;
      } else {
        result.innerHTML = "تم إرسال رمز التحقق إلى الهاتف";
      }
    }

    async function verifyCode() {
      const phone = document.getElementById("phone").value.trim();
      const token = document.getElementById("otp").value.trim();
      const result = document.getElementById("result");

      const { data, error } = await client.auth.verifyOtp({
        phone: phone,
        token: token,
        type: "sms"
      });

      if (error) {
        result.innerHTML = "فشل التحقق: " + error.message;
      } else {
        result.innerHTML = "تم تسجيل الدخول بنجاح";
      }
    }
  </script>

</body>
</html>
