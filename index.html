<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jabri Complex</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f6f7fb;
  --line:#e8edf4;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

.app{
  max-width:430px;
  margin:auto;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:white;
  text-align:center;
  padding:15px;
}

.header img{
  width:90px;
}

.title{
  font-size:22px;
  font-weight:900;
}

.subtitle{
  font-size:12px;
  color:#777;
}

/* BOXES */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}

.box{
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* COLORS */
.blue-card{ background:#eef4ff; color:#2f6fed; }
.green-card{ background:#edf8f1; color:#18a957; }
.orange-card{ background:#fff6ea; color:#d68a1d; }

.balance-negative{
  background:#fdecec;
  color:#e05252;
}

.balance-positive{
  background:#eaf7ef;
  color:#18a957;
}

.credit-zero{
  background:#f3f4f6;
  color:#9aa3b2;
}

/* TEXT */
.label{
  font-size:14px;
}

.big{
  font-size:28px;
  font-weight:900;
}

/* CHART */
.chart-wrap{
  max-width:250px;
  margin:auto;
}

.section{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

.section-title{
  font-weight:900;
}

.section-subtitle{
  color:#777;
  font-size:13px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
  <img src="logo_complex.png">
  <div class="title">Jabri Complex</div>
  <div class="subtitle">Tenant Portal</div>
</div>

<!-- BOXES -->
<div class="grid">
  <div id="rentCard" class="box">
    <div class="label">الإيجار</div>
    <div id="rent" class="big">0</div>
  </div>

  <div id="balanceCard" class="box">
    <div class="label">الرصيد</div>
    <div id="balance" class="big">0</div>
  </div>

  <div id="creditCard" class="box">
    <div class="label">إجمالي الدائن</div>
    <div id="credit" class="big">0</div>
  </div>

  <div id="debitCard" class="box">
    <div class="label">إجمالي المدين</div>
    <div id="debit" class="big">0</div>
  </div>
</div>

<!-- CHART -->
<div class="section">
  <h3 class="section-title">نسبة المدفوع مقابل المتبقي</h3>
  <p class="section-subtitle">عرض بصري مبسط لحالة الحساب</p>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

</div>

<script>
let chart

function loadData(){

  // 🔥 مثال بيانات (استبدلها من supabase عندك)
  const debit = 3866
  const credit = 200
  const balance = 3666
  const rent = 1836

  document.getElementById('debit').innerText = debit
  document.getElementById('credit').innerText = credit
  document.getElementById('balance').innerText = balance
  document.getElementById('rent').innerText = rent

  const debitCard = document.getElementById('debitCard')
  const creditCard = document.getElementById('creditCard')
  const balanceCard = document.getElementById('balanceCard')
  const rentCard = document.getElementById('rentCard')

  debitCard.className = 'box blue-card'
  rentCard.className = 'box orange-card'

  // CREDIT
  if (credit > 0){
    creditCard.className = 'box green-card'
  } else {
    creditCard.className = 'box credit-zero'
  }

  // BALANCE
  if (balance > 0){
    balanceCard.className = 'box balance-negative'
  } else {
    balanceCard.className = 'box balance-positive'
  }

  // CHART
  if(chart) chart.destroy()

  chart = new Chart(document.getElementById('chart'), {
    type:'doughnut',
    data:{
      labels:['مدفوع','متبقي'],
      datasets:[{
        data:[credit, balance],
        backgroundColor:['#18a957','#e05252'],
        cutout:'70%'
      }]
    },
    options:{
      plugins:{
        legend:{display:false}
      }
    }
  })
}

loadData()
</script>

</body>
</html>
