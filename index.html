<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jabri Complex</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #182033;
    }

    .topbar {
      background: #fff;
      padding: 18px;
      border-bottom: 1px solid #eee;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 12px;
    }

    .brand-title {
      font-weight: bold;
      font-size: 18px;
    }

    .page {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 15px;
      border: 1px solid #eceff5;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #182033;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      display: none;
    }

    .name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .code {
      color: #667085;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .box {
      padding: 20px;
      border-radius: 16px;
      text-align: center;
    }

    .blue { background: #eef4ff; color:#2f6fed; }
    .green { background: #edf8f1; color:#18a957; }
    .purple { background: #f5eefc; color:#8d3df2; }
    .orange { background: #fff6ea; color:#d68a1d; }

    .num {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .label {
      font-size: 15px;
      color: #4b5563;
      font-weight: bold;
    }

    .error {
      color: #c62828;
      display: none;
      margin-top: 10px;
      font-weight: bold;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <img src="logo_complex.png" alt="logo">
      <div class="brand-title">Jabri Complex</div>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <h3>بحث المستأجر</h3>
      <input id="tenantCode" placeholder="JC-01">
      <button onclick="searchTenant()">بحث</button>
      <div id="errorMsg" class="error">غير موجود</div>
    </div>

    <div id="result" class="card result">
      <div class="name" id="name"></div>
      <div class="code" id="code"></div>

      <div class="grid">
        <div class="box blue">
          <div id="debit" class="num">0</div>
          <div class="label">إجمالي المدين</div>
        </div>

        <div class="box green">
          <div id="credit" class="num">0</div>
          <div class="label">إجمالي الدائن</div>
        </div>

        <div class="box purple">
          <div id="balance" class="num">0</div>
          <div class="label">الرصيد</div>
        </div>

        <div class="box orange">
          <div id="rent" class="num">0</div>
          <div class="label">إيجار السنة</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://gzukfvxcpfblzqyjzkoz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
    )

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('en-US')
    }

    window.searchTenant = async function () {
      const code = document.getElementById('tenantCode').value.trim()
      const error = document.getElementById('errorMsg')
      const result = document.getElementById('result')

      error.style.display = 'none'
      result.style.display = 'none'

      if (!code) {
        error.textContent = 'أدخل رمز المستأجر'
        error.style.display = 'block'
        return
      }

      const { data: t, error: tError } = await supabase
        .from('tenants')
        .select('tenant_code, tenant_name')
        .eq('tenant_code', code)
        .maybeSingle()

      if (tError) {
        console.error('tenants error:', tError)
        error.textContent = 'مشكلة في قراءة بيانات المستأجر'
        error.style.display = 'block'
        return
      }

      if (!t) {
        error.textContent = 'الرمز غير موجود'
        error.style.display = 'block'
        return
      }

      const { data: s, error: sError } = await supabase
        .from('tenant_summary')
        .select('*')
        .eq('رمز_المستأجر', code)
        .maybeSingle()

      if (sError) {
        console.error('tenant_summary error:', sError)
        error.textContent = 'مشكلة في قراءة الملخص المالي'
        error.style.display = 'block'
        return
      }

      if (!s) {
        error.textContent = 'لا يوجد ملخص مالي لهذا المستأجر'
        error.style.display = 'block'
        return
      }

      document.getElementById('name').innerText = t.tenant_name || ''
      document.getElementById('code').innerText = t.tenant_code || ''
      document.getElementById('debit').innerText = formatNumber(s["إجمالي_المدين"])
      document.getElementById('credit').innerText = formatNumber(s["إجمالي_الدائن"])
      document.getElementById('balance').innerText = formatNumber(s["الرصيد"])
      document.getElementById('rent').innerText = formatNumber(s["إيجار_السنة"])

      result.style.display = 'block'
    }
  </script>

</body>
</html>
