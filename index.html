<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Jabri Complex</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  margin: 0;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
  background: white;
  border-bottom: 1px solid #eee;
}

/* CARDS GRID */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  padding: 20px;
}

/* ====== الملخص المالي (الأصلي) ====== */
.card {
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  font-weight: bold;
}

/* ألوان */
.card.orange { background: #fff4e5; color: #d97706; }
.card.purple { background: #f3f0ff; color: #7c3aed; }
.card.green  { background: #e6f4ea; color: #16a34a; }
.card.blue   { background: #e8f0fe; color: #2563eb; }

/* ====== حالة السداد ====== */
.section {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 16px;
}

/* 🔥 نفس ستايل الملخص المالي */
.status-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 15px;
}

/* نفس card بالضبط */
.status-card {
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  font-weight: bold;
}

/* نفس الألوان */
.status-card:nth-child(1) { background: #f3f0ff; color: #7c3aed; }
.status-card:nth-child(2) { background: #e6f4ea; color: #16a34a; }
.status-card:nth-child(3) { background: #fff4e5; color: #d97706; }
.status-card:nth-child(4) { background: #e8f0fe; color: #2563eb; }

/* hover */
.status-card:hover {
  transform: translateY(-3px);
  transition: 0.2s;
}
</style>
</head>

<body>

<div class="header">
  <h2>Jabri Complex</h2>
</div>

<!-- ====== الملخص المالي ====== -->
<div class="cards">
  <div class="card orange">الإيجار<br>1,836</div>
  <div class="card purple">الرصيد<br>3,666</div>
  <div class="card green">إجمالي الدائن<br>200</div>
  <div class="card blue">إجمالي المدين<br>3,866</div>
</div>

<!-- ====== حالة السداد ====== -->
<div class="section">
  <h3>حالة السداد</h3>

  <div class="status-cards">
    <div class="status-card">نسبة المتبقي<br>95%</div>
    <div class="status-card">نسبة السداد<br>5%</div>
    <div class="status-card">المتبقي<br>3,666</div>
    <div class="status-card">المدفوع<br>200</div>
  </div>
</div>

</body>
</html>
