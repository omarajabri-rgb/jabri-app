<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
            --soft-shadow: 0 14px 30px rgba(120,95,56,0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            direction: rtl;
            text-align: right;
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand strong {
            color: var(--gold-deep);
            font-size: 18px;
            font-weight: 900;
        }

        .brand small {
            display: block;
            font-size: 11px;
            letter-spacing: 1.8px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .ghost-btn {
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid rgba(201,164,107,0.18);
            background: rgba(255,255,255,0.70);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
        }

        .hero-card {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: right;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            backdrop-filter: blur(16px);
            position: relative;
        }

        .hero-status {
            position: absolute;
            left: 18px;
            top: 18px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
            box-shadow: 0 4px 12px rgba(120,95,56,0.08);
        }

        .hero-status.paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.24);
        }

        .hero-status.partial {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.22);
        }

        .hero-card h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
            padding-left: 110px;
        }

        .hero-note {
            margin-top: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
        }

        .chip-header {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 12px;
            width: 100%;
            padding-right: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.5px;
            min-width: 120px;
            color: #fff;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            box-shadow: 0 6px 16px rgba(201,164,107,0.25);
        }

        .stats-grid,
        .content-grid {
            display: grid;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stats-grid {
            grid-template-columns: 1fr 1fr;
        }

        .content-grid {
            grid-template-columns: 1fr;
        }

        .soft-card,
        .smart-card,
        .panel {
            border-radius: 26px;
            border: 1px solid rgba(201,164,107,0.18);
            background: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            box-shadow: var(--soft-shadow);
            padding: 24px;
        }

        .soft-card {
            text-align: center;
        }

        .soft-card span {
            display: block;
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .soft-card b {
            display: block;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .credit-card {
            background: linear-gradient(135deg, rgba(47,158,111,0.12), rgba(255,255,255,0.25));
            border-color: rgba(47,158,111,0.24);
            color: var(--success);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(201,90,82,0.10), rgba(255,255,255,0.25));
            border-color: rgba(201,90,82,0.22);
            color: var(--danger);
        }

        .smart-body {
            font-size: 16px;
            line-height: 1.9;
            font-weight: 800;
            color: var(--text);
            text-align: right;
            padding-right: 5px;
            margin-top: 10px;
        }

        .chart-wrap {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notify-item {
            padding: 14px 18px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 900;
            background: #fff;
            border: 1px solid rgba(201,164,107,0.20);
            text-align: center;
            color: var(--muted);
            width: 100%;
            box-shadow: 0 6px 16px rgba(120,95,56,0.08);
            margin-top: 10px;
            line-height: 1.7;
        }

        .notify-item.good {
            color: var(--success);
            border-color: rgba(47,158,111,0.24);
            background: linear-gradient(135deg, rgba(47,158,111,0.08), rgba(255,255,255,0.94));
        }

        .notify-item.warn {
            color: var(--danger);
            border-color: rgba(201,90,82,0.22);
            background: linear-gradient(135deg, rgba(201,90,82,0.08), rgba(255,255,255,0.94));
        }

        .action-btn {
            width: 100%;
            max-width: 300px;
            margin: 24px auto 0;
            padding: 16px;
            border-radius: 24px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            box-shadow: 0 18px 35px rgba(201,164,107,0.25);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.55s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media screen and (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }

            .hero-card h1 {
                font-size: 24px;
                padding-left: 90px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .soft-card b {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="topbar reveal">
            <div class="brand">
                <small>MANAGED BUSINESS SPACES</small>
                <strong>JABRI COMPLEX</strong>
            </div>
            <button class="ghost-btn" onclick="logout()">
                <i data-lucide="log-out"></i> خروج
            </button>
        </div>

        <section class="hero-card reveal">
            <span id="account_status_chip" class="hero-status partial">-</span>
            <h1 id="t_name">...</h1>
            <div id="last_update" class="hero-note">-</div>
        </section>

        <div class="stats-grid">
            <div class="soft-card credit-card reveal">
                <span>دائن</span>
                <b id="val_credit">0</b>
            </div>
            <div class="soft-card balance-card reveal">
                <span>الرصيد</span>
                <b id="val_balance">0</b>
            </div>
        </div>

        <div class="smart-card reveal">
            <div class="chip-header">
                <div class="chip">نصيحة محاسبية</div>
            </div>
            <div id="smart_message" class="smart-body">لا توجد نصيحة محاسبية حالياً.</div>
        </div>

        <section class="panel reveal">
            <div class="chip-header">
                <div class="chip">إشعارات</div>
            </div>
            <div id="notifications_box">
                <div class="notify-item">لا توجد إشعارات حالياً</div>
            </div>
        </section>

        <div class="content-grid">
            <section class="panel reveal">
                <div class="chip-header">
                    <div class="chip">ملخص الحساب</div>
                </div>
                <div class="chart-wrap">
                    <canvas id="balancePieChart"></canvas>
                </div>
            </section>
        </div>

        <button class="action-btn reveal" onclick="goToStatement()">
            <i data-lucide="file-text"></i> كشف الحساب
        </button>

        <div class="footer reveal">© 2026 مجمع الجبري الصناعي التجاري</div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function toNumber(v) {
            return isNaN(parseFloat(v)) ? 0 : parseFloat(v);
        }

        function formatCurrency(v) {
            return `${Math.round(toNumber(v)).toLocaleString('en-US')} `;
        }

        function formatNow() {
            const now = new Date();
            return `آخر تحديث: ${now.toLocaleDateString('en-GB')} - ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
        }

        async function init() {
            try {
                const { data: tenant } = await supabaseClient
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .maybeSingle();

                const { data: tx } = await supabaseClient
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode);

                const tx2026 = (tx || []).filter(t => new Date(t.date).getFullYear() === 2026);
                const daen2026 = tx2026.reduce((sum, t) => sum + toNumber(t.credit), 0);
                const debit2026 = tx2026.reduce((sum, t) => sum + toNumber(t.debit), 0);
                const balance2026 = Math.max(0, debit2026 - daen2026);
                const rate = debit2026 > 0 ? Math.round((daen2026 / debit2026) * 100) : 0;

                document.getElementById('t_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('last_update').innerText = formatNow();

                const chip = document.getElementById('account_status_chip');
                chip.innerText = balance2026 === 0 ? 'مسدد' : 'جزئي';
                chip.className = balance2026 === 0 ? 'hero-status paid' : 'hero-status partial';

                document.getElementById('val_credit').innerText = formatCurrency(daen2026);
                document.getElementById('val_balance').innerText = formatCurrency(balance2026);

                const storedAdvice = localStorage.getItem(`advice_${tenantCode}`);
                if (storedAdvice) {
                    document.getElementById('smart_message').innerText = storedAdvice;
                }

                const rawNotification = localStorage.getItem(`notify_${tenantCode}`);
                if (rawNotification) {
                    try {
                        const notification = JSON.parse(rawNotification);
                        const typeClass = notification.type === 'friendly' ? 'good' : 'warn';
                        document.getElementById('notifications_box').innerHTML = `
                            <div class="notify-item ${typeClass}">${notification.message}</div>
                        `;
                    } catch (e) {
                        document.getElementById('notifications_box').innerHTML = `
                            <div class="notify-item">لا توجد إشعارات حالياً</div>
                        `;
                    }
                }

                new Chart(document.getElementById('balancePieChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['رصيد', 'دائن'],
                        datasets: [{
                            data: [balance2026, daen2026],
                            backgroundColor: ['#c95a52', '#2f9e6f'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        cutout: '78%',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    usePointStyle: true,
                                    boxWidth: 10,
                                    color: '#5d5347',
                                    font: { family: 'Tajawal', weight: '700' }
                                }
                            }
                        }
                    },
                    plugins: [{
                        id: 'centerText',
                        beforeDraw(chart) {
                            const { width, height, ctx } = chart;
                            ctx.restore();
                            ctx.font = "bold 22px Tajawal";
                            ctx.fillStyle = "#2f2a24";
                            ctx.textBaseline = "middle";
                            const text = `${rate}%`;
                            ctx.fillText(text, (width - ctx.measureText(text).width) / 2, height / 2);
                            ctx.save();
                        }
                    }]
                });

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.querySelectorAll('.reveal').forEach((el, i) => setTimeout(() => el.classList.add('active'), i * 50));
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            }
        }

        function goToStatement() {
            window.location.href = `statement.html?tenant=${encodeURIComponent(tenantCode)}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = init;
    </script>
</body>
</html>
