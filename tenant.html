<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | لوحة المستأجر</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.72);
            --surface-strong: rgba(255,255,255,0.88);
            --card-border: rgba(201, 164, 107, 0.22);
            --text: #2f2a24;
            --muted: #7d7468;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --warning: #c88a1e;
            --danger: #cc5a50;
            --info: #5f89c5;
            --shadow: 0 18px 40px rgba(120, 95, 56, 0.10);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(201,164,107,0.12), transparent 28%),
                radial-gradient(circle at bottom right, rgba(177,138,82,0.10), transparent 26%),
                linear-gradient(135deg, var(--bg), var(--bg-2));
            padding: 16px;
            opacity: 0;
            transition: opacity 0.45s ease;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            z-index: 9999;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 3px solid rgba(201,164,107,0.18);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding-bottom: 42px;
            position: relative;
            z-index: 1;
        }

        .reveal {
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.55s cubic-bezier(.2,.8,.2,1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand small {
            font-size: 11px;
            letter-spacing: 1.8px;
            color: var(--muted);
            font-weight: 800;
        }

        .brand strong {
            color: var(--gold-deep);
            font-size: 18px;
            font-weight: 900;
        }

        .ghost-btn {
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.55);
            color: var(--muted);
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .hero-card {
            border-radius: var(--radius-xl);
            padding: 26px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .hero-title {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .hero-sub {
            margin: 8px 0 0;
            font-size: 13px;
            color: var(--muted);
            font-weight: 700;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(255,255,255,0.65);
            color: var(--muted);
            border: 1px solid rgba(201,164,107,0.16);
        }

        .stats-grid {
            display: grid;
            gap: 14px;
            margin-bottom: 16px;
            grid-template-columns: 1fr 1fr;
        }

        .chart-grid, .smart-grid {
            display: grid;
            gap: 14px;
            margin-bottom: 16px;
            grid-template-columns: 1fr 1.35fr;
        }

        .smart-grid { grid-template-columns: repeat(2, 1fr); }

        .stat-card, .panel, .smart-card {
            border-radius: var(--radius-lg);
            padding: 18px;
        }

        .stat-card {
            background: var(--surface-strong);
            border: 1px solid rgba(201,164,107,0.15);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-card span {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 8px;
        }

        .stat-card b {
            display: block;
            font-size: 22px;
            font-weight: 900;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .panel-title {
            font-size: 17px;
            font-weight: 900;
            color: var(--text);
        }

        .chart-wrap {
            position: relative;
            min-height: 290px;
        }

        .smart-card {
            position: relative;
            overflow: hidden;
            padding: 12px;
            font-size: 13px;
        }

        .smart-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-right: 5px solid var(--gold);
            pointer-events: none;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 12px;
        }

        .smart-body {
            line-height: 1.8;
            font-weight: 700;
            color: var(--text);
        }

        .risk-chip {
            display: inline-flex;
            margin-top: 12px;
            padding: 7px 12px;
            border-radius: 999px;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn {
            width: 100%;
            padding: 17px 18px;
            border-radius: 18px;
            border: none;
            font-size: 15px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        .btn-gold {
            color: #fff;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            box-shadow: 0 14px 24px rgba(201,164,107,0.22);
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
            margin-top: 8px;
        }

        @media (max-width: 900px) {
            .chart-grid, .smart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="app">
        <div class="topbar reveal">
            <div class="brand">
                <small>MANAGED BUSINESS SPACES FOR LEASE</small>
                <strong>JABRI COMPLEX</strong>
            </div>
            <button class="ghost-btn" onclick="logout()">
                <i data-lucide="log-out"></i> خروج
            </button>
        </div>

        <section class="hero-card glass reveal">
            <div style="position:absolute; left:20px; top:20px;">
                <span id="account_status_chip" style="
                    padding:8px 14px;
                    border-radius:999px;
                    font-size:12px;
                    font-weight:900;
                    background:#cc5a50;
                    color:#fff;
                ">متابعة</span>
            </div>

            <h1 id="t_name" class="hero-title">...</h1>
            <p id="t_unit" class="hero-sub">...</p>

            <div class="meta-row">
                <div class="meta-chip"><i data-lucide="calendar-range"></i><span id="year_info">سنة 2026</span></div>
                <div class="meta-chip"><i data-lucide="clock-3"></i><span id="last_update">-</span></div>
            </div>
        </section>

        <div class="stats-grid">
            <div class="stat-card reveal">
                <span>إجمالي المدفوع</span>
                <b id="val_credit">0</b>
            </div>
            <div class="stat-card reveal">
                <span>الرصيد المتبقي</span>
                <b id="val_balance">0</b>
            </div>
        </div>

        <div class="chart-grid">
            <section class="panel glass reveal">
                <div class="panel-head">
                    <div class="panel-title">حالة الحساب</div>
                </div>
                <div class="chart-wrap"><canvas id="balancePieChart"></canvas></div>
            </section>

            <section class="panel glass reveal">
                <div class="panel-head">
                    <div class="panel-title">حركة الدفعات</div>
                </div>
                <div class="chart-wrap"><canvas id="paymentLineChart"></canvas></div>
            </section>
        </div>

        <div class="smart-grid">
            <section class="smart-card glass reveal" id="smart_box">
                <div class="tag" id="status_tag">الحالة المالية</div>
                <div id="smart_icon" style="margin-bottom:10px;"></div>
                <div id="smart_message" class="smart-body">جاري التحليل...</div>
            </section>

            <section class="smart-card glass reveal" id="advice_box">
                <div class="tag" id="advice_tag">التوصية المالية</div>
                <div id="advice_icon" style="margin-bottom:10px;"></div>
                <div id="advice_message" class="smart-body">جاري إعداد التوصية...</div>
            </section>
        </div>

        <div class="actions reveal">
            <button class="btn btn-gold" onclick="goToStatement()">
                <i data-lucide="file-text"></i> كشف الحساب
            </button>
        </div>

        <div class="footer reveal" id="footer_year"></div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let dbData = {};
        let transactions = [];
        let pieChart = null;
        let lineChart = null;

        function toNumber(value) { return isNaN(parseFloat(value)) ? 0 : parseFloat(value); }
        function formatCurrency(v) { return `${toNumber(v).toLocaleString('en-US', {minimumFractionDigits: 3})} د.أ`; }

        function animateValue(id, end) {
            const el = document.getElementById(id);
            let start = 0;
            const duration = 800;
            let startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                el.textContent = formatCurrency(start + (end - start) * progress);
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function buildCharts(paid, balance) {
            if (pieChart) pieChart.destroy();
            if (lineChart) lineChart.destroy();

            pieChart = new Chart(document.getElementById('balancePieChart'), {
                type: 'pie',
                data: {
                    labels: ['المدفوع', 'المتبقي'],
                    datasets: [{
                        data: [paid, Math.max(0, balance)],
                        backgroundColor: ['#2f9e6f', '#cc5a50'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Tajawal', weight: '700' } } },
                        title: {
                            display: true,
                            text: `المدفوع ${formatCurrency(paid)} | المتبقي ${formatCurrency(balance)}`,
                            font: { size: 14, family:'Tajawal', weight:'bold' }
                        }
                    }
                }
            });

            const creditTx = [...transactions].filter(t => toNumber(t.credit) > 0 && new Date(t.date).getFullYear() === 2026).sort((a, b) => new Date(a.date) - new Date(b.date));
            lineChart = new Chart(document.getElementById('paymentLineChart'), {
                type: 'line',
                data: {
                    labels: creditTx.length ? creditTx.map(t => new Date(t.date).toLocaleDateString('ar-JO')) : ['-'],
                    datasets: [{
                        label: 'قيمة الدفعة',
                        data: creditTx.length ? creditTx.map(t => toNumber(t.credit)) : [0],
                        borderColor: '#c9a46b',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updateUI() {
            document.querySelectorAll('.reveal').forEach((el, i) => setTimeout(() => el.classList.add('active'), 50 + (i * 40)));

            const yearFiltered = transactions.filter(t => new Date(t.date).getFullYear() === 2026);
            const totalDebits = yearFiltered.reduce((s,t)=>s+toNumber(t.debit), 0);
            const totalCredits = yearFiltered.reduce((s,t)=>s+toNumber(t.credit), 0);
            const balance = totalDebits - totalCredits;

            const badgeText = balance === 0 ? 'منتظم' : (balance <= 500 ? 'تنبيه' : 'متابعة');
            const statusChip = document.getElementById('account_status_chip');
            statusChip.innerText = badgeText;
            statusChip.style.background = balance === 0 ? '#2f9e6f' : (balance <= 500 ? '#c88a1e' : '#cc5a50');

            document.getElementById('t_name').innerText = dbData.tenant_name || '-';
            document.getElementById('t_unit').innerText = `الوحدة: ${dbData.shop_no || '-'} • رمز: ${tenantCode}`;
            document.getElementById('val_balance').style.color = balance === 0 ? '#2f9e6f' : '#cc5a50';
            document.getElementById('val_credit').style.color = '#2f9e6f';
            document.getElementById('footer_year').innerText = `© 2026 مجمع الجبري الصناعي التجاري`;

            animateValue('val_credit', totalCredits);
            animateValue('val_balance', balance);
            buildCharts(totalCredits, balance);

            // Smart Logic
            const smartBox = document.getElementById('smart_box');
            const smartMsg = document.getElementById('smart_message');
            if(balance === 0) {
                smartBox.querySelector('.tag').style.background = '#2f9e6f';
                smartMsg.innerText = "حسابك مكتمل لعام 2026، شكراً لالتزامك.";
            } else {
                smartBox.querySelector('.tag').style.background = balance <= 500 ? '#c88a1e' : '#cc5a50';
                smartMsg.innerText = `يوجد رصيد مستحق بقيمة ${formatCurrency(balance)} يرجى مراجعته.`;
            }

            if (window.lucide) lucide.createIcons();
        }

        function goToStatement() { window.location.href = `statement.html?tenant=${encodeURIComponent(tenantCode)}`; }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        window.onload = async () => {
            const { data: tenant } = await supabaseClient.from('tenants').select('*').eq('tenant_code', tenantCode).maybeSingle();
            const { data: tx } = await supabaseClient.from('tenant_transactions').select('*').eq('tenant_code', tenantCode);
            dbData = tenant;
            transactions = tx || [];
            document.getElementById('loader').style.display = 'none';
            document.body.style.opacity = '1';
            updateUI();
        };
    </script>
</body>
</html>
