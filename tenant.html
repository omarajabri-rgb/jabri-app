<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر المحدثة</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
            --neutral: #8b7f70;

            --glass-bg: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            --glass-card-bg: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            --glass-border: 1px solid rgba(201,164,107,0.18);
            --glass-shadow: 0 12px 28px rgba(120,95,56,0.08);
            --glass-soft-shadow: 0 14px 30px rgba(120,95,56,0.08);
            --glass-blur: blur(14px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            direction: rtl;
            text-align: right;
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand strong {
            color: var(--gold-deep);
            font-size: 18px;
            font-weight: 900;
        }

        .brand small {
            display: block;
            font-size: 10px;
            letter-spacing: 1.4px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .ghost-btn {
            padding: 12px 16px;
            border-radius: 16px;
            border: var(--glass-border);
            background: rgba(255,255,255,0.70);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .ghost-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 26px rgba(120,95,56,0.12);
        }

        .hero-card {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: right;
            background: var(--glass-bg);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
        }

        .hero-status {
            position: absolute;
            left: 18px;
            top: 18px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.4px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .hero-status.paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.25);
        }

        .hero-status.partial {
            background: rgba(195,138,46,0.12);
            color: var(--warning);
            border: 1px solid rgba(195,138,46,0.25);
        }

        .hero-status.late {
            background: rgba(201,90,82,0.10);
            color: var(--danger);
            border: 1px solid rgba(201,90,82,0.25);
        }

        .hero-card h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
            padding-left: 110px;
        }

        .hero-note {
            margin-top: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
        }

        .hero-due {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 16px;
            background: rgba(201,164,107,0.12);
            border: 1px solid rgba(201,164,107,0.22);
            color: var(--gold-deep);
            font-size: 14px;
            font-weight: 900;
        }

        .hero-due b {
            color: var(--text);
            font-size: 18px;
        }

        .chip-header {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 12px;
            width: 100%;
            padding-right: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 999px;
            min-width: 100px;
            font-size: 12px;
            font-weight: 900;
            color: var(--gold-deep);
            background: rgba(201,164,107,0.12);
            border: 1px solid rgba(201,164,107,0.22);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.40);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 22px;
        }

        .soft-card {
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            text-align: center;
            padding: 22px;
        }

        .soft-card span {
            display: block;
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .soft-card b {
            display: block;
            font-size: 30px;
            font-weight: 900;
        }

        .credit-card {
            background: linear-gradient(135deg, rgba(47,158,111,0.12), rgba(255,255,255,0.25));
            border-color: rgba(47,158,111,0.24);
            color: var(--success);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(201,90,82,0.10), rgba(255,255,255,0.25));
            border-color: rgba(201,90,82,0.22);
            color: var(--danger);
        }

        .panel {
            padding: 24px;
            margin-bottom: 22px;
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .smart-body {
            font-size: 16px;
            line-height: 2.05;
            font-weight: 800;
            color: var(--text);
            text-align: right;
            margin-top: 10px;
            white-space: pre-line;
        }

        .highlight-number {
            display: inline-block;
            padding: 4px 10px;
            margin: 0 3px;
            border-radius: 10px;
            font-weight: 900;
            color: var(--gold-deep);
            background: rgba(201,164,107,0.15);
            border: 1px solid rgba(201,164,107,0.25);
            backdrop-filter: blur(6px);
        }

        .pie-text-stats {
            margin-top: 16px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            font-size: 15px;
            font-weight: 900;
        }

        .pie-text-item {
            color: var(--muted);
        }

        .pie-text-item b {
            font-weight: 900;
            margin-right: 4px;
        }

        .pie-text-item.paid b {
            color: var(--success);
        }

        .pie-text-item.balance b {
            color: var(--danger);
        }

        .chart-wrap {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            position: relative;
        }

        .timeline-wrap {
            min-height: 300px;
        }

        .line-insight {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 900;
            text-align: center;
            border: 1px solid transparent;
        }

        .line-insight.good {
            color: var(--success);
            background: rgba(47,158,111,0.10);
            border-color: rgba(47,158,111,0.18);
        }

        .line-insight.warning {
            color: var(--danger);
            background: rgba(201,90,82,0.10);
            border-color: rgba(201,90,82,0.18);
        }

        .line-insight.neutral {
            color: var(--neutral);
            background: rgba(139,127,112,0.10);
            border-color: rgba(139,127,112,0.18);
        }

        #notifications_box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .notify-empty {
            padding: 16px;
            border-radius: 18px;
            text-align: center;
            color: var(--muted);
            font-weight: 800;
            background: rgba(255,255,255,0.45);
            border: 1px dashed rgba(201,164,107,0.24);
        }

        .notify-card {
            padding: 16px 18px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.65), rgba(247,244,237,0.75));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 6px 18px rgba(120,95,56,0.08);
            position: relative;
            overflow: hidden;
        }

        .notify-card::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .notify-card.legal::before {
            background: linear-gradient(90deg, transparent, #c95a52, transparent);
        }

        .notify-card.lawyer::before {
            background: linear-gradient(90deg, transparent, #7a1f1f, transparent);
        }

        .notify-title {
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 6px;
            color: var(--gold-deep);
        }

        .notify-card.legal .notify-title,
        .notify-card.lawyer .notify-title {
            color: var(--danger);
        }

        .notify-message {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .notify-date {
            margin-top: 6px;
            font-size: 10px;
            font-weight: 800;
            color: var(--muted);
        }

        .action-btn {
            width: 100%;
            max-width: 300px;
            margin: 24px auto 0;
            padding: 16px;
            border-radius: 24px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            box-shadow: 0 18px 35px rgba(201,164,107,0.25);
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 38px rgba(201,164,107,0.28);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.55s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .chart-wrap {
                min-height: 240px;
            }

            .timeline-wrap {
                min-height: 280px;
            }

            .hero-card h1 {
                padding-left: 0;
                padding-top: 34px;
                font-size: 24px;
            }

            .hero-status {
                left: 14px;
                top: 14px;
            }

            .hero-due {
                display: flex;
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="topbar reveal">
            <div class="brand">
                <small>MANAGED BUSINESS SPACES</small>
                <strong>JABRI COMPLEX</strong>
            </div>
            <button class="ghost-btn" onclick="logout()">
                <i data-lucide="log-out"></i> خروج
            </button>
        </div>

        <section class="hero-card reveal">
            <span id="account_status_chip" class="hero-status partial">-</span>
            <h1 id="t_name">...</h1>
            <div id="last_update" class="hero-note">-</div>
            <div class="hero-due">
                المطلوب الآن
                <b id="due_now_value">0 د.أ</b>
            </div>
        </section>

        <div class="stats-grid">
            <div class="soft-card credit-card reveal">
                <span>المدفوع</span>
                <b id="val_credit">0</b>
            </div>
            <div class="soft-card balance-card reveal">
                <span>المتبقي</span>
                <b id="val_balance">0</b>
            </div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">نصيحة محاسبية</div>
            </div>
            <div id="smart_message" class="smart-body">تحليل البيانات...</div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">إشعار</div>
            </div>
            <div id="notifications_box">
                <div class="notify-empty">لا توجد إشعارات حالياً</div>
            </div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">وضع الحساب</div>
            </div>
            <div class="chart-wrap">
                <canvas id="balancePieChart"></canvas>
            </div>
            <div class="pie-text-stats">
                <span class="pie-text-item paid">المدفوع: <b id="pie_paid_value">0</b></span>
                <span class="pie-text-item balance">المتبقي: <b id="pie_balance_value">0</b></span>
            </div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">اتجاه المتبقي خلال سنتين</div>
            </div>
            <div class="chart-wrap timeline-wrap">
                <canvas id="timelineChart"></canvas>
            </div>
            <div id="line_insight" class="line-insight neutral">لا توجد بيانات كافية للمقارنة حالياً</div>
        </div>

        <button class="action-btn reveal" onclick="goToStatement()">
            <i data-lucide="file-text"></i> كشف الحساب بالتفصيل
        </button>

        <div class="footer reveal">© 2026 مجمع الجبري الصناعي التجاري</div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let pieChartInstance = null;
        let timelineChartInstance = null;

        function toNumber(v) {
            const num = parseFloat(String(v ?? 0).replace(/,/g, ''));
            return isNaN(num) ? 0 : num;
        }

        function formatNumber(v) {
            return String(Math.round(toNumber(v)));
        }

        function formatMoney(v) {
            return `${formatNumber(v)} د.أ`;
        }

        function formatNotificationDate(value) {
            const d = new Date(value);
            return isNaN(d)
                ? ''
                : d.toLocaleDateString('en-GB') + ' - ' + d.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
        }

        function formatRealLastUpdate(value) {
            if (!value) return `آخر تحديث: ${new Date().toLocaleDateString('en-GB')}`;
            const d = new Date(value);
            if (isNaN(d)) return `آخر تحديث: ${new Date().toLocaleDateString('en-GB')}`;

            return `آخر تحديث: ${d.toLocaleDateString('en-GB')} - ${d.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            })}`;
        }

        function formatEnglishDate(value) {
            if (!value) return '—';
            const d = new Date(value);
            return isNaN(d) ? '—' : d.toLocaleDateString('en-GB');
        }

        function getPriorityByType(type) {
            if (type === 'lawyer') return 1;
            if (type === 'legal') return 2;
            if (type === 'third') return 3;
            if (type === 'second') return 4;
            if (type === 'first') return 5;
            return 6;
        }

        function getCurrentAndPreviousSummaries(summaryRows) {
            const rows = (summaryRows || [])
                .filter(row => Number(row.year) > 0)
                .sort((a, b) => Number(a.year) - Number(b.year));

            if (!rows.length) {
                return {
                    currentSummary: null,
                    previousSummary: null,
                    chartRows: []
                };
            }

            const currentSummary = rows[rows.length - 1];
            const previousSummary = rows.length > 1 ? rows[rows.length - 2] : null;

            return {
                currentSummary,
                previousSummary,
                chartRows: [previousSummary, currentSummary].filter(Boolean)
            };
        }

        function addMonthsSafe(dateInput, months) {
            const d = new Date(dateInput);
            if (isNaN(d.getTime())) return null;

            const originalDay = d.getDate();
            d.setDate(1);
            d.setMonth(d.getMonth() + months);

            const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
            d.setDate(Math.min(originalDay, lastDay));
            return d;
        }

        function getCycleBaseDate(contractDate, referenceDate = new Date()) {
            const contract = new Date(contractDate);
            if (isNaN(contract.getTime())) return null;

            const candidate = new Date(
                referenceDate.getFullYear(),
                contract.getMonth(),
                contract.getDate()
            );

            if (referenceDate < candidate) {
                candidate.setFullYear(candidate.getFullYear() - 1);
            }

            return candidate;
        }

        function getInstallmentPlan(contractDate, annualAmount, previousBalance = 0, referenceDate = new Date()) {
            const safeAnnual = Math.max(0, toNumber(annualAmount));
            const installmentAmount = safeAnnual / 3;
            const safePreviousBalance = Math.max(0, toNumber(previousBalance));

            const base = getCycleBaseDate(contractDate, referenceDate);

            if (!base) {
                const year = referenceDate.getFullYear();
                const firstDate = new Date(year, 0, 1);
                const secondDate = new Date(year, 5, 1);
                const thirdDate = new Date(year, 8, 1);

                let dueUntilToday = safePreviousBalance;
                let currentInstallmentValue = safePreviousBalance + installmentAmount;
                let currentInstallmentDate = firstDate;

                if (referenceDate >= firstDate) {
                    dueUntilToday = safePreviousBalance + installmentAmount;
                    currentInstallmentValue = safePreviousBalance + installmentAmount;
                    currentInstallmentDate = firstDate;
                }

                if (referenceDate >= secondDate) {
                    dueUntilToday = safePreviousBalance + (installmentAmount * 2);
                    currentInstallmentValue = installmentAmount;
                    currentInstallmentDate = secondDate;
                }

                if (referenceDate >= thirdDate) {
                    dueUntilToday = safePreviousBalance + (installmentAmount * 3);
                    currentInstallmentValue = installmentAmount;
                    currentInstallmentDate = thirdDate;
                }

                const nextInstallment =
                    referenceDate < firstDate ? { label: 'القسط الأول', date: firstDate, amount: safePreviousBalance + installmentAmount } :
                    referenceDate < secondDate ? { label: 'القسط الثاني', date: secondDate, amount: installmentAmount } :
                    referenceDate < thirdDate ? { label: 'القسط الثالث', date: thirdDate, amount: installmentAmount } :
                    { label: 'القسط الأول', date: new Date(year + 1, 0, 1), amount: safePreviousBalance + installmentAmount };

                return { installmentAmount, currentInstallmentValue, currentInstallmentDate, dueUntilToday, nextInstallment };
            }

            const firstDate = new Date(base);
            const secondDate = addMonthsSafe(base, 5);
            const thirdDate = addMonthsSafe(base, 8);

            let dueUntilToday = safePreviousBalance;
            let currentInstallmentValue = safePreviousBalance + installmentAmount;
            let currentInstallmentDate = firstDate;

            if (referenceDate >= firstDate) {
                dueUntilToday = safePreviousBalance + installmentAmount;
                currentInstallmentValue = safePreviousBalance + installmentAmount;
                currentInstallmentDate = firstDate;
            }

            if (referenceDate >= secondDate) {
                dueUntilToday = safePreviousBalance + (installmentAmount * 2);
                currentInstallmentValue = installmentAmount;
                currentInstallmentDate = secondDate;
            }

            if (referenceDate >= thirdDate) {
                dueUntilToday = safePreviousBalance + (installmentAmount * 3);
                currentInstallmentValue = installmentAmount;
                currentInstallmentDate = thirdDate;
            }

            let nextInstallment;
            if (referenceDate < firstDate) {
                nextInstallment = { label: 'القسط الأول', date: firstDate, amount: safePreviousBalance + installmentAmount };
            } else if (referenceDate < secondDate) {
                nextInstallment = { label: 'القسط الثاني', date: secondDate, amount: installmentAmount };
            } else if (referenceDate < thirdDate) {
                nextInstallment = { label: 'القسط الثالث', date: thirdDate, amount: installmentAmount };
            } else {
                nextInstallment = { label: 'القسط الأول', date: addMonthsSafe(firstDate, 12), amount: safePreviousBalance + installmentAmount };
            }

            return { installmentAmount, currentInstallmentValue, currentInstallmentDate, dueUntilToday, nextInstallment };
        }

        function getMonthlyPlan(finalBalance) {
            const balance = Math.max(0, Number(finalBalance || 0));

            if (balance <= 0) {
                return { monthsToClose: 0, monthlySuggestion: 0 };
            }

            let monthsToClose = 12;
            if (balance <= 300) monthsToClose = 3;
            else if (balance <= 1000) monthsToClose = 6;
            else if (balance <= 2000) monthsToClose = 12;
            else monthsToClose = 18;

            return {
                monthsToClose,
                monthlySuggestion: Math.ceil(balance / monthsToClose)
            };
        }

        function getTenantStatus(dueNow, totalCredit) {
            if (dueNow <= 0) return { text: '✔ منتظم', cls: 'paid' };
            if (totalCredit > 0) return { text: '⚠ سداد جزئي', cls: 'partial' };
            return { text: '⚠ متأخر', cls: 'late' };
        }

        function getAccountingAdvice(current, previous, tenant) {
            if (!current) {
                return {
                    message: 'لا توجد بيانات كافية لإظهار النصيحة المحاسبية حالياً.',
                    dueNow: 0
                };
            }

            const currentBalance = Math.max(0, Number(current?.final_balance || 0));
            const previousBalance = Math.max(0, Number(previous?.final_balance || 0));
            const currentCredit = Number(current?.total_credit || 0);
            const annualDebit = Number(current?.total_debit || 0);

            const plan = getInstallmentPlan(tenant?.contract_date, annualDebit, previousBalance);
            const dueNow = Math.max(0, plan.dueUntilToday - currentCredit);
            const monthlyPlan = getMonthlyPlan(currentBalance);

            if (currentBalance <= 0) {
                return {
                    dueNow: 0,
                    message: `حسابك منتظم حالياً، ولا يوجد مبلغ مستحق الآن.
تم تسجيل مدفوعات بقيمة <span class="highlight-number" data-value="${Math.round(currentCredit)}">0</span> د.أ`
                };
            }

            return {
                dueNow,
                message: `للمحافظة على انتظام الحساب، يُنصح بتسديد المبلغ المستحق حالياً وقدره <span class="highlight-number" data-value="${Math.round(dueNow)}">0</span> د.أ.
القسط الحالي: <span class="highlight-number" data-value="${Math.round(plan.currentInstallmentValue)}">0</span> د.أ
${previousBalance > 0 ? `الرصيد السابق: <span class="highlight-number" data-value="${Math.round(previousBalance)}">0</span> د.أ` : 'لا يوجد رصيد سابق'}
تاريخ القسط الحالي: <span class="highlight-number">${formatEnglishDate(plan.currentInstallmentDate)}</span>
${monthlyPlan.monthlySuggestion > 0 ? `الدفعة المقترحة شهرياً: <span class="highlight-number" data-value="${monthlyPlan.monthlySuggestion}">0</span> د.أ` : ''}`
            };
        }

        function getLineInsight(current, previous) {
            if (!current || !previous) {
                return {
                    type: 'neutral',
                    text: 'لا توجد بيانات كافية للمقارنة حالياً'
                };
            }

            const currentBalance = Math.max(0, Number(current?.final_balance || 0));
            const previousBalance = Math.max(0, Number(previous?.final_balance || 0));
            const diff = currentBalance - previousBalance;

            if (diff < 0) {
                return {
                    type: 'good',
                    text: `تحسّن في المتبقي بمقدار ${Math.abs(Math.round(diff))} د.أ مقارنة بالسنة الماضية`
                };
            }

            if (diff > 0) {
                return {
                    type: 'warning',
                    text: `زيادة في المبلغ المتبقي بمقدار ${Math.round(diff)} د.أ مقارنة بالسنة الماضية`
                };
            }

            return {
                type: 'neutral',
                text: 'لا يوجد تغيير في المتبقي مقارنة بالسنة الماضية'
            };
        }

        function animateNumber(element, endValue) {
            if (!element) return;
            const duration = 800;
            const startTime = performance.now();

            function update(currentTime) {
                const progress = Math.min((currentTime - startTime) / duration, 1);
                element.innerText = String(Math.floor(progress * endValue));
                if (progress < 1) requestAnimationFrame(update);
            }

            requestAnimationFrame(update);
        }

        function animateHighlights() {
            document.querySelectorAll('.highlight-number').forEach(el => {
                const raw = el.getAttribute('data-value');
                if (raw === null) return;

                const end = parseInt(raw) || 0;
                const duration = 900;
                const startTime = performance.now();

                function update(currentTime) {
                    const progress = Math.min((currentTime - startTime) / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    el.innerText = String(Math.floor(eased * end));
                    if (progress < 1) requestAnimationFrame(update);
                }

                requestAnimationFrame(update);
            });
        }

        async function deactivateExpiredNotifications() {
            const nowIso = new Date().toISOString();

            const { error } = await supabaseClient
                .from('tenant_notifications')
                .update({ is_active: false })
                .eq('tenant_code', tenantCode)
                .eq('is_active', true)
                .not('expires_at', 'is', null)
                .lt('expires_at', nowIso);

            if (error) console.error('deactivateExpiredNotifications error:', error);
        }

        async function fetchVisibleNotifications() {
            const nowIso = new Date().toISOString();

            const { data, error } = await supabaseClient
                .from('tenant_notifications')
                .select('*')
                .eq('tenant_code', tenantCode)
                .eq('is_active', true);

            if (error) {
                console.error('fetchVisibleNotifications error:', error);
                return [];
            }

            return (data || [])
                .filter(item => {
                    const notExpired = !item.expires_at || item.expires_at > nowIso;
                    const notHiddenAfterSeen = !(item.hide_after_seen === true && item.seen_at);
                    return notExpired && notHiddenAfterSeen;
                })
                .sort((a, b) => {
                    const priorityDiff = getPriorityByType(a.type) - getPriorityByType(b.type);
                    if (priorityDiff !== 0) return priorityDiff;
                    return new Date(b.created_at) - new Date(a.created_at);
                });
        }

        async function markNotificationsSeen(ids) {
            if (!ids || !ids.length) return;

            const nowIso = new Date().toISOString();

            const { error } = await supabaseClient
                .from('tenant_notifications')
                .update({
                    is_read: true,
                    seen_at: nowIso
                })
                .in('id', ids);

            if (error) console.error('markNotificationsSeen error:', error);
        }

        async function loadNotifications() {
            const box = document.getElementById('notifications_box');

            await deactivateExpiredNotifications();

            const visibleBeforeSeen = await fetchVisibleNotifications();

            if (!visibleBeforeSeen.length) {
                box.innerHTML = `<div class="notify-empty">لا توجد إشعارات حالياً</div>`;
                return;
            }

            box.innerHTML = visibleBeforeSeen.map(item => `
                <div class="notify-card ${item.type || 'normal'}">
                    ${item.title ? `<div class="notify-title">${item.title}</div>` : ''}
                    <div class="notify-message">${item.message || ''}</div>
                    <div class="notify-date">${formatNotificationDate(item.created_at)}</div>
                </div>
            `).join('');

            const unseenVisibleIds = visibleBeforeSeen
                .filter(item => !item.seen_at || !item.is_read)
                .map(item => item.id);

            await markNotificationsSeen(unseenVisibleIds);

            const visibleAfterSeen = await fetchVisibleNotifications();

            if (!visibleAfterSeen.length) {
                box.innerHTML = `<div class="notify-empty">لا توجد إشعارات حالياً</div>`;
                return;
            }

            box.innerHTML = visibleAfterSeen.map(item => `
                <div class="notify-card ${item.type || 'normal'}">
                    ${item.title ? `<div class="notify-title">${item.title}</div>` : ''}
                    <div class="notify-message">${item.message || ''}</div>
                    <div class="notify-date">${formatNotificationDate(item.created_at)}</div>
                </div>
            `).join('');
        }

        function renderPieChart(credit, balance) {
            const canvas = document.getElementById('balancePieChart');

            if (pieChartInstance) pieChartInstance.destroy();

            const creditValue = Math.max(0, toNumber(credit));
            const balanceValue = Math.max(0, toNumber(balance));
            const total = creditValue + balanceValue;
            const percentTarget = total > 0 ? Math.round((creditValue / total) * 100) : 0;

            pieChartInstance = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: ['المدفوع', 'المتبقي'],
                    datasets: [{
                        data: [creditValue, balanceValue],
                        backgroundColor: ['#2f9e6f', '#c95a52'],
                        borderWidth: 0
                    }]
                },
                options: {
                    cutout: '75%',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1500,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                },
                plugins: [{
                    id: 'centerText',
                    beforeDraw(chart) {
                        const { width, height, ctx } = chart;

                        if (typeof chart._animatedValue !== 'number') {
                            chart._animatedValue = 0;
                        }

                        chart._animatedValue += (percentTarget - chart._animatedValue) * 0.08;
                        const currentValue = Math.round(chart._animatedValue);

                        ctx.save();
                        ctx.font = 'bold 52px Tajawal';
                        ctx.fillStyle = '#2f2a24';
                        ctx.textBaseline = 'middle';
                        ctx.textAlign = 'center';
                        ctx.fillText(`${currentValue}%`, width / 2, height / 2 - 8);
                        ctx.restore();

                        if (Math.abs(chart._animatedValue - percentTarget) > 0.1) {
                            requestAnimationFrame(() => chart.draw());
                        }
                    }
                }]
            });
        }

        function renderTimelineChart(chartRows) {
            const canvas = document.getElementById('timelineChart');
            if (timelineChartInstance) timelineChartInstance.destroy();

            const rows = (chartRows || []).filter(Boolean);
            const labels = rows.map(row => String(row.year));
            const balances = rows.map(row => Math.max(0, toNumber(row.final_balance)));

            let trendColor = '#c9a46b';
            let fillColor = 'rgba(201,164,107,0.10)';

            if (balances.length >= 2) {
                const prev = balances[0];
                const current = balances[1];

                if (current < prev) {
                    trendColor = '#2f9e6f';
                    fillColor = 'rgba(47,158,111,0.10)';
                } else if (current > prev) {
                    trendColor = '#c95a52';
                    fillColor = 'rgba(201,90,82,0.10)';
                }
            }

            timelineChartInstance = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels.length ? labels : ['—'],
                    datasets: [{
                        label: 'المتبقي',
                        data: balances.length ? balances : [0],
                        borderColor: trendColor,
                        backgroundColor: fillColor,
                        borderWidth: 4,
                        tension: 0.35,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: trendColor,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            rtl: true,
                            labels: {
                                usePointStyle: true,
                                boxWidth: 10,
                                font: {
                                    family: 'Tajawal',
                                    size: 12,
                                    weight: '700'
                                }
                            }
                        },
                        tooltip: {
                            rtl: true,
                            titleAlign: 'right',
                            bodyAlign: 'right',
                            callbacks: {
                                title: function(items) {
                                    return `السنة ${items[0]?.label || ''}`;
                                },
                                label: function(context) {
                                    return `المتبقي: ${formatNumber(context.raw)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: '#7a6c59',
                                font: { size: 12, weight: '700' }
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(201,164,107,0.12)'
                            },
                            ticks: {
                                color: '#7a6c59',
                                callback: v => formatNumber(v)
                            }
                        }
                    }
                }
            });
        }

        async function init() {
            try {
                const { data: tenant, error: tenantError } = await supabaseClient
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .maybeSingle();

                const { data: summaryData, error: summaryError } = await supabaseClient
                    .from('tenant_yearly_summary')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .order('year', { ascending: true });

                if (tenantError) console.error('tenant error:', tenantError);
                if (summaryError) console.error('summary error:', summaryError);

                const {
                    currentSummary,
                    previousSummary,
                    chartRows
                } = getCurrentAndPreviousSummaries(summaryData || []);

                const currentCredit = currentSummary ? toNumber(currentSummary.total_credit) : 0;
                const currentBalance = currentSummary ? Math.max(0, toNumber(currentSummary.final_balance)) : 0;

                document.getElementById('t_name').innerText = tenant?.tenant_name || tenantCode || '-';

                const realLastUpdate =
                    currentSummary?.updated_at ||
                    currentSummary?.created_at ||
                    tenant?.updated_at ||
                    tenant?.created_at ||
                    null;

                document.getElementById('last_update').innerText = formatRealLastUpdate(realLastUpdate);

                const advice = getAccountingAdvice(currentSummary, previousSummary, tenant);
                document.getElementById('smart_message').innerHTML = advice.message;
                document.getElementById('due_now_value').innerText = formatMoney(advice.dueNow);

                const tenantStatus = getTenantStatus(advice.dueNow, currentCredit);
                const chip = document.getElementById('account_status_chip');
                chip.innerText = tenantStatus.text;
                chip.className = `hero-status ${tenantStatus.cls}`;

                animateNumber(document.getElementById('val_credit'), Math.round(currentCredit));
                animateNumber(document.getElementById('val_balance'), Math.round(currentBalance));
                animateNumber(document.getElementById('pie_paid_value'), Math.round(currentCredit));
                animateNumber(document.getElementById('pie_balance_value'), Math.round(currentBalance));

                const lineInsight = getLineInsight(currentSummary, previousSummary);
                const lineInsightEl = document.getElementById('line_insight');
                lineInsightEl.className = `line-insight ${lineInsight.type}`;
                lineInsightEl.innerText = lineInsight.text;

                animateHighlights();
                await loadNotifications();

                renderPieChart(currentCredit, currentBalance);
                renderTimelineChart(chartRows);

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.querySelectorAll('.reveal').forEach((el, i) => {
                    setTimeout(() => el.classList.add('active'), i * 80);
                });

                if (window.lucide) lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function goToStatement() {
            window.location.href = `statement.html?tenant=${encodeURIComponent(tenantCode)}`;
        }

        window.onload = init;
    </script>
</body>
