<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --border: rgba(201,164,107,0.20);
            --text: #2f2a24;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
            --info: #5f89c5;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
            box-sizing: border-box;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .brand small {
            display: block;
            font-size: 11px;
            letter-spacing: 1.8px;
            color: #7a6c59;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .brand strong {
            color: var(--gold-deep);
            font-size: 18px;
            font-weight: 900;
        }

        .ghost-btn {
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid rgba(201,164,107,0.18);
            background: rgba(255,255,255,0.7);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .ghost-btn:focus,
        .ghost-btn:active {
            outline: none;
            background: rgba(255,255,255,0.7);
            color: var(--text);
            transform: none;
        }

        .hero-card {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
        }

        .hero-status {
            position: absolute;
            left: 18px;
            right: auto;
            top: 18px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px rgba(120,95,56,0.08);
            color: #fff;
        }

        .hero-status.paid {
            background: linear-gradient(135deg, #39a97b, #2f9e6f);
        }

        .hero-status.partial {
            background: linear-gradient(135deg, #d96a60, #c95a52);
        }

        .hero-card h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .hero-note {
            margin-top: 10px;
            color: #7a6c59;
            font-size: 12px;
            font-weight: 800;
        }

        .stats-grid,
        .chart-grid,
        .smart-grid {
            display: grid;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stats-grid {
            grid-template-columns: 1fr 1fr;
        }

        .chart-grid {
            grid-template-columns: 1fr 1.1fr;
        }

        .smart-grid {
            grid-template-columns: 1fr 1fr;
        }

        .stat-card,
        .panel,
        .smart-card {
            border-radius: 26px;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            background: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            overflow: hidden;
        }

        .stat-card {
            padding: 18px;
            text-align: center;
        }

        .stat-card span {
            display: block;
            color: #7a6c59;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .stat-card b {
            display: block;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.3px;
        }

        .stat-card.is-paid {
            border-color: rgba(47,158,111,0.18);
        }

        .stat-card.is-balance {
            border-color: rgba(204,90,80,0.16);
        }

        .panel {
            padding: 18px;
        }

        .panel-title {
            font-weight: 900;
            font-size: 17px;
            margin-bottom: 14px;
            color: var(--text);
        }

        .chart-wrap {
            position: relative;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .smart-card {
            padding: 16px;
        }

        .tag {
            display: inline-flex;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 10px;
        }

        .smart-body {
            font-size: 14px;
            line-height: 1.8;
            font-weight: 700;
            color: var(--text);
        }

        .notifications-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notify-item {
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(201,164,107,0.18);
            background: rgba(255,255,255,0.58);
            font-size: 13px;
            font-weight: 800;
            line-height: 1.7;
        }

        .notify-item.good {
            color: var(--success);
        }

        .notify-item.warn {
            color: var(--danger);
        }

        .notify-item.note {
            color: #7a6c59;
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: nowrap;
        }

        .action-btn {
            flex: 1;
            max-width: 220px;
            padding: 16px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .action-btn.statement-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            border: none;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(120,95,56,0.15);
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #7a6c59;
            font-weight: 800;
            margin-top: 10px;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .reveal {
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.55s cubic-bezier(.2,.8,.2,1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media screen and (max-width: 900px) {
            .chart-grid,
            .smart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }

            .hero-card h1 {
                font-size: 24px;
                margin-top: 10px;
            }

            .hero-status {
                left: 12px;
                top: 12px;
                font-size: 11px;
                padding: 7px 12px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .chart-wrap {
                min-height: 260px;
            }

            .bottom-actions {
                flex-wrap: nowrap;
            }

            .action-btn {
                width: auto;
                flex: 1;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="topbar reveal">
            <div class="brand">
                <small>MANAGED BUSINESS SPACES</small>
                <strong>JABRI COMPLEX</strong>
            </div>

            <button class="ghost-btn" onclick="logout()">
                <i data-lucide="log-out"></i>
                خروج
            </button>
        </div>

        <section class="hero-card reveal">
            <span id="account_status_chip" class="hero-status partial">-</span>
            <h1 id="t_name">...</h1>
            <div class="hero-note" id="hero_note">ملخص حساب سنة 2026</div>
        </section>

        <div class="stats-grid">
            <div class="stat-card reveal is-paid">
                <span>دائن</span>
                <b id="val_credit" style="color: var(--success);">0</b>
            </div>

            <div class="stat-card reveal is-balance">
                <span>رصيد</span>
                <b id="val_balance" style="color: var(--danger);">0</b>
            </div>
        </div>

        <div class="chart-grid">
            <section class="panel reveal">
                <div class="panel-title">حالة الحساب</div>
                <div class="chart-wrap">
                    <canvas id="balancePieChart"></canvas>
                </div>
                <div id="collection_note" style="text-align:center; margin-top:10px; font-size:13px; color:#7d7468; font-weight:800;">-</div>
            </section>

            <section class="panel reveal">
                <div class="panel-title">إشعارات</div>
                <div id="notifications_box" class="notifications-box">
                    <div class="notify-item note">لا توجد إشعارات حالياً.</div>
                </div>
            </section>
        </div>

        <div class="smart-grid">
            <section class="smart-card reveal">
                <div class="tag" style="background: var(--gold-deep);">الحالة المالية</div>
                <div id="smart_message" class="smart-body">جاري التحليل...</div>
            </section>

            <section class="smart-card reveal">
                <div class="tag" style="background: var(--info);">التوصية</div>
                <div id="advice_message" class="smart-body">جاري الإعداد...</div>
            </section>
        </div>

        <div class="bottom-actions reveal">
            <button class="action-btn statement-btn" onclick="goToStatement()">
                <i data-lucide="file-text"></i>
                كشف الحساب
            </button>
        </div>

        <div class="footer reveal" id="footer_year"></div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let transactions = [];
        let pieChart = null;

        function toNumber(v) {
            return isNaN(parseFloat(v)) ? 0 : parseFloat(v);
        }

        function formatCurrency(v) {
            return `${Math.round(toNumber(v)).toLocaleString('en-US')}`;
        }

        function goToStatement() {
            const code = localStorage.getItem('jabri_tenant_code');
            if (!code) {
                alert('لا يوجد مستأجر');
                return;
            }
            window.location.href = `statement.html?tenant=${encodeURIComponent(code)}`;
        }

        function activateReveal() {
            const items = document.querySelectorAll('.reveal');
            items.forEach((el, i) => {
                setTimeout(() => el.classList.add('active'), 50 + (i * 45));
            });
        }

        function animateValue(id, end) {
            const el = document.getElementById(id);
            const duration = 1200;
            let startTime = null;

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const raw = Math.min((timestamp - startTime) / duration, 1);
                const progress = easeOutCubic(raw);
                const current = end * progress;
                el.textContent = formatCurrency(current);

                if (raw < 1) requestAnimationFrame(step);
                else el.textContent = formatCurrency(end);
            }

            requestAnimationFrame(step);
        }

        function buildCharts(paid, balance, rate) {
            if (pieChart) pieChart.destroy();

            pieChart = new Chart(document.getElementById('balancePieChart'), {
                type: 'doughnut',
                plugins: [{
                    id: 'centerText',
                    beforeDraw(chart) {
                        const { width, height, ctx } = chart;
                        ctx.restore();
                        ctx.font = "bold 22px Tajawal";
                        ctx.fillStyle = "#2f2a24";
                        ctx.textBaseline = "middle";

                        const text = `${rate}%`;
                        const x = (width - ctx.measureText(text).width) / 2;
                        const y = height / 2;

                        ctx.fillText(text, x, y);
                        ctx.save();
                    }
                }],
                data: {
                    labels: ['المدفوع', 'المتبقي'],
                    datasets: [{
                        data: [paid, Math.max(0, balance)],
                        backgroundColor: ['#2f9e6f', '#c95a52'],
                        borderWidth: 0
                    }]
                },
                options: {
                    cutout: '75%',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { animateRotate: true, duration: 1200 },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 10,
                                color: '#5d5347',
                                font: { family: 'Tajawal', weight: '700' }
                            }
                        }
                    }
                }
            });
        }

        async function init() {
            try {
                const { data: tenant } = await supabaseClient
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .maybeSingle();

                const { data: tx } = await supabaseClient
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .order('date', { ascending: true });

                transactions = tx || [];

                const tx2026 = transactions.filter(t => new Date(t.date).getFullYear() === 2026);
                const daen2026 = tx2026.reduce((sum, t) => sum + toNumber(t.credit), 0);
                const debit2026 = tx2026.reduce((sum, t) => sum + toNumber(t.debit), 0);

                const previousTx = transactions.filter(t => new Date(t.date).getFullYear() < 2026);
                const prevDebit = previousTx.reduce((sum, t) => sum + toNumber(t.debit), 0);
                const prevCredit = previousTx.reduce((sum, t) => sum + toNumber(t.credit), 0);

                const openingBalance2026 = (toNumber(tenant?.previous_balance) + prevDebit) - prevCredit;
                const balance2026 = Math.max(0, openingBalance2026 + debit2026 - daen2026);
                const totalDue2026 = openingBalance2026 + debit2026;
                const collectionRate = totalDue2026 > 0 ? Math.round((daen2026 / totalDue2026) * 100) : 100;

                document.getElementById('t_name').innerText = tenant?.tenant_name || '-';

                const chip = document.getElementById('account_status_chip');
                if (balance2026 === 0) {
                    chip.innerText = 'مسدد';
                    chip.className = 'hero-status paid';
                } else {
                    chip.innerText = 'جزئي';
                    chip.className = 'hero-status partial';
                }

                const creditEl = document.getElementById('val_credit');
                const balanceEl = document.getElementById('val_balance');

                creditEl.style.color = '#2f9e6f';

                if (balance2026 === 0) {
                    balanceEl.style.color = '#2f9e6f';
                    document.querySelector('.stat-card.is-balance').style.boxShadow = '0 0 25px rgba(47,158,111,0.2)';
                } else {
                    balanceEl.style.color = '#c95a52';
                }

                const notificationsBox = document.getElementById('notifications_box');
                if (balance2026 === 0) {
                    notificationsBox.innerHTML = `
                        <div class="notify-item good">حسابك مسدد بالكامل، لا توجد إشعارات مستحقة.</div>
                    `;
                } else {
                    notificationsBox.innerHTML = `
                        <div class="notify-item warn">يوجد رصيد مستحق بقيمة ${formatCurrency(balance2026)}، يرجى المتابعة مع الإدارة.</div>
                        <div class="notify-item note">آخر تحديث تم على حسابك اليوم.</div>
                    `;
                }

                document.getElementById('collection_note').innerText =
                    `نسبة السداد الحالية تشير إلى حالة حساب ${collectionRate > 70 ? 'مستقرة' : 'تحتاج متابعة'}`;

                document.getElementById('footer_year').innerText =
                    `© 2026 مجمع الجبري الصناعي التجاري`;

                document.getElementById('smart_message').innerText =
                    balance2026 === 0
                        ? "لا توجد ذمم مالية معلقة لعام 2026."
                        : "يتطلب الحساب سداد الرصيد المتبقي لإغلاق السنة مالياً.";

                document.getElementById('advice_message').innerText =
                    balance2026 === 0
                        ? "حسابك منتظم تماماً."
                        : "يمكنك سداد المبلغ المتبقي عبر مكتب الإدارة أو التحويل البنكي.";

                animateValue('val_credit', daen2026);
                animateValue('val_balance', balance2026);
                buildCharts(daen2026, balance2026, collectionRate);

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                activateReveal();
                if (window.lucide) lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                alert('خطأ في الاتصال بقاعدة البيانات.');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = init;
    </script>
</body>
</html>
