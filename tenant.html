<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر المحدثة</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;

            --glass-bg: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            --glass-card-bg: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            --glass-border: 1px solid rgba(201,164,107,0.18);
            --glass-shadow: 0 12px 28px rgba(120,95,56,0.08);
            --glass-soft-shadow: 0 14px 30px rgba(120,95,56,0.08);
            --glass-blur: blur(14px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            direction: rtl;
            text-align: right;
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand strong {
            color: var(--gold-deep);
            font-size: 18px;
            font-weight: 900;
        }

        .brand small {
            display: block;
            font-size: 11px;
            letter-spacing: 1.8px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .ghost-btn {
            padding: 12px 16px;
            border-radius: 16px;
            border: var(--glass-border);
            background: rgba(255,255,255,0.70);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .hero-card {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: right;
            background: var(--glass-bg);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
        }

        .hero-status {
            position: absolute;
            left: 18px;
            top: 18px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.4px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .hero-status.paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.25);
        }

        .hero-status.partial {
            background: rgba(201,90,82,0.10);
            color: var(--danger);
            border: 1px solid rgba(201,90,82,0.25);
        }

        .hero-card h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
            padding-left: 110px;
        }

        .hero-note {
            margin-top: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
        }

        .chip-header {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 12px;
            width: 100%;
            padding-right: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 999px;
            min-width: 100px;
            font-size: 12px;
            font-weight: 900;
            color: var(--gold-deep);
            background: rgba(201,164,107,0.12);
            border: 1px solid rgba(201,164,107,0.22);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.40);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .soft-card {
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            text-align: center;
            padding: 24px;
        }

        .soft-card span {
            display: block;
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .soft-card b {
            display: block;
            font-size: 30px;
            font-weight: 900;
        }

        .credit-card {
            background: linear-gradient(135deg, rgba(47,158,111,0.12), rgba(255,255,255,0.25));
            border-color: rgba(47,158,111,0.24);
            color: var(--success);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(201,90,82,0.10), rgba(255,255,255,0.25));
            border-color: rgba(201,90,82,0.22);
            color: var(--danger);
        }

        .panel {
            padding: 24px;
            margin-bottom: 22px;
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .smart-body {
            font-size: 16px;
            line-height: 2.2;
            font-weight: 800;
            color: var(--text);
            text-align: right;
            margin-top: 10px;
            white-space: pre-line;
        }

        .highlight-number {
            display: inline-block;
            padding: 4px 10px;
            margin: 0 3px;
            border-radius: 10px;
            font-weight: 900;
            color: var(--gold-deep);
            background: rgba(201,164,107,0.15);
            border: 1px solid rgba(201,164,107,0.25);
            backdrop-filter: blur(6px);
        }

        .pie-text-stats {
            margin-top: 16px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            font-size: 15px;
            font-weight: 900;
        }

        .pie-text-item {
            color: var(--muted);
        }

        .pie-text-item b {
            font-weight: 900;
            margin-right: 4px;
        }

        .pie-text-item.paid b {
            color: var(--success);
        }

        .pie-text-item.balance b {
            color: var(--danger);
        }

        .chart-wrap {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            position: relative;
        }

        .timeline-wrap {
            min-height: 300px;
        }

        #notifications_box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .notify-empty {
            padding: 16px;
            border-radius: 18px;
            text-align: center;
            color: var(--muted);
            font-weight: 800;
            background: rgba(255,255,255,0.45);
            border: 1px dashed rgba(201,164,107,0.24);
        }

        .notify-card {
            padding: 16px 18px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.65), rgba(247,244,237,0.75));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 6px 18px rgba(120,95,56,0.08);
            position: relative;
            overflow: hidden;
        }

        .notify-card::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .notify-card.legal::before {
            background: linear-gradient(90deg, transparent, #c95a52, transparent);
        }

        .notify-card.lawyer::before {
            background: linear-gradient(90deg, transparent, #7a1f1f, transparent);
        }

        .notify-title {
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 6px;
            color: var(--gold-deep);
        }

        .notify-card.legal .notify-title,
        .notify-card.lawyer .notify-title {
            color: var(--danger);
        }

        .notify-message {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .notify-date {
            margin-top: 6px;
            font-size: 10px;
            font-weight: 800;
            color: var(--muted);
        }

        .action-btn {
            width: 100%;
            max-width: 300px;
            margin: 24px auto 0;
            padding: 16px;
            border-radius: 24px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            box-shadow: 0 18px 35px rgba(201,164,107,0.25);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.55s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .chart-wrap {
                min-height: 240px;
            }

            .timeline-wrap {
                min-height: 280px;
            }

            .hero-card h1 {
                padding-left: 0;
                padding-top: 34px;
                font-size: 24px;
            }

            .hero-status {
                left: 14px;
                top: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="topbar reveal">
            <div class="brand">
                <small>MANAGED BUSINESS SPACES</small>
                <strong>JABRI COMPLEX</strong>
            </div>
            <button class="ghost-btn" onclick="logout()">
                <i data-lucide="log-out"></i> خروج
            </button>
        </div>

        <section class="hero-card reveal">
            <span id="account_status_chip" class="hero-status partial">-</span>
            <h1 id="t_name">...</h1>
            <div id="last_update" class="hero-note">-</div>
        </section>

        <div class="stats-grid">
            <div class="soft-card credit-card reveal">
                <span>دائن (مدفوع)</span>
                <b id="val_credit">0</b>
            </div>
            <div class="soft-card balance-card reveal">
                <span>الرصيد المتبقي</span>
                <b id="val_balance">0</b>
            </div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">نصيحة محاسبية</div>
            </div>
            <div id="smart_message" class="smart-body">تحليل البيانات...</div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">إشعار</div>
            </div>
            <div id="notifications_box">
                <div class="notify-empty">لا توجد إشعارات حالياً</div>
            </div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">ملخص الحساب</div>
            </div>
            <div class="chart-wrap">
                <canvas id="balancePieChart"></canvas>
            </div>
            <div class="pie-text-stats">
                <span class="pie-text-item paid">مدفوع: <b id="pie_paid_value">0</b></span>
                <span class="pie-text-item balance">متبقي: <b id="pie_balance_value">0</b></span>
            </div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">الخط الزمني للدفع</div>
            </div>
            <div class="chart-wrap timeline-wrap">
                <canvas id="timelineChart"></canvas>
            </div>
        </div>

        <button class="action-btn reveal" onclick="goToStatement()">
            <i data-lucide="file-text"></i> كشف الحساب بالتفصيل
        </button>

        <div class="footer reveal">© 2026 مجمع الجبري الصناعي التجاري</div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let pieChartInstance = null;
        let timelineChartInstance = null;
        const PROFILE_YEARS = new Set([2025, 2026]);

        function toNumber(v) {
            const num = parseFloat(String(v ?? 0).replace(/,/g, ''));
            return isNaN(num) ? 0 : num;
        }

        function formatNumber(v) {
            return Math.round(toNumber(v)).toLocaleString('en-US');
        }

        function isRentRow(desc) {
            const d = (desc || '').trim();
            return d.startsWith('ايجار') || d.startsWith('الإيجار') || d.startsWith('الايجار');
        }

        function isFeesRow(desc) {
            return (desc || '').trim().startsWith('معارف');
        }

        function isCarryRow(desc) {
            const d = (desc || '').trim();
            return d.includes('رصيد سابق') || d.includes('رصيد مدور') || d.startsWith('رصيد عام');
        }

        function formatDateOnly(value) {
            const d = new Date(value);
            return isNaN(d) ? '-' : d.toLocaleDateString('en-GB');
        }

        function formatNotificationDate(value) {
            const d = new Date(value);
            return isNaN(d)
                ? ''
                : d.toLocaleDateString('en-GB') + ' - ' + d.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
        }

        function getProfileTransactions(transactions) {
            return (transactions || []).filter(t => {
                const year = new Date(t.date).getFullYear();
                return PROFILE_YEARS.has(year);
            });
        }

        function getPriorityByType(type) {
            if (type === 'lawyer') return 1;
            if (type === 'legal') return 2;
            if (type === 'third') return 3;
            if (type === 'second') return 4;
            if (type === 'first') return 5;
            return 6;
        }

        function getStatementYearAdvice(transactions, balance) {
            const filtered = getProfileTransactions(transactions);
            const rentRows = filtered.filter(t => isRentRow(t.description || ''));
            const feesRows = filtered.filter(t => isFeesRow(t.description || ''));
            const carryRows = filtered.filter(t => isCarryRow(t.description || ''));

            const yearlyRent = rentRows.reduce((sum, row) => sum + toNumber(row.debit), 0);
            const yearlyFees = feesRows.reduce((sum, row) => sum + toNumber(row.debit), 0);
            const previousBalance = carryRows.reduce((sum, row) => sum + toNumber(row.debit), 0);

            const totalYears = PROFILE_YEARS.size;
            const monthlyBase = totalYears > 0 ? Math.round((yearlyRent + yearlyFees) / (12 * totalYears)) : 0;

            let suggestedMonthly = monthlyBase;

            if (balance > 0) {
                if (balance <= 600) suggestedMonthly += 25;
                else if (balance <= 1200) suggestedMonthly += 50;
                else if (balance <= 1800) suggestedMonthly += 100;
                else suggestedMonthly += 150;
            } else if (previousBalance > 0) {
                if (previousBalance <= 600) suggestedMonthly += 25;
                else if (previousBalance <= 1200) suggestedMonthly += 50;
                else if (previousBalance <= 1800) suggestedMonthly += 100;
                else suggestedMonthly += 150;
            }

            return { yearlyRent, yearlyFees, previousBalance, monthlyBase, suggestedMonthly };
        }

        function buildPredictionMeta(transactions, balance) {
            const filtered = getProfileTransactions(transactions);
            const payments = filtered.filter(t => toNumber(t.credit) > 0);

            if (payments.length === 0 || balance <= 0) return { level: 'unknown' };

            const totalPaid = payments.reduce((sum, t) => sum + toNumber(t.credit), 0);
            const months = new Set(
                payments.map(t => {
                    const d = new Date(t.date);
                    return `${d.getFullYear()}-${d.getMonth()}`;
                })
            ).size;

            const monthlyRate = totalPaid / (months || 1);
            if (monthlyRate <= 0) return { level: 'unknown' };

            const monthsToClose = Math.ceil(balance / monthlyRate);
            if (monthsToClose <= 3) return { level: 'excellent', monthsToClose };
            if (monthsToClose <= 6) return { level: 'good', monthsToClose };
            if (monthsToClose <= 12) return { level: 'warning', monthsToClose };
            return { level: 'weak', monthsToClose };
        }

        function buildAdviceMessageFromStatement(transactions, balance) {
            const advice = getStatementYearAdvice(transactions, balance);
            const prediction = buildPredictionMeta(transactions, balance);

            if (!advice.yearlyRent && !advice.yearlyFees && !balance) {
                return 'لا توجد بيانات كافية لإظهار النصيحة المحاسبية حالياً.';
            }

            let recommended = advice.suggestedMonthly;
            const monthsToClose = prediction.monthsToClose || 0;

            if (prediction.level === 'excellent') recommended = advice.monthlyBase;
            else if (prediction.level === 'good') recommended = Math.max(advice.suggestedMonthly, advice.monthlyBase + 25);
            else if (prediction.level === 'warning') recommended = Math.max(advice.suggestedMonthly, advice.monthlyBase + 75);
            else if (prediction.level === 'weak') recommended = Math.max(advice.suggestedMonthly, advice.monthlyBase + 150);

            if (recommended <= 0 && balance <= 0) {
                return 'الحساب ضمن وضع جيد حالياً، ولا يوجد رصيد متبقٍ يستدعي خطة سداد إضافية.';
            }

            return `يُنصح بدفع حوالي <span class="highlight-number" data-value="${recommended}">0</span> د.أ شهرياً
سيتم إغلاق الرصيد خلال <span class="highlight-number" data-value="${monthsToClose}">0</span> شهراً بهذا المعدل`;
        }

        function animateNumber(element, endValue) {
            if (!element) return;
            const duration = 800;
            const startTime = performance.now();

            function update(currentTime) {
                const progress = Math.min((currentTime - startTime) / duration, 1);
                element.innerText = Math.floor(progress * endValue).toLocaleString('en-US');
                if (progress < 1) requestAnimationFrame(update);
            }

            requestAnimationFrame(update);
        }

        function animateHighlights() {
            document.querySelectorAll('.highlight-number').forEach(el => {
                const end = parseInt(el.getAttribute('data-value')) || 0;
                const duration = 900;
                const startTime = performance.now();

                function update(currentTime) {
                    const progress = Math.min((currentTime - startTime) / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    el.innerText = Math.floor(eased * end).toLocaleString('en-US');
                    if (progress < 1) requestAnimationFrame(update);
                }

                requestAnimationFrame(update);
            });
        }

        async function deactivateExpiredNotifications() {
            const nowIso = new Date().toISOString();

            const { error } = await supabaseClient
                .from('tenant_notifications')
                .update({ is_active: false })
                .eq('tenant_code', tenantCode)
                .eq('is_active', true)
                .not('expires_at', 'is', null)
                .lt('expires_at', nowIso);

            if (error) console.error('deactivateExpiredNotifications error:', error);
        }

        async function fetchVisibleNotifications() {
            const nowIso = new Date().toISOString();

            const { data, error } = await supabaseClient
                .from('tenant_notifications')
                .select('*')
                .eq('tenant_code', tenantCode)
                .eq('is_active', true);

            if (error) {
                console.error('fetchVisibleNotifications error:', error);
                return [];
            }

            return (data || [])
                .filter(item => {
                    const notExpired = !item.expires_at || item.expires_at > nowIso;
                    const notHiddenAfterSeen = !(item.hide_after_seen === true && item.seen_at);
                    return notExpired && notHiddenAfterSeen;
                })
                .sort((a, b) => {
                    const priorityDiff = getPriorityByType(a.type) - getPriorityByType(b.type);
                    if (priorityDiff !== 0) return priorityDiff;
                    return new Date(b.created_at) - new Date(a.created_at);
                });
        }

        async function markNotificationsSeen(ids) {
            if (!ids || !ids.length) return;

            const nowIso = new Date().toISOString();

            const { error } = await supabaseClient
                .from('tenant_notifications')
                .update({
                    is_read: true,
                    seen_at: nowIso
                })
                .in('id', ids);

            if (error) console.error('markNotificationsSeen error:', error);
        }

        async function loadNotifications() {
            const box = document.getElementById('notifications_box');

            await deactivateExpiredNotifications();

            const visibleBeforeSeen = await fetchVisibleNotifications();

            if (!visibleBeforeSeen.length) {
                box.innerHTML = `<div class="notify-empty">لا توجد إشعارات حالياً</div>`;
                return;
            }

            box.innerHTML = visibleBeforeSeen.map(item => `
                <div class="notify-card ${item.type || 'normal'}">
                    ${item.title ? `<div class="notify-title">${item.title}</div>` : ''}
                    <div class="notify-message">${item.message || ''}</div>
                    <div class="notify-date">${formatNotificationDate(item.created_at)}</div>
                </div>
            `).join('');

            const unseenVisibleIds = visibleBeforeSeen
                .filter(item => !item.seen_at || !item.is_read)
                .map(item => item.id);

            await markNotificationsSeen(unseenVisibleIds);

            const visibleAfterSeen = await fetchVisibleNotifications();

            if (!visibleAfterSeen.length) {
                box.innerHTML = `<div class="notify-empty">لا توجد إشعارات حالياً</div>`;
                return;
            }

            box.innerHTML = visibleAfterSeen.map(item => `
                <div class="notify-card ${item.type || 'normal'}">
                    ${item.title ? `<div class="notify-title">${item.title}</div>` : ''}
                    <div class="notify-message">${item.message || ''}</div>
                    <div class="notify-date">${formatNotificationDate(item.created_at)}</div>
                </div>
            `).join('');
        }

        function buildTimelineAnalytics2025_2026(transactions) {
            const filtered = [...getProfileTransactions(transactions)]
                .filter(t => t?.date)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            let runningBalance = 0;
            const labels = [];
            const paymentSeries = [];
            const balanceSeries = [];
            const points = [];

            filtered.forEach(row => {
                const dateObj = new Date(row.date);
                if (isNaN(dateObj)) return;

                const debit = toNumber(row.debit);
                const credit = toNumber(row.credit);
                const desc = (row.description || '').trim();

                if (!isCarryRow(desc)) {
                    runningBalance += debit - credit;
                }

                labels.push(dateObj.toLocaleDateString('en-GB'));
                paymentSeries.push(credit > 0 ? credit : null);
                balanceSeries.push(runningBalance);
                points.push({
                    date: row.date,
                    description: desc || 'حركة مالية',
                    debit,
                    credit,
                    balance: runningBalance
                });
            });

            return {
                labels,
                paymentSeries,
                balanceSeries,
                points
            };
        }

        function renderPieChart(paid, balance) {
            const canvas = document.getElementById('balancePieChart');

            if (pieChartInstance) pieChartInstance.destroy();

            const paidValue = Math.max(0, toNumber(paid));
            const balanceValue = Math.max(0, toNumber(balance));
            const total = paidValue + balanceValue;
            const percentTarget = total > 0 ? Math.round((paidValue / total) * 100) : 0;

            pieChartInstance = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: ['مدفوع', 'متبقي'],
                    datasets: [{
                        data: [paidValue, balanceValue],
                        backgroundColor: ['#2f9e6f', '#c95a52'],
                        borderWidth: 0
                    }]
                },
                options: {
                    cutout: '75%',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1500,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                },
                plugins: [{
                    id: 'centerText',
                    beforeDraw(chart) {
                        const { width, height, ctx } = chart;

                        if (typeof chart._animatedValue !== 'number') {
                            chart._animatedValue = 0;
                        }

                        chart._animatedValue += (percentTarget - chart._animatedValue) * 0.08;
                        const currentValue = Math.round(chart._animatedValue);

                        ctx.save();
                        ctx.font = 'bold 52px Tajawal';
                        ctx.fillStyle = '#2f2a24';
                        ctx.textBaseline = 'middle';
                        ctx.textAlign = 'center';
                        ctx.fillText(`${currentValue}%`, width / 2, height / 2 - 8);
                        ctx.restore();

                        if (Math.abs(chart._animatedValue - percentTarget) > 0.1) {
                            requestAnimationFrame(() => chart.draw());
                        }
                    }
                }]
            });
        }

        function renderTimelineChart(analytics) {
            const canvas = document.getElementById('timelineChart');
            if (timelineChartInstance) timelineChartInstance.destroy();

            timelineChartInstance = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: analytics.labels.length ? analytics.labels : ['—'],
                    datasets: analytics.labels.length ? [
                        {
                            label: 'الدفعات',
                            data: analytics.paymentSeries,
                            yAxisID: 'yPayments',
                            borderColor: '#2f9e6f',
                            backgroundColor: 'rgba(47,158,111,0.08)',
                            borderWidth: 3,
                            tension: 0.35,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            spanGaps: true,
                            fill: false
                        },
                        {
                            label: 'الرصيد',
                            data: analytics.balanceSeries,
                            yAxisID: 'yBalance',
                            borderColor: '#c95a52',
                            backgroundColor: 'rgba(201,90,82,0.10)',
                            borderWidth: 3,
                            tension: 0.35,
                            pointRadius: 3,
                            pointHoverRadius: 5,
                            fill: true
                        }
                    ] : [{
                        label: 'الرصيد',
                        data: [0],
                        borderColor: '#c9a46b',
                        backgroundColor: 'rgba(201,164,107,0.10)',
                        borderWidth: 3,
                        tension: 0.35,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            rtl: true,
                            labels: {
                                usePointStyle: true,
                                boxWidth: 10,
                                font: {
                                    family: 'Tajawal',
                                    size: 12,
                                    weight: '700'
                                }
                            }
                        },
                        tooltip: {
                            rtl: true,
                            titleAlign: 'right',
                            bodyAlign: 'right',
                            callbacks: {
                                title: function(items) {
                                    if (!analytics.points.length) return '—';
                                    const idx = items[0]?.dataIndex ?? 0;
                                    const point = analytics.points[idx];
                                    return `${formatDateOnly(point.date)} | ${point.description}`;
                                },
                                label: function(context) {
                                    if (!analytics.points.length) return `${context.dataset.label}: 0`;
                                    const idx = context.dataIndex;
                                    const point = analytics.points[idx];
                                    if (context.dataset.label === 'الدفعات') {
                                        return `الدفعة: ${formatNumber(point.credit)}`;
                                    }
                                    return `الرصيد: ${formatNumber(point.balance)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 10,
                                color: '#7a6c59',
                                font: { size: 11, weight: '700' }
                            }
                        },
                        yPayments: {
                            position: 'left',
                            beginAtZero: true,
                            grid: { drawOnChartArea: false },
                            ticks: {
                                color: '#7a6c59',
                                callback: v => formatNumber(v)
                            }
                        },
                        yBalance: {
                            position: 'right',
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(201,164,107,0.12)'
                            },
                            ticks: {
                                color: '#7a6c59',
                                callback: v => formatNumber(v)
                            }
                        }
                    }
                }
            });
        }

        async function init() {
            try {
                const { data: tenant, error: tenantError } = await supabaseClient
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .maybeSingle();

                const { data: tx, error: txError } = await supabaseClient
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .order('date', { ascending: true });

                if (tenantError) console.error('tenant error:', tenantError);
                if (txError) console.error('transactions error:', txError);

                const allTransactions = tx || [];
                const profileTransactions = getProfileTransactions(allTransactions);

                const totalCredit = profileTransactions.reduce((sum, t) => sum + toNumber(t.credit), 0);
                const totalDebit = profileTransactions.reduce((sum, t) => sum + toNumber(t.debit), 0);
                const balance = Math.max(0, totalDebit - totalCredit);

                document.getElementById('t_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('last_update').innerText = `آخر تحديث: ${new Date().toLocaleDateString('en-GB')}`;

                const chip = document.getElementById('account_status_chip');
                chip.innerText = balance === 0 ? '✔ مسدد' : '⚠ جزئي';
                chip.className = balance === 0 ? 'hero-status paid' : 'hero-status partial';

                animateNumber(document.getElementById('val_credit'), Math.round(totalCredit));
                animateNumber(document.getElementById('val_balance'), Math.round(balance));
                animateNumber(document.getElementById('pie_paid_value'), Math.round(totalCredit));
                animateNumber(document.getElementById('pie_balance_value'), Math.round(balance));

                document.getElementById('smart_message').innerHTML =
                    buildAdviceMessageFromStatement(allTransactions, balance);

                animateHighlights();
                await loadNotifications();

                renderPieChart(totalCredit, balance);

                const timelineAnalytics = buildTimelineAnalytics2025_2026(allTransactions);
                renderTimelineChart(timelineAnalytics);

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.querySelectorAll('.reveal').forEach((el, i) => {
                    setTimeout(() => el.classList.add('active'), i * 80);
                });
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function goToStatement() {
            window.location.href = `statement.html?tenant=${encodeURIComponent(tenantCode)}`;
        }

        window.onload = init;
    </script>
</body>
