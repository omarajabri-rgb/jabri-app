<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر المحدثة</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
            --neutral: #8b7f70;
            --glass-bg: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            --glass-card-bg: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            --glass-border: 1px solid rgba(201,164,107,0.18);
            --glass-shadow: 0 12px 28px rgba(120,95,56,0.08);
            --glass-soft-shadow: 0 14px 30px rgba(120,95,56,0.08);
            --glass-blur: blur(14px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }

        body {
            margin: 0; color: var(--text); padding: 16px; opacity: 0;
            transform: translateY(8px); transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            direction: rtl; text-align: right;
        }

        body.loaded { opacity: 1; transform: translateY(0); }

        .wrap { max-width: 1120px; margin: 0 auto; padding-bottom: 42px; width: 100%; }

        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }

        .brand strong { color: var(--gold-deep); font-size: 18px; font-weight: 900; }
        .brand small { display: block; font-size: 11px; letter-spacing: 1.8px; color: var(--muted); font-weight: 800; margin-bottom: 4px; }

        .ghost-btn {
            padding: 12px 16px; border-radius: 16px; border: var(--glass-border);
            background: rgba(255,255,255,0.70); color: var(--text); font-size: 12px;
            font-weight: 900; cursor: pointer; display: inline-flex; align-items: center;
            gap: 8px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10); transition: all 0.25s ease;
        }

        .hero-card {
            border-radius: 26px; padding: 24px; margin-bottom: 16px; text-align: right;
            background: var(--glass-bg); border: var(--glass-border); box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); position: relative;
        }

        .hero-status {
            position: absolute; left: 18px; top: 18px; padding: 6px 12px; border-radius: 999px;
            font-size: 11px; font-weight: 900; backdrop-filter: blur(8px);
        }

        .hero-status.paid { background: rgba(47,158,111,0.12); color: var(--success); border: 1px solid rgba(47,158,111,0.25); }
        .hero-status.partial { background: rgba(201,90,82,0.10); color: var(--danger); border: 1px solid rgba(201,90,82,0.25); }

        .hero-card h1 { margin: 0; font-size: 28px; font-weight: 900; color: var(--gold-deep); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 22px; }

        .soft-card {
            border-radius: 26px; border: var(--glass-border); background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow); text-align: center; padding: 24px;
        }

        .soft-card b { display: block; font-size: 30px; font-weight: 900; }

        .panel {
            padding: 24px; margin-bottom: 22px; border-radius: 26px; border: var(--glass-border);
            background: var(--glass-card-bg); box-shadow: var(--glass-soft-shadow);
        }

        .chip {
            display: inline-flex; padding: 8px 16px; border-radius: 999px; font-size: 12px;
            font-weight: 900; color: var(--gold-deep); background: rgba(201,164,107,0.12);
            border: 1px solid rgba(201,164,107,0.22); margin-bottom: 12px;
        }

        .smart-body { font-size: 15px; line-height: 1.8; font-weight: 800; white-space: normal; }
        .smart-body b { color: var(--gold-deep); }

        .notify-card {
            padding: 16px 18px; border-radius: 20px; margin-bottom: 10px;
            background: linear-gradient(135deg, rgba(255,255,255,0.65), rgba(247,244,237,0.75));
            border: 1px solid rgba(201,164,107,0.18); position: relative;
        }

        .notify-card.legal::before { content: ""; position: absolute; top: 0; right: 0; left: 0; height: 3px; background: var(--danger); }

        .chart-wrap { min-height: 220px; display: flex; align-items: center; justify-content: center; position: relative; }

        .action-btn {
            width: 100%; max-width: 300px; margin: 24px auto 0; padding: 16px; border-radius: 24px;
            font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 10px; border: none; background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff; box-shadow: 0 18px 35px rgba(201,164,107,0.25);
        }

        #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--gold-deep); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="topbar">
            <div class="brand">
                <small>MANAGED BUSINESS SPACES</small>
                <strong>JABRI COMPLEX</strong>
            </div>
            <button class="ghost-btn" onclick="logout()">
                <i data-lucide="log-out"></i> خروج
            </button>
        </div>

        <section class="hero-card">
            <span id="account_status_chip" class="hero-status partial">-</span>
            <h1 id="t_name">...</h1>
            <div id="last_update" class="hero-note">-</div>
        </section>

        <div class="stats-grid">
            <div class="soft-card" style="color:var(--success)">
                <span style="font-size:14px; font-weight:800;">المدفوع</span>
                <b id="val_credit">0</b>
            </div>
            <div class="soft-card" style="color:var(--danger)">
                <span style="font-size:14px; font-weight:800;">المتبقي</span>
                <b id="val_balance">0</b>
            </div>
        </div>

        <div class="panel">
            <div class="chip">نصيحة محاسبية</div>
            <div id="smart_message" class="smart-body">تحليل البيانات...</div>
        </div>

        <div class="panel">
            <div class="chip">إشعار الإدارة</div>
            <div id="notifications_box">
                <div style="text-align:center; color:var(--muted); padding:20px;">لا يوجد تنبيهات حالياً</div>
            </div>
        </div>

        <div class="panel">
            <div class="chip">وضع الحساب</div>
            <div class="chart-wrap">
                <canvas id="balancePieChart"></canvas>
            </div>
        </div>

        <button class="action-btn" onclick="goToStatement()">
            <i data-lucide="file-text"></i> كشف الحساب بالتفصيل
        </button>

        <div class="footer" style="text-align:center; margin-top:30px; font-size:12px; color:var(--muted);">© 2026 مجمع الجبري الصناعي التجاري</div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let pieChartInstance = null;

        function toNumber(v) { return parseFloat(String(v ?? 0).replace(/,/g, '')) || 0; }

        async function init() {
            try {
                // 1. جلب البيانات الأساسية
                const { data: tenant } = await supabaseClient.from('tenants').select('*').eq('tenant_code', tenantCode).maybeSingle();
                const { data: summaryData } = await supabaseClient.from('tenant_yearly_summary').select('*').eq('tenant_code', tenantCode).order('year', { ascending: false });

                if (tenant) {
                    // 2. تحديث "آخر ظهور" فورياً (مهم لصفحة الإدارة)
                    await supabaseClient.from('tenants').update({ last_seen: new Date().toISOString() }).eq('tenant_code', tenantCode);
                    document.getElementById('t_name').innerText = tenant.tenant_name || tenantCode;
                }

                const currentSummary = summaryData?.[0] || null;
                const credit = toNumber(currentSummary?.total_credit);
                const balance = Math.max(0, toNumber(currentSummary?.final_balance));

                // تحديث الواجهة
                document.getElementById('val_credit').innerText = Math.round(credit);
                document.getElementById('val_balance').innerText = Math.round(balance);
                document.getElementById('account_status_chip').innerText = balance <= 0 ? "ملتزم" : "جزئي";
                document.getElementById('account_status_chip').className = `hero-status ${balance <= 0 ? 'paid' : 'partial'}`;
                document.getElementById('last_update').innerText = `آخر تحديث: ${new Date().toLocaleDateString('en-GB')}`;

                // النصيحة المحاسبية (تنسيق سطرين)
                if (balance > 0) {
                    const monthly = Math.ceil(balance / 12);
                    document.getElementById('smart_message').innerHTML = `المطلوب حالياً: <b>${Math.round(balance)}</b>. ينصح بسداد <b>${monthly}</b> شهرياً،<br>لإغلاق الحساب خلال 12 شهر.`;
                } else {
                    document.getElementById('smart_message').innerText = "حسابكم منتظم تماماً، شكراً لالتزامكم.";
                }

                // تحميل الإشعارات
                await loadNotifications();
                
                // رسم المخطط
                renderPie(credit, balance);

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                if (window.lucide) lucide.createIcons();

            } catch (e) { console.error(e); }
        }

        async function loadNotifications() {
            const { data } = await supabaseClient.from('tenant_notifications').select('*').eq('tenant_code', tenantCode).eq('is_active', true).order('created_at', { ascending: false });
            const box = document.getElementById('notifications_box');

            if (data && data.length > 0) {
                box.innerHTML = data.map(n => `
                    <div class="notify-card ${n.type === 'legal' || n.type === 'lawyer' ? 'legal' : ''}">
                        <div style="font-weight:900; color:var(--gold-deep); margin-bottom:5px;">${n.title || 'تنبيه من الإدارة'}</div>
                        <div style="font-size:14px; font-weight:700;">${n.message}</div>
                        <div style="font-size:10px; color:var(--muted); margin-top:8px;">${new Date(n.created_at).toLocaleDateString('en-GB')}</div>
                    </div>
                `).join('');
                
                // تحديث الإشعارات كـ "مقروءة"
                const unseenIds = data.filter(n => !n.is_read).map(n => n.id);
                if (unseenIds.length > 0) {
                    await supabaseClient.from('tenant_notifications').update({ is_read: true, seen_at: new Date().toISOString() }).in('id', unseenIds);
                }
            }
        }

        function renderPie(paid, remaining) {
            const ctx = document.getElementById('balancePieChart').getContext('2d');
            if (pieChartInstance) pieChartInstance.destroy();
            
            const total = paid + remaining;
            const percent = total > 0 ? Math.round((paid / total) * 100) : 0;

            pieChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['المدفوع', 'المتبقي'],
                    datasets: [{ data: [paid, remaining], backgroundColor: ['#2f9e6f', '#c95a52'], borderWidth: 0 }]
                },
                options: {
                    cutout: '80%',
                    plugins: { legend: { display: false } },
                    animation: { duration: 2000 }
                },
                plugins: [{
                    beforeDraw: (chart) => {
                        const { width, height, ctx } = chart;
                        ctx.save();
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.font = 'bold 40px Tajawal';
                        ctx.fillStyle = '#2f2a24';
                        ctx.fillText(percent + '%', width / 2, height / 2);
                        ctx.restore();
                    }
                }]
            });
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        function goToStatement() { window.location.href = `statement.html?tenant=${tenantCode}`; }

        window.onload = init;
    </script>
</body>
</html>
