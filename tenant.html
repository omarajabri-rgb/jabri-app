<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر V3</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f4f1e8;
            --surface: rgba(255, 255, 255, 0.85);
            --gold: #c9a46b;
            --gold-dark: #af8b51;
            --text-main: #2d2924;
            --text-muted: #6e675d;
            --success: #27ae60;
            --danger: #e74c3c;
            --glass-border: rgba(201, 164, 107, 0.2);
            --shadow: 0 12px 40px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }
        
        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            padding: 20px; direction: rtl; opacity: 0; transition: 0.6s;
        }

        body.loaded { opacity: 1; }

        .container { max-width: 900px; margin: 0 auto; }

        /* Header V3 */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }
        .brand-box h2 { margin: 0; font-size: 20px; color: var(--gold-dark); font-weight: 900; }
        .brand-box span { font-size: 10px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }

        /* Hero Card */
        .card-hero {
            background: white; border-radius: 30px; padding: 30px;
            box-shadow: var(--shadow); border: 1px solid var(--glass-border);
            position: relative; overflow: hidden; margin-bottom: 20px;
        }
        .card-hero::after {
            content: ''; position: absolute; top: -50%; right: -20%;
            width: 300px; height: 300px; background: rgba(201, 164, 107, 0.05);
            border-radius: 50%; z-index: 0;
        }

        .status-badge {
            display: inline-block; padding: 6px 16px; border-radius: 50px;
            font-size: 12px; font-weight: 800; margin-bottom: 15px;
        }
        .status-paid { background: #e8f6ef; color: var(--success); }
        .status-debt { background: #fdf2f2; color: var(--danger); }

        .tenant-name { font-size: 28px; font-weight: 900; margin: 0; position: relative; z-index: 1; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box {
            background: white; padding: 20px; border-radius: 25px;
            text-align: center; border: 1px solid var(--glass-border);
        }
        .stat-box small { color: var(--text-muted); font-weight: 700; display: block; margin-bottom: 5px; }
        .stat-box b { font-size: 26px; color: var(--text-main); }

        /* Insights Panel */
        .panel {
            background: white; border-radius: 25px; padding: 25px;
            margin-bottom: 20px; border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }
        .panel-title {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 15px; font-weight: 900; color: var(--gold-dark);
        }

        .advice-text { line-height: 1.8; font-size: 15px; font-weight: 500; }

        .prediction-pill {
            background: #fdfaf4; border: 1px solid #f1e6d2;
            padding: 15px; border-radius: 20px; margin-top: 15px;
            text-align: center; font-weight: 800; color: var(--gold-dark);
        }

        /* Buttons */
        .btn-main {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: white; font-weight: 900; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(201, 164, 107, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .logout-btn {
            background: none; border: 1px solid #ddd; padding: 8px 15px;
            border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 700;
        }

        /* Chart */
        .chart-container { height: 250px; position: relative; margin: 20px 0; }

        @media (max-width: 500px) {
            .tenant-name { font-size: 22px; }
            .stat-box b { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="brand-box">
                <span>Jabri Real Estate</span>
                <h2>مجمع جبري</h2>
            </div>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </header>

        <section class="card-hero">
            <div id="status_pill" class="status-badge">جاري التحميل...</div>
            <h1 id="tenant_name" class="tenant-name">...</h1>
            <p id="update_time" style="font-size: 12px; color: var(--text-muted); margin-top: 10px;"></p>
        </section>

        <div class="stats-grid">
            <div class="stat-box">
                <small>إجمالي المدفوعات</small>
                <b id="val_paid">0</b>
            </div>
            <div class="stat-box" style="border-right: 4px solid var(--danger);">
                <small>الرصيد المتبقي</small>
                <b id="val_balance">0</b>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title"><i data-lucide="sparkles"></i> الخلاصة المالية</div>
            <div id="advice_content" class="advice-text">جاري تحليل كشف الحساب لعام 2026...</div>
        </div>

        <div class="panel">
            <div class="panel-title"><i data-lucide="pie-chart"></i> نسبة الإنجاز والتوقع</div>
            <div class="chart-container">
                <canvas id="v3Chart"></canvas>
            </div>
            <div id="prediction_pill" class="prediction-pill">...</div>
        </div>

        <button class="btn-main" onclick="location.href='statement.html'">
            <i data-lucide="file-text"></i> عرض كشف الحساب المفصل
        </button>

        <footer style="text-align: center; margin-top: 30px; color: #999; font-size: 11px; font-weight: 700;">
            حقوق الطبع محفوظة 2026 © إدارة مجمع جبري
        </footer>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const client = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        // --- Core Logic V3 ---
        const toNumber = v => isNaN(parseFloat(v)) ? 0 : parseFloat(v);

        // وظائف البحث الذكي في الوصف
        const isRent = d => /ايجار|الإيجار|الايجار/.test(d);
        const isFees = d => /معارف|خدمات/.test(d);
        const isCarry = d => /رصيد سابق|مدور|عام/.test(d);

        async function initV3() {
            try {
                const { data: tenant } = await client.from('tenants').select('*').eq('tenant_code', tenantCode).maybeSingle();
                const { data: tx } = await client.from('tenant_transactions').select('*').eq('tenant_code', tenantCode);

                const currentYear = 2026;
                const yearTx = (tx || []).filter(t => new Date(t.date).getFullYear() === currentYear);
                
                const totalPaid = yearTx.reduce((s, t) => s + toNumber(t.credit), 0);
                const totalDebit = yearTx.reduce((s, t) => s + toNumber(t.debit), 0);
                const balance = Math.max(0, totalDebit - totalPaid);
                const payRate = totalDebit > 0 ? Math.round((totalPaid / totalDebit) * 100) : 0;

                // التحديث البصري
                document.getElementById('tenant_name').innerText = tenant?.tenant_name || 'مستأجر غير معروف';
                document.getElementById('val_paid').innerText = Math.round(totalPaid).toLocaleString();
                document.getElementById('val_balance').innerText = Math.round(balance).toLocaleString();
                document.getElementById('update_time').innerText = `تم التحديث في: ${new Date().toLocaleTimeString('ar-JO')}`;

                const pill = document.getElementById('status_pill');
                if(balance === 0) { pill.innerText = "مكتمل السداد ✨"; pill.className = "status-badge status-paid"; }
                else { pill.innerText = "سداد جزئي"; pill.className = "status-badge status-debt"; }

                // حساب النصيحة (Logic Locked)
                document.getElementById('advice_content').innerText = buildAdvice(tx, currentYear);
                
                // حساب التوقع (Logic Locked)
                document.getElementById('prediction_pill').innerText = buildPrediction(tx, balance, currentYear);

                renderChart(payRate, balance, totalPaid);

                document.body.classList.add('loaded');
                lucide.createIcons();

            } catch (err) { console.error(err); }
        }

        function buildAdvice(transactions, year) {
            const yearRows = (transactions || []).filter(t => new Date(t.date).getFullYear() === year);
            const rent = yearRows.find(t => isRent(t.description || ''));
            const fees = yearRows.find(t => isFees(t.description || ''));
            const carry = yearRows.find(t => isCarry(t.description || ''));

            const rentVal = toNumber(rent?.debit);
            const feesVal = toNumber(fees?.debit);
            const prevVal = toNumber(carry?.debit);
            const monthly = Math.round((rentVal + feesVal) / 12);

            if (!rentVal) return "لا توجد بيانات تعاقدية مسجلة لعام 2026 بعد.";

            let msg = `بناءً على عقدك، القسط الشهري الأساسي هو ${monthly} د.أ. `;
            if (prevVal > 0) {
                let suggest = monthly + (prevVal <= 1000 ? 50 : 100);
                msg += `نظراً لوجود رصيد سابق (${prevVal} د.أ)، ننصح بدفع ${suggest} د.أ شهرياً لتسوية الحساب بالكامل هذا العام.`;
            } else {
                msg += `حسابك منتظم، يرجى الالتزام بالدفع الشهري لضمان استمرار الخدمات.`;
            }
            return msg;
        }

        function buildPrediction(transactions, balance, year) {
            const payments = (transactions || []).filter(t => new Date(t.date).getFullYear() === year && toNumber(t.credit) > 0);
            if (!payments.length || balance <= 0) return "لا يوجد رصيد مستحق حالياً";

            const avg = payments.reduce((s, t) => s + toNumber(t.credit), 0) / new Set(payments.map(p => new Date(p.date).getMonth())).size;
            const monthsLeft = Math.ceil(balance / (avg || 1));

            if (monthsLeft <= 2) return `أداء رائع! ستصفي رصيدك خلال شهرين تقريباً 🔥`;
            if (monthsLeft <= 5) return `بالمعدل الحالي، سيتم تسوية حسابك خلال ${monthsLeft} أشهر 👍`;
            return `تنبيه: بالمعدل الحالي تحتاج ${monthsLeft} أشهر لتصفية الرصيد، يفضل زيادة الدفع ⚠️`;
        }

        function renderChart(rate, balance, paid) {
            new Chart(document.getElementById('v3Chart'), {
                type: 'doughnut',
                data: {
                    labels: ['متبقي', 'مدفوع'],
                    datasets: [{
                        data: [balance, paid],
                        backgroundColor: ['#eeeeee', '#c9a46b'],
                        hoverOffset: 4, borderWidth: 0
                    }]
                },
                options: {
                    cutout: '80%', maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        window.onload = initV3;
    </script>
</body>
</html>
