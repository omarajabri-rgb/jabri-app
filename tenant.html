<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر المحدثة</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;

            --glass-bg: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            --glass-card-bg: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            --glass-border: 1px solid rgba(201,164,107,0.18);
            --glass-shadow: 0 12px 28px rgba(120,95,56,0.08);
            --glass-soft-shadow: 0 14px 30px rgba(120,95,56,0.08);
            --glass-blur: blur(14px);

            --chip-bg: rgba(201,164,107,0.14);
            --chip-border: 1px solid rgba(201,164,107,0.24);
            --chip-inner-glow: inset 0 1px 0 rgba(255,255,255,0.45);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            direction: rtl;
            text-align: right;
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand strong {
            color: var(--gold-deep);
            font-size: 18px;
            font-weight: 900;
        }

        .brand small {
            display: block;
            font-size: 11px;
            letter-spacing: 1.8px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .ghost-btn {
            padding: 12px 16px;
            border-radius: 16px;
            border: var(--glass-border);
            background: rgba(255,255,255,0.70);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .ghost-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(120,95,56,0.15);
        }

        .hero-card {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: right;
            background: var(--glass-bg);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
        }

        .hero-status {
            position: absolute;
            left: 18px;
            top: 18px;
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            box-shadow: var(--chip-inner-glow);
        }

        .hero-status.paid {
            background: rgba(47,158,111,0.10);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.24);
        }

        .hero-status.partial {
            background: rgba(204,90,80,0.10);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.22);
        }

        .hero-card h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
            padding-left: 110px;
        }

        .hero-note {
            margin-top: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
        }

        .chip-header {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 12px;
            width: 100%;
            padding-right: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 999px;
            min-width: 120px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: var(--gold-deep);
            background: var(--chip-bg);
            border: var(--chip-border);
            box-shadow: var(--chip-inner-glow);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .soft-card {
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            text-align: center;
            padding: 24px;
        }

        .soft-card span {
            display: block;
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .soft-card b {
            display: block;
            font-size: 30px;
            font-weight: 900;
        }

        .credit-card {
            background: linear-gradient(135deg, rgba(47,158,111,0.12), rgba(255,255,255,0.25));
            border-color: rgba(47,158,111,0.24);
            color: var(--success);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(201,90,82,0.10), rgba(255,255,255,0.25));
            border-color: rgba(201,90,82,0.22);
            color: var(--danger);
        }

        .panel {
            padding: 24px;
            margin-bottom: 22px;
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .smart-body {
            font-size: 16px;
            line-height: 1.9;
            font-weight: 800;
            color: var(--text);
            text-align: right;
            margin-top: 10px;
        }

        .prediction-item {
            margin-top: 15px;
            padding: 16px 18px;
            border-radius: 22px;
            background: rgba(255,255,255,0.55);
            border: 1px dashed rgba(201,164,107,0.65);
            box-shadow: var(--chip-inner-glow);
            font-weight: 900;
            text-align: center;
            color: var(--gold-deep);
            line-height: 1.8;
        }

        .chart-wrap {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .action-btn {
            width: 100%;
            max-width: 300px;
            margin: 24px auto 0;
            padding: 16px;
            border-radius: 24px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            box-shadow: 0 18px 35px rgba(201,164,107,0.25);
            transition: all 0.25s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 38px rgba(201,164,107,0.28);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.55s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media screen and (max-width: 768px) {
            .hero-card h1 {
                font-size: 24px;
                padding-left: 90px;
            }

            .soft-card b {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="topbar reveal">
            <div class="brand">
                <small>MANAGED BUSINESS SPACES</small>
                <strong>JABRI COMPLEX</strong>
            </div>
            <button class="ghost-btn" onclick="logout()">
                <i data-lucide="log-out"></i> خروج
            </button>
        </div>

        <section class="hero-card reveal">
            <span id="account_status_chip" class="hero-status partial">-</span>
            <h1 id="t_name">...</h1>
            <div id="last_update" class="hero-note">-</div>
        </section>

        <div class="stats-grid">
            <div class="soft-card credit-card reveal">
                <span>دائن (مدفوع)</span>
                <b id="val_credit">0</b>
            </div>
            <div class="soft-card balance-card reveal">
                <span>الرصيد المتبقي</span>
                <b id="val_balance">0</b>
            </div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">نصيحة محاسبية</div>
            </div>
            <div id="smart_message" class="smart-body">تحليل البيانات...</div>
        </div>

        <div class="panel reveal">
            <div class="chip-header">
                <div class="chip">ملخص الحساب</div>
            </div>
            <div class="chart-wrap">
                <canvas id="balancePieChart"></canvas>
            </div>
            <div id="prediction_box" class="prediction-item">جاري تحليل نمط الدفع...</div>
        </div>

        <button class="action-btn reveal" onclick="goToStatement()">
            <i data-lucide="file-text"></i> كشف الحساب بالتفصيل
        </button>

        <div class="footer reveal">© 2026 مجمع الجبري الصناعي التجاري</div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function toNumber(v) {
            return isNaN(parseFloat(v)) ? 0 : parseFloat(v);
        }

        function isRentRow(desc) {
            const d = (desc || '').trim();
            return d.startsWith('ايجار') || d.startsWith('الإيجار') || d.startsWith('الايجار');
        }

        function isFeesRow(desc) {
            const d = (desc || '').trim();
            return d.startsWith('معارف');
        }

        function isCarryRow(desc) {
            const d = (desc || '').trim();
            return d.includes('رصيد سابق') || d.includes('رصيد مدور') || d.startsWith('رصيد عام');
        }

        function getStatementYearAdvice(transactions, year = 2026) {
            const yearRows = (transactions || []).filter(t => new Date(t.date).getFullYear() === year);
            const rentRow = yearRows.find(t => isRentRow(t.description || ''));
            const feesRow = yearRows.find(t => isFeesRow(t.description || ''));
            const carryRow = yearRows.find(t => isCarryRow(t.description || ''));

            const yearlyRent = toNumber(rentRow?.debit);
            const yearlyFees = toNumber(feesRow?.debit);
            const previousBalance = toNumber(carryRow?.debit);
            const monthlyBase = Math.round((yearlyRent + yearlyFees) / 12);

            let suggestedMonthly = monthlyBase;
            if (previousBalance > 0) {
                if (previousBalance <= 600) suggestedMonthly += 25;
                else if (previousBalance <= 1200) suggestedMonthly += 50;
                else if (previousBalance <= 1800) suggestedMonthly += 100;
                else suggestedMonthly += 150;
            }

            return { yearlyRent, yearlyFees, previousBalance, monthlyBase, suggestedMonthly };
        }

        function buildPredictionMeta(transactions, balance, year = 2026) {
            const yearRows = (transactions || []).filter(t => new Date(t.date).getFullYear() === year);
            const payments = yearRows.filter(t => toNumber(t.credit) > 0);

            if (payments.length === 0 || balance <= 0) {
                return {
                    text: 'لا يوجد بيانات كافية لعرض التوقع حالياً',
                    monthsToClose: null,
                    monthlyRate: 0,
                    level: 'unknown'
                };
            }

            const totalPaid = payments.reduce((sum, t) => sum + toNumber(t.credit), 0);
            const months = new Set(
                payments.map(t => {
                    const d = new Date(t.date);
                    return `${d.getFullYear()}-${d.getMonth()}`;
                })
            ).size;

            const monthlyRate = totalPaid / (months || 1);

            if (monthlyRate <= 0) {
                return {
                    text: 'لا يوجد نمط دفع واضح حالياً',
                    monthsToClose: null,
                    monthlyRate: 0,
                    level: 'unknown'
                };
            }

            const monthsToClose = Math.ceil(balance / monthlyRate);

            if (monthsToClose <= 3) {
                return {
                    text: `ممتاز 🔥 — بهذا المعدل سيتم تسوية الرصيد خلال ${monthsToClose} أشهر`,
                    monthsToClose,
                    monthlyRate,
                    level: 'excellent'
                };
            } else if (monthsToClose <= 6) {
                return {
                    text: `جيد 👍 — يتوقع تسوية الرصيد خلال ${monthsToClose} أشهر`,
                    monthsToClose,
                    monthlyRate,
                    level: 'good'
                };
            } else if (monthsToClose <= 12) {
                return {
                    text: `يُنصح برفع الدفعة قليلًا ⚠️ — بهذا المعدل يحتاج ${monthsToClose} أشهر لتصفية الرصيد`,
                    monthsToClose,
                    monthlyRate,
                    level: 'warning'
                };
            } else {
                return {
                    text: `يُنصح بزيادة الدفع ⚠️ — بهذا المعدل يحتاج ${monthsToClose} أشهر لتصفية الرصيد`,
                    monthsToClose,
                    monthlyRate,
                    level: 'weak'
                };
            }
        }

        function buildAdviceMessageFromStatement(transactions, balance, year = 2026) {
            const advice = getStatementYearAdvice(transactions, year);
            const prediction = buildPredictionMeta(transactions, balance, year);

            if (!advice.yearlyRent && !advice.yearlyFees) {
                return 'لا توجد بيانات كافية في كشف حساب 2026 لإظهار النصيحة المحاسبية حالياً.';
            }

            let recommended = advice.suggestedMonthly;

            if (prediction.level === 'excellent') {
                recommended = advice.monthlyBase;
            } else if (prediction.level === 'good') {
                recommended = Math.max(advice.suggestedMonthly, advice.monthlyBase + 25);
            } else if (prediction.level === 'warning') {
                recommended = Math.max(advice.suggestedMonthly, advice.monthlyBase + 75);
            } else if (prediction.level === 'weak') {
                recommended = Math.max(advice.suggestedMonthly, advice.monthlyBase + 150);
            }

            if (advice.previousBalance > 0) {
                return `حسب كشف حساب ${year}، الأساس الشهري هو ${advice.monthlyBase} د.أ (شامل الإيجار والمعارف)، ومع وجود رصيد سابق يُنصح بدفع ${recommended} د.أ شهريًا لتخفيف الرصيد بشكل مريح.`;
            }

            return `حسب كشف حساب ${year}، الأساس الشهري الحالي هو ${advice.monthlyBase} د.أ (شامل الإيجار والمعارف)، ويُنصح بالالتزام بهذا المبلغ شهريًا.`;
        }

        function animateNumber(element, endValue) {
            const duration = 800;
            const startTime = performance.now();

            function update(currentTime) {
                const progress = Math.min((currentTime - startTime) / duration, 1);
                element.innerText = Math.floor(progress * endValue).toLocaleString('en-US');
                if (progress < 1) requestAnimationFrame(update);
            }

            requestAnimationFrame(update);
        }

        async function init() {
            try {
                const { data: tenant } = await supabaseClient
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .maybeSingle();

                const { data: tx } = await supabaseClient
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode);

                const tx2026 = (tx || []).filter(t => new Date(t.date).getFullYear() === 2026);
                const daen2026 = tx2026.reduce((sum, t) => sum + toNumber(t.credit), 0);
                const debit2026 = tx2026.reduce((sum, t) => sum + toNumber(t.debit), 0);
                const balance2026 = Math.max(0, debit2026 - daen2026);
                const rate = debit2026 > 0 ? Math.round((daen2026 / debit2026) * 100) : 0;

                document.getElementById('t_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('last_update').innerText = `آخر تحديث: ${new Date().toLocaleDateString('en-GB')}`;

                const chip = document.getElementById('account_status_chip');
                chip.innerText = balance2026 === 0 ? 'مسدد' : 'جزئي';
                chip.className = balance2026 === 0 ? 'hero-status paid' : 'hero-status partial';

                animateNumber(document.getElementById('val_credit'), Math.round(daen2026));
                animateNumber(document.getElementById('val_balance'), Math.round(balance2026));

                document.getElementById('smart_message').innerText =
                    buildAdviceMessageFromStatement(tx || [], balance2026, 2026);

                const prediction = buildPredictionMeta(tx || [], balance2026, 2026);
                document.getElementById('prediction_box').innerText = prediction.text;

                new Chart(document.getElementById('balancePieChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['متبقي', 'مدفوع'],
                        datasets: [{
                            data: [balance2026, daen2026],
                            backgroundColor: ['#c95a52', '#2f9e6f'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        cutout: '75%',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    font: { family: 'Tajawal', weight: 'bold' },
                                    color: '#2f2a24',
                                    padding: 16,
                                    usePointStyle: true,
                                    pointStyle: 'circle',
                                    boxWidth: 10
                                }
                            }
                        }
                    },
                    plugins: [{
                        beforeDraw(chart) {
                            const { width, height, ctx } = chart;
                            ctx.restore();
                            ctx.font = 'bold 24px Tajawal';
                            ctx.fillStyle = '#2f2a24';
                            ctx.textBaseline = 'middle';
                            const text = rate + '%';
                            ctx.fillText(text, (width - ctx.measureText(text).width) / 2, height / 2 - 10);
                            ctx.save();
                        }
                    }]
                });

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.querySelectorAll('.reveal').forEach((el, i) => {
                    setTimeout(() => el.classList.add('active'), i * 80);
                });
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
            }
        }

        function goToStatement() {
            window.location.href = `statement.html?tenant=${encodeURIComponent(tenantCode)}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = init;
    </script>
</body>
</html>
