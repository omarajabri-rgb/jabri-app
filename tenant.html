<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | لوحة المستأجر</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --navy: #0f172a; --gold: #d4af37; --bg: #08111f;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #38bdf8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; min-height: 100vh; padding: 15px; opacity: 0; transition: opacity 0.5s ease; overflow-x: hidden; }
        
        /* شاشة التحميل */
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#08111f; z-index:9999; }
        .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius:50%; animation:spin 1s linear infinite; }

        .reveal { opacity: 0; transform: translateY(15px); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tenant-card { background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px; margin-bottom: 20px; }
        
        /* تصميم المعلومات السريعة (كبسولات عمر) */
        .quick-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
        .quick-info div { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 10px 5px; text-align: center; }
        .quick-info span { display: block; font-size: 9px; color: #94a3b8; font-weight: 700; margin-bottom: 3px; }
        .quick-info b { font-size: 11px; font-weight: 900; color: var(--gold); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 22px; padding: 18px 5px; text-align: center; color: var(--navy); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stat-card span { display: block; font-size: 9px; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        .stat-card b { font-size: 11px; font-weight: 900; }
        
        .status-box { background: #fff; border-radius: 28px; padding: 22px; color: var(--navy); margin-bottom: 20px; border-right: 10px solid var(--gold); position: relative; }
        .legal-tag { position: absolute; top: -10px; left: 20px; background: var(--gold); color: #fff; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; }
        
        .risk-chip { display: inline-block; margin-top: 10px; padding: 6px 12px; border-radius: 999px; font-size: 10px; font-weight: 900; color: #fff; }
        .btn-stack { display: grid; gap: 12px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 18px; border-radius: 22px; border: none; font-size: 16px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: var(--navy); }
        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.1); color: #fff; }
        .footer-text { text-align: center; font-size: 10px; color: #64748b; margin-top: 20px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="header reveal">
        <div style="font-weight: 900; font-size: 14px; color: var(--gold);">JABRI COMPLEX</div>
        <button onclick="logout()" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; font-size:11px; font-weight:800; padding:6px 14px; border-radius:10px; cursor:pointer;">خروج</button>
    </div>

    <section class="tenant-card reveal">
        <h1 id="t_name" style="margin:0; font-size:22px; font-weight:900; color:var(--gold);">...</h1>
        <p id="t_unit" style="margin:5px 0 0; font-size:11px; font-weight:700; color:#94a3b8;"></p>
        <p id="year_info" style="font-size:10px; color:var(--gold); font-weight:800; margin-top:5px;"></p>

        <div class="quick-info">
            <div><span>آخر تحديث</span><b id="last_update">-</b></div>
            <div><span>آخر دفعة</span><b id="last_payment">-</b></div>
            <div><span>حالة الحساب</span><b id="account_status">-</b></div>
        </div>
    </section>

    <div class="stats-grid">
        <div class="stat-card reveal" style="transition-delay:0.1s;"><span>إجمالي المستحق</span><b id="val_debit">0</b></div>
        <div class="stat-card reveal" style="transition-delay:0.2s;"><span>المدفوعات</span><b id="val_credit" style="color:var(--success);">0</b></div>
        <div class="stat-card reveal" style="transition-delay:0.3s;"><span>الرصيد المتبقي</span><b id="val_balance" style="color:var(--danger);">0</b></div>
    </div>

    <div class="status-box reveal" id="smart_box" style="transition-delay:0.4s;">
        <div class="legal-tag" id="status_tag">الحالة المالية</div>
        <div id="smart_icon" style="margin-bottom:10px;"></div>
        <div id="smart_message" style="font-size:13px; font-weight:700; color:#1e293b; line-height:1.5;">جاري التحليل...</div>
    </div>

    <div class="status-box reveal" id="advice_box" style="transition-delay:0.45s; border-right-color:var(--info);">
        <div class="legal-tag" id="advice_tag" style="background:var(--info);">التوصية المالية</div>
        <div id="advice_icon" style="margin-bottom:10px;"></div>
        <div id="advice_message" style="font-size:13px; font-weight:700; color:#1e293b; line-height:1.7;">جاري إعداد التوصية...</div>
    </div>

    <div class="btn-stack reveal" style="transition-delay:0.5s;">
        <button class="btn btn-gold" onclick="window.location.href='statement.html'"><i data-lucide="file-text"></i> كشف الحساب</button>
        <button class="btn btn-outline" onclick="sendWhatsApp()"><i data-lucide="message-circle"></i> واتساب الإدارة</button>
    </div>

    <div class="footer-text reveal" id="footer_year"></div>

    <script>
        // 1. تأمين الجلسة
        const tenantSession = localStorage.getItem('jabri_tenant_session');
        const tenantId = localStorage.getItem('jabri_tenant_id');

        if (!tenantSession || !tenantId || isNaN(tenantId)) {
            localStorage.clear(); window.location.href = "index.html";
        }

        const today = new Date();
        const currentYear = today.getFullYear();
        const dueMessage = `حتى تاريخ ${today.toLocaleDateString('ar-JO')}`;

        // 2. إعداد Supabase
        const { createClient } = supabase;
        const supabaseClient = createClient('https://gzukfvxcpfblzqyjzkoz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU');

        let dbData = {};

        window.onload = async () => {
            try {
                const { data, error } = await supabaseClient.from('tenants').select('*').eq('id', tenantId).single();
                if (error) throw error;
                dbData = data;
                document.getElementById('loader').style.display = 'none';
                document.body.style.opacity = "1";
                updateUI();
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                document.body.style.opacity = "1";
                alert("تعذر تحميل البيانات.");
            }
        };

        // 3. محرك التوصية والتحليل
        function getSmartAdvice({ previousBalance, currentRent, paid, totalDue, balance }) {
            const collectionRate = totalDue > 0 ? Math.round((paid / totalDue) * 100) : 100;
            const carryRatio = totalDue > 0 ? previousBalance / totalDue : 0;
            let riskScore = balance === 0 ? 0 : (balance <= 500 ? 20 : (balance <= 1000 ? 45 : (balance <= 2000 ? 70 : 90)));
            if (carryRatio >= 0.4) riskScore += 10;
            if (collectionRate < 50) riskScore += 10;
            riskScore = Math.min(100, riskScore);

            let title, color, icon, message;
            if (balance === 0) { title = "وضع ممتاز"; color = "var(--success)"; icon = "badge-check"; message = `وضعك المالي ممتاز. لا يوجد رصيد مستحق حتى سنة ${currentYear}. استمر بنفس الالتزام.`; }
            else if (balance <= 500) { title = "إغلاق الرصيد"; color = "var(--warning)"; icon = "wallet"; message = `ننصح بتسديد كامل المبلغ المتبقي (${balance.toLocaleString()} د.أ) لإغلاق الحساب تماماً.`; }
            else if (balance <= 1500) { title = "خطة سداد"; color = "var(--info)"; icon = "badge-dollar-sign"; message = `الرصيد التراكمي قابل للمعالجة بسهولة. التوصية: دفع حوالي ${Math.round(balance / 3).toLocaleString()} د.أ كدفعة أولى.`; }
            else { title = "سداد عاجل"; color = "var(--danger)"; icon = "shield-alert"; message = `الرصيد التراكمي مرتفع. التوصية: دفع ${Math.min(balance, 1000).toLocaleString()} د.أ فوراً لتجنب الإجراءات الإدارية.`; }
            return { riskScore, title, message, icon, color, collectionRate };
        }

        // 4. عرض التوصية في الواجهة
        function renderSmartAdvice(advice) {
            const tag = document.getElementById('advice_tag'), icon = document.getElementById('advice_icon'), msg = document.getElementById('advice_message'), box = document.getElementById('advice_box');
            box.style.borderRightColor = advice.color; tag.style.background = advice.color; tag.innerText = advice.title;
            icon.innerHTML = `<i data-lucide="${advice.icon}" style="color:${advice.color}"></i>`;
            const rColor = advice.riskScore < 40 ? "#10b981" : (advice.riskScore < 70 ? "#f59e0b" : "#ef4444");
            msg.innerHTML = `<div style="margin-bottom:12px;">${advice.message}</div><div class="risk-chip" style="background:${rColor}">درجة المخاطرة: ${advice.riskScore}/100</div><div style="margin-top:10px; font-size:11px; color:#64748b; font-weight:800;">نسبة التحصيل الحالية: ${advice.collectionRate}%</div>`;
        }

        // 5. تحديث الواجهة الرئيسي
        function updateUI() {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            
            // الحسابات المحاسبية
            const prev = Number(dbData.previous_balance) || 0;
            const rent = Number(dbData.total_rent) || 0;
            const paid = Number(dbData.paid_amount) || 0;
            const totalDue = prev + rent;
            const balance = Math.max(0, totalDue - paid);

            // تحديث الـ Quick Info (منطق عمر)
            document.getElementById('last_update').innerText = new Date().toLocaleDateString('ar-JO');
            document.getElementById('last_payment').innerText = dbData.last_payment_amount ? `${Number(dbData.last_payment_amount).toLocaleString()} د.أ` : 'لا يوجد';
            
            let statusText = "منتظم", statusColor = "#10b981";
            if (balance > 0 && balance <= 500) { statusText = "تنبيه"; statusColor = "#f59e0b"; }
            else if (balance > 500) { statusText = "متابعة"; statusColor = "#ef4444"; }
            
            const sEl = document.getElementById('account_status');
            sEl.innerText = statusText; sEl.style.color = statusColor;

            // تحديث العناوين
            document.getElementById('t_name').innerText = dbData.name || 'مستأجر';
            document.getElementById('t_unit').innerText = `الوحدة: ${dbData.unit || '-'}`;
            document.getElementById('year_info').innerText = `الحساب حتى سنة ${currentYear}`;
            document.getElementById('footer_year').innerText = `© ${currentYear} مجمع الجبري`;

            // المحركات
            const advice = getSmartAdvice({ previousBalance: prev, currentRent: rent, paid, totalDue, balance });
            animateValue("val_debit", 0, totalDue, 1200);
            animateValue("val_credit", 0, paid, 1200);
            animateValue("val_balance", 0, balance, 1200);

            setTimeout(() => { 
                processSmartStatus(balance); 
                renderSmartAdvice(advice); 
                lucide.createIcons(); 
            }, 150);
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id); let startT = null;
            const step = (t) => {
                if (!startT) startT = t; const prog = Math.min((t - startT) / duration, 1);
                obj.innerHTML = Math.floor(prog * (end - start) + start).toLocaleString() + " <span style='font-size:8px; color:#64748b;'>د.أ</span>";
                if (prog < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function processSmartStatus(balance) {
            const box = document.getElementById('smart_box'), msg = document.getElementById('smart_message'), tag = document.getElementById('status_tag'), icon = document.getElementById('smart_icon');
            if (balance === 0) setStatus(box, tag, msg, icon, "var(--success)", "ممتاز", `حسابك مسدد بالكامل حتى سنة ${currentYear} (${dueMessage}).`, "award");
            else if (balance <= 500) setStatus(box, tag, msg, icon, "var(--warning)", "تنبيه", `الرصيد التراكمي المتبقي حتى سنة ${currentYear} هو ${balance.toLocaleString()} د.أ (${dueMessage}).`, "clock");
            else setStatus(box, tag, msg, icon, "var(--danger)", "متابعة", `الرصيد التراكمي المتبقي حتى سنة ${currentYear} هو ${balance.toLocaleString()} د.أ (${dueMessage}).`, "alert-triangle");
        }

        function setStatus(b, t, m, i, color, txt, message, icn) {
            b.style.borderRightColor = color; t.style.background = color; t.innerText = txt; m.innerText = message; i.innerHTML = `<i data-lucide="${icn}" style="color:${color}"></i>`;
        }

        function sendWhatsApp() {
            const bal = Math.max(0, (Number(dbData.previous_balance) || 0) + (Number(dbData.total_rent) || 0) - (Number(dbData.paid_amount) || 0));
            const msg = encodeURIComponent(`مرحباً إدارة مجمع الجبري، استفسار مالي بخصوص الوحدة ${dbData.unit || '-'}.\nالرصيد التراكمي المتبقي حتى سنة ${currentYear}: ${bal.toLocaleString()} د.أ (${dueMessage}).`);
            window.open(`https://wa.me/9627XXXXXXXX?text=${msg}`, '_blank');
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
