<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | لوحة المستأجر المحدثة</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;

            --glass-bg: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            --glass-card-bg: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            --glass-border: 1px solid rgba(201,164,107,0.18);
            --glass-shadow: 0 12px 28px rgba(120,95,56,0.08);
            --glass-soft-shadow: 0 14px 30px rgba(120,95,56,0.08);
            --glass-blur: blur(14px);

            --chip-inner-glow: inset 0 1px 0 rgba(255,255,255,0.45);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            direction: rtl;
            text-align: right;
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand strong {
            color: var(--gold-deep);
            font-size: 18px;
            font-weight: 900;
        }

        .brand small {
            display: block;
            font-size: 11px;
            letter-spacing: 1.8px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .ghost-btn {
            padding: 12px 16px;
            border-radius: 16px;
            border: var(--glass-border);
            background: rgba(255,255,255,0.70);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .hero-card {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: right;
            background: var(--glass-bg);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
        }

        .hero-status {
            position: absolute;
            left: 18px;
            top: 18px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.4px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .hero-status.paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.25);
        }

        .hero-status.partial {
            background: rgba(201,90,82,0.10);
            color: var(--danger);
            border: 1px solid rgba(201,90,82,0.25);
        }

        .hero-card h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
            padding-left: 110px;
        }

        .hero-note {
            margin-top: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 800;
        }

        .chip-header {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 12px;
            width: 100%;
            padding-right: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 999px;
            min-width: 100px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            color: var(--gold-deep);
            background: rgba(201,164,107,0.12);
            border: 1px solid rgba(201,164,107,0.22);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.40);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .soft-card {
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            text-align: center;
            padding: 24px;
        }

        .soft-card span {
            display: block;
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .soft-card b {
            display: block;
            font-size: 30px;
            font-weight: 900;
        }

        .credit-card {
            background: linear-gradient(135deg, rgba(47,158,111,0.12), rgba(255,255,255,0.25));
            border-color: rgba(47,158,111,0.24);
            color: var(--success);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(201,90,82,0.10), rgba(255,255,255,0.25));
            border-color: rgba(201,90,82,0.22);
            color: var(--danger);
        }

        .panel {
            padding: 24px;
            margin-bottom: 22px;
            border-radius: 26px;
            border: var(--glass-border);
            background: var(--glass-card-bg);
            box-shadow: var(--glass-soft-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .smart-body {
            font-size: 16px;
            line-height: 2.2;
            font-weight: 800;
            color: var(--text);
            text-align: right;
            margin-top: 10px;
            white-space: pre-line;
        }

        .highlight-number {
            display: inline-block;
            padding: 4px 10px;
            margin: 0 3px;
            border-radius: 10px;
            font-weight: 900;
            color: var(--gold-deep);
            background: rgba(201,164,107,0.15);
