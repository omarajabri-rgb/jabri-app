<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | لوحة المستأجر</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --navy: #0f172a;
            --gold: #d4af37;
            --bg: #08111f;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #38bdf8;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Tajawal', sans-serif; 
        }

        body {
            margin: 0; background: var(--bg); color: #fff; min-height: 100vh;
            padding: 15px; opacity: 0; transition: opacity 0.5s ease; overflow-x: hidden;
        }
        
        #loader {
            position: fixed; inset: 0; display: flex; align-items: center;
            justify-content: center; background: #08111f; z-index: 9999;
        }

        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; }
        .header img { height: 45px; width: auto; object-fit: contain; }

        .tenant-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px; margin-bottom: 20px;
        }
        
        .account-badge {
            display: inline-flex; align-items: center; gap: 8px; margin-top: 12px;
            padding: 8px 16px; border-radius: 999px; font-size: 11px; font-weight: 900;
            color: #fff;
        }

        .badge-good { background: linear-gradient(135deg, #10b981, #059669); }
        .badge-warn { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .badge-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .quick-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 20px; }
        .quick-info div { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 12px 5px; text-align: center; }
        .quick-info span { display: block; font-size: 9px; color: #94a3b8; font-weight: 700; margin-bottom: 3px; }
        .quick-info b { font-size: 11px; font-weight: 900; color: var(--gold); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card {
            background: #fff; border-radius: 22px; padding: 18px 5px; text-align: center;
            color: var(--navy); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .stat-card span { display: block; font-size: 9px; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        .stat-card b { font-size: 11px; font-weight: 900; }

        .btn-stack { display: grid; gap: 12px; margin-bottom: 20px; }
        .btn {
            width: 100%; padding: 18px; border-radius: 22px; border: none; font-size: 16px;
            font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s;
        }
        .btn-gold { background: var(--gold); color: var(--navy); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; }

        .footer-text { text-align: center; font-size: 10px; color: #64748b; margin-top: 20px; font-weight: 800; }

        @media (max-width: 768px) { .quick-info, .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="header">
        <img src="logo_complex.png" alt="Jabri Complex Logo">
        <button onclick="logout()" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; font-size:11px; font-weight:800; padding:6px 14px; border-radius:10px; cursor:pointer;">خروج</button>
    </div>

    <section class="tenant-card">
        <h1 id="t_name" style="margin:0; font-size:22px; font-weight:900; color:var(--gold);">جاري التحميل...</h1>
        <p id="t_unit" style="margin:5px 0 0; font-size:11px; font-weight:700; color:#94a3b8;"></p>
        
        <div id="account_badge" class="account-badge">جاري التحقق...</div>

        <div class="quick-info">
            <div><span>آخر تحديث</span><b id="last_update">-</b></div>
            <div><span>آخر دفعة</span><b id="last_payment">-</b></div>
            <div><span>حالة الحساب</span><b id="account_status">-</b></div>
        </div>
    </section>

    <div class="stats-grid">
        <div class="stat-card">
            <span>إجمالي المستحق</span>
            <b id="val_debit">0</b>
        </div>
        <div class="stat-card">
            <span>المدفوعات</span>
            <b id="val_credit" style="color:var(--success);">0</b>
        </div>
        <div class="stat-card">
            <span>الرصيد المتبقي</span>
            <b id="val_balance" style="color:var(--danger);">0</b>
        </div>
    </div>

    <div class="btn-stack">
        <button class="btn btn-gold" onclick="window.location.href='statement.html'">
            <i data-lucide="file-text"></i>
            كشف الحساب
        </button>
        <button class="btn btn-outline" onclick="window.open('https://wa.me/962796444440', '_blank')">
            <i data-lucide="message-circle"></i>
            واتساب الإدارة
        </button>
    </div>

    <div class="footer-text" id="footer_year"></div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) window.location.href = "index.html";

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function formatCurrency(v) { 
            return `${Number(v || 0).toLocaleString('en-US', { minimumFractionDigits: 3 })} د.أ`; 
        }

        window.onload = async () => {
            try {
                // الربط مع tenant_name و shop_no لتطابق قاعدة البيانات
                const { data: tenant, error: tErr } = await supabaseClient
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .single();

                const { data: tx, error: txErr } = await supabaseClient
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .order('date', { ascending: false });

                if (tErr || !tenant) throw new Error("Tenant Not Found");

                // تحديث واجهة المستخدم بالبيانات الصحيحة
                document.getElementById('t_name').innerText = tenant.tenant_name || '-';
                document.getElementById('t_unit').innerText = `الوحدة رقم: ${tenant.shop_no || '-'}`;
                document.getElementById('footer_year').innerText = `© ${new Date().getFullYear()} JABRI INDUSTRIAL COMPLEX`;

                const prevBal = Number(tenant.previous_balance || 0); // تأكد من إضافة هذا العمود في Supabase
                const debits = (tx || []).reduce((s, t) => s + (Number(t.debit) || 0), 0);
                const credits = (tx || []).reduce((s, t) => s + (Number(t.credit) || 0), 0);
                
                const totalDue = prevBal + debits;
                const balance = totalDue - credits;

                document.getElementById('val_debit').innerText = formatCurrency(totalDue);
                document.getElementById('val_credit').innerText = formatCurrency(credits);
                document.getElementById('val_balance').innerText = formatCurrency(balance);
                
                // تحديث البادج والحالة
                const badge = document.getElementById('account_badge');
                if (balance <= 0) {
                    badge.className = "account-badge badge-good";
                    badge.innerHTML = '<i data-lucide="shield-check"></i> حساب مكتمل';
                    document.getElementById('account_status').innerText = "منتظم";
                } else {
                    badge.className = balance > 500 ? "account-badge badge-danger" : "account-badge badge-warn";
                    badge.innerHTML = '<i data-lucide="alert-circle"></i> يرجى المراجعة';
                    document.getElementById('account_status').innerText = "متبقي رصيد";
                }

                if (tx && tx.length > 0) {
                    document.getElementById('last_update').innerText = new Date(tx[0].date).toLocaleDateString('ar-JO');
                    const lastPay = tx.find(t => Number(t.credit) > 0);
                    document.getElementById('last_payment').innerText = lastPay ? formatCurrency(lastPay.credit) : 'لا يوجد';
                }

                document.getElementById('loader').style.display = 'none';
                document.body.style.opacity = "1";
                if (window.lucide) lucide.createIcons();

            } catch (e) { 
                console.error(e); 
                alert("خطأ في تحميل البيانات");
                logout(); 
            }
        };

        function logout() { 
            localStorage.clear(); 
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
