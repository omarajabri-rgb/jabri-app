<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إدارة مجمع الجبري | دخول الإدارة</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --surface-strong: rgba(255,255,255,0.92);
            --border: rgba(201,164,107,0.20);
            --text: #2f2a24;
            --muted: #7d7468;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --danger: #cc5a50;
            --success: #159a6f;
            --shadow: 0 18px 40px rgba(120,95,56,0.12);
        }

        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(201,164,107,0.12), transparent 24%),
                radial-gradient(circle at bottom right, rgba(177,138,82,0.10), transparent 24%),
                linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        .card {
            width: 100%;
            max-width: 430px;
            padding: 34px 28px;
            border-radius: 32px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            top: -50px;
            left: -40px;
            background: rgba(201,164,107,0.08);
            pointer-events: none;
        }

        .card::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            bottom: -45px;
            right: -30px;
            background: rgba(177,138,82,0.07);
            pointer-events: none;
        }

        .logo-badge {
            width: 68px;
            height: 68px;
            margin: 0 auto 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            box-shadow: 0 12px 24px rgba(201,164,107,0.22);
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 0;
            color: var(--gold-deep);
            font-size: 30px;
            font-weight: 900;
            position: relative;
            z-index: 1;
        }

        .subtext {
            margin: 10px 0 24px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.9;
            position: relative;
            z-index: 1;
        }

        .form-group {
            text-align: right;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold-deep);
            font-size: 12px;
            font-weight: 900;
            padding-right: 4px;
        }

        input {
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.86);
            color: var(--text);
            font-size: 15px;
            font-weight: 700;
            outline: none;
            transition: 0.22s ease;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201,164,107,0.10);
            background: var(--surface-strong);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            transition: 0.22s ease;
            position: relative;
            z-index: 1;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(201,164,107,0.20);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .msg {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.7;
            position: relative;
            z-index: 1;
        }

        .msg.error {
            background: rgba(204,90,80,0.10);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.12);
        }

        .msg.success {
            background: rgba(21,154,111,0.10);
            color: var(--success);
            border: 1px solid rgba(21,154,111,0.14);
        }

        .hint {
            margin-top: 18px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.9;
            position: relative;
            z-index: 1;
        }

        .hint b {
            color: var(--gold-deep);
        }

        .footer-note {
            margin-top: 16px;
            font-size: 10px;
            color: var(--muted);
            font-weight: 800;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 1;
        }
    </style>

<link rel="icon" href="IMG_2028.png">
<link rel="apple-touch-icon" href="IMG_2028.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jabri Admin">

</head>
<body>
    <div class="card">
        <div class="logo-badge">
            <i data-lucide="shield-check"></i>
        </div>

        <h1>JABRI ADMIN</h1>
        <div class="subtext">
            دخول الإدارة مستقل عن بوابة المستأجرين.<br>
            يمكنك تعديل اسم المستخدم وكلمة المرور من داخل هذا الملف.
        </div>

        <div class="form-group">
            <label>اسم المستخدم</label>
            <input id="admin_user" type="text" placeholder="Admin username" autocomplete="off">
        </div>

        <div class="form-group">
            <label>كلمة المرور</label>
            <input id="admin_pass" type="password" placeholder="Password" autocomplete="off">
        </div>
<div style="display:flex;align-items:center;gap:8px;margin-top:6px;margin-bottom:18px;">
    <input type="checkbox" id="remember_admin" style="width:auto;">
    <label style="margin:0;font-size:12px;font-weight:800;color:#7a6c59;">تذكرني</label>
</div>
        <button id="login_btn" class="btn-login" onclick="handleAdminLogin()">
            <i data-lucide="log-in"></i>
            دخول الإدارة
        </button>

        <div id="msg" class="msg"></div>

        <div class="hint">
            الافتراضي حاليًا:<br>
            username: <b>admin</b><br>
            password: <b>1234</b>
        </div>

        <div class="footer-note">
            © 2026 JABRI INDUSTRIAL COMPLEX
        </div>
    </div>

    <script>
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'Intheend';

        window.onload = () => {
            if (window.lucide) lucide.createIcons();
const remember = localStorage.getItem('jabri_admin_remember');
document.getElementById('remember_admin').checked = remember === 'yes';

if (remember === 'yes') {
    const savedUser = localStorage.getItem('jabri_admin_saved_user');
    const savedPass = localStorage.getItem('jabri_admin_saved_pass');

    if (savedUser && savedPass) {
        document.getElementById('admin_user').value = savedUser;
        document.getElementById('admin_pass').value = savedPass;

        setTimeout(() => {
            handleAdminLogin();
        }, 300);
    }
}
            document.getElementById('admin_user').addEventListener('keypress', onEnter);
            document.getElementById('admin_pass').addEventListener('keypress', onEnter);

            if (localStorage.getItem('jabri_admin_session') === 'active') {
                window.location.href = 'admin.html';
            }
        };

        function onEnter(e) {
            if (e.key === 'Enter') handleAdminLogin();
        }

        function showMessage(text, type = 'error') {
            const msg = document.getElementById('msg');
            msg.className = `msg ${type}`;
            msg.style.display = 'block';
            msg.innerText = text;
        }

        function handleAdminLogin() {
            const user = document.getElementById('admin_user').value.trim();
            const pass = document.getElementById('admin_pass').value.trim();
            const btn = document.getElementById('login_btn');

            if (!user || !pass) {
                showMessage('يرجى إدخال اسم المستخدم وكلمة المرور.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-circle"></i> جاري التحقق...`;
            if (window.lucide) lucide.createIcons();

            setTimeout(() => {
    if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {

        // 👇 هذا اللي نضيفه
        const remember = document.getElementById('remember_admin').checked;

        if (remember) {
            localStorage.setItem('jabri_admin_remember', 'yes');
            localStorage.setItem('jabri_admin_saved_user', user);
            localStorage.setItem('jabri_admin_saved_pass', pass);
        } else {
            localStorage.removeItem('jabri_admin_remember');
            localStorage.removeItem('jabri_admin_saved_user');
            localStorage.removeItem('jabri_admin_saved_pass');
        }

        // 👇 خلي الباقي مثل ما هو
        localStorage.setItem('jabri_admin_session', 'active');
        localStorage.setItem('jabri_admin_user', user);
        showMessage('تم تسجيل الدخول بنجاح، جاري التحويل...', 'success');

        setTimeout(() => {
            window.location.href = 'admin.html';
        }, 450);
        return;
    }

                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="log-in"></i> دخول الإدارة`;
                if (window.lucide) lucide.createIcons();

                showMessage('بيانات الدخول غير صحيحة. عدّل القيم داخل admin-login.html إذا أردت تغيير بيانات الإدارة.', 'error');
            }, 350);
        }
    </script>
</body>
</html>
