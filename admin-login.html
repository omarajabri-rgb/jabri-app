<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول الإدارة</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:10px;
}

p{
  color:#777;
  margin-bottom:20px;
}

input{
  width:100%;
  height:45px;
  border-radius:10px;
  border:1px solid #ddd;
  padding:0 10px;
  font-size:16px;
  margin-bottom:15px;
}

button{
  width:100%;
  height:45px;
  border:none;
  border-radius:10px;
  background:#1d2940;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.error{
  color:red;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>دخول الإدارة</h2>
  <p>أدخل كلمة المرور</p>

  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>

  <div id="error" class="error">كلمة المرور غير صحيحة</div>
</div>

<script>

const ADMIN_PASSWORD = "Intheend"; // 🔥 غيرها فوراً

function login(){
  const pass = document.getElementById('password').value

  if(pass === ADMIN_PASSWORD){
    localStorage.setItem("adminAuth", "true")
    window.location.href = "/admin.html"
  } else {
    document.getElementById('error').style.display = 'block'
  }
}

</script>

</body>
</html>
