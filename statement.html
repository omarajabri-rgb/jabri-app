<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>كشف الحساب</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
  padding-bottom:95px;
}

/* 🔥 FIXED BUTTONS */
.bottom-actions{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:9999;

  display:flex;
  flex-direction:row-reverse;
  gap:12px;

  width:min(420px, 100%);
  margin:0 auto;

  padding:8px 10px calc(4px + env(safe-area-inset-bottom));
  box-sizing:border-box;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,0.35);
  border-radius:22px 22px 0 0;
  box-shadow:0 -8px 30px rgba(0,0,0,0.12);

  transition:transform 0.25s ease, opacity 0.25s ease;
}

.bottom-actions.hide{
  transform:translateY(120%);
  opacity:0;
}

.pdf-btn,
.back-btn{
  flex:1;
  height:52px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  font-size:16px;
}

.pdf-btn{
  background:linear-gradient(135deg,#c9a46b,#b89155);
  color:#fff;
}

.back-btn{
  background:linear-gradient(135deg,#1f2d4a,#2b3d63);
  color:#fff;
}
</style>
</head>

<body>

<div class="app">
  <h2>كشف الحساب</h2>
  <div id="tenantName"></div>
  <div id="container"></div>
</div>

<div class="bottom-actions">
  <button class="pdf-btn" onclick="savePDF()">PDF</button>
  <button class="back-btn" onclick="goBack()">رجوع</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'YOUR_SUPABASE_ANON_KEY'
)

window.goBack = () => window.history.back()

window.savePDF = () => {
  const element = document.querySelector(".app")
  html2pdf().from(element).save("statement.pdf")
}

/* 🔥 FIX: hide while scrolling, show when stop */
let scrollTimeout

window.addEventListener("scroll", () => {
  const buttons = document.querySelector(".bottom-actions")

  buttons.classList.add("hide")

  clearTimeout(scrollTimeout)

  scrollTimeout = setTimeout(() => {
    buttons.classList.remove("hide")
  }, 150)
})

document.addEventListener("DOMContentLoaded", load)

async function load(){
  const tenant = localStorage.getItem("jabri_tenant_code")

  if(!tenant){
    document.getElementById("container").innerHTML = "لا يوجد مستأجر"
    return
  }

  document.getElementById("tenantName").innerText = tenant

  const { data } = await supabase
    .from("tenant_transactions")
    .select("*")
    .eq("tenant_code", tenant)

  let balance = 0
  let html = ""

  data.forEach(r=>{
    balance += (r.debit || 0) - (r.credit || 0)

    html += `
    <div>
      ${r.date} | ${r.debit || 0} | ${r.credit || 0} | ${balance}
    </div>`
  })

  document.getElementById("container").innerHTML = html
}
</script>

</body>
</html>
