<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>كشف حساب</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  text-align:center;
}

.year-card{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
  display:inline-block;
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:8px;
  font-size:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th{
  background:#f4f6fb;
  font-weight:900;
}

.debit{color:#e05252;font-weight:bold;}
.credit{color:#18a957;font-weight:bold;}
.balance{font-weight:bold;color:#1d2940;}
.balance-negative{color:#18a957;}
.balance-zero{color:#18a957;}

.bottom-actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

button{
  flex:1;
  height:45px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.pdf-btn{background:#c9a46b;color:#fff;}
.back-btn{background:#1d2940;color:#fff;}

.debug{
  font-size:11px;
  color:#777;
  margin-top:5px;
}

.receipt{
  background:#eef4ff;
  padding:3px 7px;
  border-radius:8px;
  color:#2f6fed;
  font-weight:bold;
  display:inline-block;
  min-width:26px;
}

.carry-row{
  background:rgba(29,41,64,0.04);
}

.summary-line{
  margin-top:10px;
  font-weight:bold;
  font-size:14px;
}

.empty-box{
  background:#fff;
  border-radius:18px;
  padding:20px;
  text-align:center;
  color:#777;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <div class="card">
    <h3 style="margin:0;">كشف حساب</h3>
    <div id="tenantName" style="font-weight:bold;color:#2f6fed;margin-top:8px;font-size:18px;"></div>
    <div id="debug" class="debug"></div>
  </div>

  <div id="container"></div>

  <div class="bottom-actions">
    <button class="pdf-btn" onclick="savePDF()">PDF</button>
    <button class="back-btn" onclick="history.back()">رجوع</button>
  </div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

function normalizeText(v){
  return String(v || "").trim()
}

function cleanNum(v){
  if(typeof v === "number") return Number.isFinite(v) ? v : 0
  if(v === null || v === undefined || v === "" || v === "NaN") return 0
  const cleaned = String(v).replace(/[^\d.-]/g, "")
  const n = parseFloat(cleaned)
  return Number.isFinite(n) ? n : 0
}

function num(v){
  const n = Number(v)
  return Number.isFinite(n) ? n : 0
}

function formatDate(d){
  const x = new Date(d)
  return isNaN(x.getTime()) ? "-" : x.toLocaleDateString("en-GB")
}

function formatNumber(v){
  return num(v).toLocaleString("en-US")
}

function isNumericText(v){
  return /^-?\d+(\.\d+)?$/.test(normalizeText(v))
}

function isCarryDescription(desc){
  return normalizeText(desc).includes("رصيد")
}

function isPaymentReceipt(receipt){
  const t = normalizeText(receipt)
  return (
    t.includes("نقد") ||
    t.includes("شيك") ||
    t.includes("تحويل") ||
    t.includes("حوال") ||
    t.includes("دفعة")
  )
}

function getTenantCode(){
  const params = new URLSearchParams(window.location.search)

  let code =
    params.get("tenant") ||
    params.get("tenant_code") ||
    params.get("code") ||
    localStorage.getItem("jabri_tenant_code") ||
    localStorage.getItem("tenant_code") ||
    localStorage.getItem("tenantCode")

  if(code && code.trim()) return code.trim()

  const keys = ["tenant","user","currentTenant","loggedTenant"]

  for(const k of keys){
    try{
      const obj = JSON.parse(localStorage.getItem(k))
      if(obj){
        const c = obj.tenant_code || obj.code || obj.id
        if(c) return String(c).trim()
      }
    }catch(e){}
  }

  return ""
}

// إصلاح الصفوف التي دخلت shifted في 2025 و2026
function normalizeRow(r){
  let description = normalizeText(r.description)
  let receiptNo = normalizeText(r.receipt_no || "-")
  let debit = cleanNum(r.debit)
  let credit = cleanNum(r.credit)

  const rowDate = new Date(r.date)
  const rowYear = isNaN(rowDate.getTime()) ? "" : rowDate.getFullYear()

  const shiftedNumber = isNumericText(description) && debit === 0 && credit === 0
  const receiptLooksPayment = isPaymentReceipt(receiptNo)

  if(shiftedNumber){
    const amount = cleanNum(description)

    if(receiptLooksPayment){
      // مثل نقدي + 450 / 850 / 1000
      credit = amount
      debit = 0
      description = "دفعة من الإيجار"
      receiptNo = "-"
    } else {
      // مثل 1800 / 36 / 2494 / 2030
      debit = amount
      credit = 0

      if(amount === 36){
        description = `معارف ${rowYear}`
      } else if(amount === 1800){
        description = `إيجار لعام ${rowYear}`
      } else {
        description = `رصيد سابق عام ${rowYear - 1}`
      }
    }
  }

  return {
    ...r,
    description,
    receipt_no: receiptNo,
    debitVal: num(debit),
    creditVal: num(credit)
  }
}

function getRowOrder(desc){
  const text = normalizeText(desc)

  if(text.includes("رصيد")) return 1
  if(text.includes("إيجار")) return 2
  if(text.includes("معارف")) return 3
  if(text.includes("دفعة")) return 4
  return 9
}

function getBalanceClass(balance){
  if(Math.abs(balance) < 0.01) return "balance balance-zero"
  if(balance < 0) return "balance balance-negative"
  return "balance"
}

async function load(){
  const container = document.getElementById("container")
  const tenantName = document.getElementById("tenantName")
  const debug = document.getElementById("debug")

  const tenant = getTenantCode()

  debug.innerText = "tenant code: " + tenant

  if(!tenant){
    container.innerHTML = "<div class='empty-box'>❌ لا يوجد tenant code</div>"
    return
  }

  tenantName.innerText = tenant

  const { data, error } = await supabase
    .from("tenant_transactions")
    .select("*")
    .eq("tenant_code", tenant)
    .order("date", { ascending: true })

  if(error){
    container.innerHTML = `<div class="empty-box">${error.message}</div>`
    return
  }

  debug.innerText += " | rows: " + (data ? data.length : 0)

  if(!data || data.length === 0){
    container.innerHTML = "<div class='empty-box'>⚠️ لا يوجد بيانات</div>"
    return
  }

  // تجميع حسب سنة العرض
  const grouped = {}

  data.forEach(r => {
    const fixed = normalizeRow(r)

    // لو السطر رصيد سابق عام 2024 يعرض في 2025
    let displayYear
    if(isCarryDescription(fixed.description)){
      const match = fixed.description.match(/عام\s*(\d{4})/)
      if(match){
        displayYear = Number(match[1]) + 1
      } else {
        displayYear = new Date(fixed.date).getFullYear()
      }
    } else {
      displayYear = new Date(fixed.date).getFullYear()
    }

    if(!grouped[displayYear]) grouped[displayYear] = []
    grouped[displayYear].push(fixed)
  })

  let html = ""

  Object.keys(grouped).sort((a,b) => Number(a) - Number(b)).forEach(year => {
    let yearRows = grouped[year]

    // من الأقدم إلى الأحدث داخل كل جدول
    // مع إبقاء الرصيد السابق أولاً ثم الإيجار ثم المعارف ثم الدفعات
    yearRows.sort((a, b) => {
      const oa = getRowOrder(a.description)
      const ob = getRowOrder(b.description)

      if(oa !== ob) return oa - ob

      const da = new Date(a.date).getTime()
      const db = new Date(b.date).getTime()
      return da - db
    })

    let balance = 0
    let debitTotal = 0
    let creditTotal = 0

    const rows = yearRows.map((r, i) => {
      const debit = num(r.debitVal)
      const credit = num(r.creditVal)
      const desc = normalizeText(r.description)

      if(i === 0 && desc.includes("رصيد")){
        balance = debit
      } else {
        balance += debit - credit
      }

      debitTotal += debit
      creditTotal += credit

      return `
        <tr class="${desc.includes("رصيد") ? "carry-row" : ""}">
          <td>${formatDate(r.date)}</td>
          <td class="debit">${debit > 0 ? formatNumber(debit) : "-"}</td>
          <td class="credit">${credit > 0 ? formatNumber(credit) : "-"}</td>
          <td class="${getBalanceClass(balance)}">${formatNumber(balance)}</td>
          <td>${desc || "-"}</td>
          <td><span class="receipt">${r.receipt_no || "-"}</span></td>
        </tr>
      `
    }).join("")

    html += `
      <div class="year-card">
        <div class="year-title">سنة ${year}</div>

        <table>
          <thead>
            <tr>
              <th>تاريخ</th>
              <th>مدين</th>
              <th>دائن</th>
              <th>رصيد</th>
              <th>بيان</th>
              <th>سند</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>

        <div class="summary-line">
          مدين: ${formatNumber(debitTotal)} | دائن: ${formatNumber(creditTotal)} | رصيد: ${formatNumber(balance)}
        </div>
      </div>
    `
  })

  container.innerHTML = html
}

window.savePDF = function(){
  html2pdf().from(document.body).save("statement.pdf")
}

load()
</script>

</body>
</html>
