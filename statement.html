<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>كشف الحساب</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --bg-1:#edf2f7;
  --bg-2:#f8fafc;
  --navy:#1d2940;
  --navy-2:#243552;
  --gold:#c9a46b;
  --gold-2:#b89155;
  --text:#1d2940;
  --muted:#7b8497;
  --line:#e8edf4;
  --white:rgba(255,255,255,0.74);
  --red:#e05252;
  --green:#18a957;
  --orange:#b96a00;
  --soft-red:#fff3f3;
  --soft-green:#edf8f1;
  --soft-orange:#fff7ec;
  --soft-blue:#eef4ff;
  --shadow:0 14px 40px rgba(15,23,42,0.08);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top right, rgba(201,164,107,.12), transparent 22%),
    linear-gradient(135deg,var(--bg-1),var(--bg-2));
}

.app{
  max-width:470px;
  margin:auto;
  padding:16px;
  padding-bottom:26px;
}

.card{
  background:var(--white);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.85);
  border-radius:24px;
  padding:18px 16px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

.title-wrap{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.page-title{
  margin:0;
  font-size:22px;
  font-weight:900;
  color:var(--navy);
  letter-spacing:-.3px;
}

.title-badge{
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#fff;
  border-radius:999px;
  padding:7px 12px;
  font-size:11px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(185,145,85,.24);
}

.tenant-name-main{
  font-size:24px;
  font-weight:900;
  color:var(--navy);
  margin:14px 0 4px;
  line-height:1.2;
  letter-spacing:-.35px;
}

.tenant-code-sub{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
  letter-spacing:.4px;
}

.overall-summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:16px;
}

.overall-card{
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.95);
  border-radius:20px;
  padding:14px 10px;
  text-align:center;
  box-shadow:0 10px 22px rgba(17,24,39,.05);
}

.overall-label{
  font-size:11px;
  font-weight:900;
  color:#5d6678;
  margin-bottom:6px;
}

.overall-value{
  font-size:22px;
  font-weight:900;
  letter-spacing:-.3px;
}

.overall-debit .overall-value{ color:var(--red); }
.overall-credit .overall-value{ color:var(--green); }
.overall-balance .overall-value{ color:var(--navy); }

.year-card{
  background:rgba(255,248,238,.70);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.82);
  border-radius:24px;
  padding:14px;
  margin-bottom:16px;
  box-shadow:0 12px 34px rgba(15,23,42,.06);
}

.year-card.green{
  background:linear-gradient(180deg, rgba(237,248,241,.92), rgba(255,255,255,.72));
}

.year-card.orange{
  background:linear-gradient(180deg, rgba(255,246,234,.92), rgba(255,255,255,.72));
}

.year-card.red{
  background:linear-gradient(180deg, rgba(255,241,241,.88), rgba(255,255,255,.72));
}

.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.year-title{
  min-width:58px;
  text-align:center;
  background:linear-gradient(135deg,var(--navy),var(--navy-2));
  color:#fff;
  padding:7px 15px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(29,41,64,.18);
}

.status-box{
  min-width:76px;
  text-align:center;
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  display:inline-block;
}

.status-paid{
  background:var(--soft-green);
  color:var(--green);
  border:1px solid rgba(24,169,87,.14);
}

.status-partial{
  background:var(--soft-orange);
  color:var(--orange);
  border:1px solid rgba(185,106,0,.14);
}

.status-unpaid{
  background:var(--soft-red);
  color:var(--red);
  border:1px solid rgba(224,82,82,.14);
}

.table-shell{
  background:rgba(255,255,255,.74);
  border:1px solid rgba(255,255,255,.95);
  border-radius:18px;
  padding:6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 4px;
}

thead th{
  background:#f3f6fa;
  color:#2d3748;
  font-size:11px;
  font-weight:900;
  text-align:center;
  padding:8px 6px;
  border:none;
}

thead th:first-child{
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}

thead th:last-child{
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}

tbody tr{
  background:rgba(255,255,255,.95);
  box-shadow:0 3px 10px rgba(17,24,39,.03);
}

tbody tr:hover{
  background:#fbfdff;
  transition:.2s ease;
}

tbody td{
  padding:6px 6px;
  font-size:12px;
  text-align:center;
  border:none;
  line-height:1.18;
  vertical-align:middle;
}

tbody td:first-child{
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}

tbody td:last-child{
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}

.debit{
  color:var(--red);
  font-weight:900;
  font-size:12px;
}

.credit{
  color:var(--green);
  font-weight:900;
  font-size:12px;
}

.balance{
  font-weight:900;
  font-size:13px;
  direction:ltr;
  unicode-bidi:isolate;
}

.balance-positive{ color:var(--red); }
.balance-negative{ color:var(--orange); }
.balance-zero{ color:var(--green); }

.desc-cell{
  font-weight:800;
  color:var(--navy);
  line-height:1.22;
}

.receipt{
  background:var(--soft-blue);
  color:#2f6fed;
  padding:3px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  display:inline-block;
  min-width:40px;
}

.date-chip{
  background:rgba(47,111,237,.08);
  color:#2f6fed;
  font-weight:900;
  padding:3px 8px;
  border-radius:999px;
  font-size:10px;
  display:inline-block;
  white-space:nowrap;
}

.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.summary-card{
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.95);
  border-radius:18px;
  padding:12px 10px;
  text-align:center;
  box-shadow:0 10px 22px rgba(17,24,39,.05);
}

.summary-label{
  font-size:11px;
  font-weight:900;
  color:#5d6678;
  margin-bottom:6px;
}

.summary-value{
  font-size:18px;
  font-weight:900;
  letter-spacing:-.3px;
}

.summary-debit .summary-value{ color:var(--red); }
.summary-credit .summary-value{ color:var(--green); }
.summary-balance .summary-value{ color:var(--navy); }

.bottom-actions{
  display:flex;
  flex-direction:row-reverse;
  gap:12px;
  width:100%;
  max-width:470px;
  margin:18px auto 0;
  padding:0 4px 10px;
}

.pdf-btn,
.back-btn{
  height:52px;
  border:none;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
  font-size:16px;
  letter-spacing:.2px;
  transition:transform .18s ease, box-shadow .18s ease;
}

.pdf-btn{
  flex:1.2;
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#fff;
  box-shadow:0 12px 24px rgba(185,145,85,.24);
}

.back-btn{
  flex:.8;
  background:linear-gradient(135deg,var(--navy),var(--navy-2));
  color:#fff;
  box-shadow:0 12px 24px rgba(29,41,64,.20);
}

.pdf-btn:hover,
.back-btn:hover{
  transform:translateY(-1px);
}

.pdf-btn:active,
.back-btn:active{
  transform:scale(.98);
}

.pdf-header{
  display:none;
}

.pdf-mode .pdf-header{
  display:block;
  text-align:center;
  margin-bottom:28px;
}

.pdf-logo{
  width:82px;
  margin-bottom:10px;
}

.pdf-title{
  font-size:28px;
  font-weight:900;
  color:var(--navy);
  margin-bottom:5px;
}

.pdf-tenant{
  font-size:21px;
  font-weight:800;
  color:var(--gold);
}

.pdf-date{
  font-size:14px;
  color:#555;
  margin-top:6px;
}

.pdf-mode .app{
  max-width:900px !important;
  padding:30px !important;
  padding-bottom:20px !important;
}

.pdf-mode .year-card{
  break-inside:avoid;
  page-break-inside:avoid;
}

.pdf-mode .table-shell{
  padding:8px;
}

.pdf-mode thead th{
  font-size:13px;
}

.pdf-mode tbody td{
  font-size:13px;
  padding:7px 7px;
}

.pdf-mode .summary-value,
.pdf-mode .overall-value{
  font-size:24px;
}

.pdf-mode .bottom-actions{
  display:none !important;
}

.error-box,
.empty-box{
  padding:16px;
  border-radius:18px;
  font-weight:900;
  text-align:center;
}

.error-box{
  color:#c62828;
  background:#fff1f1;
}

.empty-box{
  color:#7b8497;
  background:rgba(255,255,255,.78);
}

@media (max-width:420px){
  .app{ padding:12px; }
  .year-card{ padding:12px; }
  .summary, .overall-summary{ gap:8px; }
  .summary-value{ font-size:17px; }
  .overall-value{ font-size:19px; }
  tbody td{ font-size:11.5px; }
}
</style>

<script type="module">

const params = new URLSearchParams(window.location.search)
const tenant = (params.get("tenant") || localStorage.getItem("jabri_tenant_code") || "").trim().toUpperCase()
const from = params.get("from")

window.goBack = function(){
  if(from === "admin"){
    window.location.href = "admin.html"
    return
  }
  if(window.history.length > 1){
    window.history.back()
    return
  }
  window.location.href = "index.html"

window.savePDF = async function(){
  try{
    document.body.classList.add("pdf-mode")

    const element = document.querySelector(".app")
    const tenantText = (document.getElementById("pdfTenantName").innerText || tenant || "statement").trim()
    const safeFileName = tenantText
      .replace(/[^\u0600-\u06FF\w\- ]/g, "")
      .replace(/\s+/g, "_")

    const opt = {
      margin: 0.3,
      filename: `statement_${safeFileName || "tenant"}.pdf`,
      image: { type: "jpeg", quality: 1 },
      html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
      jsPDF: { unit: "in", format: "a4", orientation: "portrait" }
    }

    const worker = html2pdf().set(opt).from(element)
    const pdfBlob = await worker.outputPdf("blob")

    document.body.classList.remove("pdf-mode")

    const fileName = `statement_${safeFileName || "tenant"}.pdf`
    const file = new File([pdfBlob], fileName, { type: "application/pdf" })

    if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({
        files:[file],
        title:"كشف حساب",
        text:`كشف حساب ${tenantText || "المستأجر"}`
      })
      return
    }

    const url = URL.createObjectURL(pdfBlob)
    const a = document.createElement("a")
    a.href = url
    a.download = fileName
    document.body.appendChild(a)
    a.click()
    a.remove()
    URL.revokeObjectURL(url)

  } catch(err){
    console.error("PDF/Share error:", err)
    document.body.classList.remove("pdf-mode")
    alert("تعذر إنشاء أو مشاركة PDF")
  }
}

function normalizeText(v){
  return String(v || "").replace(/\s+/g, " ").trim()
}

function num(v){
  if(v === null || v === undefined || v === "") return 0
  const cleaned = String(v).replace(/,/g, "").trim()
  if(cleaned === "-" || cleaned === "—") return 0
  const n = Number(cleaned)
  return Number.isFinite(n) ? n : 0
}

function displayNumber(v){
  return num(v).toLocaleString("en-US")
}

function displaySignedNumber(v){
  const n = Number(v) || 0
  const abs = Math.abs(n).toLocaleString("en-US")
  return n < 0 ? `-${abs}` : abs
}

function formatDate(dateStr){
  if(!dateStr) return "-"
  const raw = String(dateStr).trim()

  const dmy = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)
  if(dmy){
    const [, d, m, y] = dmy
    return `${d.padStart(2,"0")}/${m.padStart(2,"0")}/${y}`
  }

  const ymdSlash = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/)
  if(ymdSlash){
    const [, y, m, d] = ymdSlash
    return `${d.padStart(2,"0")}/${m.padStart(2,"0")}/${y}`
  }

  const ymdDash = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/)
  if(ymdDash){
    return `${ymdDash[3]}/${ymdDash[2]}/${ymdDash[1]}`
  }

  const d = new Date(raw)
  if(Number.isNaN(d.getTime())) return raw
  return d.toLocaleDateString("en-GB")
}

function getBaseYear(dateStr){
  if(!dateStr) return null
  const raw = String(dateStr).trim()

  const dmy = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)
  if(dmy) return Number(dmy[3])

  const ymdSlash = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/)
  if(ymdSlash) return Number(ymdSlash[1])

  const ymdDash = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/)
  if(ymdDash) return Number(ymdDash[1])

  const d = new Date(raw)
  if(Number.isNaN(d.getTime())) return null
  return d.getFullYear()
}

function isCarryRow(desc){
  const text = normalizeText(desc)
  return (
    text.includes("رصيد عام") ||
    text.includes("رصيد سابق") ||
    text.includes("سابق عام")
  )
}

function getDisplayYear(row){
  const baseYear = getBaseYear(row.date)
  if(baseYear === null) return null
  return isCarryRow(row.description) ? baseYear + 1 : baseYear
}

function toSortableTime(dateStr, displayYear){
  if(!dateStr) return Number.MAX_SAFE_INTEGER
  const raw = String(dateStr).trim()

  const ymdDash = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/)
  if(ymdDash){
    const y = displayYear || Number(ymdDash[1])
    return new Date(`${y}-${ymdDash[2]}-${ymdDash[3]}T00:00:00`).getTime()
  }

  const dmy = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)
  if(dmy){
    const [, d, m, y] = dmy
    const year = displayYear || Number(y)
    return new Date(`${year}-${m.padStart(2,"0")}-${d.padStart(2,"0")}T00:00:00`).getTime()
  }

  const ymdSlash = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/)
  if(ymdSlash){
    const [, y, m, d] = ymdSlash
    const year = displayYear || Number(y)
    return new Date(`${year}-${m.padStart(2,"0")}-${d.padStart(2,"0")}T00:00:00`).getTime()
  }

  const t = new Date(raw).getTime()
  return Number.isNaN(t) ? Number.MAX_SAFE_INTEGER : t
}

function getRowOrder(desc){
  const text = normalizeText(desc)
  if(isCarryRow(text)) return 1
  if(text.includes("ايجار") || text.includes("الإيجار") || text.includes("الايجار")) return 2
  if(text.includes("معارف")) return 3
  return 4
}

function normalizeRow(raw){
  return {
    tenant_code: normalizeText(raw.tenant_code).toUpperCase(),
    date: raw.date,
    description: normalizeText(raw.description) || "-",
    debit: num(raw.debit),
    credit: num(raw.credit),
    receipt_no: normalizeText(raw.receipt_no) || "-"
  }
}

function buildTenantHeader(name, code){
  return `
    <div class="tenant-name-main">${name || code}</div>
    <div class="tenant-code-sub">${code}</div>
  `
}

function renderOverallSummary(totalDebit, totalCredit, balance){
  return `
    <div class="overall-summary">
      <div class="overall-card overall-debit">
        <div class="overall-label">إجمالي المدين</div>
        <div class="overall-value">${displayNumber(totalDebit)}</div>
      </div>
      <div class="overall-card overall-credit">
        <div class="overall-label">إجمالي الدائن</div>
        <div class="overall-value">${displayNumber(totalCredit)}</div>
      </div>
      <div class="overall-card overall-balance">
        <div class="overall-label">إجمالي الرصيد</div>
        <div class="overall-value">${displaySignedNumber(balance)}</div>
      </div>
    </div>
  `
}

document.addEventListener("DOMContentLoaded", load)

async function load(){
  const container = document.getElementById("container")
  const tenantName = document.getElementById("tenantName")
  const pdfTenantName = document.getElementById("pdfTenantName")
  const pdfDate = document.getElementById("pdfDate")
  const overallSummary = document.getElementById("overallSummary")

  if(!tenant){
    container.innerHTML = `<div class="empty-box">لا يوجد مستأجر</div>`
    return
  }

  pdfDate.innerText = "تاريخ الإصدار: " + new Date().toLocaleDateString("en-GB")

  let tenantDisplayName = tenant

  try{
    const { data: tenantData } = await supabase
      .from("tenants")
      .select("tenant_name")
      .eq("tenant_code", tenant)
      .maybeSingle()

    if(tenantData?.tenant_name){
      tenantDisplayName = tenantData.tenant_name
    }
  } catch(err){
    console.error("Tenant name load error:", err)
  }

  tenantName.innerHTML = buildTenantHeader(tenantDisplayName, tenant)
  pdfTenantName.innerText = tenantDisplayName

  const { data, error } = await supabase
    .from("tenant_transactions")
    .select("tenant_code,date,description,debit,credit,receipt_no,notes")
    .eq("tenant_code", tenant)

  if(error){
    console.error("Supabase error:", error)
    container.innerHTML = `<div class="error-box">${error.message || "خطأ في قراءة البيانات"}</div>`
    return
  }

  const rows = (data || [])
    .filter(r => normalizeText(r.tenant_code).toUpperCase() === tenant)
    .map(normalizeRow)
    .map(r => ({ ...r, displayYear: getDisplayYear(r) }))
    .filter(r => r.displayYear !== null)

  if(rows.length === 0){
    container.innerHTML = `<div class="empty-box">لا توجد بيانات لهذا المستأجر</div>`
    return
  }

  const grouped = {}
  rows.forEach(r => {
    if(!grouped[r.displayYear]) grouped[r.displayYear] = []
    grouped[r.displayYear].push(r)
  })

  let html = ""
  let smartTotalDebit = 0
  let smartTotalCredit = 0
  let finalOverallBalance = 0

  Object.keys(grouped)
    .sort((a,b) => Number(a) - Number(b))
    .forEach(year => {
      const yearRows = grouped[year]

      yearRows.sort((a,b) => {
        const t1 = toSortableTime(a.date, a.displayYear)
        const t2 = toSortableTime(b.date, b.displayYear)
        if(t1 !== t2) return t1 - t2
        return getRowOrder(a.description) - getRowOrder(b.description)
      })

      let totalDebit = 0
      let totalCredit = 0
      let runningBalance = 0

      yearRows.forEach(r => {
        totalDebit += r.debit
        totalCredit += r.credit
        runningBalance += r.debit - r.credit
        r.balance = runningBalance

        if(!isCarryRow(r.description)){
          smartTotalDebit += r.debit
          smartTotalCredit += r.credit
        }
      })

      const yearBalance = runningBalance
      finalOverallBalance = yearBalance

      let color = "red"
      let status = "غير مسدد"
      let statusClass = "status-unpaid"

      if(yearBalance <= 0){
        color = "green"
        status = "مسدد"
        statusClass = "status-paid"
      } else if(totalCredit > 0){
        color = "orange"
        status = "سداد جزئي"
        statusClass = "status-partial"
      }

      html += `
        <div class="year-card ${color}">
          <div class="year-header">
            <span class="year-title">${year}</span>
            <span class="status-box ${statusClass}">${status}</span>
          </div>

          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>التاريخ</th>
                  <th>مدين</th>
                  <th>دائن</th>
                  <th>الرصيد</th>
                  <th>البيان</th>
                  <th>رقم السند</th>
                </tr>
              </thead>
              <tbody>
      `

      yearRows.forEach(r => {
        let balanceClass = "balance-zero"
        if(r.balance > 0) balanceClass = "balance-positive"
        if(r.balance < 0) balanceClass = "balance-negative"

        html += `
          <tr>
            <td><span class="date-chip">${formatDate(r.date)}</span></td>
            <td class="debit">${r.debit ? displayNumber(r.debit) : "-"}</td>
            <td class="credit">${r.credit ? displayNumber(r.credit) : "-"}</td>
            <td class="balance ${balanceClass}">${displaySignedNumber(r.balance)}</td>
            <td class="desc-cell">${r.description}</td>
            <td><span class="receipt">${r.receipt_no}</span></td>
          </tr>
        `
      })

      html += `
              </tbody>
            </table>
          </div>

          <div class="summary">
            <div class="summary-card summary-debit">
              <div class="summary-label">إجمالي المدين</div>
              <div class="summary-value">${displayNumber(totalDebit)}</div>
            </div>

            <div class="summary-card summary-credit">
              <div class="summary-label">إجمالي الدائن</div>
              <div class="summary-value">${displayNumber(totalCredit)}</div>
            </div>

            <div class="summary-card summary-balance">
              <div class="summary-label">الرصيد</div>
              <div class="summary-value">${displaySignedNumber(yearBalance)}</div>
            </div>
          </div>
        </div>
      `
    })

  overallSummary.innerHTML = renderOverallSummary(
    smartTotalDebit,
    smartTotalCredit,
    finalOverallBalance
  )

  container.innerHTML = html
}
</script>
</body>
</html>
