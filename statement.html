<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الحساب</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
}

/* Header */
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Year Card */
.year-card{
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Colors */
.green{ background:#edf8f1; }
.orange{ background:#fff6ea; }
.red{ background:#fff1f1; }

/* Header */
.year-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
}

/* Summary */
.summary{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:13px;
  font-weight:bold;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:8px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}

th{
  background:#f1f3f7;
}

.debit{ color:red; font-weight:bold; }
.credit{ color:green; font-weight:bold; }
.balance{ font-weight:bold; }

.receipt{
  background:#eef4ff;
  padding:4px 8px;
  border-radius:10px;
}

.btn{
  width:100%;
  height:45px;
  border:none;
  border-radius:15px;
  background:#1d2940;
  color:#fff;
  font-weight:bold;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="app">

<button class="btn" onclick="goBack()">رجوع</button>

<div class="card">
<h2>كشف الحساب</h2>
<div id="tenantName"></div>
</div>

<div id="container"></div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

// ✅ حل مشكلة السنة
const params = new URLSearchParams(window.location.search)
const tenant = params.get("tenant")
const yearParam = 'all'

window.goBack = function(){
  window.history.back()
}

document.addEventListener("DOMContentLoaded", load)

async function load(){

  if(!tenant){
    document.getElementById("container").innerHTML = "لا يوجد مستأجر"
    return
  }

  document.getElementById("tenantName").innerText = tenant

  const { data, error } = await supabase
    .from('tenant_transactions')
    .select('*')
    .eq('tenant_code', tenant)
    .order('date', { ascending: true })

  if(error || !data){
    document.getElementById("container").innerHTML = "خطأ"
    return
  }

  let balance = 0
  const grouped = {}

  data.forEach(r=>{
    const year = new Date(r.date).getFullYear()

    if(!grouped[year]) grouped[year] = []

    balance += (r.debit || 0) - (r.credit || 0)

    grouped[year].push({
      ...r,
      balance
    })
  })

  let html = ""

  Object.keys(grouped).forEach(year=>{

    const rows = grouped[year]

    let totalDebit = 0
    let totalCredit = 0

    rows.forEach(r=>{
      totalDebit += Number(r.debit || 0)
      totalCredit += Number(r.credit || 0)
    })

    const yearBalance = totalDebit - totalCredit

    let color = 'red'
    let status = 'غير مسدد'

    if(yearBalance <= 0 && totalCredit > 0){
      color = 'green'
      status = 'مسدد'
    }
    else if(totalCredit > 0){
      color = 'orange'
      status = 'جزئي'
    }

    html += `
    <div class="year-card ${color}">

      <div class="year-header">
        <span class="year-title">${year}</span>
        <span>${status}</span>
      </div>

      <div class="summary">
        <div>مدين: ${totalDebit}</div>
        <div>دائن: ${totalCredit}</div>
        <div>رصيد: ${yearBalance}</div>
      </div>

      <table>
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>البيان</th>
            <th>مدين</th>
            <th>دائن</th>
            <th>الرصيد</th>
            <th>السند</th>
          </tr>
        </thead>
        <tbody>
    `

    rows.forEach(r=>{
      html += `
      <tr>
        <td>${r.date}</td>
        <td>${r.description || "-"}</td>
        <td class="debit">${r.debit || "-"}</td>
        <td class="credit">${r.credit || "-"}</td>
        <td class="balance">${r.balance}</td>
        <td class="receipt">${r.receipt_no || "-"}</td>
      </tr>
      `
    })

    html += `</tbody></table></div>`
  })

  document.getElementById("container").innerHTML = html
}
</script>

</body>
</html>
