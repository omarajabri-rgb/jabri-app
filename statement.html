<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        .header-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        #statement_date {
            margin: 0;
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            background: rgba(201,164,107,0.14);
            color: var(--text);
            border: 1px solid rgba(201,164,107,0.24);
            min-height: 32px;
        }

        .controls-bar {
            display: flex;
            gap: 12px;
            align-items: stretch;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-card,
        .summary-strip {
            background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(247,244,237,0.74));
            border: 1px solid rgba(201,164,107,0.16);
            border-radius: 22px;
            box-shadow: 0 10px 24px rgba(120,95,56,0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .filter-card {
            padding: 14px;
            min-width: 240px;
            flex: 0 0 260px;
        }

        .filter-card label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 900;
            color: var(--muted);
        }

        .year-filter {
            width: 100%;
            height: 46px;
            border-radius: 16px;
            border: 1px solid rgba(201,164,107,0.20);
            background: rgba(255,255,255,0.72);
            color: var(--text);
            font-size: 15px;
            font-weight: 900;
            padding: 0 14px;
            outline: none;
            cursor: pointer;
        }

        .summary-strip {
            flex: 1;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .summary-box {
            padding: 14px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(201,164,107,0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 18px rgba(120,95,56,0.08);
        }

        .summary-box span {
            display: block;
            color: #7a6c59;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .summary-box b {
            display: block;
            font-size: 18px;
            font-weight: 900;
        }

        .summary-opening {
            background: linear-gradient(135deg, rgba(201,164,107,0.14), rgba(255,255,255,0.25));
        }

        .summary-debit {
            background: linear-gradient(135deg, rgba(204,90,80,0.14), rgba(255,255,255,0.25));
        }

        .summary-debit b {
            color: var(--danger);
        }

        .summary-credit {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
        }

        .summary-credit b {
            color: var(--success);
        }

        .summary-balance.ok {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
        }

        .summary-balance.due {
            background: linear-gradient(135deg, rgba(204,90,80,0.14), rgba(255,255,255,0.25));
        }

        .summary-balance.ok b {
            color: var(--success);
        }

        .summary-balance.due b {
            color: var(--danger);
        }

        .year-card {
            border-radius: 26px;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            background: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .year-card.status-paid { border-color: rgba(47,158,111,0.18); }
        .year-card.status-partial { border-color: rgba(195,138,46,0.18); }
        .year-card.status-late { border-color: rgba(204,90,80,0.16); }

        .year-head {
            position: relative;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 66px;
        }

        .year-status {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px rgba(120,95,56,0.08);
        }

        .status-paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.24);
        }

        .status-partial {
            background: rgba(195,138,46,0.12);
            color: var(--warning);
            border: 1px solid rgba(195,138,46,0.24);
        }

        .status-late {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.22);
        }

        .year-title {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .year-chip {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 20px;
            font-weight: 900;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 1px;
        }

        .year-chip.paid {
            color: var(--success);
            background: linear-gradient(135deg, rgba(47,158,111,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(47,158,111,0.35);
        }

        .year-chip.partial {
            color: var(--warning);
            background: linear-gradient(135deg, rgba(195,138,46,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(195,138,46,0.30);
        }

        .year-chip.late {
            color: var(--danger);
            background: linear-gradient(135deg, rgba(204,90,80,0.12), rgba(255,255,255,0.25));
            border: 1px solid rgba(204,90,80,0.30);
        }

        .statement-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            background: transparent;
        }

        .statement-table th,
        .statement-table td {
            text-align: center;
            vertical-align: middle;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .statement-table th {
            background: #e9e2d5;
            color: #5f5345;
            padding: 12px 10px;
            font-weight: 900;
            font-size: 11px;
            white-space: nowrap;
            border-bottom: 1px solid rgba(201,164,107,0.18);
        }

        .statement-table td {
            padding: 6px 6px;
            line-height: 1.3;
            font-size: 11px;
            border: 1px solid rgba(201,164,107,0.15);
        }

        .statement-table tbody tr:nth-child(odd) td {
            background: rgba(253,251,246,0.78);
        }

        .statement-table tbody tr:nth-child(even) td {
            background: rgba(201,164,107,0.045);
        }

        .statement-table tbody tr:hover td {
            background: rgba(201,164,107,0.12);
            transition: 0.2s;
        }

        .statement-table td:nth-child(2),
        .statement-table td:nth-child(4) {
            color: var(--danger);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .statement-table td:nth-child(3) {
            color: var(--success);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .statement-table td:nth-child(5),
        .statement-table th:nth-child(5) {
            color: #000000;
            font-weight: 800;
        }

        .balance-paid {
            color: var(--success) !important;
        }

        .balance-late {
            color: var(--danger) !important;
        }

        .main-row td {
            font-weight: 900;
        }

        .carry-row td {
            background: rgba(201,164,107,0.09) !important;
        }

        .empty-state {
            border-radius: 24px;
            padding: 28px 18px;
            text-align: center;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(201,164,107,0.16);
            color: var(--muted);
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(120,95,56,0.05);
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: nowrap;
        }

        .back-btn,
        .save-btn {
            flex: 1;
            max-width: 200px;
            padding: 16px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .back-btn {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text);
        }

        .save-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            border: none;
        }

        .back-btn:hover,
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(120,95,56,0.15);
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media screen and (max-width: 980px) {
            .controls-bar {
                flex-direction: column;
            }

            .filter-card {
                min-width: 100%;
                flex: 1 1 auto;
            }

            .summary-strip {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            .statement-header h1 { font-size: 22px; }
            .year-head { min-height: 58px; padding: 14px 12px; }
            .year-status {
                left: 12px;
                font-size: 11px;
                padding: 7px 12px;
            }
            .year-chip { font-size: 17px; }
            .bottom-actions { flex-wrap: nowrap; }
            .back-btn, .save-btn { width: auto; flex: 1; font-size: 14px; }
        }

        @media screen and (max-width: 560px) {
            .summary-strip {
                grid-template-columns: 1fr;
            }

            .header-meta {
                flex-direction: column;
            }
        }

        @page {
            size: A4 portrait;
            margin: 10mm;
        }

        @media print {
            body {
                background: white !important;
                opacity: 1 !important;
                transform: none !important;
                padding: 0 !important;
                color: var(--text) !important;
            }

            .bottom-actions,
            #loader {
                display: none !important;
            }

            .wrap {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .controls-bar,
            .year-card,
            .statement-header,
            .statement-table tr {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }

            .statement-table th,
            .statement-table td {
                font-size: 10px !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="statement-header">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">-</h2>
            <div class="header-meta">
                <span class="chip" id="statement_tenant_code">-</span>
                <span class="chip" id="statement_date">-</span>
            </div>
        </div>

        <div class="controls-bar">
            <div class="filter-card">
                <label for="year_filter">عرض السنة</label>
                <select id="year_filter" class="year-filter">
                    <option value="all">كل السنوات</option>
                </select>
            </div>

            <div class="summary-strip" id="summary_strip"></div>
        </div>

        <div id="years_container"></div>

        <div class="bottom-actions">
            <button class="back-btn" onclick="window.history.back()">رجوع</button>
            <button class="save-btn" type="button" onclick="window.print()">حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const tenantCode = localStorage.getItem('jabri_tenant_code');

        const supabase = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let ALL_TRANSACTIONS = [];
        let ALL_SUMMARIES = [];
        let YEARS = [];

        function toNumber(v) {
            return parseFloat(String(v ?? '').replace(/,/g, '')) || 0;
        }

        function formatCurrency(v) {
            return String(Number(toNumber(v).toFixed(2)).toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }));
        }

        function formatShortDate(dateValue) {
            if (!dateValue) return '-';
            const d = new Date(dateValue);
            if (isNaN(d)) return dateValue;
            return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
        }

        function formatLastUpdate() {
            const now = new Date();
            return `تاريخ الإصدار: ${now.toLocaleDateString('en-GB')} - ${now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            })}`;
        }

        function escapeHtml(text = '') {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function isRentRow(desc) {
            const d = String(desc || '').trim();
            return d.startsWith('ايجار') || d.startsWith('الإيجار') || d.startsWith('الايجار');
        }

        function isFeesRow(desc) {
            const d = String(desc || '').trim();
            return d.startsWith('معارف');
        }

        function isCarryRow(desc) {
            const d = String(desc || '').trim();
            return d.includes('رصيد سابق') || d.includes('رصيد مدور') || d.startsWith('رصيد عام');
        }

        function getOpeningOrder(desc) {
            if (isRentRow(desc)) return 1;
            if (isFeesRow(desc)) return 2;
            if (isCarryRow(desc)) return 3;
            return 99;
        }

        function getStatus(totalCredit, finalBalance) {
            if (toNumber(finalBalance) <= 0) {
                return { text: 'مسدد', className: 'status-paid', chip: 'paid' };
            }
            if (toNumber(totalCredit) > 0) {
                return { text: 'جزئي', className: 'status-partial', chip: 'partial' };
            }
            return { text: 'متأخر', className: 'status-late', chip: 'late' };
        }

        function getBalanceBoxClass(balance) {
            return toNumber(balance) <= 0 ? 'ok' : 'due';
        }

        function getSummaryByYear(year) {
            return ALL_SUMMARIES.find(s => Number(s.year) === Number(year)) || null;
        }

        function getTransactionsByYear(year) {
            return ALL_TRANSACTIONS.filter(t => {
                const y = new Date(t.date).getFullYear();
                return Number(y) === Number(year);
            });
        }

        function normalizeRows(rows) {
            const openingRows = rows
                .filter(r => isRentRow(r.description) || isFeesRow(r.description) || isCarryRow(r.description))
                .sort((a, b) => {
                    const orderDiff = getOpeningOrder(a.description) - getOpeningOrder(b.description);
                    if (orderDiff !== 0) return orderDiff;
                    return new Date(a.date) - new Date(b.date);
                });

            const paymentRows = rows
                .filter(r => !isRentRow(r.description) && !isFeesRow(r.description) && !isCarryRow(r.description))
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const ordered = [...openingRows, ...paymentRows];

            return ordered.map((item, idx, arr) => {
                let fixedDate = item.date;

                if (isCarryRow(item.description)) {
                    const match = String(item.description || '').match(/\d{4}/);
                    if (match) fixedDate = `${match[0]}-01-01`;
                }

                const rowBalance = item.balance !== undefined && item.balance !== null && String(item.balance).trim() !== ''
                    ? toNumber(item.balance)
                    : null;

                return {
                    ...item,
                    date: fixedDate,
                    balance: rowBalance,
                    isCarry: isCarryRow(item.description),
                    isMain: isRentRow(item.description) || isFeesRow(item.description),
                    isLast: idx === arr.length - 1
                };
            });
        }

        function populateYearFilter() {
            const select = document.getElementById('year_filter');
            select.innerHTML = `<option value="all">كل السنوات</option>`;

            YEARS.forEach(year => {
                const option = document.createElement('option');
                option.value = String(year);
                option.textContent = year;
                select.appendChild(option);
            });

            select.addEventListener('change', renderView);
        }

        function updateSummaryStrip(selectedYear) {
            const summaryStrip = document.getElementById('summary_strip');

            if (selectedYear === 'all') {
                const totalOpening = ALL_SUMMARIES.reduce((sum, s) => sum + toNumber(s.opening_balance), 0);
                const totalDebit = ALL_SUMMARIES.reduce((sum, s) => sum + toNumber(s.total_debit), 0);
                const totalCredit = ALL_SUMMARIES.reduce((sum, s) => sum + toNumber(s.total_credit), 0);
                const latestSummary = [...ALL_SUMMARIES].sort((a, b) => Number(b.year) - Number(a.year))[0];
                const finalBalance = latestSummary ? toNumber(latestSummary.final_balance) : 0;

                summaryStrip.innerHTML = `
                    <div class="summary-box summary-opening">
                        <span>إجمالي الأرصدة السابقة</span>
                        <b>${formatCurrency(totalOpening)}</b>
                    </div>
                    <div class="summary-box summary-debit">
                        <span>إجمالي المدين</span>
                        <b>${formatCurrency(totalDebit)}</b>
                    </div>
                    <div class="summary-box summary-credit">
                        <span>إجمالي الدائن</span>
                        <b>${formatCurrency(totalCredit)}</b>
                    </div>
                    <div class="summary-box summary-balance ${getBalanceBoxClass(finalBalance)}">
                        <span>الرصيد الحالي</span>
                        <b>${formatCurrency(finalBalance)}</b>
                    </div>
                `;
                return;
            }

            const summary = getSummaryByYear(selectedYear);

            summaryStrip.innerHTML = `
                <div class="summary-box summary-opening">
                    <span>الرصيد السابق</span>
                    <b>${formatCurrency(summary?.opening_balance || 0)}</b>
                </div>
                <div class="summary-box summary-debit">
                    <span>مدين السنة</span>
                    <b>${formatCurrency(summary?.total_debit || 0)}</b>
                </div>
                <div class="summary-box summary-credit">
                    <span>دائن السنة</span>
                    <b>${formatCurrency(summary?.total_credit || 0)}</b>
                </div>
                <div class="summary-box summary-balance ${getBalanceBoxClass(summary?.final_balance || 0)}">
                    <span>رصيد آخر السنة</span>
                    <b>${formatCurrency(summary?.final_balance || 0)}</b>
                </div>
            `;
        }

        function buildYearCard(year, transactions, summary) {
            const items = normalizeRows(transactions);
            const totalCredit = toNumber(summary?.total_credit || 0);
            const finalBalance = toNumber(summary?.final_balance || 0);
            const status = getStatus(totalCredit, finalBalance);

            return `
                <div class="year-card ${status.className}">
                    <div class="year-head">
                        <div class="year-status ${status.className}">${status.text}</div>
                        <div class="year-title">
                            <span class="year-chip ${status.chip}">${year}</span>
                        </div>
                    </div>

                    <table class="statement-table">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>مدين</th>
                                <th>دائن</th>
                                <th>الرصيد</th>
                                <th>البيان</th>
                                <th>سند</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.length ? items.map(item => `
                                <tr class="${item.isCarry ? 'carry-row' : ''} ${item.isMain ? 'main-row' : ''} ${item.isLast ? 'last-row' : ''}">
                                    <td><span class="chip">${formatShortDate(item.date)}</span></td>
                                    <td>${item.debit ? formatCurrency(item.debit) : ''}</td>
                                    <td>${item.credit ? formatCurrency(item.credit) : ''}</td>
                                    <td class="${item.balance !== null && item.balance <= 0 ? 'balance-paid' : (item.balance !== null ? 'balance-late' : '')}">
                                        ${item.balance !== null ? formatCurrency(item.balance) : ''}
                                    </td>
                                    <td>${escapeHtml(item.description || '')}</td>
                                    <td>
                                        <span class="chip" style="${!item.receipt_no || item.receipt_no === '-' ? 'opacity:0.4' : 'opacity:1'}">
                                            ${escapeHtml(item.receipt_no || '—')}
                                        </span>
                                    </td>
                                </tr>
                            `).join('') : `
                                <tr>
                                    <td colspan="6">لا توجد حركات لهذه السنة</td>
                                </tr>
                            `}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderView() {
            const container = document.getElementById('years_container');
            const selectedYear = document.getElementById('year_filter').value;

            updateSummaryStrip(selectedYear);
            container.innerHTML = '';

            if (selectedYear === 'all') {
                if (!YEARS.length) {
                    container.innerHTML = `<div class="empty-state">لا توجد بيانات لعرض كشف الحساب.</div>`;
                    return;
                }

                container.innerHTML = YEARS.map(year => {
                    const tx = getTransactionsByYear(year);
                    const summary = getSummaryByYear(year);
                    return buildYearCard(year, tx, summary);
                }).join('');
                return;
            }

            const year = Number(selectedYear);
            const tx = getTransactionsByYear(year);
            const summary = getSummaryByYear(year);
            container.innerHTML = buildYearCard(year, tx, summary);
        }

        async function init() {
            if (!tenantCode) {
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.getElementById('years_container').innerHTML = `<div class="empty-state">لم يتم العثور على كود المستأجر.</div>`;
                return;
            }

            try {
                const [{ data: tenant, error: tenantError }, { data: tx, error: txError }, { data: summaries, error: summariesError }] = await Promise.all([
                    supabase
                        .from('tenants')
                        .select('*')
                        .eq('tenant_code', tenantCode)
                        .single(),
                    supabase
                        .from('tenant_transactions')
                        .select('*')
                        .eq('tenant_code', tenantCode)
                        .order('date', { ascending: true }),
                    supabase
                        .from('tenant_yearly_summary')
                        .select('*')
                        .eq('tenant_code', tenantCode)
                        .order('year', { ascending: true })
                ]);

                if (tenantError) throw tenantError;
                if (txError) throw txError;
                if (summariesError) throw summariesError;

                ALL_TRANSACTIONS = tx || [];
                ALL_SUMMARIES = summaries || [];

                const yearsFromTx = ALL_TRANSACTIONS.map(t => new Date(t.date).getFullYear());
                const yearsFromSummary = ALL_SUMMARIES.map(s => Number(s.year));

                YEARS = [...new Set([...yearsFromTx, ...yearsFromSummary])]
                    .filter(Boolean)
                    .sort((a, b) => a - b);

                document.getElementById('statement_tenant_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('statement_tenant_code').innerText = `كود المستأجر: ${tenantCode}`;
                document.getElementById('statement_date').innerText = formatLastUpdate();

                populateYearFilter();
                renderView();

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.getElementById('years_container').innerHTML = `
                    <div class="empty-state">
                        حدث خطأ أثناء تحميل كشف الحساب.
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
