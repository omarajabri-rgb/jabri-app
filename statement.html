<script>
    const adminSession = localStorage.getItem('jabri_admin_session');
    const tenantSession = localStorage.getItem('jabri_tenant_session');
    const tenantCode = localStorage.getItem('jabri_tenant_code');

    const isAdminViewer = adminSession === 'active';
    const isTenantViewer = tenantSession === 'active';

    const { createClient } = supabase;
    const supabaseClient = createClient(
        'https://gzukfvxcpfblzqyjzkoz.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
    );

    function toNumber(value) {
        const n = parseFloat(value);
        return isNaN(n) ? 0 : n;
    }

    function formatCurrency(v) {
        return `${toNumber(v).toLocaleString('en-US', {
            minimumFractionDigits: 3,
            maximumFractionDigits: 3
        })} د.أ`;
    }

    function formatDate(value) {
        if (!value) return '-';
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleDateString('ar-JO');
    }

    function formatDateTime(value) {
        const d = new Date(value);
        if (isNaN(d.getTime())) return '-';
        return d.toLocaleString('ar-JO', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit'
        });
    }

    function goBack() {
        if (isAdminViewer) {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'tenant.html';
        }
    }

    function savePDF() {
        const element = document.querySelector('.wrap');
        const tenantName = (document.getElementById('statement_tenant_name').innerText || 'مستأجر').replace(/\s+/g, '_');

        html2pdf().set({
            margin: 5,
            filename: `كشف_حساب_${tenantName}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }

    function getLastPayment(rows) {
        const payments = rows
            .filter(r => toNumber(r.credit) > 0)
            .sort((a, b) => new Date(b.date) - new Date(a.date));
        return payments.length ? payments[0] : null;
    }

    function daysSince(date) {
        const d = new Date(date);
        return Math.floor((Date.now() - d) / (1000 * 60 * 60 * 24));
    }

    function getYearStatus(closingBalance, openingBalance, yearRows) {
        const yearDebit = yearRows.reduce((s, r) => s + toNumber(r.debit), 0);
        const yearCredit = yearRows.reduce((s, r) => s + toNumber(r.credit), 0);
        const yearRequired = openingBalance + yearDebit;

        if (closingBalance <= 0) {
            return { text: 'مسدد', className: 'status-paid' };
        }

        if (yearRequired > 0 && yearCredit > 0) {
            return { text: 'جزئي', className: 'status-partial' };
        }

        return { text: 'غير مسدد', className: 'status-unpaid' };
    }

    function txItemHTML({ date, description, debit, credit, balance, receipt_no, carry = false }) {
        return `
            <div class="tx-item ${carry ? 'carry-item' : ''}">
                <div class="tx-main">
                    <div class="tx-desc">${description || '-'}</div>
                    <div class="tx-chips">
                        <div class="chip">التاريخ: ${date || '-'}</div>
                        <div class="chip">السند: ${receipt_no || '-'}</div>
                    </div>
                </div>
                <div class="amt-box amt-credit">
                    <span>دائن</span>
                    <b>${credit ? formatCurrency(credit) : '-'}</b>
                </div>
                <div class="amt-box amt-debit">
                    <span>مدين</span>
                    <b>${debit ? formatCurrency(debit) : '-'}</b>
                </div>
                <div class="amt-box amt-balance">
                    <span>الرصيد</span>
                    <b>${formatCurrency(balance)}</b>
                </div>
            </div>
        `;
    }

    function renderYears(previousBalance, transactions) {
        const yearsContainer = document.getElementById('years_container');
        yearsContainer.innerHTML = '';

        const rows = Array.isArray(transactions) ? transactions : [];
        const grouped = {};

        rows.forEach(row => {
            if (!row.date) return;
            const year = new Date(row.date).getFullYear();
            if (!grouped[year]) grouped[year] = [];
            grouped[year].push(row);
        });

        const years = Object.keys(grouped).sort((a, b) => Number(a) - Number(b));

        if (!years.length && toNumber(previousBalance) === 0) {
            yearsContainer.innerHTML = `<div class="empty-state glass">لا توجد حركات مالية متاحة حالياً.</div>`;
            return;
        }

        let carryBalance = toNumber(previousBalance);
        const currentYear = new Date().getFullYear();
        const displayYears = years.length ? years : [currentYear];

        displayYears.forEach((year, index) => {
            const yearRows = (grouped[year] || []).sort((a, b) => new Date(a.date) - new Date(b.date));
            const openingBalance = carryBalance;
            const renderedItems = [];

            if (openingBalance > 0) {
                renderedItems.push({
                    date: '-',
                    description: `رصيد مرحل من سنة ${index === 0 ? 'سابقة' : Number(year) - 1}`,
                    debit: openingBalance,
                    credit: 0,
                    balance: openingBalance,
                    receipt_no: '-',
                    carry: true
                });
            }

            let runningBal = openingBalance;

            yearRows.forEach(row => {
                const debit = toNumber(row.debit);
                const credit = toNumber(row.credit);
                runningBal += debit - credit;

                renderedItems.push({
                    date: formatDate(row.date),
                    description: row.description || '-',
                    debit,
                    credit,
                    balance: Math.max(0, runningBal),
                    receipt_no: row.receipt_no || '-',
                    carry: false
                });
            });

            const closingBalance = Math.max(0, runningBal);
            const yearStatus = getYearStatus(closingBalance, openingBalance, yearRows);
            carryBalance = closingBalance;

            const card = document.createElement('section');
            card.className = `year-card glass ${Number(year) === currentYear ? 'current-year' : ''}`;
            card.innerHTML = `
                <div class="year-head">
                    <div class="year-title">${year}</div>
                    <div class="year-balance">رصيد أول السنة: ${formatCurrency(openingBalance)}</div>
                    <div class="year-balance">رصيد نهاية السنة: ${formatCurrency(closingBalance)}</div>
                    <div class="year-status ${yearStatus.className}">حالة السنة: ${yearStatus.text}</div>
                </div>
                <div class="tx-list">
                    ${renderedItems.length
                        ? renderedItems.map(txItemHTML).join('')
                        : '<div style="padding:10px; text-align:center; font-size:12px; color:var(--muted);">لا توجد حركات لهذا العام</div>'
                    }
                </div>
            `;
            yearsContainer.appendChild(card);
        });
    }

    function showError(message, extra = '') {
        document.getElementById('years_container').innerHTML = `
            <div class="empty-state glass">
                ${message}
                ${extra ? `<br><br><span style="font-size:11px">${extra}</span>` : ''}
            </div>
        `;
        document.getElementById('loader').style.display = 'none';
        document.body.classList.add('loaded');
    }

    window.onload = async () => {
        try {
            console.log('adminSession =', adminSession);
            console.log('tenantSession =', tenantSession);
            console.log('tenantCode =', tenantCode);

            if (!tenantCode) {
                showError('لا يوجد كود مستأجر محفوظ.');
                return;
            }

            if (!isAdminViewer && !isTenantViewer) {
                showError('لا توجد صلاحية لفتح الكشف.');
                return;
            }

            const { data: tenant, error: tenantError } = await supabaseClient
                .from('tenants')
                .select('*')
                .eq('tenant_code', tenantCode)
                .maybeSingle();

            console.log('tenant =', tenant);
            console.log('tenantError =', tenantError);

            if (tenantError) {
                showError('خطأ في تحميل بيانات المستأجر.', tenantError.message);
                return;
            }

            if (!tenant) {
                showError('لم يتم العثور على المستأجر.', `tenant_code = ${tenantCode}`);
                return;
            }

            const { data: transactions, error: txError } = await supabaseClient
                .from('tenant_transactions')
                .select('*')
                .eq('tenant_code', tenantCode)
                .order('date', { ascending: true });

            console.log('transactions =', transactions);
            console.log('txError =', txError);

            if (txError) {
                showError('خطأ في تحميل الحركات المالية.', txError.message);
                return;
            }

            const tenantName = tenant.tenant_name || 'مستأجر';
            const previousBalance = toNumber(tenant.previous_balance);
            const rows = Array.isArray(transactions) ? transactions : [];
            const now = new Date();

            const totalDebitsFromTx = rows.reduce((sum, r) => sum + toNumber(r.debit), 0);
            const totalCreditsFromTx = rows.reduce((sum, r) => sum + toNumber(r.credit), 0);
            const totalDue = previousBalance + totalDebitsFromTx;
            const runningBal = Math.max(0, totalDue - totalCreditsFromTx);

            document.getElementById('statement_tenant_name').innerText = tenantName;
            document.getElementById('statement_date').innerText = `تاريخ الإصدار: ${formatDateTime(now)}`;
            document.getElementById('footer_year').innerText = now.getFullYear();
            document.getElementById('sum_due').innerText = formatCurrency(totalDue);
            document.getElementById('sum_paid').innerText = formatCurrency(totalCreditsFromTx);
            document.getElementById('sum_balance').innerText = formatCurrency(runningBal);

            const lastPayment = getLastPayment(rows);
            const box = document.getElementById('last_payment_box');

            if (lastPayment) {
                const days = daysSince(lastPayment.date);
                const dayText = days === 0 ? 'اليوم' : (days === 1 ? 'منذ يوم' : `منذ ${days} يوم`);
                box.innerText = `آخر دفعة: ${dayText} — ${formatCurrency(lastPayment.credit)} — ${formatDate(lastPayment.date)}`;
            } else {
                box.innerText = 'لا يوجد دفعات مسجلة';
            }

            renderYears(previousBalance, rows);

            document.getElementById('loader').style.display = 'none';
            document.body.classList.add('loaded');
            if (window.lucide) lucide.createIcons();
        } catch (e) {
            console.error('statement crash =', e);
            showError('تعذر تحميل بيانات الكشف.', e.message || 'Unknown error');
        }
    };
</script>
