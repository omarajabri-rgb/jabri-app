<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>كشف الحساب</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
  padding-bottom:95px;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.year-card{
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.green{ background:#edf8f1; }
.orange{ background:#fff6ea; }
.red{ background:#fff1f1; }

.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  gap:10px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.7);
  border-radius:14px;
  overflow:hidden;
}

th, td{
  padding:8px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}

th{
  background:#f1f3f7;
}

.debit{ color:#e05252; font-weight:bold; }
.credit{ color:#18a957; font-weight:bold; }

.balance{
  font-weight:900;
  font-size:14px;
}

.balance-positive{ color:#e05252; }
.balance-zero{ color:#18a957; }

/* 🔥 buttons */
.bottom-actions{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:9999;

  display:flex;
  flex-direction:row-reverse;
  gap:12px;

  width:min(420px, 100%);
  margin:0 auto;

  padding:8px 10px calc(4px + env(safe-area-inset-bottom));
  box-sizing:border-box;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,0.35);
  border-radius:22px 22px 0 0;
  box-shadow:0 -8px 30px rgba(0,0,0,0.12);

  transition:all 0.3s ease;
  transform:translateY(120%);
  opacity:0;
}

.pdf-btn,
.back-btn{
  flex:1;
  height:52px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  font-size:16px;
}

.pdf-btn{
  background:linear-gradient(135deg,#c9a46b,#b89155);
  color:#fff;
}

.back-btn{
  background:linear-gradient(135deg,#1f2d4a,#2b3d63);
  color:#fff;
}
</style>
</head>

<body>

<div class="app">
  <div class="card">
    <h2>كشف الحساب</h2>
    <div id="tenantName"></div>
  </div>

  <div id="container"></div>
</div>

<div class="bottom-actions">
  <button class="pdf-btn" onclick="savePDF()">PDF</button>
  <button class="back-btn" onclick="goBack()">رجوع</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'YOUR_SUPABASE_ANON_KEY'
)

window.goBack = () => window.history.back()

window.savePDF = async function(){
  const element = document.querySelector(".app")
  html2pdf().from(element).save("statement.pdf")
}

/* 🔥 show only at bottom */
window.addEventListener("scroll", () => {
  const buttons = document.querySelector(".bottom-actions")

  const reachedBottom =
    window.innerHeight + window.scrollY >= document.body.offsetHeight - 10

  if (reachedBottom) {
    buttons.style.transform = "translateY(0)"
    buttons.style.opacity = "1"
  } else {
    buttons.style.transform = "translateY(120%)"
    buttons.style.opacity = "0"
  }
})

document.addEventListener("DOMContentLoaded", load)

async function load(){
  const tenant = localStorage.getItem("jabri_tenant_code")

  if(!tenant){
    document.getElementById("container").innerHTML = "لا يوجد مستأجر"
    return
  }

  document.getElementById("tenantName").innerText = tenant

  const { data } = await supabase
    .from("tenant_transactions")
    .select("*")
    .eq("tenant_code", tenant)

  let balance = 0
  let html = ""

  data.forEach(r=>{
    balance += (r.debit || 0) - (r.credit || 0)

    html += `
    <div class="card">
      ${r.date} | ${r.debit || 0} | ${r.credit || 0} | ${balance}
    </div>`
  })

  document.getElementById("container").innerHTML = html
}
</script>

</body>
</html>
