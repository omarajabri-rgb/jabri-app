<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.78);
            --border: rgba(201,164,107,0.22);
            --text: #2f2a24;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #cc5a50;
            --warning: #c38a2e;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        #statement_date {
            margin: 0;
            color: #7a6c59;
            font-size: 13px;
            font-weight: 700;
        }

        .chip {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            white-space: nowrap;
            background: rgba(201,164,107,0.15);
            color: var(--gold-deep);
            border: 1px solid rgba(201,164,107,0.25);
        }

        .year-chip {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 20px;
            font-weight: 900;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 1px;
            transition: all 0.25s ease;
        }

        .year-chip.paid {
            color: var(--success);
            background: linear-gradient(
                135deg,
                rgba(47,158,111,0.15),
                rgba(255,255,255,0.25)
            );
            border: 1px solid rgba(47,158,111,0.35);
        }

        .year-chip.late {
            color: var(--danger);
            background: linear-gradient(
                135deg,
                rgba(204,90,80,0.12),
                rgba(255,255,255,0.25)
            );
            border: 1px solid rgba(204,90,80,0.30);
        }

        .year-chip.partial {
            color: var(--warning);
            background: linear-gradient(
                135deg,
                rgba(195,138,46,0.15),
                rgba(255,255,255,0.25)
            );
            border: 1px solid rgba(195,138,46,0.30);
        }

        .year-card {
            border-radius: 26px;
            margin-bottom: 24px;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.92),
                rgba(247,244,237,0.75)
            );
            border: 1px solid rgba(201,164,107,0.18);
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
        }

        .year-head {
            padding: 20px;
            position: relative;
            text-align: center;
        }

        .year-status {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .status-paid {
            background: rgba(47,158,111,0.12);
            color: #2f9e6f;
            border: 1px solid rgba(47,158,111,0.22);
        }

        .status-partial {
            background: rgba(195,138,46,0.12);
            color: #c38a2e;
            border: 1px solid rgba(195,138,46,0.22);
        }

        .status-late {
            background: rgba(204,90,80,0.12);
            color: #cc5a50;
            border: 1px solid rgba(204,90,80,0.22);
        }

        .statement-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            background: transparent;
        }

        .statement-table th {
            background: #e9e2d5;
            color: #5f5345;
            padding: 12px 10px;
            font-weight: 900;
            font-size: 11px;
            white-space: nowrap;
            text-align: center;
            border-bottom: 1px solid rgba(201,164,107,0.18);
        }

        .statement-table td {
            padding: 10px 8px;
            vertical-align: middle;
            font-size: 11px;
            border: 1px solid rgba(201,164,107,0.15);
            background: rgba(247,244,237,0.60);
        }

        .statement-table td:nth-child(1),
        .statement-table th:nth-child(1),
        .statement-table td:nth-child(6),
        .statement-table th:nth-child(6) {
            text-align: center;
        }

        .statement-table td:nth-child(2),
        .statement-table td:nth-child(3),
        .statement-table td:nth-child(4) {
            text-align: center;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            font-weight: 900;
        }

        .statement-table td:nth-child(2) {
            color: var(--danger);
        }

        .statement-table td:nth-child(3) {
            color: var(--success);
        }

        .statement-table td:nth-child(4) {
            color: #b0413e;
            font-size: 12px;
        }

        .statement-table td:nth-child(5),
        .statement-table th:nth-child(5) {
            text-align: right;
            padding-right: 14px;
            white-space: nowrap;
        }

        .balance-zero {
            color: var(--success) !important;
        }

        .carry-row td {
            background: rgba(201,164,107,0.05);
            font-style: italic;
        }

        .main-row td {
            background: rgba(177,138,82,0.03);
            font-weight: 700;
        }

        .last-row td {
            border-bottom: 2px solid var(--gold);
        }

        .year-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .year-summary-box {
            padding: 14px;
            border-radius: 18px;
            text-align: center;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.7),
                rgba(255,255,255,0.25)
            );
            border: 1px solid rgba(201,164,107,0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .year-summary-box span {
            display: block;
            color: #7a6c59;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .year-summary-box b {
            display: block;
            font-size: 16px;
            font-weight: 900;
        }

        .year-summary-box.credit-box {
            border-color: rgba(47,158,111,0.25);
            background: linear-gradient(
                135deg,
                rgba(47,158,111,0.12),
                rgba(255,255,255,0.25)
            );
        }

        .year-summary-box.balance-box {
            border-color: rgba(204,90,80,0.25);
            background: linear-gradient(
                135deg,
                rgba(204,90,80,0.10),
                rgba(255,255,255,0.25)
            );
        }

        .year-summary-box.credit-box b {
            color: var(--success);
        }

        .year-summary-box.balance-box b {
            color: var(--danger);
        }

        @keyframes paymentHighlight {
            0% {
                background: rgba(47,158,111,0.25);
                transform: scale(1.01);
            }
            100% {
                background: transparent;
                transform: scale(1);
            }
        }

        .payment-new {
            animation: paymentHighlight 1.5s ease forwards;
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }

        .back-btn {
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fff;
        }

        .save-btn {
            background: var(--gold-deep);
            color: white;
            border: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="statement-header glass">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">-</h2>
            <p id="statement_date">-</p>
        </div>

        <div id="years_container"></div>

        <div class="bottom-actions">
            <button class="back-btn" onclick="window.history.back()">رجوع</button>
            <button class="back-btn save-btn" onclick="savePDF()">حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const tenantCode = localStorage.getItem('jabri_tenant_code');
        const supabase = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function toNumber(v) {
            return parseFloat(v) || 0;
        }

        function formatCurrency(v) {
            return Math.round(v).toLocaleString();
        }

        async function init() {
            if (!tenantCode) return;

            try {
                const { data: tenant } = await supabase
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .single();

                const { data: tx } = await supabase
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .order('date', { ascending: true });

                document.getElementById('statement_tenant_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('statement_date').innerText =
                    `تاريخ الإصدار: ${new Date().toLocaleDateString('ar-JO')}`;

                render(toNumber(tenant?.previous_balance), tx || []);

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            } catch (e) {
                console.error(e);
            }
        }

        function render(prevBal, transactions) {
            const container = document.getElementById('years_container');
            container.innerHTML = '';

            const grouped = {};

            transactions.forEach(t => {
                const y = new Date(t.date).getFullYear();
                if (!grouped[y]) grouped[y] = [];
                grouped[y].push(t);
            });

            const years = Object.keys(grouped).map(Number).sort((a, b) => a - b);
            let carryBalance = toNumber(prevBal);

            years.forEach(year => {
                const yearRows = grouped[year].sort((a, b) => new Date(a.date) - new Date(b.date));
                let running = 0;
                const items = [];
                const openingRows = [];
                const paymentRows = [];

                yearRows.forEach(r => {
                    const desc = (r.description || '').trim();
                    const rowDate = new Date(r.date).toLocaleDateString('en-GB');

                    const isOpeningItem =
                        rowDate === `01/01/${year}` &&
                        (
                            desc.includes('ايجار') ||
                            desc.includes('الإيجار') ||
                            desc.includes('معارف')
                        );

                    if (isOpeningItem) openingRows.push(r);
                    else paymentRows.push(r);
                });

                openingRows.sort((a, b) => {
                    const ad = a.description || '';
                    const bd = b.description || '';

                    if (ad.includes('معارف') && bd.includes('ايجار')) return -1;
                    if (ad.includes('ايجار') && bd.includes('معارف')) return 1;
                    return 0;
                });

                if (carryBalance > 0) {
                    running += carryBalance;
                    items.push({
                        date: '-',
                        description: 'رصيد مدور من سنوات سابقة',
                        debit: carryBalance,
                        credit: 0,
                        balance: running,
                        receipt_no: '-',
                        isCarry: true
                    });
                }

                openingRows.forEach(r => {
                    running += (toNumber(r.debit) - toNumber(r.credit));
                    items.push({ ...r, balance: running, isMain: true });
                });

                paymentRows.forEach(r => {
                    running += (toNumber(r.debit) - toNumber(r.credit));
                    items.push({ ...r, balance: running });
                });

                const closingBalance = running;
                carryBalance = closingBalance;

                const totalCreditYear = items.reduce(
                    (s, r) => s + (r.isCarry ? 0 : toNumber(r.credit)),
                    0
                );

                let status = { text: 'متأخر', className: 'status-late' };
                if (closingBalance <= 0) {
                    status = { text: 'مسدد', className: 'status-paid' };
                } else if (totalCreditYear > 0) {
                    status = { text: 'جزئي', className: 'status-partial' };
                }

                const card = document.createElement('div');
                card.className = 'year-card';
                card.innerHTML = `
                    <div class="year-head">
                        <div class="year-status ${status.className}">
                            ${status.text}
                        </div>
                        <div class="year-title">
                            <span class="year-chip ${status.className.replace('status-', '')}">
                                ${year}
                            </span>
                        </div>
                    </div>

                    <table class="statement-table">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>مدين</th>
                                <th>دائن</th>
                                <th>الرصيد</th>
                                <th>البيان</th>
                                <th>سند</th>
                            </tr>
                        </thead>
                        <tbody id="body-${year}"></tbody>
                    </table>

                    <div class="year-footer">
                        <div class="year-summary-box credit-box">
                            <span>دائن</span>
                            <b>${formatCurrency(totalCreditYear)}</b>
                        </div>
                        <div class="year-summary-box balance-box">
                            <span>رصيد السنة</span>
                            <b>${formatCurrency(closingBalance)}</b>
                        </div>
                    </div>
                `;

                container.appendChild(card);
                const tbody = document.getElementById(`body-${year}`);

                items.forEach((item, index) => {
                    const tr = document.createElement('tr');

                    if (item.isCarry) tr.classList.add('carry-row');
                    if (item.isMain) tr.classList.add('main-row');
                    if (index === items.length - 1) tr.classList.add('last-row');

                    if (index === items.length - 1 && toNumber(item.credit) > 0) {
                        tr.classList.add('payment-new');
                    }

                    tr.innerHTML = `
                        <td>
                            ${item.date !== '-'
                                ? `<span class="chip">${new Date(item.date).toLocaleDateString('en-GB')}</span>`
                                : '-'}
                        </td>
                        <td>${item.debit ? formatCurrency(item.debit) : ''}</td>
                        <td>${item.credit ? formatCurrency(item.credit) : ''}</td>
                        <td class="${toNumber(item.balance) === 0 ? 'balance-zero' : ''}">
                            ${formatCurrency(item.balance)}
                        </td>
                        <td>${item.description || ''}</td>
                        <td>
                            <span class="chip" style="${!item.receipt_no || item.receipt_no === '-' ? 'opacity:0.4' : ''}">
                                ${item.receipt_no || '—'}
                            </span>
                        </td>
                    `;

                    tbody.appendChild(tr);
                });
            });
        }

        window.savePDF = () => {
            const element = document.querySelector('.wrap');
            html2pdf()
                .set({
                    margin: 10,
                    filename: 'statement.pdf',
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                })
                .from(element)
                .save();
        };

        init();
    </script>
</body>
</html>
