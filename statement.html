<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>كشف حساب مجمع جبري</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:linear-gradient(135deg,#edf2f7,#f7f9fc);
    color:#1d2940;
  }

  .app{
    max-width:420px;
    margin:auto;
    padding:15px;
    padding-bottom:20px;
  }

  .card{
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(14px);
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    text-align:center;
  }

  .year-card{
    background:#fff;
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.04);
  }

  .year-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    gap:10px;
  }

  .year-title{
    background:#1d2940;
    color:#fff;
    padding:6px 14px;
    border-radius:20px;
    font-weight:bold;
  }

  .status-chip{
    padding:6px 12px;
    border-radius:12px;
    font-size:12px;
    font-weight:900;
  }

  .status-paid{
    background:#edf8f1;
    color:#18a957;
  }

  .status-partial{
    background:#fff6ea;
    color:#b96a00;
  }

  .status-unpaid{
    background:#fff1f1;
    color:#e05252;
  }

  table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.72);
    border-radius:14px;
    overflow:hidden;
    margin-top:10px;
  }

  th, td{
    padding:10px 5px;
    font-size:11px;
    text-align:center;
    border-bottom:1px solid #eee;
  }

  th{
    background:#f1f3f7;
    color:#111;
    font-weight:900;
  }

  .carry-row{
    background:rgba(29,41,64,0.04);
  }

  .final-row td{
    background:rgba(201,164,107,0.14);
    font-weight:900;
  }

  .debit{
    color:#e05252;
    font-weight:bold;
  }

  .credit{
    color:#18a957;
    font-weight:bold;
  }

  .balance{
    font-weight:900;
    color:#1d2940;
  }

  .balance-zero{
    color:#18a957;
  }

  .balance-negative{
    color:#18a957;
  }

  .summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:12px;
  }

  .summary-card{
    background:#f8fafc;
    border-radius:12px;
    padding:10px 5px;
    text-align:center;
    border:1px solid #e2e8f0;
  }

  .summary-label{
    font-size:10px;
    color:#64748b;
    margin-bottom:4px;
    font-weight:bold;
  }

  .summary-value{
    font-size:14px;
    font-weight:900;
  }

  .bottom-actions{
    display:flex;
    flex-direction:row-reverse;
    gap:12px;
    margin-top:20px;
  }

  .pdf-btn{
    flex:1.2;
    height:52px;
    background:linear-gradient(135deg,#c9a46b,#b89155);
    color:#fff;
    border:none;
    border-radius:14px;
    font-weight:900;
    cursor:pointer;
  }

  .back-btn{
    flex:0.8;
    height:52px;
    background:#1f2d4a;
    color:#fff;
    border:none;
    border-radius:14px;
    font-weight:900;
    cursor:pointer;
  }

  .receipt{
    background:#eef4ff;
    padding:2px 6px;
    border-radius:8px;
    color:#2f6fed;
    font-weight:bold;
    display:inline-block;
    min-width:28px;
  }

  .error-box, .empty-box{
    background:#fff;
    border-radius:16px;
    padding:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.04);
    font-weight:800;
    text-align:center;
  }

  .error-box{
    color:#c62828;
    background:#fff1f1;
  }

  .empty-box{
    color:#64748b;
  }
</style>
</head>

<div class="app">

  </div>

  <div id="container"></div>

    <button class="back-btn" onclick="window.history.back()">رجوع</button>
  </div>
</div>
