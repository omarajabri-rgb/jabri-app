<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>كشف حساب</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  text-align:center;
}

.year-card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:8px;
  font-size:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.debit{color:#e05252;font-weight:bold;}
.credit{color:#18a957;font-weight:bold;}
.balance{font-weight:bold;}

.bottom-actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

button{
  flex:1;
  height:45px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.pdf-btn{background:#c9a46b;color:#fff;}
.back-btn{background:#1d2940;color:#fff;}

.debug{
  font-size:11px;
  color:#777;
  margin-top:5px;
}

.receipt{
  background:#eef4ff;
  padding:2px 6px;
  border-radius:8px;
  color:#2f6fed;
  font-weight:bold;
  display:inline-block;
  min-width:26px;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
  <h3>كشف حساب</h3>
  <div id="tenantName"></div>
  <div id="debug" class="debug"></div>
</div>

<div id="container"></div>

<div class="bottom-actions">
  <button class="pdf-btn" onclick="savePDF()">PDF</button>
  <button class="back-btn" onclick="history.back()">رجوع</button>
</div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

function normalizeText(v){
  return String(v || "").trim()
}

function getTenantCode(){
  const params = new URLSearchParams(window.location.search)

  let code =
    params.get("tenant") ||
    params.get("tenant_code") ||
    params.get("code") ||
    localStorage.getItem("jabri_tenant_code") ||
    localStorage.getItem("tenant_code") ||
    localStorage.getItem("tenantCode")

  if(code && code.trim()) return code.trim()

  const keys = ["tenant","user","currentTenant","loggedTenant"]
  for(const k of keys){
    try{
      const obj = JSON.parse(localStorage.getItem(k))
      if(obj){
        const c = obj.tenant_code || obj.code || obj.id
        if(c) return String(c).trim()
      }
    }catch(e){}
  }

  return ""
}

function num(v){
  const n = Number(v)
  return Number.isFinite(n) ? n : 0
}

function cleanNum(v){
  if(typeof v === 'number') return Number.isFinite(v) ? v : 0
  if(v === null || v === undefined || v === "" || v === "NaN") return 0
  const cleaned = String(v).replace(/[^\d.-]/g, '')
  const n = parseFloat(cleaned)
  return Number.isFinite(n) ? n : 0
}

function formatDate(d){
  const x = new Date(d)
  return isNaN(x) ? "-" : x.toLocaleDateString("en-GB")
}

function isNumericText(v){
  return /^-?\d+(\.\d+)?$/.test(normalizeText(v))
}

function normalizeRow(r, index, rowsOfYear){
  let description = normalizeText(r.description)
  let receiptNo = normalizeText(r.receipt_no || "-")
  let debit = cleanNum(r.debit)
  let credit = cleanNum(r.credit)

  const rowDate = new Date(r.date)
  const rowYear = isNaN(rowDate) ? "" : rowDate.getFullYear()

  const receiptLooksPayment =
    receiptNo.includes("نقد") ||
    receiptNo.includes("شيك") ||
    receiptNo.includes("تحويل") ||
    receiptNo.includes("حوال") ||
    receiptNo.includes("دفعة")

  const shiftedNumber = isNumericText(description) && debit === 0 && credit === 0

  if(shiftedNumber){
    const amount = cleanNum(description)

    // إذا السند صار "نقدي" فهذه دفعة
    if(receiptLooksPayment){
      credit = amount
      debit = 0
      description = "دفعة من الإيجار"
      receiptNo = "-"
    } else {
      // غير هيك نحددها حسب المبلغ ومكان السطر
      if(amount === 36){
        debit = 36
        credit = 0
        description = `معارف ${rowYear}`
      } else if(amount === 1800){
        debit = 1800
        credit = 0
        description = `إيجار لعام ${rowYear}`
      } else {
        // 2494 / 2030 / أي رصيد سابق
        debit = amount
        credit = 0
        description = `رصيد سابق عام ${rowYear - 1}`
      }
    }
  }

  return {
    ...r,
    description,
    receipt_no: receiptNo,
    debitVal: num(debit),
    creditVal: num(credit)
  }
}

async function load(){

  const container = document.getElementById("container")
  const tenantName = document.getElementById("tenantName")
  const debug = document.getElementById("debug")

  const tenant = getTenantCode()

  debug.innerText = "tenant code: " + tenant

  if(!tenant){
    container.innerHTML = "❌ لا يوجد tenant code"
    return
  }

  tenantName.innerText = tenant

  const {data,error} = await supabase
    .from("tenant_transactions")
    .select("*")
    .eq("tenant_code", tenant)
    .order("date",{ascending:true})

  if(error){
    container.innerHTML = error.message
    return
  }

  debug.innerText += " | rows: " + (data ? data.length : 0)

  if(!data || data.length === 0){
    container.innerHTML = "⚠️ لا يوجد بيانات"
    return
  }

  const grouped = {}

  data.forEach(r=>{
    const y = new Date(r.date).getFullYear()
    if(!grouped[y]) grouped[y]=[]
    grouped[y].push(r)
  })

  let html=""

  Object.keys(grouped).sort().forEach(year=>{

    // normalize rows only inside same year
    let yearRows = grouped[year].map((r, i) => normalizeRow(r, i, grouped[year]))

    // إعادة ترتيب بسيطة داخل السنة:
    // رصيد سابق أولاً ثم الإيجار ثم المعارف ثم الدفعات
    yearRows.sort((a,b)=>{
      const aDesc = normalizeText(a.description)
      const bDesc = normalizeText(b.description)

      const order = (desc) => {
        if(desc.includes("رصيد")) return 1
        if(desc.includes("إيجار")) return 2
        if(desc.includes("معارف")) return 3
        if(desc.includes("دفعة")) return 4
        return 9
      }

      const oa = order(aDesc)
      const ob = order(bDesc)

      if(oa !== ob) return oa - ob

      return new Date(a.date) - new Date(b.date)
    })

    let balance = 0
    let debitTotal = 0
    let creditTotal = 0

    const rows = yearRows.map((r,i)=>{

      let debit = num(r.debitVal)
      let credit = num(r.creditVal)
      const desc = normalizeText(r.description)

      // الرصيد الافتتاحي
      if(i === 0 && desc.includes("رصيد")){
        balance = debit
      } else {
        balance += debit - credit
      }

      debitTotal += debit
      creditTotal += credit

      return `
      <tr>
        <td>${formatDate(r.date)}</td>
        <td class="debit">${debit > 0 ? debit.toLocaleString("en-US") : "-"}</td>
        <td class="credit">${credit > 0 ? credit.toLocaleString("en-US") : "-"}</td>
        <td class="balance">${balance.toLocaleString("en-US")}</td>
        <td>${desc || "-"}</td>
        <td><span class="receipt">${r.receipt_no || "-"}</span></td>
      </tr>`
    }).join("")

    html += `
    <div class="year-card">
      <div class="year-title">سنة ${year}</div>

      <table>
        <thead>
          <tr>
            <th>تاريخ</th>
            <th>مدين</th>
            <th>دائن</th>
            <th>رصيد</th>
            <th>بيان</th>
            <th>سند</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <div style="margin-top:10px;font-weight:bold">
        مدين: ${debitTotal.toLocaleString("en-US")} | دائن: ${creditTotal.toLocaleString("en-US")} | رصيد: ${balance.toLocaleString("en-US")}
      </div>
    </div>`
  })

  container.innerHTML = html
}

window.savePDF = function(){
  html2pdf().from(document.body).save("statement.pdf")
}

load()
</script>

</body>
</html>
