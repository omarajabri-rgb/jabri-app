<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.78);
            --surface-strong: rgba(255,255,255,0.92);
            --border: rgba(201,164,107,0.22);
            --text: #2f2a24;
            --muted: #7d7468;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #cc5a50;
            --warning: #c38a2e;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0; color: var(--text); padding: 16px; opacity: 0;
            transform: translateY(8px); transition: all 0.45s ease;
            background: radial-gradient(circle at top left, rgba(201,164,107,0.12), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(177,138,82,0.10), transparent 24%),
                        linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded { opacity: 1; transform: translateY(0); }
        .wrap { max-width: 1120px; margin: 0 auto; padding-bottom: 42px; }
        .glass { background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); box-shadow: var(--shadow); }

        .statement-header { border-radius: 26px; padding: 24px; margin-bottom: 16px; text-align: center; }
        .statement-header h1 { margin: 0 0 8px; font-size: 28px; font-weight: 900; color: var(--gold-deep); }
        .statement-header h2 { margin: 0 0 8px; font-size: 20px; font-weight: 900; color: var(--text); }
        #statement_date { font-size: 13px; font-weight: 900; color: var(--gold-deep); margin-top: 6px; }

        .year-head {
            padding: 18px 18px 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .year-title {
            font-size: 34px;
            font-weight: 900;
            color: #a88349;
            text-align: center;
        }

        .year-status {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(201,164,107,0.10);
            border: 1px solid rgba(201,164,107,0.18);
        }

        .table-wrapper { padding: 8px 12px 0; overflow: hidden; }
        .statement-table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 11px; background: rgba(255,255,255,0.96); border-radius: 18px; overflow: hidden; }

        .statement-table th:nth-child(1), .statement-table td:nth-child(1) { width: 18%; }
        .statement-table th:nth-child(2), .statement-table td:nth-child(2) { width: 16%; }
        .statement-table th:nth-child(3), .statement-table td:nth-child(3) { width: 16%; }
        .statement-table th:nth-child(4), .statement-table td:nth-child(4) { width: 16%; }
        .statement-table th:nth-child(5), .statement-table td:nth-child(5) { width: 20%; }
        .statement-table th:nth-child(6), .statement-table td:nth-child(6) { width: 14%; }

        .statement-table th { background: linear-gradient(135deg, rgba(201,164,107,0.90), rgba(177,138,82,0.90)); color: #fffdf8; padding: 8px 4px; font-weight: 900; border: 1px solid rgba(255,255,255,0.14); font-size: 10.5px; }
        .statement-table td { padding: 7px 3px; border: 1px solid rgba(201,164,107,0.10); text-align: center; color: var(--text); vertical-align: middle; font-size: 10px; line-height: 1.4; word-break: break-word; }

        .statement-table td:nth-child(1) { color: var(--gold-deep); font-weight: 900; }
        .statement-table td:nth-child(2) { color: var(--danger); font-weight: 900; font-size: 9.5px; }
        .statement-table td:nth-child(3) { color: var(--success); font-weight: 900; font-size: 9.5px; }
        .statement-table td:nth-child(4) { color: var(--danger); font-weight: 900; font-size: 9.5px; }
        .balance-zero { color: var(--success) !important; }

        .statement-table td:nth-child(5) { font-weight: 800; }
        .statement-table td:nth-child(6) { color: var(--gold-deep); font-weight: 900; }

        /* --- Updated Main Row Styles --- */
        .main-row td { background: rgba(201,164,107,0.10) !important; font-weight: 900; }
        .main-row td:nth-child(5) {
            font-weight: 900;
            color: #2f2a24;
        }

        .carry-row td { background: rgba(201,164,107,0.08) !important; font-weight: 900; }

        .last-row td {
            background: rgba(201,164,107,0.15) !important;
            font-weight: 900;
            border-top: 2px solid var(--gold-deep);
        }
        .last-row td.balance-cell {
            color: var(--danger);
            font-size: 13px;
        }

        .table-chip { display: inline-flex; align-items: center; justify-content: center; padding: 4px 6px; border-radius: 999px; font-size: 9px; font-weight: 900; background: rgba(201,164,107,0.12); color: var(--gold-deep); border: 1px solid rgba(201,164,107,0.18); }

        .year-card { border-radius: 26px; margin-bottom: 24px; background: rgba(255,255,255,0.84); border: 1px solid rgba(201,164,107,0.22); box-shadow: var(--shadow); overflow: hidden; }
        .year-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px 16px; }
        .year-summary-box { background: rgba(201,164,107,0.08); border: 1px solid rgba(201,164,107,0.16); border-radius: 18px; padding: 12px; text-align: center; }
        .year-summary-box span { display: block; color: var(--muted); font-size: 10px; font-weight: 800; margin-bottom: 6px; }
        .year-summary-box b { display: block; font-size: 15px; font-weight: 900; }
        .year-summary-box.debit-box b { color: var(--danger); }

        .bottom-actions { display: flex; justify-content: center; gap: 12px; margin-top: 25px; }
        .back-btn { border: 1px solid var(--border); background: rgba(255,255,255,0.74); padding: 10px 15px; border-radius: 14px; font-size: 13px; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .save-btn { color: #fff; background: linear-gradient(135deg, var(--gold), var(--gold-deep)); border: none; }

        #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg), var(--bg-2)); z-index: 9999; }
        .spinner { width: 38px; height: 38px; border: 3px solid rgba(201,164,107,0.18); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
            body { background: #fff !important; padding: 0; opacity: 1 !important; transform: none !important; }
            #loader, .bottom-actions { display: none !important; }
            .year-card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div class="wrap">
        <div class="statement-header glass">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">اسم المستأجر</h2>
            <p id="statement_date">—</p>
        </div>

        <div id="years_container" class="years-stack"></div>

        <div class="bottom-actions">
            <button class="back-btn" onclick="goBack()"><i data-lucide="arrow-right"></i> رجوع</button>
            <button class="back-btn save-btn" onclick="savePDF()"><i data-lucide="download"></i> حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const tenantCode = localStorage.getItem('jabri_tenant_code');
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function toNumber(v) { return parseFloat(v) || 0; }
        function formatCurrency(v) { return Math.round(toNumber(v)).toString(); }
        function formatDate(v) { return v ? new Date(v).toLocaleDateString('en-GB') : '-'; }
        function formatDateTime(v) { return v ? new Date(v).toLocaleString('en-GB', { year: 'numeric', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '-'; }

        function goBack() { window.history.back(); }
        function savePDF() {
            const element = document.querySelector('.wrap');
            const name = document.getElementById('statement_tenant_name').innerText.replace(/\s+/g, '_');
            html2pdf().set({ margin: 5, filename: `كشف_حساب_${name}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }}).from(element).save();
        }
        window.goBack = goBack; window.savePDF = savePDF;

        function txRowHTML({ date, description, debit, credit, balance, receipt_no, isCarry = false, isLast = false }) {
            const isMain = description?.includes('ايجار') || description?.includes('الإيجار') || description?.includes('معارف');
            const isZero = Math.round(balance) === 0;

            return `
                <tr class="${isCarry ? 'carry-row' : ''} ${isMain ? 'main-row' : ''} ${isLast ? 'last-row' : ''}">
                    <td><span class="table-chip">${date || '-'}</span></td>
                    <td>${debit ? formatCurrency(debit) : ''}</td>
                    <td>${credit ? formatCurrency(credit) : ''}</td>
                    <td class="balance-cell ${isZero ? 'balance-zero' : ''}">${formatCurrency(balance)}</td>
                    <td style="text-align:right">${description || '-'}</td>
                    <td><span class="table-chip">${receipt_no || '-'}</span></td>
                </tr>
            `;
        }

        function renderYears(previousBalance, transactions) {
            const container = document.getElementById('years_container');
            container.innerHTML = '';
            const grouped = {};
            transactions.forEach(r => {
                const year = new Date(r.date).getFullYear();
                if (!grouped[year]) grouped[year] = []; grouped[year].push(r);
            });

            const years = Object.keys(grouped).sort((a,b) => a - b);
            let totalRunningCarry = toNumber(previousBalance);
            const currentYear = new Date().getFullYear();

            (years.length ? years : [currentYear]).forEach((year) => {
                const yearRows = (grouped[year] || []).sort((a, b) => new Date(a.date) - new Date(b.date));
                const openingBalance = totalRunningCarry;
                const renderedItems = [];
                let running = 0;

                const openingRows = [];
                const normalRows = [];

                yearRows.forEach(row => {
                    const desc = (row.description || '').trim();
                    const rowDate = formatDate(row.date);
                    // 1- logical grouping (kept as requested)
                    const isOpeningYearItem = rowDate === `01/01/${year}` && (desc.includes('الإيجار') || desc.includes('ايجار') || desc.includes('معارف'));
                    if (isOpeningYearItem) openingRows.push(row); else normalRows.push(row);
                });

                openingRows.forEach(row => {
                    const d = toNumber(row.debit); const c = toNumber(row.credit);
                    running += d - c;
                    renderedItems.push({ date: formatDate(row.date), description: row.description, debit: d, credit: c, balance: running, receipt_no: row.receipt_no });
                });

                // 2- Edited "رصيد متراكم" insertion
                if (openingBalance > 0) {
                    running += openingBalance;
                    renderedItems.push({
                        date: '-',
                        description: `رصيد متراكم`,
                        debit: openingBalance,
                        credit: 0,
                        balance: running,
                        receipt_no: '-',
                        isCarry: true
                    });
                }

                normalRows.forEach(row => {
                    const d = toNumber(row.debit); const c = toNumber(row.credit);
                    running += d - c;
                    renderedItems.push({ date: formatDate(row.date), description: row.description, debit: d, credit: c, balance: running, receipt_no: row.receipt_no });
                });

                const closingBalance = running;
                totalRunningCarry = closingBalance;
                const yearStatus = closingBalance <= 0 ? {text:'مسدد', className:'status-paid'} : {text:'غير مسدد', className:'status-unpaid'};

                const card = document.createElement('section');
                card.className = 'year-card';
                card.innerHTML = `
                    <div class="year-head">
                        <div class="year-status ${yearStatus.className}">${yearStatus.text}</div>
                        <div class="year-title">${year}</div>
                    </div>
                    <div class="table-wrapper">
                        <table class="statement-table">
                            <thead><tr><th>التاريخ</th><th>مدين (+)</th><th>دائن (-)</th><th>الرصيد</th><th>البيان</th><th>رقم السند</th></tr></thead>
                            <tbody>
                                ${renderedItems.map((item, index) => {
                                    return txRowHTML({
                                        ...item,
                                        isLast: index === renderedItems.length - 1
                                    });
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    <div class="year-footer">
                        <div class="year-summary-box debit-box"><span>مدين</span><b>${formatCurrency(renderedItems.reduce((s, r) => s + toNumber(r.debit), 0))}</b></div>
                        <div class="year-summary-box balance-box"><span>الرصيد</span><b>${formatCurrency(closingBalance)}</b></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = async () => {
            if (!tenantCode) return;
            const { data: tenant } = await supabaseClient.from('tenants').select('*').eq('tenant_code', tenantCode).maybeSingle();
            if (!tenant) return;
            const { data: tx } = await supabaseClient.from('tenant_transactions').select('*').eq('tenant_code', tenantCode).order('date', { ascending: true });
            
            document.getElementById('statement_tenant_name').innerText = tenant.tenant_name;
            document.getElementById('statement_date').innerText = `تاريخ الإصدار: ${formatDateTime(new Date())}`;

            renderYears(toNumber(tenant.previous_balance), tx || []);
            document.getElementById('loader').style.display = 'none';
            document.body.classList.add('loaded');
            if (window.lucide) lucide.createIcons();
        };
    </script>
</body>
</html>
