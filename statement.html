<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
            --info: #5e7fd8;
            --highlight: rgba(201,164,107,0.22);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        .header-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            background: rgba(201,164,107,0.14);
            color: var(--text);
            border: 1px solid rgba(201,164,107,0.24);
            min-height: 32px;
        }

        .search-card,
        .year-card,
        .search-results-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(247,244,237,0.74));
            border: 1px solid rgba(201,164,107,0.16);
            border-radius: 22px;
            box-shadow: 0 10px 24px rgba(120,95,56,0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .search-card {
            margin-bottom: 18px;
            padding: 14px;
        }

        .search-title {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 900;
            color: var(--muted);
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input-wrap {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 46px;
            border-radius: 16px;
            border: 1px solid rgba(201,164,107,0.20);
            background: rgba(255,255,255,0.72);
            color: var(--text);
            font-size: 15px;
            font-weight: 900;
            padding: 0 16px;
            outline: none;
        }

        .search-btn,
        .clear-btn,
        .back-btn,
        .save-btn {
            height: 46px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .search-btn,
        .save-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            border: none;
            padding: 0 18px;
        }

        .clear-btn,
        .back-btn {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text);
            padding: 0 18px;
        }

        .search-btn:hover,
        .clear-btn:hover,
        .back-btn:hover,
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(120,95,56,0.15);
        }

        .search-hint {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
        }

        .search-results-card {
            display: none;
            margin-bottom: 18px;
            padding: 16px;
        }

        .search-results-card.active {
            display: block;
        }

        .search-results-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .search-results-title {
            font-size: 14px;
            font-weight: 900;
            color: var(--text);
        }

        .search-status-badge {
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            border: 1px solid transparent;
        }

        .search-status-badge.found {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border-color: rgba(47,158,111,0.24);
        }

        .search-status-badge.not-found {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border-color: rgba(204,90,80,0.22);
        }

        .search-status-badge.multi {
            background: rgba(94,127,216,0.12);
            color: var(--info);
            border-color: rgba(94,127,216,0.22);
        }

        .search-empty {
            text-align: center;
            padding: 16px 10px 4px;
            color: var(--muted);
            font-weight: 800;
        }

        .search-results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .result-item {
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(201,164,107,0.16);
            background: linear-gradient(135deg, rgba(255,255,255,0.70), rgba(247,244,237,0.62));
            box-shadow: 0 8px 18px rgba(120,95,56,0.05);
        }

        .result-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 14px;
            font-weight: 900;
            color: var(--text);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .result-cell {
            border-radius: 14px;
            padding: 10px;
            background: rgba(255,255,255,0.60);
            border: 1px solid rgba(201,164,107,0.12);
            text-align: center;
        }

        .result-cell span {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .result-cell b {
            display: block;
            font-size: 13px;
            font-weight: 900;
            color: var(--text);
            word-break: break-word;
        }

        .highlight {
            background: var(--highlight);
            border-radius: 6px;
            padding: 0 3px;
        }

        .year-card {
            border-radius: 26px;
            margin-bottom: 18px;
            overflow: hidden;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            background: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .year-card.status-paid { border-color: rgba(47,158,111,0.18); }
        .year-card.status-partial { border-color: rgba(195,138,46,0.18); }
        .year-card.status-late { border-color: rgba(204,90,80,0.16); }

        .year-head {
            position: relative;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 66px;
        }

        .year-status {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px rgba(120,95,56,0.08);
        }

        .status-paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.24);
        }

        .status-partial {
            background: rgba(195,138,46,0.12);
            color: var(--warning);
            border: 1px solid rgba(195,138,46,0.24);
        }

        .status-late {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.22);
        }

        .year-title {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .year-chip {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 20px;
            font-weight: 900;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 1px;
        }

        .year-chip.paid {
            color: var(--success);
            background: linear-gradient(135deg, rgba(47,158,111,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(47,158,111,0.35);
        }

        .year-chip.partial {
            color: var(--warning);
            background: linear-gradient(135deg, rgba(195,138,46,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(195,138,46,0.30);
        }

        .year-chip.late {
            color: var(--danger);
            background: linear-gradient(135deg, rgba(204,90,80,0.12), rgba(255,255,255,0.25));
            border: 1px solid rgba(204,90,80,0.30);
        }

        .year-body {
            padding: 0 16px 16px;
        }

        .year-summary-only {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .summary-box {
            padding: 14px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(201,164,107,0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 18px rgba(120,95,56,0.08);
        }

        .summary-box span {
            display: block;
            color: #7a6c59;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .summary-box b {
            display: block;
            font-size: 18px;
            font-weight: 900;
        }

        .summary-opening {
            background: linear-gradient(135deg, rgba(201,164,107,0.14), rgba(255,255,255,0.25));
        }

        .summary-debit {
            background: linear-gradient(135deg, rgba(204,90,80,0.14), rgba(255,255,255,0.25));
        }

        .summary-debit b { color: var(--danger); }

        .summary-credit {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
        }

        .summary-credit b { color: var(--success); }

        .summary-balance.ok {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
        }

        .summary-balance.due {
            background: linear-gradient(135deg, rgba(204,90,80,0.14), rgba(255,255,255,0.25));
        }

        .summary-balance.ok b { color: var(--success); }
        .summary-balance.due b { color: var(--danger); }

        .empty-state {
            border-radius: 24px;
            padding: 28px 18px;
            text-align: center;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(201,164,107,0.16);
            color: var(--muted);
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(120,95,56,0.05);
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: nowrap;
        }

        .back-btn,
        .save-btn {
            flex: 1;
            max-width: 200px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-size: 15px;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media screen and (max-width: 980px) {
            .year-summary-only,
            .result-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            .statement-header h1 { font-size: 22px; }
            .year-head { min-height: 58px; padding: 14px 12px; }
            .year-status {
                left: 12px;
                font-size: 11px;
                padding: 7px 12px;
            }
            .year-chip { font-size: 17px; }
            .bottom-actions { flex-wrap: nowrap; }
            .back-btn, .save-btn { width: auto; flex: 1; font-size: 14px; }
        }

        @media screen and (max-width: 560px) {
            .year-summary-only,
            .result-grid {
                grid-template-columns: 1fr;
            }

            .header-meta,
            .search-row {
                flex-direction: column;
            }

            .search-input-wrap,
            .search-btn,
            .clear-btn {
                width: 100%;
            }
        }

        @page {
            size: A4 portrait;
            margin: 10mm;
        }

        @media print {
            body {
                background: white !important;
                opacity: 1 !important;
                transform: none !important;
                padding: 0 !important;
                color: var(--text) !important;
            }

            .bottom-actions,
            #loader,
            .search-card,
            .search-results-card {
                display: none !important;
            }

            .wrap {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .year-card,
            .statement-header {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="statement-header">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">-</h2>
            <div class="header-meta">
                <span class="chip" id="statement_tenant_code">-</span>
                <span class="chip" id="statement_date">-</span>
            </div>
        </div>

        <div class="search-card">
            <div class="search-title">بحث عن السند أو التاريخ</div>
            <div class="search-row">
                <div class="search-input-wrap">
                    <input
                        id="receipt_search"
                        class="search-input"
                        type="text"
                        placeholder="ابحث برقم السند أو التاريخ"
                    />
                </div>
                <button id="search_btn" class="search-btn" type="button">بحث</button>
                <button id="clear_search_btn" class="clear-btn" type="button">مسح</button>
            </div>
            <div class="search-hint">
                مثال: 878 أو 01/01/2026 أو 2026-01-01
            </div>
        </div>

        <div id="search_results_card" class="search-results-card">
            <div class="search-results-head">
                <div class="search-results-title" id="search_results_title">نتائج البحث</div>
                <div id="search_status_badge" class="search-status-badge found">موجود</div>
            </div>
            <div id="search_results_body"></div>
        </div>

        <div id="years_container"></div>

        <div class="bottom-actions">
            <button class="back-btn" onclick="window.history.back()">رجوع</button>
            <button class="save-btn" type="button" onclick="window.print()">حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const urlParams = new URLSearchParams(window.location.search);
        const tenantFromURL = urlParams.get('tenant');
        const tenantFromStorage = localStorage.getItem('jabri_tenant_code');
        const tenantCode = (tenantFromURL || tenantFromStorage || '').trim();

        const supabase = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let ALL_TRANSACTIONS = [];
        let ALL_SUMMARIES = [];

        function toNumber(v) {
            return parseFloat(String(v ?? '').replace(/,/g, '')) || 0;
        }

        function formatCurrency(v) {
            return String(Number(toNumber(v).toFixed(2)).toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }));
        }

        function formatShortDate(dateValue) {
            if (!dateValue) return '-';
            const d = new Date(dateValue);
            if (!isNaN(d)) {
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                return `${day}/${month}/${year}`;
            }

            const raw = String(dateValue);
            const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (iso) {
                return `${iso[3]}/${iso[2]}/${iso[1]}`;
            }

            return raw;
        }

        function formatLastUpdate() {
            const now = new Date();
            return `تاريخ الإصدار: ${now.toLocaleDateString('en-GB')} - ${now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            })}`;
        }

        function escapeHtml(text = '') {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeRegex(text = '') {
            return String(text).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightMatch(value, query) {
            const safeValue = String(value ?? '');
            const cleanedQuery = String(query || '').trim();
            if (!cleanedQuery) return escapeHtml(safeValue);

            const escapedValue = escapeHtml(safeValue);
            const regex = new RegExp(`(${escapeRegex(cleanedQuery)})`, 'ig');
            return escapedValue.replace(regex, '<span class="highlight">$1</span>');
        }

        function getStatus(totalCredit, finalBalance) {
            if (toNumber(finalBalance) <= 0) {
                return { text: 'مسدد', className: 'status-paid', chip: 'paid' };
            }
            if (toNumber(totalCredit) > 0) {
                return { text: 'جزئي', className: 'status-partial', chip: 'partial' };
            }
            return { text: 'متأخر', className: 'status-late', chip: 'late' };
        }

        function getBalanceBoxClass(balance) {
            return toNumber(balance) <= 0 ? 'ok' : 'due';
        }

        function normalizeSearchText(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .replace(/\s+/g, ' ')
                .replace(/[-_.]/g, '/');
        }

        function extractDateParts(rawDate) {
            const raw = String(rawDate || '').trim();
            if (!raw) {
                return {
                    raw: '',
                    rawNormalized: '',
                    year: '',
                    month: '',
                    month2: '',
                    day: '',
                    day2: '',
                    dateFormats: []
                };
            }

            const parsed = new Date(raw);
            let year = '';
            let month = '';
            let day = '';

            if (!isNaN(parsed)) {
                year = String(parsed.getFullYear());
                month = String(parsed.getMonth() + 1);
                day = String(parsed.getDate());
            } else {
                const isoMatch = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                const slashMatch = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);

                if (isoMatch) {
                    year = isoMatch[1];
                    month = String(Number(isoMatch[2]));
                    day = String(Number(isoMatch[3]));
                } else if (slashMatch) {
                    day = String(Number(slashMatch[1]));
                    month = String(Number(slashMatch[2]));
                    year = slashMatch[3];
                }
            }

            const month2 = month ? month.padStart(2, '0') : '';
            const day2 = day ? day.padStart(2, '0') : '';

            const dateFormats = [
                raw,
                `${day}/${month}/${year}`,
                `${day2}/${month2}/${year}`,
                `${day}/${month2}/${year}`,
                `${day2}/${month}/${year}`,
                `${year}/${month}/${day}`,
                `${year}/${month2}/${day2}`,
                `${year}-${month2}-${day2}`,
                `${year}-${month}-${day}`
            ]
                .map(v => normalizeSearchText(v))
                .filter(Boolean);

            return {
                raw,
                rawNormalized: normalizeSearchText(raw),
                year,
                month,
                month2,
                day,
                day2,
                dateFormats
            };
        }

        function transactionMatchesQuery(item, rawQuery) {
            const q = normalizeSearchText(rawQuery);
            if (!q) return false;

            const dateParts = extractDateParts(item.date);
            const receiptField = normalizeSearchText(item.receipt_no || '');

            const matchDate = dateParts.dateFormats.some(field => field.includes(q) || q.includes(field));
            const matchReceipt = receiptField.includes(q) || q.includes(receiptField);

            return matchDate || matchReceipt;
        }

        function buildYearCard(summary) {
            const totalCredit = toNumber(summary?.total_credit || 0);
            const finalBalance = toNumber(summary?.final_balance || 0);
            const status = getStatus(totalCredit, finalBalance);

            return `
                <div class="year-card ${status.className}">
                    <div class="year-head">
                        <div class="year-status ${status.className}">${status.text}</div>
                        <div class="year-title">
                            <span class="year-chip ${status.chip}">${summary.year}</span>
                        </div>
                    </div>

                    <div class="year-body">
                        <div class="year-summary-only">
                            <div class="summary-box summary-opening">
                                <span>الرصيد السابق</span>
                                <b>${formatCurrency(summary.opening_balance)}</b>
                            </div>
                            <div class="summary-box summary-debit">
                                <span>مدين السنة</span>
                                <b>${formatCurrency(summary.total_debit)}</b>
                            </div>
                            <div class="summary-box summary-credit">
                                <span>دائن السنة</span>
                                <b>${formatCurrency(summary.total_credit)}</b>
                            </div>
                            <div class="summary-box summary-balance ${getBalanceBoxClass(summary.final_balance)}">
                                <span>رصيد آخر السنة</span>
                                <b>${formatCurrency(summary.final_balance)}</b>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderView() {
            const container = document.getElementById('years_container');

            if (!ALL_SUMMARIES.length) {
                container.innerHTML = `<div class="empty-state">لا توجد بيانات لعرض كشف الحساب.</div>`;
                return;
            }

            container.innerHTML = [...ALL_SUMMARIES]
                .sort((a, b) => Number(a.year) - Number(b.year))
                .map(summary => buildYearCard(summary))
                .join('');
        }

        function setSearchStatus(type, text) {
            const badge = document.getElementById('search_status_badge');
            badge.className = `search-status-badge ${type}`;
            badge.textContent = text;
        }

        function clearSearchResults() {
            const card = document.getElementById('search_results_card');
            const body = document.getElementById('search_results_body');
            const title = document.getElementById('search_results_title');

            title.textContent = 'نتائج البحث';
            body.innerHTML = '';
            card.classList.remove('active');
        }

        function renderSearchResults(query) {
            const q = normalizeSearchText(query);
            const card = document.getElementById('search_results_card');
            const body = document.getElementById('search_results_body');
            const title = document.getElementById('search_results_title');

            if (!q) {
                clearSearchResults();
                return;
            }

            const results = ALL_TRANSACTIONS.filter(item => transactionMatchesQuery(item, q));
            const cleanedQuery = query.trim();

            title.textContent = `نتائج البحث عن: ${cleanedQuery}`;

            if (!results.length) {
                setSearchStatus('not-found', 'غير موجود');
                body.innerHTML = `
                    <div class="search-empty">
                        لم يتم العثور على أي حركة مطابقة.
                    </div>
                `;
                card.classList.add('active');
                return;
            }

            if (results.length === 1) {
                setSearchStatus('found', 'موجود ومحتسب');
            } else {
                setSearchStatus('multi', `${results.length} نتائج`);
            }

            body.innerHTML = `
                <div class="search-results-grid">
                    ${results.map(item => {
                        return `
                            <div class="result-item">
                                <div class="result-top">
                                    <div class="result-title">حركة مالية</div>
                                    <span class="chip">مطابقة</span>
                                </div>

                                <div class="result-grid">
                                    <div class="result-cell">
                                        <span>التاريخ</span>
                                        <b>${highlightMatch(formatShortDate(item.date), cleanedQuery)}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>رقم السند</span>
                                        <b>${highlightMatch(item.receipt_no || '—', cleanedQuery)}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>مدين</span>
                                        <b>${toNumber(item.debit) ? formatCurrency(item.debit) : '—'}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>دائن</span>
                                        <b>${toNumber(item.credit) ? formatCurrency(item.credit) : '—'}</b>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            card.classList.add('active');
        }

        function bindSearchEvents() {
            const input = document.getElementById('receipt_search');
            const searchBtn = document.getElementById('search_btn');
            const clearBtn = document.getElementById('clear_search_btn');

            searchBtn.addEventListener('click', () => {
                renderSearchResults(input.value);
            });

            clearBtn.addEventListener('click', () => {
                input.value = '';
                clearSearchResults();
                input.focus();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    renderSearchResults(input.value);
                }
            });

            input.addEventListener('input', () => {
                if (!input.value.trim()) {
                    clearSearchResults();
                }
            });
        }

        async function loadTenantName() {
            try {
                const { data, error } = await supabase
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .maybeSingle();

                if (error) {
                    console.warn('TENANT QUERY WARNING:', error);
                    return;
                }

                document.getElementById('statement_tenant_name').innerText =
                    data?.tenant_name ||
                    data?.name ||
                    tenantCode;
            } catch (err) {
                console.warn('TENANT NAME LOAD WARNING:', err);
            }
        }

        async function loadTransactions() {
            try {
                const { data, error } = await supabase
                    .from('tenant_transactions')
                    .select('date, debit, credit, receipt_no')
                    .eq('tenant_code', tenantCode)
                    .order('date', { ascending: true });

                if (error) {
                    console.warn('TX QUERY WARNING:', error);
                    ALL_TRANSACTIONS = [];
                    return;
                }

                ALL_TRANSACTIONS = Array.isArray(data) ? data : [];
            } catch (err) {
                console.warn('TX LOAD WARNING:', err);
                ALL_TRANSACTIONS = [];
            }
        }

        async function loadSummaries() {
            const { data, error } = await supabase
                .from('tenant_yearly_summary')
                .select('*')
                .eq('tenant_code', tenantCode)
                .order('year', { ascending: true });

            if (error) throw error;
            ALL_SUMMARIES = Array.isArray(data) ? data : [];
        }

        async function init() {
            if (!tenantCode) {
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.getElementById('years_container').innerHTML = `<div class="empty-state">لم يتم العثور على كود المستأجر.</div>`;
                return;
            }

            document.getElementById('statement_tenant_code').innerText = `كود المستأجر: ${tenantCode}`;
            document.getElementById('statement_date').innerText = formatLastUpdate();
            document.getElementById('statement_tenant_name').innerText = tenantCode;

            try {
                await Promise.all([
                    loadTenantName(),
                    loadTransactions(),
                    loadSummaries()
                ]);

                bindSearchEvents();
                renderView();

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            } catch (e) {
                console.error('STATEMENT ERROR:', e);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.getElementById('years_container').innerHTML = `
                    <div class="empty-state">
                        حدث خطأ أثناء تحميل كشف الحساب.
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
