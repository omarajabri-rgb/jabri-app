<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>كشف حساب</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --accent:#c9a46b;
  --accent-dark:#9a6b2f;
  --text:#182033;
  --muted:#7c879c;
  --navy:#1d2940;
  --date-color:#1d2940;
  --table-line:#e9edf5;
  --line:rgba(255,255,255,0.44);
  --glass:rgba(255,255,255,0.64);
  --shadow:0 14px 40px rgba(18,26,43,0.08);
  --shadow-soft:0 8px 22px rgba(18,26,43,0.06);
  --green:#16a34a;
  --red:#dc2626;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.55), transparent 30%),
    radial-gradient(circle at 85% 12%, rgba(255,255,255,0.42), transparent 26%),
    linear-gradient(135deg,#edf2f7,#f7f9fc);
  position:relative;
  overflow-x:hidden;
}

body::before,
body::after{
  content:"";
  position:fixed;
  pointer-events:none;
  z-index:0;
  filter:blur(18px);
  opacity:.55;
}

body::before{
  width:260px;
  height:260px;
  top:70px;
  left:-60px;
  border-radius:50%;
  background:rgba(201,164,107,0.14);
}

body::after{
  width:240px;
  height:240px;
  bottom:80px;
  right:-70px;
  border-radius:50%;
  background:rgba(64,110,255,0.08);
}

body.spring-theme{
  background:
    radial-gradient(circle at 16% 20%, rgba(255,255,255,0.55), transparent 30%),
    radial-gradient(circle at 85% 12%, rgba(213,255,230,0.26), transparent 24%),
    linear-gradient(135deg,#edf7f1,#f8fbfc);
}

body.spring-theme::before{
  background:rgba(126,211,161,0.18);
}

body.spring-theme::after{
  background:rgba(201,164,107,0.10);
}

body.summer-theme{
  background:
    radial-gradient(circle at 16% 20%, rgba(255,255,255,0.56), transparent 28%),
    radial-gradient(circle at 85% 12%, rgba(255,233,196,0.28), transparent 22%),
    linear-gradient(135deg,#f7f1e8,#fbfcfe);
}

body.summer-theme::before{
  background:rgba(201,164,107,0.18);
}

body.summer-theme::after{
  background:rgba(255,210,145,0.12);
}

body.autumn-theme{
  background:
    radial-gradient(circle at 16% 20%, rgba(255,255,255,0.52), transparent 28%),
    radial-gradient(circle at 85% 12%, rgba(255,214,176,0.26), transparent 22%),
    linear-gradient(135deg,#f7efe8,#fbfcfe);
}

body.autumn-theme::before{
  background:rgba(181,112,58,0.14);
}

body.autumn-theme::after{
  background:rgba(201,164,107,0.12);
}

body.winter-theme{
  background:
    radial-gradient(circle at 16% 20%, rgba(255,255,255,0.50), transparent 30%),
    radial-gradient(circle at 85% 12%, rgba(209,226,255,0.26), transparent 24%),
    linear-gradient(135deg,#edf3fb,#f7f9fc);
}

body.winter-theme::before{
  background:rgba(139,177,255,0.14);
}

body.winter-theme::after{
  background:rgba(201,164,107,0.08);
}

.app{
  position:relative;
  z-index:1;
  width:min(100%, 980px);
  margin:auto;
  padding:18px 14px 24px;
}

.card,
.year-card,
.empty-box{
  background:var(--glass);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
}

.card{
  padding:22px 16px 18px;
  margin-bottom:16px;
  text-align:center;
}

.tenant-title{
  margin:0;
  font-size:23px;
  font-weight:900;
  color:var(--navy);
  letter-spacing:.2px;
}

.tenant-title::after{
  content:"";
  display:block;
  width:42px;
  height:2px;
  border-radius:2px;
  margin:10px auto 0;
  background:var(--accent);
  box-shadow:0 0 10px rgba(201,164,107,0.28);
}

.statement-title{
  margin:10px 0 0;
  font-size:14px;
  font-weight:800;
  color:var(--accent-dark);
}

.debug{
  font-size:11px;
  color:var(--muted);
  margin-top:8px;
}

.year-card{
  position:relative;
  padding:16px 14px 14px;
  margin-bottom:16px;
  overflow:hidden;
}

.year-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.year-title{
  background:linear-gradient(135deg,var(--navy),#263653);
  color:#fff;
  padding:9px 16px;
  border-radius:999px;
  font-weight:900;
  display:inline-block;
  box-shadow:0 8px 18px rgba(29,41,64,0.16);
}

.year-status{
  padding:7px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  box-shadow:var(--shadow-soft);
}

.status-full{
  background:#eafaf0;
  color:var(--green);
  border:1px solid #cdeed9;
}

.status-partial{
  background:#fff4f4;
  color:var(--red);
  border:1px solid #ffd6d6;
}

.table-wrap{
  overflow:hidden;
  border-radius:18px;
  background:rgba(255,255,255,0.42);
  border:1px solid rgba(255,255,255,0.28);
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  margin-top:0;
}

th,td{
  padding:8px 4px;
  font-size:11px;
  border-bottom:1px solid var(--table-line);
  text-align:center;
  white-space:nowrap;
  vertical-align:middle;
}

th{
  background:rgba(244,246,251,0.92);
  font-weight:900;
  color:var(--navy);
  position:sticky;
  top:0;
  z-index:1;
}

th:nth-child(1), td:nth-child(1){ width:21%; }
th:nth-child(2), td:nth-child(2){ width:13%; }
th:nth-child(3), td:nth-child(3){ width:13%; }
th:nth-child(4), td:nth-child(4){ width:16%; }
th:nth-child(5), td:nth-child(5){ width:25%; }
th:nth-child(6), td:nth-child(6){ width:12%; }

td:nth-child(5){
  white-space:normal;
  line-height:1.28;
  font-weight:700;
  word-break:break-word;
}

tbody tr{
  opacity:0;
  transform:translateY(8px);
  animation:rowFadeIn .45s ease forwards;
  transition:background .18s ease, transform .18s ease, box-shadow .18s ease;
}

tbody tr:nth-child(1){ animation-delay:.03s; }
tbody tr:nth-child(2){ animation-delay:.06s; }
tbody tr:nth-child(3){ animation-delay:.09s; }
tbody tr:nth-child(4){ animation-delay:.12s; }
tbody tr:nth-child(5){ animation-delay:.15s; }
tbody tr:nth-child(6){ animation-delay:.18s; }
tbody tr:nth-child(7){ animation-delay:.21s; }
tbody tr:nth-child(8){ animation-delay:.24s; }
tbody tr:nth-child(9){ animation-delay:.27s; }
tbody tr:nth-child(10){ animation-delay:.30s; }
tbody tr:nth-child(11){ animation-delay:.33s; }
tbody tr:nth-child(12){ animation-delay:.36s; }

tbody tr:hover{
  background:rgba(201,164,107,0.05);
}

tbody tr:active{
  transform:scale(0.992);
  background:rgba(201,164,107,0.10);
}

.debit{
  color:#e05252;
  font-weight:900;
}

.credit{
  color:#18a957;
  font-weight:900;
}

.balance{
  font-weight:900;
  color:var(--navy);
  transition:color .18s ease, transform .18s ease, text-shadow .18s ease;
}

.balance-due{
  color:var(--red);
}

.balance-paid,
.balance-zero{
  color:var(--green);
}

tbody tr:hover .balance,
tbody tr:active .balance{
  transform:scale(1.03);
}

tbody tr:hover .balance-due,
tbody tr:active .balance-due{
  text-shadow:0 0 10px rgba(220,38,38,0.16);
}

tbody tr:hover .balance-paid,
tbody tr:active .balance-paid,
tbody tr:hover .balance-zero,
tbody tr:active .balance-zero{
  text-shadow:0 0 10px rgba(22,163,74,0.12);
}

.date-col{
  color:var(--date-color) !important;
}

th.date-col{
  color:var(--date-color) !important;
  font-weight:900;
}

td.date-col{
  color:var(--date-color) !important;
  font-weight:800;
}

.chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 8px;
  border-radius:999px;
  font-size:9px;
  font-weight:800;
  background:rgba(255,255,255,0.74);
  border:1px solid rgba(255,255,255,0.46);
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.chip-date{
  color:var(--date-color);
}

.chip-receipt{
  color:var(--accent-dark);
  border:1px solid rgba(201,164,107,0.26);
  background:rgba(201,164,107,0.10);
  min-width:48px;
  font-size:8.5px;
  padding:4px 7px;
  letter-spacing:.2px;
}

.carry-row{
  background:rgba(29,41,64,0.045);
}

.payment-row td{
  transition:background .2s ease, color .2s ease;
}

.payment-row:hover td,
.payment-row:active td{
  background:rgba(22,163,74,0.04);
}

.payment-row:hover .credit,
.payment-row:active .credit{
  animation:creditPulse .55s ease;
}

.latest-payment td{
  background:rgba(22,163,74,0.07) !important;
}

.latest-payment td:first-child{
  position:relative;
}

.latest-payment td:first-child::before{
  content:"";
  position:absolute;
  right:2px;
  top:50%;
  transform:translateY(-50%);
  width:5px;
  height:68%;
  border-radius:999px;
  background:#16a34a;
  box-shadow:0 0 12px rgba(22,163,74,0.28);
}

.latest-payment .credit{
  text-shadow:0 0 10px rgba(22,163,74,0.14);
}

.latest-payment .chip-date,
.latest-payment .chip-receipt{
  border-color:rgba(22,163,74,0.20);
}

.summary-line{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.mini-stat{
  padding:13px 10px;
  border-radius:18px;
  text-align:center;
  font-weight:900;
  border:1px solid rgba(255,255,255,0.30);
  box-shadow:var(--shadow-soft);
  transition:transform .18s ease, box-shadow .18s ease;
}

.mini-stat:hover{
  transform:translateY(-1px);
}

.mini-stat .mini-label{
  display:block;
  font-size:12px;
  margin-bottom:5px;
  font-weight:800;
}

.mini-stat .mini-value{
  display:block;
  font-size:17px;
  font-weight:900;
}

.mini-stat.debit-stat{
  background:linear-gradient(180deg,#ffe5e5 0%, #ffdada 100%);
  border:1px solid #ffcaca;
  box-shadow:0 8px 18px rgba(220,38,38,0.12), 0 0 0 rgba(220,38,38,0);
}

.mini-stat.debit-stat .mini-label{
  color:#b91c1c;
}

.mini-stat.debit-stat .mini-value{
  color:#dc2626;
}

.mini-stat.credit-stat{
  background:linear-gradient(180deg,#f2fff7 0%, #e9fbf0 100%);
  border:1px solid #cdeed9;
  box-shadow:0 8px 18px rgba(22,163,74,0.10), 0 0 0 rgba(22,163,74,0);
}

.mini-stat.credit-stat .mini-label,
.mini-stat.credit-stat .mini-value{
  color:#16a34a;
}

.mini-stat.balance-stat{
  border:1px solid #ecd9ad;
  box-shadow:0 8px 18px rgba(201,164,107,0.10);
}

.balance-due-box{
  background:linear-gradient(180deg,#fff1f1 0%, #ffe5e5 100%);
  border-color:#ffd6d6;
  box-shadow:0 8px 18px rgba(220,38,38,0.12), 0 0 14px rgba(220,38,38,0.08);
}

.balance-due-box .mini-label,
.balance-due-box .mini-value{
  color:#dc2626;
}

.balance-paid-box{
  background:linear-gradient(180deg,#fffaf1 0%, #fdf2dd 100%);
  border-color:#ecd9ad;
  box-shadow:0 8px 18px rgba(201,164,107,0.10), 0 0 12px rgba(201,164,107,0.10);
}

.balance-paid-box .mini-label,
.balance-paid-box .mini-value{
  color:var(--accent-dark);
}

.glow-red{
  box-shadow:0 8px 18px rgba(220,38,38,0.12), 0 0 16px rgba(220,38,38,0.12);
}

.glow-green{
  box-shadow:0 8px 18px rgba(22,163,74,0.10), 0 0 14px rgba(22,163,74,0.10);
}

.glow-gold{
  box-shadow:0 8px 18px rgba(201,164,107,0.10), 0 0 14px rgba(201,164,107,0.12);
}

.bottom-actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

button{
  flex:1;
  height:48px;
  border:none;
  border-radius:16px;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
  transition:transform .22s ease, opacity .22s ease, box-shadow .22s ease;
  box-shadow:var(--shadow-soft);
}

button:hover{
  transform:translateY(-2px);
  opacity:.96;
}

.save-btn{
  background:linear-gradient(135deg,var(--accent),#d7b783);
  color:#fff;
}

.back-btn{
  background:linear-gradient(135deg,var(--navy),#2b3a58);
  color:#fff;
}

.empty-box{
  padding:24px 16px;
  text-align:center;
  color:#777;
  font-weight:900;
}

@keyframes creditPulse{
  0%{
    transform:scale(1);
    opacity:1;
  }
  40%{
    transform:scale(1.08);
    opacity:.88;
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

@keyframes countUpFade{
  0%{
    opacity:.2;
    transform:translateY(8px);
  }
  100%{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes rowFadeIn{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.count-up{
  animation:countUpFade .45s ease;
}

@media (max-width:480px){
  .app{
    padding:14px 10px 22px;
  }

  .tenant-title{
    font-size:21px;
  }

  .debug{
    display:none;
  }

  th,td{
    font-size:10px;
    padding:7px 3px;
  }

  .chip{
    padding:3px 6px;
    font-size:8px;
  }

  .chip-date{
    padding:3px 5px;
    font-size:8px;
  }

  .chip-receipt{
    padding:3px 5px;
    font-size:7.5px;
    min-width:42px;
  }

  .summary-line{
    gap:8px;
  }

  .mini-stat{
    padding:11px 7px;
    border-radius:16px;
  }

  .mini-stat .mini-label{
    font-size:11px;
  }

  .mini-stat .mini-value{
    font-size:14px;
  }

  button{
    font-size:14px;
    height:46px;
  }
}

@media (min-width:768px) and (max-width:1024px){
  .app{
    width:min(100%, 820px);
    padding:22px 20px 28px;
  }

  .card{
    padding:26px 22px 20px;
  }

  .tenant-title{
    font-size:28px;
  }

  .statement-title{
    font-size:16px;
  }

  .year-card{
    padding:20px 18px 18px;
  }

  .year-title{
    font-size:18px;
    padding:10px 18px;
  }

  .year-status{
    font-size:13px;
    padding:8px 16px;
  }

  th,td{
    padding:10px 6px;
    font-size:12px;
  }

  .chip{
    font-size:10px;
    padding:5px 8px;
  }

  .chip-date{
    font-size:9px;
    padding:4px 7px;
  }

  .chip-receipt{
    font-size:9px;
    padding:4px 7px;
    min-width:52px;
  }

  .mini-stat .mini-value{
    font-size:19px;
  }

  button{
    height:52px;
    font-size:17px;
  }
}

@media (min-width:1025px){
  .app{
    width:min(100%, 980px);
  }

  th,td{
    font-size:12px;
    padding:10px 6px;
  }

  .chip{
    font-size:10px;
  }

  .mini-stat .mini-value{
    font-size:19px;
  }
}

@media print{
  body::before,
  body::after,
  .bottom-actions,
  .debug{
    display:none !important;
  }

  body{
    background:#fff !important;
  }

  .app{
    max-width:100%;
    width:100%;
    padding:0;
  }

  .card,
  .year-card{
    box-shadow:none !important;
    background:#fff !important;
    border:1px solid #eee !important;
  }

  .mini-stat,
  .chip{
    box-shadow:none !important;
  }
}
</style>
</head>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

function normalizeText(v){
  return String(v || "").trim()
}

function cleanNum(v){
  if(typeof v === "number") return Number.isFinite(v) ? v : 0
  if(v === null || v === undefined || v === "" || v === "NaN") return 0
  const cleaned = String(v).replace(/[^\d.-]/g, "")
  const n = parseFloat(cleaned)
  return Number.isFinite(n) ? n : 0
}

function num(v){
  const n = Number(v)
  return Number.isFinite(n) ? n : 0
}

function formatDate(d){
  const x = new Date(d)
  return isNaN(x.getTime()) ? "-" : x.toLocaleDateString("en-GB")
}

function formatNumber(v){
  return num(v).toLocaleString("en-US")
}

function formatBalanceNumber(v){
  return Math.abs(num(v)).toLocaleString("en-US")
}

function isNumericText(v){
  return /^-?\d+(\.\d+)?$/.test(normalizeText(v))
}

function isCarryDescription(desc){
  return normalizeText(desc).includes("رصيد")
}

function isPaymentReceipt(receipt){
  const t = normalizeText(receipt)
  return (
    t.includes("نقد") ||
    t.includes("شيك") ||
    t.includes("تحويل") ||
    t.includes("حوال") ||
    t.includes("دفعة")
  )
}

function getTenantCode(){
  const params = new URLSearchParams(window.location.search)

  let code =
    params.get("tenant") ||
    params.get("tenant_code") ||
    params.get("code") ||
    localStorage.getItem("jabri_tenant_code") ||
    localStorage.getItem("tenant_code") ||
    localStorage.getItem("tenantCode")

  if(code && code.trim()) return code.trim()

  const keys = ["tenant","user","currentTenant","loggedTenant"]

  for(const k of keys){
    try{
      const obj = JSON.parse(localStorage.getItem(k))
      if(obj){
        const c = obj.tenant_code || obj.code || obj.id
        if(c) return String(c).trim()
      }
    }catch(e){}
  }

  return ""
}

function normalizeRow(r){
  let description = normalizeText(r.description)
  let receiptNo = normalizeText(r.receipt_no || "-")
  let debit = cleanNum(r.debit)
  let credit = cleanNum(r.credit)

  const rowDate = new Date(r.date)
  const rowYear = isNaN(rowDate.getTime()) ? "" : rowDate.getFullYear()

  const shiftedNumber = isNumericText(description) && debit === 0 && credit === 0
  const receiptLooksPayment = isPaymentReceipt(receiptNo)

  if(shiftedNumber){
    const amount = cleanNum(description)

    if(receiptLooksPayment){
      credit = amount
      debit = 0
      description = "دفعة من الإيجار"
      receiptNo = "-"
    } else {
      debit = amount
      credit = 0

      if(amount === 36){
        description = `معارف ${rowYear}`
      } else if(amount === 1800){
        description = `إيجار لعام ${rowYear}`
      } else {
        description = `رصيد سابق عام ${rowYear - 1}`
      }
    }
  }

  return {
    ...r,
    description,
    receipt_no: receiptNo,
    debitVal: num(debit),
    creditVal: num(credit)
  }
}

function getRowOrder(desc, date, debitVal){
  const text = normalizeText(desc)
  const debit = num(debitVal)

  const isCarry = text.includes("رصيد")
  const isRent = text.includes("إيجار") || text.includes("ايجار")
  const isFee = text.includes("معارف")

  if(debit > 0){
    if(isCarry) return 1
    if(isRent) return 2
    if(isFee) return 3
    return 4
  }

  return 5
}

function getBalanceClass(balance){
  if(Math.abs(balance) < 0.01) return "balance balance-zero"
  if(balance > 0) return "balance balance-due"
  return "balance balance-paid"
}

function getYearStatus(balance){
  if(Math.abs(balance) < 0.01){
    return { text:"مكتمل", class:"status-full" }
  }
  return { text:"جزئي", class:"status-partial" }
}

function getSeasonClass(){
  const month = new Date().getMonth() + 1
  if([3,4,5].includes(month)) return "spring-theme"
  if([6,7,8].includes(month)) return "summer-theme"
  if([9,10,11].includes(month)) return "autumn-theme"
  return "winter-theme"
}

function setSeasonTheme(){
  document.body.classList.add(getSeasonClass())
}

function animateCount(el, endValue){
  const finalValue = Number(endValue) || 0
  const duration = 700
  const start = performance.now()

  function frame(now){
    const progress = Math.min((now - start) / duration, 1)
    const current = Math.round(finalValue * progress)
    el.textContent = current.toLocaleString("en-US")
    if(progress < 1){
      requestAnimationFrame(frame)
    } else {
      el.textContent = finalValue.toLocaleString("en-US")
    }
  }

  requestAnimationFrame(frame)
}

function runCountUp(){
  document.querySelectorAll(".count-up").forEach(el => {
    const value = Number(el.dataset.value || 0)
    animateCount(el, value)
  })
}

async function load(){
  const container = document.getElementById("container")
  const tenantName = document.getElementById("tenantName")
  const debug = document.getElementById("debug")

  const tenant = "JC-02"

const { data: tenantData, error } = await supabase
  .from('tenants')
  .select('tenant_name')
  .eq('tenant_code', tenant)
  .single()

if(error){
  console.log(error)
}

debug.innerText = "tenant code: [" + tenant + "]"
  if(!tenant){
    container.innerHTML = "<div class='empty-box'>❌ لا يوجد tenant code</div>"
    return
  }

  tenantName.innerText = tenantData?.tenant_name || tenant

  const { data, error } = await supabase
    .from("tenant_transactions")
    .select("*")
    .eq("tenant_code", tenant)
    .order("date", { ascending: true })

  if(error){
    container.innerHTML = `<div class="empty-box">${error.message}</div>`
    return
  }

  debug.innerText += " | rows: " + (data ? data.length : 0)

  if(!data || data.length === 0){
    container.innerHTML = "<div class='empty-box'>⚠️ لا يوجد بيانات</div>"
    return
  }

  const grouped = {}

  data.forEach(r => {
    const fixed = normalizeRow(r)
    const rowDate = new Date(fixed.date)
    const displayYear = rowDate.getFullYear()

    if(!grouped[displayYear]) grouped[displayYear] = []
    grouped[displayYear].push(fixed)
  })

  let html = ""

  Object.keys(grouped).sort((a,b) => Number(a) - Number(b)).forEach(year => {
    let yearRows = grouped[year]

    yearRows.sort((a, b) => {
      const oa = getRowOrder(a.description, a.date, a.debitVal)
      const ob = getRowOrder(b.description, b.date, b.debitVal)

      if(oa !== ob) return oa - ob

      const da = new Date(a.date).getTime()
      const db = new Date(b.date).getTime()
      return da - db
    })

    let balance = 0
    let debitTotal = 0
    let creditTotal = 0

    const paymentRows = yearRows
      .map((r, idx) => ({ r, idx }))
      .filter(item => normalizeText(item.r.description).includes("دفعة"))

    const latestPaymentIndex = paymentRows.length
      ? paymentRows[paymentRows.length - 1].idx
      : -1

    const rows = yearRows.map((r, i) => {
      const debit = num(r.debitVal)
      const credit = num(r.creditVal)
      const desc = normalizeText(r.description)

      if(i === 0 && desc.includes("رصيد")){
        balance = debit
      } else {
        balance += debit - credit
      }

      debitTotal += debit
      creditTotal += credit

      const rowClasses = [
        desc.includes("رصيد") ? "carry-row" : "",
        desc.includes("دفعة") ? "payment-row" : "",
        i === latestPaymentIndex ? "latest-payment" : ""
      ].join(" ").trim()

      return `
        <tr class="${rowClasses}">
          <td class="date-col">
            <span class="chip chip-date">${formatDate(r.date)}</span>
          </td>
          <td class="debit">${debit > 0 ? formatNumber(debit) : "-"}</td>
          <td class="credit">${credit > 0 ? formatNumber(credit) : "-"}</td>
          <td class="${getBalanceClass(balance)}">${formatBalanceNumber(balance)}</td>
          <td>${desc || "-"}</td>
          <td>
            <span class="chip chip-receipt">${r.receipt_no || "-"}</span>
          </td>
        </tr>
      `
    }).join("")

    const status = getYearStatus(balance)
    const balanceBoxClass = balance > 0 ? "balance-due-box glow-red" : "balance-paid-box glow-gold"

    html += `
      <div class="year-card">
        <div class="year-head">
          <div class="year-title">سنة ${year}</div>
          <div class="year-status ${status.class}">${status.text}</div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="date-col">التاريخ</th>
                <th>مدين</th>
                <th>دائن</th>
                <th>الرصيد</th>
                <th>البيان</th>
                <th>السند</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>

        <div class="summary-line">
          <div class="mini-stat debit-stat glow-red">
            <span class="mini-label">مدين</span>
            <span class="mini-value count-up" data-value="${debitTotal}">${formatNumber(debitTotal)}</span>
          </div>

          <div class="mini-stat credit-stat glow-green">
            <span class="mini-label">دائن</span>
            <span class="mini-value count-up" data-value="${creditTotal}">${formatNumber(creditTotal)}</span>
          </div>

          <div class="mini-stat balance-stat ${balanceBoxClass}">
            <span class="mini-label">الرصيد</span>
            <span class="mini-value">${formatBalanceNumber(balance)}</span>
          </div>
        </div>
      </div>
    `
  })

  container.innerHTML = html
  runCountUp()
}

window.savePDF = async function(){
  const element = document.querySelector(".app")
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)

  const opt = {
    margin: 0.2,
    filename: 'statement.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  }

  if(isIOS){
    const worker = html2pdf().set(opt).from(element).toPdf()
    const pdf = await worker.get('pdf')
    const blob = pdf.output('blob')
    const url = URL.createObjectURL(blob)
    window.open(url, '_blank')
    return
  }

  html2pdf().set(opt).from(element).save()
}

setSeasonTheme()
load()
</script>
