<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --border: rgba(201,164,107,0.20);
            --text: #2f2a24;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }

        body {
            margin: 0; color: var(--text); padding: 16px; opacity: 0;
            transform: translateY(8px); transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded { opacity: 1; transform: translateY(0); }
        .wrap { max-width: 1120px; margin: 0 auto; padding-bottom: 42px; }

        .statement-header {
            border-radius: 26px; padding: 24px; margin-bottom: 16px; text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            border: 1px solid rgba(201,164,107,0.18); box-shadow: 0 12px 28px rgba(120,95,56,0.08);
        }

        .statement-header h1 { margin: 0 0 8px; font-size: 28px; font-weight: 900; color: var(--gold-deep); }
        #statement_date { color: #7a6c59; font-size: 13px; font-weight: 700; }

        .chip {
            display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 10px; font-weight: 900;
            background: rgba(201,164,107,0.14); color: var(--text); border: 1px solid rgba(201,164,107,0.24);
        }

        .year-card {
            border-radius: 26px; margin-bottom: 24px; overflow: hidden;
            border: 1px solid rgba(201,164,107,0.18); box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            background: linear-gradient(135deg, rgba(252, 251, 246, 0.98), rgba(247, 244, 237, 0.85));
        }

        .year-head { padding: 18px 20px; text-align: center; }
        .year-chip { display: inline-block; padding: 8px 18px; border-radius: 999px; font-size: 20px; font-weight: 900; backdrop-filter: blur(8px); }
        .year-chip.paid { color: var(--success); background: linear-gradient(135deg, rgba(47,158,111,0.15), rgba(255,255,255,0.25)); border: 1px solid rgba(47,158,111,0.35); }
        .year-chip.late { color: var(--danger); background: linear-gradient(135deg, rgba(204,90,80,0.12), rgba(255,255,255,0.25)); border: 1px solid rgba(204,90,80,0.30); }

        .statement-table { width: 100%; border-collapse: collapse; table-layout: auto; background: transparent; }
        .statement-table th { background: #e9e2d5; color: #5f5345; padding: 12px 10px; font-weight: 900; font-size: 11px; }
        .statement-table td { padding: 6px 6px; font-size: 11px; border: 1px solid rgba(201,164,107,0.15); text-align: center; vertical-align: middle; }

        .statement-table tbody tr:nth-child(odd) td { background: rgba(253,251,246,0.70); }
        .statement-table tbody tr:nth-child(even) td { background: rgba(201,164,107,0.04); }

        /* 🔥 تعديلات الحدود النهائية التي طلبتها */
        .statement-table tbody tr:last-child td {
            border-bottom: 2px solid var(--gold) !important;
            box-shadow: inset 0 -1px 0 rgba(201,164,107,0.35);
        }

        .last-row td {
            border-bottom: 2px solid var(--gold) !important;
        }

        .statement-table td:nth-child(2) { color: var(--danger); font-weight: 900; }
        .statement-table td:nth-child(3) { color: var(--success); font-weight: 900; }
        .statement-table td:nth-child(4) { font-size: 12px; font-weight: 900; color: #b0413e; border-left: 1px solid rgba(201,164,107,0.24); }

        .year-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .year-summary-box {
            padding: 14px; border-radius: 18px; text-align: center; border: 1px solid rgba(201,164,107,0.18);
            background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0.25));
            backdrop-filter: blur(12px); box-shadow: 0 8px 18px rgba(120,95,56,0.08);
        }

        .year-summary-box b { display: block; font-size: 18px; font-weight: 900; }
        .year-summary-box.credit-box b { color: var(--success); }
        .year-summary-box.balance-box.paid b { color: var(--success); }
        .year-summary-box.balance-box.late b { color: var(--danger); }

        .bottom-actions { display: flex; justify-content: center; gap: 12px; margin-top: 25px; }
        .back-btn { padding: 12px 20px; border-radius: 14px; font-weight: 900; cursor: pointer; border: 1px solid var(--border); background: #fff; }
        .save-btn { background: #7a6c59; color: white; border: none; }

        #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--gold-deep); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 🔥 تحسينات التصدير الجديدة */
        body.pdf-export .wrap {
            width: 1200px !important;
            margin: auto !important;
        }

        body.pdf-export .statement-table td, 
        body.pdf-export .statement-table th {
            font-size: 12px !important;
        }

        body.pdf-export * {
            animation: none !important;
            transition: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            box-shadow: none !important;
        }

        body.pdf-export .year-card { background: #ffffff !important; border: 1px solid #d8c9af !important; }
        body.pdf-export .bottom-actions, body.pdf-export #loader { display: none !important; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div class="wrap">
        <div class="statement-header">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">-</h2>
            <p id="statement_date">-</p>
        </div>
        <div id="years_container"></div>
        <div class="bottom-actions">
            <button class="back-btn" onclick="window.history.back()">رجوع</button>
            <button class="back-btn save-btn" onclick="savePDF()">حفظ</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        const supabase = createClient('https://gzukfvxcpfblzqyjzkoz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU');

        function toNumber(v) { return parseFloat(String(v).replace(/,/g, '')) || 0; }
        function formatCurrency(v) { return Math.round(v).toLocaleString(); }

        // 🔥 منطق حساب الرصيد الجاري المحدث كما في Excel
        function calculateRunningBalance(rows, initialBalance = 0) {
            let running = initialBalance;
            return rows.sort((a, b) => new Date(a.date) - new Date(b.date)).map(row => {
                const debit = toNumber(row.debit);
                const credit = toNumber(row.credit);
                running = running - credit + debit; // معادلة إكسيل
                return { ...row, debit, credit, balance: running };
            });
        }

        async function init() {
            if (!tenantCode) return;
            try {
                const { data: tenant } = await supabase.from('tenants').select('*').eq('tenant_code', tenantCode).single();
                const { data: tx } = await supabase.from('tenant_transactions').select('*').eq('tenant_code', tenantCode).order('date', { ascending: true });
                document.getElementById('statement_tenant_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('statement_date').innerText = `Last update: ${new Date().toLocaleDateString('en-GB')} - ${new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
                render(toNumber(tenant?.previous_balance), tx || []);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            } catch (e) { console.error(e); }
        }

        function render(prevBal, transactions) {
            const container = document.getElementById('years_container');
            container.innerHTML = '';
            const grouped = {};
            transactions.forEach(t => {
                const y = new Date(t.date).getFullYear();
                if (!grouped[y]) grouped[y] = [];
                grouped[y].push(t);
            });
            const years = Object.keys(grouped).map(Number).sort((a, b) => a - b);
            let carryBalance = prevBal;

            years.forEach(year => {
                const yearRows = grouped[year];
                const openingRent = [], openingFees = [], other = [];

                yearRows.forEach(r => {
                    const d = (r.description || '').trim();
                    const isOp = new Date(r.date).toLocaleDateString('en-GB') === `01/01/${year}`;
                    if (isOp && (d.includes('ايجار') || d.includes('الإيجار'))) openingRent.push(r);
                    else if (isOp && d.includes('معارف')) openingFees.push(r);
                    else other.push(r);
                });

                // تجميع ومعالجة الصفوف بترتيب إكسيل
                let itemsRaw = [...openingRent, ...openingFees];
                if (carryBalance > 0) itemsRaw.push({ date: `${year}-01-01`, description: `رصيد سابق عام ${year-1}`, debit: carryBalance, credit: 0, isCarry: true });
                itemsRaw = [...itemsRaw, ...other];

                const items = calculateRunningBalance(itemsRaw, 0);
                const finalBalance = items.length > 0 ? items[items.length - 1].balance : carryBalance;
                const totalCredit = items.reduce((s, r) => s + (r.isCarry ? 0 : toNumber(r.credit)), 0);
                const isPaid = finalBalance <= 0;

                const card = document.createElement('div');
                card.className = `year-card ${isPaid ? 'status-paid' : 'status-late'}`;
                card.innerHTML = `
                    <div class="year-head"><div class="year-title"><span class="year-chip ${isPaid?'paid':'late'}">${year}</span></div></div>
                    <table class="statement-table">
                        <thead><tr><th>التاريخ</th><th>مدين</th><th>دائن</th><th>الرصيد</th><th>البيان</th><th>سند</th></tr></thead>
                        <tbody id="body-${year}"></tbody>
                    </table>
                    <div class="year-footer">
                        <div class="year-summary-box credit-box"><span>دائن</span><b>${formatCurrency(totalCredit)}</b></div>
                        <div class="year-summary-box balance-box ${isPaid?'paid':'late'}"><span>رصيد السنة</span><b>${formatCurrency(finalBalance)}</b></div>
                    </div>
                `;
                container.appendChild(card);
                const tbody = document.getElementById(`body-${year}`);
                items.forEach((item, idx) => {
                    const tr = document.createElement('tr');
                    if (idx === items.length - 1) tr.className = 'last-row';
                    tr.innerHTML = `
                        <td><span class="chip">${new Date(item.date).toLocaleDateString('en-GB')}</span></td>
                        <td>${item.debit?formatCurrency(item.debit):''}</td>
                        <td>${item.credit?formatCurrency(item.credit):''}</td>
                        <td style="color:${item.balance<=0?'var(--success)':'#b0413e'}">${formatCurrency(item.balance)}</td>
                        <td>${item.description || ''}</td>
                        <td><span class="chip" style="opacity:${!item.receipt_no||item.receipt_no==='-'?'0.4':'1'}">${item.receipt_no||'—'}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
                carryBalance = finalBalance;
            });
        }

        window.savePDF = async () => {
            const element = document.querySelector('.wrap');
            document.body.classList.add('pdf-export');
            
            // 🔥 إعدادات التحسين الفائق للجودة
            const opt = {
                margin: 10,
                filename: 'Jabri_Statement.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 3, // دقة عالية جداً
                    dpi: 300,
                    letterRendering: true,
                    useCORS: true,
                    scrollY: 0
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            await html2pdf().set(opt).from(element).save();
            document.body.classList.remove('pdf-export');
        };
        init();
    </script>
</body>
</html>
