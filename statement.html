<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>كشف الحساب</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --bg-1:#eef2f7;
  --bg-2:#f8fafc;
  --navy:#1d2940;
  --navy-2:#243552;
  --gold:#c9a46b;
  --gold-2:#b89155;
  --line:#e8edf4;
  --text:#1d2940;
  --muted:#7b8497;
  --white:rgba(255,255,255,0.72);
  --white-strong:rgba(255,255,255,0.92);
  --red:#e05252;
  --green:#18a957;
  --orange:#b96a00;
  --soft-red:#fff3f3;
  --soft-green:#edf8f1;
  --soft-orange:#fff7ec;
  --soft-blue:#eef4ff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top right, rgba(201,164,107,0.10), transparent 24%),
    linear-gradient(135deg,var(--bg-1),var(--bg-2));
  color:var(--text);
}

.app{
  max-width:460px;
  margin:auto;
  padding:16px;
  padding-bottom:24px;
}

.card{
  background:var(--white);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.8);
  border-radius:24px;
  padding:18px 16px;
  margin-bottom:16px;
  box-shadow:0 14px 40px rgba(17,24,39,0.08);
}

.title-wrap{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.page-title{
  margin:0;
  font-size:22px;
  font-weight:900;
  color:var(--navy);
  letter-spacing:-0.3px;
}

.title-badge{
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#fff;
  padding:7px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(185,145,85,0.25);
}

.tenant-name-main{
  font-size:24px;
  font-weight:900;
  color:var(--navy);
  margin:14px 0 4px;
  line-height:1.2;
  letter-spacing:-0.4px;
}

.tenant-code-sub{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
  letter-spacing:0.4px;
}

.year-card{
  background:rgba(255,248,238,0.68);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.8);
  border-radius:24px;
  padding:14px;
  margin-bottom:16px;
  box-shadow:0 14px 38px rgba(15,23,42,0.06);
}

.year-card.green{
  background:linear-gradient(180deg,rgba(237,248,241,0.88),rgba(255,255,255,0.72));
}

.year-card.orange{
  background:linear-gradient(180deg,rgba(255,246,234,0.92),rgba(255,255,255,0.72));
}

.year-card.red{
  background:linear-gradient(180deg,rgba(255,241,241,0.88),rgba(255,255,255,0.72));
}

.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.header-side{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.year-title{
  background:linear-gradient(135deg,var(--navy),var(--navy-2));
  color:#fff;
  padding:7px 15px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  min-width:58px;
  text-align:center;
  box-shadow:0 8px 18px rgba(29,41,64,0.18);
}

.status-box{
  min-width:72px;
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  text-align:center;
  display:inline-block;
}

.status-paid{
  background:var(--soft-green);
  color:var(--green);
  border:1px solid rgba(24,169,87,0.14);
}

.status-partial{
  background:var(--soft-orange);
  color:var(--orange);
  border:1px solid rgba(185,106,0,0.14);
}

.status-unpaid{
  background:var(--soft-red);
  color:var(--red);
  border:1px solid rgba(224,82,82,0.14);
}

.table-shell{
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(255,255,255,0.95);
  border-radius:18px;
  padding:6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.8);
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 4px;
}

thead th{
  background:#f3f6fa;
  color:#2d3748;
  font-size:11px;
  font-weight:900;
  text-align:center;
  padding:8px 6px;
  border:none;
}

thead th:first-child{
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}
thead th:last-child{
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}

tbody tr{
  background:rgba(255,255,255,0.92);
  box-shadow:0 3px 10px rgba(17,24,39,0.03);
}

tbody tr:hover{
  background:#fbfdff;
  transition:0.2s ease;
}

tbody td{
  padding:6px 6px;
  font-size:12px;
  text-align:center;
  border:none;
  line-height:1.18;
  vertical-align:middle;
}

tbody td:first-child{
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}

tbody td:last-child{
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}

.debit{
  color:var(--red);
  font-weight:900;
  font-size:12px;
}

.credit{
  color:var(--green);
  font-weight:900;
  font-size:12px;
}

.balance{
  font-weight:900;
  font-size:13px;
  direction:ltr;
  unicode-bidi:isolate;
}

.balance-positive{ color:var(--red); }
.balance-negative{ color:var(--orange); }
.balance-zero{ color:var(--green); }

.desc-cell{
  font-weight:800;
  color:var(--navy);
  line-height:1.22;
}

.receipt{
  background:var(--soft-blue);
  color:#2f6fed;
  padding:3px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  display:inline-block;
  min-width:40px;
}

.date-chip{
  background:rgba(47,111,237,0.08);
  color:#2f6fed;
  font-weight:900;
  padding:3px 8px;
  border-radius:999px;
  font-size:10px;
  display:inline-block;
  white-space:nowrap;
}

.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.summary-card{
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(255,255,255,0.95);
  border-radius:18px;
  padding:12px 10px;
  text-align:center;
  box-shadow:0 10px 22px rgba(17,24,39,0.05);
}

.summary-label{
  font-size:11px;
  font-weight:900;
  color:#5d6678;
  margin-bottom:6px;
}

.summary-value{
  font-size:18px;
  font-weight:900;
  letter-spacing:-0.3px;
}

.summary-debit .summary-value{ color:var(--red); }
.summary-credit .summary-value{ color:var(--green); }
.summary-balance .summary-value{ color:var(--navy); }

.bottom-actions{
  display:flex;
  flex-direction:row-reverse;
  gap:12px;
  width:100%;
  max-width:460px;
  margin:18px auto 0;
  padding:0 4px 10px;
}

.pdf-btn,
.back-btn{
  height:52px;
  border:none;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
  font-size:16px;
  letter-spacing:0.2px;
  transition:transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
}

.pdf-btn{
  flex:1.2;
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#fff;
  box-shadow:0 12px 24px rgba(185,145,85,0.24);
}

.back-btn{
  flex:0.8;
  background:linear-gradient(135deg,var(--navy),var(--navy-2));
  color:#fff;
  box-shadow:0 12px 24px rgba(29,41,64,0.20);
}

.pdf-btn:hover,
.back-btn:hover{
  transform:translateY(-1px);
}

.pdf-btn:active,
.back-btn:active{
  transform:scale(0.98);
}

.pdf-header{
  display:none;
}

.pdf-mode .pdf-header{
  display:block;
  text-align:center;
  margin-bottom:28px;
}

.pdf-logo{
  width:82px;
  margin-bottom:10px;
}

.pdf-title{
  font-size:28px;
  font-weight:900;
  color:var(--navy);
  margin-bottom:5px;
}

.pdf-tenant{
  font-size:21px;
  font-weight:800;
  color:var(--gold);
}

.pdf-date{
  font-size:14px;
  color:#555;
  margin-top:6px;
}

.pdf-mode .app{
  max-width:900px !important;
  padding:30px !important;
  padding-bottom:20px !important;
}

.pdf-mode .year-card{
  break-inside:avoid;
  page-break-inside:avoid;
}

.pdf-mode .table-shell{
  padding:8px;
}

.pdf-mode thead th{
  font-size:13px;
}

.pdf-mode tbody td{
  font-size:13px;
  padding:7px 7px;
}

.pdf-mode .summary-value{
  font-size:24px;
}

.pdf-mode .bottom-actions{
  display:none !important;
}

.error-box,
.empty-box{
  padding:16px;
  border-radius:18px;
  font-weight:900;
  text-align:center;
}

.error-box{
  color:#c62828;
  background:#fff1f1;
}

.empty-box{
  color:#7b8497;
  background:rgba(255,255,255,0.78);
}

@media (max-width:420px){
  .app{ padding:12px; }
  .year-card{ padding:12px; }
  .summary{ gap:8px; }
  .summary-value{ font-size:17px; }
  tbody td{ font-size:11.5px; }
}
</style>
</head>

<body>

<div class="app">
  <div class="card">
    <div class="title-wrap">
      <h2 class="page-title">كشف الحساب</h2>
      <span class="title-badge">JABRI</span>
    </div>
    <div id="tenantName"></div>
  </div>

  <div class="pdf-header">
    <img src="logo.png" class="pdf-logo" onerror="this.style.display='none'" />
    <div class="pdf-title">كشف حساب</div>
    <div class="pdf-tenant" id="pdfTenantName"></div>
    <div class="pdf-date" id="pdfDate"></div>
  </div>

  <div id="container"></div>

  <div class="bottom-actions">
    <button class="pdf-btn" id="pdfBtn" onclick="savePDF()">PDF</button>
    <button class="back-btn" onclick="goBack()">رجوع</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

const params = new URLSearchParams(window.location.search)
const tenant = params.get("tenant") || localStorage.getItem("jabri_tenant_code")
const from = params.get("from")

window.goBack = function(){
  if(from === "admin"){
    window.location.href = "admin.html"
    return
  }

  if(window.history.length > 1){
    window.history.back()
    return
  }

  window.location.href = "index.html"
}

window.savePDF = async function(){
  try{
    document.body.classList.add("pdf-mode")

    const element = document.querySelector(".app")
    const tenantText = (document.getElementById("pdfTenantName").innerText || tenant || "statement").trim()
    const safeFileName = tenantText
      .replace(/[^\u0600-\u06FF\w\- ]/g, "")
      .replace(/\s+/g, "_")

    const opt = {
      margin: 0.3,
      filename: `statement_${safeFileName || "tenant"}.pdf`,
      image: { type: "jpeg", quality: 1 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        scrollY: 0
      },
      jsPDF: { unit: "in", format: "a4", orientation: "portrait" }
    }

    const worker = html2pdf().set(opt).from(element)
    const pdfBlob = await worker.outputPdf("blob")

    document.body.classList.remove("pdf-mode")

    const fileName = `statement_${safeFileName || "tenant"}.pdf`
    const file = new File([pdfBlob], fileName, { type: "application/pdf" })

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: "كشف حساب",
        text: `كشف حساب ${tenantText || "المستأجر"}`
      })
      return
    }

    const url = URL.createObjectURL(pdfBlob)
    const a = document.createElement("a")
    a.href = url
    a.download = fileName
    document.body.appendChild(a)
    a.click()
    a.remove()
    URL.revokeObjectURL(url)

  } catch (err){
    console.error("PDF/Share error:", err)
    document.body.classList.remove("pdf-mode")
    alert("تعذر إنشاء أو مشاركة PDF")
  }
}

function num(v){
  const n = Number(v)
  return Number.isFinite(n) ? n : 0
}

function displayNumber(v){
  return num(v).toLocaleString("en-US")
}

function displaySignedNumber(v){
  const n = num(v)
  const abs = Math.abs(n).toLocaleString("en-US")
  if(n < 0) return `-${abs}`
  return abs
}

function formatDate(dateStr){
  if(!dateStr) return "-"
  const d = new Date(dateStr)
  if(Number.isNaN(d.getTime())) return "-"
  return d.toLocaleDateString("en-GB")
}

function getYear(dateStr){
  const d = new Date(dateStr)
  if(Number.isNaN(d.getTime())) return null
  return d.getFullYear()
}

function getRowOrder(desc){
  const text = String(desc || "")
  if(text.includes("ايجار")) return 1
  if(text.includes("معارف")) return 2
  if(text.includes("رصيد سابق") || text.includes("سابق عام") || text.includes("رصيد عام")) return 3
  if(text.includes("دفعة")) return 4
  return 9
}

function isCarryRow(desc){
  const text = String(desc || "")
  return (
    text.includes("رصيد سابق") ||
    text.includes("سابق عام") ||
    text.includes("رصيد عام")
  )
}

function buildTenantHeader(name, code){
  return `
    <div class="tenant-name-main">${name || code}</div>
    <div class="tenant-code-sub">${code}</div>
  `
}

document.addEventListener("DOMContentLoaded", load)

async function load(){
  const container = document.getElementById("container")
  const tenantName = document.getElementById("tenantName")
  const pdfTenantName = document.getElementById("pdfTenantName")
  const pdfDate = document.getElementById("pdfDate")

  if(!tenant){
    container.innerHTML = `<div class="empty-box">لا يوجد مستأجر</div>`
    return
  }

  pdfDate.innerText = "تاريخ الإصدار: " + new Date().toLocaleDateString("en-GB")

  let tenantDisplayName = tenant

  try{
    const { data: tenantData } = await supabase
      .from("tenants")
      .select("tenant_name")
      .eq("tenant_code", tenant)
      .maybeSingle()

    if(tenantData?.tenant_name){
      tenantDisplayName = tenantData.tenant_name
    }
  } catch(err){
    console.error("Tenant name load error:", err)
  }

  tenantName.innerHTML = buildTenantHeader(tenantDisplayName, tenant)
  pdfTenantName.innerText = tenantDisplayName

  let response
  try{
    response = await supabase
      .from("tenant_transactions")
      .select("tenant_code,date,description,debit,credit,receipt_no,notes")
      .eq("tenant_code", tenant)
      .order("date", { ascending: true })
  } catch(err){
    console.error("Unexpected load error:", err)
    container.innerHTML = `<div class="error-box">حصل خطأ غير متوقع أثناء تحميل البيانات</div>`
    return
  }

  const { data, error } = response

  if(error){
    console.error("Supabase error:", error)
    container.innerHTML = `<div class="error-box">${error.message || "خطأ في قراءة البيانات"}</div>`
    return
  }

  if(!Array.isArray(data) || data.length === 0){
    container.innerHTML = `<div class="empty-box">لا توجد بيانات لهذا المستأجر</div>`
    return
  }

  const validRows = data
    .map(r => ({
      ...r,
      debit: num(r.debit),
      credit: num(r.credit),
      description: r.description || "",
      receipt_no: r.receipt_no || "-"
    }))
    .filter(r => getYear(r.date) !== null)

  if(validRows.length === 0){
    container.innerHTML = `<div class="empty-box">لا توجد تواريخ صحيحة لعرض كشف الحساب</div>`
    return
  }

  const grouped = {}

  validRows.forEach(r => {
    const year = getYear(r.date)
    if(!grouped[year]) grouped[year] = []
    grouped[year].push(r)
  })

  let html = ""
  let runningBalance = 0

  Object.keys(grouped)
    .sort((a,b) => Number(a) - Number(b))
    .forEach(year => {
      const rows = grouped[year]

      rows.sort((a,b)=>{
        const d1 = new Date(a.date).getTime()
        const d2 = new Date(b.date).getTime()
        if(d1 !== d2) return d1 - d2
        return getRowOrder(a.description) - getRowOrder(b.description)
      })

      let totalDebit = 0
      let totalCredit = 0

      rows.forEach(r => {
        const carryRow = isCarryRow(r.description)

        if(!carryRow){
          totalDebit += r.debit
          totalCredit += r.credit
        }

        if(carryRow){
          runningBalance = r.debit - r.credit
        } else {
          runningBalance += r.debit - r.credit
        }

        r.balance = runningBalance
      })

      const yearBalance = totalDebit - totalCredit

      let color = "red"
      let status = "غير مسدد"
      let statusClass = "status-unpaid"

      if(yearBalance <= 0){
        color = "green"
        status = "مسدد"
        statusClass = "status-paid"
      } else if(totalCredit > 0){
        color = "orange"
        status = "سداد جزئي"
        statusClass = "status-partial"
      }

      html += `
        <div class="year-card ${color}">
          <div class="year-header">
            <div class="header-side">
              <span class="year-title">${year}</span>
            </div>
            <div class="header-side">
              <span class="status-box ${statusClass}">${status}</span>
            </div>
          </div>

          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>التاريخ</th>
                  <th>مدين</th>
                  <th>دائن</th>
                  <th>الرصيد</th>
                  <th>البيان</th>
                  <th>رقم السند</th>
                </tr>
              </thead>
              <tbody>
      `

      rows.forEach(r => {
        let balanceClass = ""
        if (r.balance > 0) {
          balanceClass = "balance-positive"
        } else if (r.balance < 0) {
          balanceClass = "balance-negative"
        } else {
          balanceClass = "balance-zero"
        }

        html += `
          <tr>
            <td><span class="date-chip">${formatDate(r.date)}</span></td>
            <td class="debit">${r.debit ? displayNumber(r.debit) : "-"}</td>
            <td class="credit">${r.credit ? displayNumber(r.credit) : "-"}</td>
            <td class="balance ${balanceClass}">${displaySignedNumber(r.balance)}</td>
            <td class="desc-cell">${r.description || "-"}</td>
            <td><span class="receipt">${r.receipt_no}</span></td>
          </tr>
        `
      })

      html += `
              </tbody>
            </table>
          </div>

          <div class="summary">
            <div class="summary-card summary-debit">
              <div class="summary-label">إجمالي المدين</div>
              <div class="summary-value">${displayNumber(totalDebit)}</div>
            </div>

            <div class="summary-card summary-credit">
              <div class="summary-label">إجمالي الدائن</div>
              <div class="summary-value">${displayNumber(totalCredit)}</div>
            </div>

            <div class="summary-card summary-balance">
              <div class="summary-label">الرصيد</div>
              <div class="summary-value">${displaySignedNumber(yearBalance)}</div>
            </div>
          </div>
        </div>
      `
    })

  container.innerHTML = html
}
</script>

</body>
</html>
