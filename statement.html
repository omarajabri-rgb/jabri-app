<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الحساب</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
  padding-bottom:90px;
}

/* Header */
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Year Card */
.year-card{
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Colors */
.green{ background:#edf8f1; }
.orange{ background:#fff6ea; }
.red{ background:#fff1f1; }

/* Header */
.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.7);
  border-radius:14px;
  overflow:hidden;
}

th, td{
  padding:8px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}

th{
  background:#f1f3f7;
}

/* Premium */
tbody tr:nth-child(even){
  background:rgba(0,0,0,0.015);
}

tbody tr:hover{
  background:rgba(47,111,237,0.05);
  transition:0.2s;
}

.debit{ color:#e05252; font-weight:bold; font-size:13px; }
.credit{ color:#18a957; font-weight:bold; font-size:13px; }
.balance{ font-weight:900; font-size:13px; }

.balance-positive{ color:#e05252; }
.balance-zero{ color:#18a957; }

.receipt{
  background:#eef4ff;
  padding:5px 10px;
  border-radius:12px;
  font-size:11px;
  font-weight:900;
  color:#2f6fed;
}

td:nth-child(5){
  font-weight:700;
  color:#1d2940;
}

/* Summary */
.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.summary-card{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(14px);
  border-radius:16px;
  padding:12px;
  text-align:center;
}

.summary-label{
  font-size:12px;
  font-weight:800;
  color:#555;
}

.summary-value{
  font-size:22px;
  font-weight:900;
}

/* Status */
.status-box{
  min-width:70px;
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
  text-align:center;
  display:inline-block;
  background:rgba(255,255,255,0.7);
}

.status-paid{
  background:#edf8f1;
  color:#18a957;
}

.status-partial{
  background:#ffffff;
  color:#d68a1d;
  border:1px solid rgba(214,138,29,0.3);
}

.status-unpaid{
  background:#fff1f1;
  color:#e05252;
}

/* Back button */
.back-bottom{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
}

.back-bottom button{
  width:100%;
  height:50px;
  border:none;
  border-radius:15px;
  background:#1d2940;
  color:#fff;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="app">

<div class="card">
  <h2>كشف الحساب</h2>
  <div id="tenantName"></div>
</div>

<div id="container"></div>

</div>

<div class="back-bottom">
  <button onclick="goBack()">رجوع</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

const params = new URLSearchParams(window.location.search)
const tenant = params.get("tenant")

window.goBack = () => window.history.back()

function format(n){ return Number(n||0) }

function formatDate(d){
  if(!d) return "-"
  return new Date(d).toLocaleDateString('en-GB')
}

document.addEventListener("DOMContentLoaded", load)

async function load(){

  if(!tenant){
    document.getElementById("container").innerHTML = "لا يوجد مستأجر"
    return
  }

  document.getElementById("tenantName").innerText = tenant

  const { data, error } = await supabase
    .from('tenant_transactions')
    .select('*')
    .eq('tenant_code', tenant)
    .order('date', { ascending:true })

  if(error || !data){
    document.getElementById("container").innerHTML = "خطأ"
    return
  }

  let html = ""
  let balance = 0

  const grouped = {}

  data.forEach(r=>{
    const y = new Date(r.date).getFullYear()
    if(!grouped[y]) grouped[y] = []
    grouped[y].push(r)
  })

  Object.keys(grouped).forEach(year=>{

    let debit=0, credit=0

    grouped[year].forEach(r=>{
      debit+=r.debit||0
      credit+=r.credit||0
      balance+= (r.debit||0)-(r.credit||0)
      r.balance = balance
    })

    let status="غير مسدد", cls="status-unpaid", color="red"

    if(balance<=0){ status="مسدد"; cls="status-paid"; color="green" }
    else if(credit>0){ status="جزئي"; cls="status-partial"; color="orange" }

    html+=`
    <div class="year-card ${color}">
      <div class="year-header">
        <span class="year-title">${year}</span>
        <span class="status-box ${cls}">${status}</span>
      </div>
      <table><tbody>
    `

    grouped[year].forEach(r=>{
      html+=`
      <tr>
        <td>${formatDate(r.date)}</td>
        <td class="debit">${r.debit||"-"}</td>
        <td class="credit">${r.credit||"-"}</td>
        <td class="balance">${r.balance}</td>
        <td>${r.description||"-"}</td>
        <td><span class="receipt">${r.receipt_no||"-"}</span></td>
      </tr>`
    })

    html+=`</tbody></table></div>`
  })

  document.getElementById("container").innerHTML = html
}
</script>

</body>
</html>
