<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.78);
            --border: rgba(201,164,107,0.22);
            --text: #2f2a24;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #cc5a50;
            --warning: #c38a2e;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }

        body {
            margin: 0; color: var(--text); padding: 16px; opacity: 0;
            transform: translateY(8px); transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded { opacity: 1; transform: translateY(0); }
        .wrap { max-width: 1120px; margin: 0 auto; padding-bottom: 42px; }
        .glass { background: var(--surface); backdrop-filter: blur(16px); border: 1px solid var(--border); box-shadow: var(--shadow); }

        .statement-header { border-radius: 26px; padding: 24px; margin-bottom: 16px; text-align: center; }
        .statement-header h1 { margin: 0 0 8px; font-size: 28px; font-weight: 900; color: var(--gold-deep); }
        
        /* 🔥 أنيميشن الدفعات الجديدة */
        @keyframes paymentHighlight {
            0% { background: rgba(46,160,67,0.25); transform: scale(1.01); }
            50% { background: rgba(46,160,67,0.10); }
            100% { background: transparent; transform: scale(1); }
        }

        .payment-new { animation: paymentHighlight 1.5s ease forwards; z-index: 10; position: relative; }
        
        /* توهج رقم الدفعة */
        .payment-new td:nth-child(3) {
            text-shadow: 0 0 6px rgba(46,160,67,0.5);
            color: #2f9e6f !important;
        }

        .year-status {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            padding: 8px 14px; border-radius: 999px; font-size: 12px; font-weight: 900;
        }

        .status-paid { background: rgba(47,158,111,0.12); color: #2f9e6f; border: 1px solid rgba(47,158,111,0.22); }
        .status-partial { background: rgba(195,138,46,0.12); color: #c38a2e; border: 1px solid rgba(195,138,46,0.22); }
        .status-late { background: rgba(204,90,80,0.12); color: #cc5a50; border: 1px solid rgba(204,90,80,0.22); }

        .statement-table { width: 100%; border-collapse: collapse; font-size: 11px; background: rgba(255,255,255,0.9); table-layout: fixed; }
        .statement-table th { background: #e9e2d5; color: #5f5345; padding: 12px 4px; font-weight: 900; }
        .statement-table td { padding: 10px 4px; border: 1px solid rgba(201,164,107,0.15); text-align: center; word-break: break-word; }

        /* تلوين الأعمدة */
        .statement-table td:nth-child(2) { color: var(--danger); font-weight: 900; } /* مدين */
        .statement-table td:nth-child(3) { color: var(--success); font-weight: 900; } /* دائن */
        .statement-table td:nth-child(4) { font-weight: 900; color: #b0413e; } /* الرصيد */

        .year-card { border-radius: 26px; margin-bottom: 24px; background: #fff; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
        .year-head { padding: 20px; position: relative; text-align: center; }
        .year-title { font-size: 32px; font-weight: 900; color: var(--gold-deep); }

        .year-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #fdfbf6; }
        .year-summary-box { padding: 12px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        
        .bottom-actions { display: flex; justify-content: center; gap: 12px; margin-top: 25px; }
        .back-btn { padding: 12px 20px; border-radius: 14px; font-weight: 900; cursor: pointer; border: 1px solid var(--border); background: #fff; }
        .save-btn { background: var(--gold-deep); color: white; border: none; }

        #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div class="wrap">
        <div class="statement-header glass">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">-</h2>
            <p id="statement_date">-</p>
        </div>
        <div id="years_container"></div>
        <div class="bottom-actions">
            <button class="back-btn" onclick="window.history.back()">رجوع</button>
            <button class="back-btn save-btn" onclick="savePDF()">حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const tenantCode = localStorage.getItem('jabri_tenant_code');
        const supabase = createClient('https://gzukfvxcpfblzqyjzkoz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU');

        function toNumber(v) { return parseFloat(v) || 0; }
        function formatCurrency(v) { return Math.round(v).toLocaleString(); }

        async function init() {
            if (!tenantCode) return;
            try {
                const { data: tenant } = await supabase.from('tenants').select('*').eq('tenant_code', tenantCode).single();
                const { data: tx } = await supabase.from('tenant_transactions').select('*').eq('tenant_code', tenantCode).order('date', { ascending: true });

                document.getElementById('statement_tenant_name').innerText = tenant.tenant_name;
                document.getElementById('statement_date').innerText = `تاريخ الإصدار: ${new Date().toLocaleDateString('ar-JO')}`;

                render(toNumber(tenant.previous_balance), tx || []);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            } catch (e) { console.error(e); }
        }

        function render(prevBal, transactions) {
            const container = document.getElementById('years_container');
            const grouped = {};
            transactions.forEach(t => {
                const y = new Date(t.date).getFullYear();
                if (!grouped[y]) grouped[y] = [];
                grouped[y].push(t);
            });

            let runningTotal = prevBal;
            const years = Object.keys(grouped).sort();

            years.forEach((year, yearIdx) => {
                const yearRows = grouped[year];
                const items = [];
                
                if (runningTotal > 0) {
                    items.push({ date: '-', description: 'رصيد مدور من سنوات سابقة', debit: runningTotal, credit: 0, balance: runningTotal, isCarry: true });
                }

                yearRows.forEach(r => {
                    runningTotal += (toNumber(r.debit) - toNumber(r.credit));
                    items.push({ ...r, balance: runningTotal });
                });

                const totalCreditYear = yearRows.reduce((s, r) => s + toNumber(r.credit), 0);
                let status = { text: 'متأخر', className: 'status-late' };
                if (runningTotal <= 0) status = { text: 'مسدد', className: 'status-paid' };
                else if (totalCreditYear > 0) status = { text: 'جزئي', className: 'status-partial' };

                const card = document.createElement('div');
                card.className = 'year-card';
                card.innerHTML = `
                    <div class="year-head">
                        <div class="year-status ${status.className}">${status.text}</div>
                        <div class="year-title">${year}</div>
                    </div>
                    <table class="statement-table">
                        <thead><tr><th>التاريخ</th><th>مدين</th><th>دائن</th><th>الرصيد</th><th>البيان</th><th>سند</th></tr></thead>
                        <tbody id="body-${year}"></tbody>
                    </table>
                    <div class="year-footer">
                        <div class="year-summary-box"><span>واصل ${year}</span><br><b>${formatCurrency(totalCreditYear)}</b></div>
                        <div class="year-summary-box"><span>رصيد الذمة</span><br><b>${formatCurrency(runningTotal)}</b></div>
                    </div>
                `;
                container.appendChild(card);

                const tbody = document.getElementById(`body-${year}`);
                
                // 🔥 استخدام منطق الـ Index الجديد لتمييز آخر دفعة فقط
                items.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    
                    const isLastPayment = (index === items.length - 1) && (toNumber(item.credit) > 0);

                    if (isLastPayment) {
                        tr.classList.add('payment-new');
                        setTimeout(() => tr.classList.remove('payment-new'), 1500);
                    }

                    tr.innerHTML = `
                        <td>${item.date !== '-' ? new Date(item.date).toLocaleDateString('en-GB') : '-'}</td>
                        <td>${item.debit ? formatCurrency(item.debit) : ''}</td>
                        <td>${item.credit ? formatCurrency(item.credit) : ''}</td>
                        <td>${formatCurrency(item.balance)}</td>
                        <td style="text-align:right">${item.description}</td>
                        <td>${item.receipt_no || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        window.savePDF = () => {
            const element = document.querySelector('.wrap');
            html2pdf().set({ margin: 10, filename: 'kashf_hisab.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }}).from(element).save();
        };

        init();
    </script>
</body>
</html>
