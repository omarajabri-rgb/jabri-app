<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | كشف الحساب التفصيلي</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.78);
            --surface-strong: rgba(255,255,255,0.92);
            --border: rgba(201,164,107,0.22);
            --text: #2f2a24;
            --muted: #7d7468;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #cc5a50;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background:
                radial-gradient(circle at top left, rgba(201,164,107,0.12), transparent 24%),
                radial-gradient(circle at bottom right, rgba(177,138,82,0.10), transparent 24%),
                linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        .statement-header p {
            margin: 0;
            font-size: 12px;
            line-height: 1.8;
            color: var(--gold-deep);
            font-weight: 900;
        }

        #statement_date {
            font-size: 13px;
            font-weight: 900;
            color: var(--gold-deep);
            margin-top: 6px;
        }

        .last-payment-box {
            margin-top: 10px;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 900;
            text-align: center;
            background: rgba(201,164,107,0.10);
            color: var(--text);
        }

        .summary-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .summary-item {
            border-radius: 22px;
            padding: 16px;
            text-align: center;
        }

        .summary-item span {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 8px;
        }

        .summary-item b {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
        }

        .summary-item.is-paid b { color: var(--success); }
        .summary-item.is-balance b { color: var(--danger); }

        .years-stack {
            display: grid;
            gap: 16px;
        }

        .year-card {
            border-radius: 24px;
            padding: 18px;
            border-top: 1px solid rgba(201,164,107,0.20);
        }

        .year-card.current-year {
            box-shadow: 0 0 20px rgba(201,164,107,0.22);
            border: 1px solid rgba(201,164,107,0.35);
        }

        .year-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(201,164,107,0.16);
        }

        .year-title {
            font-size: 21px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .year-balance {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(201,164,107,0.12);
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
        }

        .year-status {
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
        }

        .status-paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.18);
        }

        .status-partial {
            background: rgba(201,164,107,0.12);
            color: var(--gold-deep);
            border: 1px solid rgba(201,164,107,0.20);
        }

        .status-unpaid {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.18);
        }

        .tx-list {
            display: grid;
            gap: 10px;
        }

        .tx-item {
            background: var(--surface-strong);
            border: 1px solid rgba(201,164,107,0.14);
            border-radius: 18px;
            padding: 14px;
            display: grid;
            grid-template-columns: 1.2fr .8fr .8fr .9fr;
            gap: 10px;
            align-items: center;
        }

        .tx-main {
            min-width: 0;
        }

        .tx-desc {
            font-size: 14px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 8px;
        }

        .tx-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            background: rgba(201,164,107,0.14);
            color: var(--gold-deep);
            border: 1px solid rgba(201,164,107,0.18);
        }

        .amt-box {
            text-align: center;
            border-radius: 14px;
            padding: 12px 10px;
            background: rgba(255,255,255,0.75);
        }

        .amt-box span {
            display: block;
            font-size: 10px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .amt-box b {
            font-size: 13px;
            font-weight: 900;
        }

        .amt-debit b { color: var(--danger); }
        .amt-credit b { color: var(--success); }
        .amt-balance b { color: var(--text); }

        .carry-item {
            background: rgba(201,164,107,0.10);
            border: 1px dashed rgba(201,164,107,0.30);
        }

        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--muted);
            font-weight: 800;
            border-radius: 22px;
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        .back-btn {
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.74);
            color: var(--text);
            padding: 10px 15px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            min-width: 145px;
        }

        .save-btn {
            color: #fff;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            z-index: 9999;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid rgba(201,164,107,0.18);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .footer-note {
            text-align: center;
            margin-top: 22px;
            font-size: 11px;
            color: var(--muted);
            line-height: 1.9;
            font-weight: 800;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 920px) {
            .tx-item {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            .summary-box {
                grid-template-columns: 1fr;
            }

            .statement-header h1 { font-size: 24px; }
            .statement-header h2 { font-size: 18px; }

            .bottom-actions {
                flex-direction: column;
                align-items: center;
            }

            .bottom-actions .back-btn {
                width: 100%;
                max-width: 320px;
            }
        }

        @media print {
            body {
                background: #fff !important;
                color: #000 !important;
                padding: 0;
                opacity: 1 !important;
                transform: none !important;
            }

            #loader,
            .bottom-actions {
                display: none !important;
            }

            .glass, .tx-item, .amt-box {
                background: #fff !important;
                box-shadow: none !important;
                border: 1px solid #ddd !important;
            }

            .statement-header h1,
            .year-title,
            #statement_date {
                color: #000 !important;
            }

            .summary-item b,
            .summary-item span,
            .footer-note,
            .tx-desc,
            .chip,
            .amt-box b,
            .amt-box span,
            .year-balance,
            .last-payment-box,
            .year-status {
                color: #000 !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="statement-header glass" id="statement_export_area">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">اسم المستأجر</h2>
            <p id="statement_date">—</p>
        </div>

        <div id="last_payment_box" class="last-payment-box glass">—</div>

        <div class="summary-box">
            <div class="summary-item glass">
                <span>إجمالي المستحق</span>
                <b id="sum_due">0 د.أ</b>
            </div
