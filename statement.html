<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.62);
            --border: rgba(201,164,107,0.22);
            --text: #2f2a24;
            --muted: #7d7468;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #cc5a50;
            --warning: #c38a2e;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            background:
                radial-gradient(circle at top left, rgba(201,164,107,0.10), transparent 24%),
                radial-gradient(circle at bottom right, rgba(177,138,82,0.08), transparent 24%),
                linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        #statement_date {
            font-size: 13px;
            font-weight: 900;
            color: var(--gold-deep);
            margin-top: 6px;
        }

        @keyframes paymentHighlight {
            0% {
                background: rgba(46,160,67,0.22);
                transform: scale(1.004);
            }
            50% {
                background: rgba(46,160,67,0.10);
            }
            100% {
                background: transparent;
                transform: scale(1);
            }
        }

        .payment-new {
            animation: paymentHighlight 1.5s ease forwards;
            position: relative;
            z-index: 1;
        }

        .payment-new td:nth-child(3) {
            text-shadow: 0 0 6px rgba(46,160,67,0.35);
            color: var(--success) !important;
        }

        .year-card {
            border-radius: 26px;
            margin-bottom: 24px;
            background: linear-gradient(
                135deg,
                rgba(253,251,246,0.95),
                rgba(247,244,237,0.90)
            );
            border: 1px solid rgba(201,164,107,0.18);
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
        }

        .year-head {
            padding: 22px 20px 18px;
            display: grid;
            grid-template-columns: 120px 1fr 120px;
            align-items: center;
            border-bottom: 1px solid rgba(201,164,107,0.10);
            direction: ltr;
        }

        .year-title {
            font-size: 34px;
            font-weight: 900;
            color: var(--gold-deep);
            letter-spacing: 0.4px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.45);
            text-align: center;
            grid-column: 2;
        }

        .year-status {
            grid-column: 1;
            justify-self: start;
            direction: rtl;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            box-shadow: 0 4px 12px rgba(120,95,56,0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .status-paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.22);
        }

        .status-partial {
            background: rgba(195,138,46,0.12);
            color: var(--warning);
            border: 1px solid rgba(195,138,46,0.22);
        }

        .status-late {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.22);
        }

        .statement-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 11px;
            background: transparent;
        }

        .statement-table thead th {
            background: rgba(201,164,107,0.15);
            color: #2f2a24;
            padding: 12px 4px;
            font-weight: 900;
            border-bottom: 2px solid rgba(201,164,107,0.40);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: inset 0 -1px 0 rgba(201,164,107,0.18);
            transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .statement-table td {
            padding: 10px 4px;
            border: 1px solid rgba(201,164,107,0.12);
            text-align: center;
            word-break: break-word;
            background: rgba(247,244,237,0.60);
            transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .statement-table tr {
            background: transparent !important;
        }

        .statement-table tbody tr {
            transition: background 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
        }

        .statement-table tbody tr:hover td {
            background: rgba(201,164,107,0.10) !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
        }

        .statement-table tbody tr:hover {
            transform: translateY(-1px);
        }

        .carry-row:hover td,
        .main-row:hover td,
        .last-row:hover td {
            background: rgba(201,164,107,0.12) !important;
        }

        .statement-table td:nth-child(2) {
            color: var(--danger);
            font-weight: 900;
        }

        .statement-table td:nth-child(3) {
            color: var(--success);
            font-weight: 900;
        }

        .statement-table td:nth-child(4) {
            color: #b0413e;
            font-weight: 900;
        }

        .balance-zero {
            color: var(--success) !important;
        }

        .carry-row td {
            background: rgba(247,244,237,0.60) !important;
            font-style: italic;
            font-weight: 900;
        }

        .main-row td {
            background: rgba(247,244,237,0.60) !important;
            font-weight: 700;
        }

        .last-row td {
            background: rgba(247,244,237,0.60) !important;
            border-bottom: 2px solid rgba(201,164,107,0.55);
        }

        .year-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: rgba(253,251,246,0.72);
            border-top: 1px solid rgba(201,164,107,0.10);
        }

        .year-summary-box {
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(201,164,107,0.22);
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.65),
                rgba(255,255,255,0.25)
            );
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 6px 18px rgba(120,95,56,0.08);
            transition: transform 0.20s ease, box-shadow 0.20s ease;
        }

        .year-summary-box:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(120,95,56,0.08);
        }

        .year-summary-box::before {
            content: "";
            display: block;
            height: 2px;
            width: 40%;
            margin: 0 auto 8px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(201,164,107,0.6),
                transparent
            );
        }

        .year-summary-box span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .year-summary-box b {
            display: block;
            font-size: 26px;
            font-weight: 900;
            line-height: 1.1;
        }

        .year-summary-box.credit-box b {
            color: var(--success);
        }

        .year-summary-box.balance-box b {
            color: var(--danger);
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }

        .back-btn {
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: 0 4px 12px rgba(120,95,56,0.06);
        }

        .back-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(120,95,56,0.10);
        }

        .save-btn {
            background: var(--gold-deep);
            color: white;
            border: none;
        }

        .save-btn:hover {
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error-box {
            margin-top: 18px;
            padding: 18px;
            border-radius: 18px;
            background: rgba(204,90,80,0.08);
            border: 1px solid rgba(204,90,80,0.18);
            color: var(--danger);
            text-align: center;
            font-weight: 800;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media print {
            body {
                background: #fff !important;
                padding: 0;
            }

            #loader,
            .bottom-actions {
                display: none !important;
            }

            .year-card {
                box-shadow: none !important;
                border: 1px solid #ddd !important;
                break-inside: avoid;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="statement-header glass">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">-</h2>
            <p id="statement_date">-</p>
        </div>

        <div id="years_container"></div>
        <div id="error_container"></div>

        <div class="bottom-actions">
            <button class="back-btn" onclick="window.history.back()">رجوع</button>
            <button class="back-btn save-btn" onclick="savePDF()">حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const tenantCode = localStorage.getItem('jabri_tenant_code');

        const supabase = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function toNumber(v) {
            return parseFloat(v) || 0;
        }

        function formatCurrency(v) {
            return Math.round(v || 0).toLocaleString('en-US');
        }

        function showError(msg) {
            document.getElementById('error_container').innerHTML = `
                <div class="error-box">${msg}</div>
            `;
        }

        async function init() {
            try {
                if (!tenantCode) {
                    showError('لا يوجد مستأجر مسجل حالياً. الرجاء تسجيل الدخول أولاً.');
                    return;
                }

                const { data: tenant, error: tenantError } = await supabase
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .single();

                if (tenantError || !tenant) {
                    throw new Error('تعذر تحميل بيانات المستأجر');
                }

                const { data: tx, error: txError } = await supabase
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .order('date', { ascending: true });

                if (txError) {
                    throw new Error('تعذر تحميل الحركات المالية');
                }

                document.getElementById('statement_tenant_name').innerText = tenant.tenant_name || tenantCode;
                document.getElementById('statement_date').innerText =
                    `تاريخ الإصدار: ${new Date().toLocaleDateString('ar-JO')} - ${new Date().toLocaleTimeString('ar-JO')}`;

                render(toNumber(tenant.previous_balance), tx || []);
            } catch (e) {
                console.error(e);
                showError(e.message || 'حدث خطأ أثناء تحميل كشف الحساب');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function render(prevBal, transactions) {
            const container = document.getElementById('years_container');
            container.innerHTML = '';

            const grouped = {};

            transactions.forEach(t => {
                const y = new Date(t.date).getFullYear();
                if (!grouped[y]) grouped[y] = [];
                grouped[y].push(t);
            });

            const years = Object.keys(grouped).map(Number).sort((a, b) => a - b);
            let carryBalance = toNumber(prevBal);

            years.forEach(year => {
                const yearRows = grouped[year].sort((a, b) => new Date(a.date) - new Date(b.date));

                let running = 0;
                const items = [];
                const openingRows = [];
                const paymentRows = [];

                yearRows.forEach(r => {
                    const desc = (r.description || '').trim();
                    const rowDate = new Date(r.date).toLocaleDateString('en-GB');

                    const isOpeningItem =
                        rowDate === `01/01/${year}` &&
                        (
                            desc.includes('ايجار') ||
                            desc.includes('الإيجار') ||
                            desc.includes('معارف')
                        );

                    if (isOpeningItem) {
                        openingRows.push(r);
                    } else {
                        paymentRows.push(r);
                    }
                });

                openingRows.sort((a, b) => {
                    const ad = (a.description || '');
                    const bd = (b.description || '');

                    if (ad.includes('ايجار') && bd.includes('معارف')) return -1;
                    if (ad.includes('معارف') && bd.includes('ايجار')) return 1;
                    return 0;
                });

                if (carryBalance > 0) {
                    running += carryBalance;
                    items.push({
                        date: '-',
                        description: `رصيد سابق ${year - 1}`,
                        debit: carryBalance,
                        credit: 0,
                        balance: running,
                        receipt_no: '-',
                        isCarry: true
                    });
                }

                openingRows.forEach(r => {
                    const debit = toNumber(r.debit);
                    const credit = toNumber(r.credit);

                    running += debit - credit;

                    items.push({
                        date: r.date,
                        description: r.description,
                        debit,
                        credit,
                        balance: running,
                        receipt_no: r.receipt_no || '-',
                        isMain: true
                    });
                });

                paymentRows.forEach(r => {
                    const debit = toNumber(r.debit);
                    const credit = toNumber(r.credit);

                    running += debit - credit;

                    items.push({
                        date: r.date,
                        description: r.description,
                        debit,
                        credit,
                        balance: running,
                        receipt_no: r.receipt_no || '-',
                        isPayment: credit > 0
                    });
                });

                const closingBalance = running;
                carryBalance = closingBalance;

                const totalCreditYear = items.reduce((s, r) => s + toNumber(r.credit), 0);

                let status = { text: 'متأخر', className: 'status-late' };
                if (closingBalance <= 0) {
                    status = { text: 'مسدد', className: 'status-paid' };
                } else if (totalCreditYear > 0) {
                    status = { text: 'جزئي', className: 'status-partial' };
                }

                const card = document.createElement('div');
                card.className = 'year-card';
                card.innerHTML = `
                    <div class="year-head">
                        <div class="year-status ${status.className}">${status.text}</div>
                        <div class="year-title">${year}</div>
                        <div></div>
                    </div>

                    <table class="statement-table">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>مدين</th>
                                <th>دائن</th>
                                <th>الرصيد</th>
                                <th>البيان</th>
                                <th>رقم السند</th>
                            </tr>
                        </thead>
                        <tbody id="body-${year}"></tbody>
                    </table>

                    <div class="year-footer">
                        <div class="year-summary-box credit-box">
                            <span>دائن</span>
                            <b>${formatCurrency(totalCreditYear)}</b>
                        </div>
                        <div class="year-summary-box balance-box">
                            <span>رصيد السنة</span>
                            <b>${formatCurrency(closingBalance)}</b>
                        </div>
                    </div>
                `;

                container.appendChild(card);
                const tbody = document.getElementById(`body-${year}`);

                items.forEach((item, index) => {
                    const tr = document.createElement('tr');

                    if (item.isCarry) tr.classList.add('carry-row');
                    if (item.isMain) tr.classList.add('main-row');
                    if (index === items.length - 1) tr.classList.add('last-row');

                    const isLastPayment = index === items.length - 1 && toNumber(item.credit) > 0;
                    if (isLastPayment) {
                        tr.classList.add('payment-new');
                        setTimeout(() => tr.classList.remove('payment-new'), 1500);
                    }

                    tr.innerHTML = `
                        <td>${item.date !== '-' ? new Date(item.date).toLocaleDateString('en-GB') : '-'}</td>
                        <td>${item.debit ? formatCurrency(item.debit) : ''}</td>
                        <td>${item.credit ? formatCurrency(item.credit) : ''}</td>
                        <td class="${toNumber(item.balance) === 0 ? 'balance-zero' : ''}">${formatCurrency(item.balance)}</td>
                        <td style="text-align:right">${item.description || ''}</td>
                        <td>${item.receipt_no || '-'}</td>
                    `;

                    tbody.appendChild(tr);
                });
            });
        }

        window.savePDF = () => {
            const element = document.querySelector('.wrap');
            html2pdf()
                .set({
                    margin: 10,
                    filename: 'statement.pdf',
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                })
                .from(element)
                .save();
        };

        init();
    </script>
</body>
</html>
