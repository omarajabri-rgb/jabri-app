<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.80);
            --border: rgba(201,164,107,0.20);
            --text: #2f2a24;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        #statement_date {
            margin: 0;
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
        }

        .chip {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            white-space: nowrap;
            background: rgba(201,164,107,0.14);
            color: var(--text);
            border: 1px solid rgba(201,164,107,0.24);
        }

        .year-card {
            border-radius: 26px;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
            background: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
        }

        .year-card.status-paid {
            border-color: rgba(47,158,111,0.18);
        }

        .year-card.status-partial {
            border-color: rgba(195,138,46,0.18);
        }

        .year-card.status-late {
            border-color: rgba(204,90,80,0.16);
        }

        .year-head {
            padding: 18px 20px;
            position: relative;
            text-align: center;
        }

        .year-status {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px rgba(120,95,56,0.08);
        }

        .status-paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.24);
        }

        .status-partial {
            background: rgba(195,138,46,0.12);
            color: var(--warning);
            border: 1px solid rgba(195,138,46,0.24);
        }

        .status-late {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.22);
        }

        .year-title {
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .year-chip {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 20px;
            font-weight: 900;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 1px;
            transition: all 0.25s ease;
        }

        .year-chip.paid {
            color: var(--success);
            background: linear-gradient(135deg, rgba(47,158,111,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(47,158,111,0.35);
        }

        .year-chip.partial {
            color: var(--warning);
            background: linear-gradient(135deg, rgba(195,138,46,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(195,138,46,0.30);
        }

        .year-chip.late {
            color: var(--danger);
            background: linear-gradient(135deg, rgba(204,90,80,0.12), rgba(255,255,255,0.25));
            border: 1px solid rgba(204,90,80,0.30);
        }

        .statement-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            background: transparent;
        }

        .statement-table th,
        .statement-table td {
            text-align: center;
            vertical-align: middle;
        }

        .statement-table th {
            background: #e9e2d5;
            color: #5f5345;
            padding: 12px 10px;
            font-weight: 900;
            font-size: 11px;
            white-space: nowrap;
            border-bottom: 1px solid rgba(201,164,107,0.18);
        }

        .statement-table td {
            padding: 6px 6px;
            line-height: 1.3;
            font-size: 11px;
            border: 1px solid rgba(201,164,107,0.15);
        }

        .statement-table tbody tr:nth-child(odd) td {
            background: rgba(253,251,246,0.78);
        }

        .statement-table tbody tr:nth-child(even) td {
            background: rgba(201,164,107,0.045);
        }

        .statement-table tbody tr:hover td {
            background: rgba(201,164,107,0.12);
            transition: 0.2s;
        }

        .statement-table tbody tr:last-child td,
        .last-row td {
            border-bottom: 2px solid var(--gold) !important;
            box-shadow: inset 0 -1px 0 rgba(201,164,107,0.35);
        }

        .statement-table th:nth-child(1),
        .statement-table td:nth-child(1),
        .statement-table th:nth-child(2),
        .statement-table td:nth-child(2),
        .statement-table th:nth-child(3),
        .statement-table td:nth-child(3),
        .statement-table th:nth-child(4),
        .statement-table td:nth-child(4),
        .statement-table th:nth-child(6),
        .statement-table td:nth-child(6) {
            font-weight: 900;
            color: var(--text);
        }

        .statement-table th:nth-child(5),
        .statement-table td:nth-child(5) {
            font-weight: 800;
            color: var(--text);
            white-space: normal;
        }

        .statement-table td:nth-child(2),
        .statement-table td:nth-child(3),
        .statement-table td:nth-child(4) {
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        .statement-table td:nth-child(2) {
            color: var(--danger);
        }

        .statement-table td:nth-child(3) {
            color: var(--success);
        }

        .statement-table td:nth-child(4) {
            font-size: 12px;
            border-left: 1px solid rgba(201,164,107,0.24);
        }

        .statement-table td .chip {
            display: inline-block;
            margin: auto;
            color: var(--text);
        }

        .balance-paid {
            color: var(--success) !important;
        }

        .balance-late {
            color: var(--danger) !important;
        }

        .carry-row td {
            font-style: normal;
        }

        .main-row td {
            font-weight: 900;
        }

        .year-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .year-summary-box {
            padding: 14px;
            border-radius: 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(201,164,107,0.18);
            background: linear-gradient(135deg, rgba(255,255,255,0.86), rgba(255,255,255,0.28));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 18px rgba(120,95,56,0.08);
            transition: all 0.25s ease;
        }

        .year-summary-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(120,95,56,0.12);
        }

        .year-summary-box span {
            display: block;
            color: #7a6c59;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .year-summary-box b {
            display: block;
            font-size: 18px;
            font-weight: 900;
        }

        .year-summary-box.credit-box {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
            border-color: rgba(47,158,111,0.24);
        }

        .year-summary-box.credit-box span,
        .year-summary-box.credit-box b {
            color: var(--success);
        }

        .year-summary-box.balance-box.paid {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
            border-color: rgba(47,158,111,0.25);
        }

        .year-summary-box.balance-box.late {
            background: linear-gradient(135deg, rgba(204,90,80,0.14), rgba(255,255,255,0.25));
            border-color: rgba(204,90,80,0.22);
        }

        .year-summary-box.balance-box.paid span,
        .year-summary-box.balance-box.paid b {
            color: var(--success);
        }

        .year-summary-box.balance-box.late span,
        .year-summary-box.balance-box.late b {
            color: var(--danger);
        }

        @keyframes paymentHighlight {
            0% {
                background: rgba(47,158,111,0.25);
                transform: scale(1.01);
            }
            100% {
                background: transparent;
                transform: scale(1);
            }
        }

        .payment-new {
            animation: paymentHighlight 1.5s ease forwards;
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }

        .back-btn,
        .save-btn {
            padding: 16px 32px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            min-width: 130px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(201,164,107,0.18);
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            color: var(--text);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.25s ease;
        }

        .back-btn:hover,
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(120,95,56,0.15);
        }

        .save-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            border: none;
        }

        .save-btn:hover {
            box-shadow: 0 16px 30px rgba(201,164,107,0.25);
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const tenantCode = localStorage.getItem('jabri_tenant_code');
        const supabase = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function toNumber(v) {
            return parseFloat(String(v).replace(/,/g, '')) || 0;
        }

        function formatCurrency(v) {
            return Math.round(v).toLocaleString();
        }

        function formatShortDate(dateValue) {
            const d = new Date(dateValue);
            if (isNaN(d)) return '-';
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function isRentRow(desc) {
            const d = (desc || '').trim();
            return d.includes('ايجار') || d.includes('الإيجار');
        }

        function isFeesRow(desc) {
            const d = (desc || '').trim();
            return d.includes('معارف');
        }

        function isCarryRow(desc) {
            const d = (desc || '').trim();
            return d.includes('رصيد سابق') || d.includes('رصيد مدور');
        }

        function calculateRunningBalance(rows, initialBalance = 0) {
            let running = initialBalance;

            return rows.map((row) => {
                const debit = toNumber(row.debit);
                const credit = toNumber(row.credit);

                running = running - credit + debit;

                return {
                    ...row,
                    debit,
                    credit,
                    balance: running
                };
            });
        }

        function getBalanceClass(balance) {
            const v = toNumber(balance);
            if (v <= 0) return 'balance-paid';
            return 'balance-late';
        }

        function getBalanceBoxClass(closingBalance) {
            const b = toNumber(closingBalance);
            if (b <= 0) return 'paid';
            return 'late';
        }

        function formatLastUpdate() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB');
            const timeStr = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });
            return `أخر تحديث: ${dateStr} - ${timeStr}`;
        }

        async function init() {
            if (!tenantCode) return;

            try {
                const { data: tenant } = await supabase
                    .from('tenants')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .single();

                const { data: tx } = await supabase
                    .from('tenant_transactions')
                    .select('*')
                    .eq('tenant_code', tenantCode)
                    .order('date', { ascending: true });

                document.getElementById('statement_tenant_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('statement_date').innerText = formatLastUpdate();

                render(toNumber(tenant?.previous_balance), tx || []);

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            }
        }

        function render(prevBal, transactions) {
            const container = document.getElementById('years_container');
            container.innerHTML = '';

            const grouped = {};
            transactions.forEach(t => {
                const y = new Date(t.date).getFullYear();
                if (!grouped[y]) grouped[y] = [];
                grouped[y].push(t);
            });

            const years = Object.keys(grouped).map(Number).sort((a, b) => a - b);
            let carryBalance = prevBal;

            years.forEach(year => {
                const yearRows = (grouped[year] || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));

                const openingRent = [];
                const openingFees = [];
                const existingCarryRows = [];
                const otherRows = [];

                yearRows.forEach(r => {
                    const desc = (r.description || '').trim();
                    const rowDate = formatShortDate(r.date);
                    const isOpeningDate = rowDate === `1/1/${year}`;

                    if (isOpeningDate && isRentRow(desc)) {
                        openingRent.push(r);
                    } else if (isOpeningDate && isFeesRow(desc)) {
                        openingFees.push(r);
                    } else if (isCarryRow(desc)) {
                        existingCarryRows.push(r);
                    } else {
                        otherRows.push(r);
                    }
                });

                let itemsRaw = [
                    ...openingRent,
                    ...openingFees
                ];

                const hasManualOpeningBalanceRow = yearRows.some(r => {
                    const d = new Date(r.date);
                    const isOpeningDate = d.getDate() === 1 && d.getMonth() === 0;
                    const debit = toNumber(r.debit);
                    const desc = (r.description || '').trim();

                    return (
                        isOpeningDate &&
                        debit > 0 &&
                        !desc.includes('ايجار') &&
                        !desc.includes('الإيجار') &&
                        !desc.includes('معارف')
                    );
                });

                if (existingCarryRows.length > 0) {
                    itemsRaw.push(...existingCarryRows);
                } else if (!hasManualOpeningBalanceRow && carryBalance > 0) {
                    itemsRaw.push({
                        date: `${year}-01-01`,
                        description: `رصيد سابق عام ${year - 1}`,
                        debit: carryBalance,
                        credit: 0,
                        receipt_no: '-',
                        isCarry: true
                    });
                }

                itemsRaw.push(...otherRows);
                itemsRaw.sort((a, b) => new Date(a.date) - new Date(b.date));

                const items = calculateRunningBalance(itemsRaw, 0);

                const finalBalance = items.length > 0 ? items[items.length - 1].balance : carryBalance;
                const totalCredit = items.reduce((sum, row) => sum + toNumber(row.credit), 0);

                let status = { text: 'متأخر', className: 'status-late', chip: 'late' };
                if (finalBalance <= 0) {
                    status = { text: 'مسدد', className: 'status-paid', chip: 'paid' };
                } else if (totalCredit > 0) {
                    status = { text: 'جزئي', className: 'status-partial', chip: 'partial' };
                }

                const balanceBoxClass = getBalanceBoxClass(finalBalance);

                const card = document.createElement('div');
                card.className = `year-card ${status.className}`;
                card.innerHTML = `
                    <div class="year-head">
                        <div class="year-status ${status.className}">
                            ${status.text}
                        </div>
                        <div class="year-title">
                            <span class="year-chip ${status.chip}">
                                ${year}
                            </span>
                        </div>
                    </div>

                    <table class="statement-table">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>مدين</th>
                                <th>دائن</th>
                                <th>الرصيد</th>
                                <th>البيان</th>
                                <th>سند</th>
                            </tr>
                        </thead>
                        <tbody id="body-${year}"></tbody>
                    </table>

                    <div class="year-footer">
                        <div class="year-summary-box credit-box">
                            <span>دائن</span>
                            <b>${formatCurrency(totalCredit)}</b>
                        </div>
                        <div class="year-summary-box balance-box ${balanceBoxClass}">
                            <span>رصيد السنة</span>
                            <b>${formatCurrency(finalBalance)}</b>
                        </div>
                    </div>
                `;

                container.appendChild(card);
                const tbody = document.getElementById(`body-${year}`);

                items.forEach((item, idx) => {
                    const tr = document.createElement('tr');

                    const desc = (item.description || '').trim();
                    if (item.isCarry || isCarryRow(desc)) tr.classList.add('carry-row');
                    if (isRentRow(desc) || isFeesRow(desc)) tr.classList.add('main-row');
                    if (idx === items.length - 1) tr.classList.add('last-row');

                    const isLastPayment = idx === items.length - 1 && toNumber(item.credit) > 0;
                    if (isLastPayment) {
                        tr.classList.add('payment-new');
                    }

                    tr.innerHTML = `
                        <td>
                            ${item.date ? `<span class="chip">${formatShortDate(item.date)}</span>` : '-'}
                        </td>
                        <td>${item.debit ? formatCurrency(item.debit) : ''}</td>
                        <td>${item.credit ? formatCurrency(item.credit) : ''}</td>
                        <td class="${getBalanceClass(item.balance)}">
                            ${formatCurrency(item.balance)}
                        </td>
                        <td>${item.description || ''}</td>
                        <td>
                            <span class="chip" style="${!item.receipt_no || item.receipt_no === '-' ? 'opacity:0.4' : 'opacity:1'}">
                                ${item.receipt_no || '—'}
                            </span>
                        </td>
                    `;

                    tbody.appendChild(tr);
                });

                carryBalance = finalBalance;
            });
        }

        function buildPDFClone() {
            const original = document.querySelector('.wrap');
            const clone = original.cloneNode(true);

            const actions = clone.querySelector('.bottom-actions');
            if (actions) actions.remove();

            const wrapper = document.createElement('div');
            wrapper.className = 'pdf-sheet';
            wrapper.appendChild(clone);

            return wrapper;
        }

        window.savePDF = async () => {
            const pdfRoot = document.getElementById('pdf_export_root');
            pdfRoot.innerHTML = '';

            const pdfContent = buildPDFClone();
            pdfRoot.appendChild(pdfContent);

            const filenameBase = (document.getElementById('statement_tenant_name')?.innerText || 'Jabri_Statement').trim();

            const opt = {
                margin: [6, 6, 6, 6],
                filename: `${filenameBase}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
    scale: 2,
    useCORS: true,
    width: 794,
    windowWidth: 794,
    scrollX: 0,
    scrollY: 0
},
                jsPDF: {
                    unit: 'mm',
                    format: 'a4',
                    orientation: 'portrait'
                },
                pagebreak: {
                    mode: ['css', 'legacy']
                }
            };

            try {
                await html2pdf().set(opt).from(pdfContent).save();
            } finally {
                pdfRoot.innerHTML = '';
            }
        };

        init();
    </script>
</body>
</html>
