<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الحساب</title>

<style>
  :root{
    --bg:#f6f7fb;
    --card:rgba(255,255,255,0.62);
    --text:#1a2238;
    --muted:#7b8497;
    --primary:#1d2940;
    --green:#18a957;
    --orange:#d68a1d;
    --red:#e05252;
    --blue:#2f6fed;
    --shadow:0 10px 26px rgba(16,24,40,0.08);
    --radius-xl:24px;
    --radius-lg:20px;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(circle at top right, rgba(47,111,237,0.10), transparent 25%),
      radial-gradient(circle at top left, rgba(24,169,87,0.08), transparent 22%),
      linear-gradient(135deg,#edf2f7 0%, #eef2f7 45%, #f7f9fc 100%);
    color:var(--text);
  }

  .app{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    padding:14px 14px 24px;
  }

  .card{
    background:var(--card);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.65);
    border-radius:var(--radius-xl);
    padding:16px;
    margin-bottom:12px;
    box-shadow:var(--shadow);
  }

  .top-actions{
    display:flex;
    gap:10px;
    margin-bottom:12px;
  }

  .btn{
    flex:1;
    height:46px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:15px;
    font-weight:900;
  }

  .btn-primary{
    background:var(--primary);
    color:#fff;
  }

  .btn-light{
    background:rgba(255,255,255,0.9);
    color:var(--primary);
    border:1px solid #dbe3ef;
  }

  .page-title{
    margin:0 0 8px;
    font-size:26px;
    font-weight:900;
    color:var(--primary);
  }

  .tenant-name{
    font-size:18px;
    font-weight:900;
    margin-bottom:6px;
  }

  .tenant-sub{
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .year-card{
    border-radius:22px;
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 10px 24px rgba(16,24,40,0.06);
    border:1px solid rgba(255,255,255,0.7);
  }

  .year-green{
    background:rgba(237,248,241,0.95);
  }

  .year-orange{
    background:rgba(255,246,234,0.95);
  }

  .year-red{
    background:rgba(255,241,241,0.95);
  }

  .year-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
    gap:8px;
    flex-wrap:wrap;
  }

  .year-title{
    background:var(--primary);
    color:#fff;
    padding:7px 14px;
    border-radius:999px;
    font-size:14px;
    font-weight:900;
  }

  .year-status{
    font-size:13px;
    font-weight:900;
  }

  .table-wrap{
    overflow-x:auto;
    border-radius:16px;
  }

  table{
    width:100%;
    min-width:640px;
    border-collapse:collapse;
    background:rgba(255,255,255,0.82);
    border-radius:16px;
    overflow:hidden;
  }

  th, td{
    padding:11px 10px;
    font-size:13px;
    text-align:center;
    border-bottom:1px solid #eef2f7;
    white-space:nowrap;
  }

  th{
    background:#f1f4f8;
    color:var(--primary);
    font-weight:900;
  }

  .debit{ color:var(--red); font-weight:900; }
  .credit{ color:var(--green); font-weight:900; }
  .balance{ color:var(--primary); font-weight:900; }

  .receipt-badge{
    display:inline-block;
    min-width:48px;
    padding:5px 9px;
    border-radius:999px;
    background:#eef4ff;
    color:var(--blue);
    font-weight:900;
  }

  .empty,
  .error-box,
  .loading-box{
    text-align:center;
    padding:20px;
    font-size:15px;
    font-weight:800;
    color:var(--muted);
  }

  .error-box{
    color:#c62828;
    background:#fff1f1;
    border:1px solid #ffd8d8;
    border-radius:18px;
  }
</style>
</head>
<body>

<div class="app">

  <div class="top-actions">
    <button class="btn btn-primary" onclick="goBack()">رجوع</button>
    <button class="btn btn-light" onclick="goHome()">الرئيسية</button>
  </div>

  <div class="card">
    <h1 class="page-title">كشف الحساب</h1>
    <div id="tenantName" class="tenant-name">...</div>
    <div id="tenantSub" class="tenant-sub">...</div>
  </div>

  <div id="container" class="loading-box">جاري تحميل كشف الحساب...</div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

const params = new URLSearchParams(window.location.search)
const tenant = (params.get('tenant') || localStorage.getItem('jabri_tenant_code') || '').trim().toUpperCase()
const yearParam = params.get('year') || localStorage.getItem('jabri_selected_year') || 'all'

function formatNumber(n){
  return Number(n || 0).toLocaleString('en-US')
}

function formatDate(dateStr){
  if(!dateStr) return '-'
  const d = new Date(dateStr)
  if(Number.isNaN(d.getTime())) return dateStr
  return d.toLocaleDateString('en-GB')
}

function getYearState(yearRows){
  const yearDebit = yearRows.reduce((sum, r) => sum + Number(r.debit || 0), 0)
  const yearCredit = yearRows.reduce((sum, r) => sum + Number(r.credit || 0), 0)
  const yearBalance = yearDebit - yearCredit

  if(yearBalance <= 0 && yearCredit > 0){
    return { cls:'year-green', label:'مسدد', color:'#18a957' }
  }

  if(yearCredit > 0 && yearBalance > 0){
    return { cls:'year-orange', label:'جزئي', color:'#d68a1d' }
  }

  return { cls:'year-red', label:'غير مسدد', color:'#e05252' }
}

window.goBack = function(){
  window.history.back()
}

window.goHome = function(){
  window.location.href = 'index.html'
}

document.addEventListener('DOMContentLoaded', loadStatement)

async function loadStatement(){
  const container = document.getElementById('container')

  if(!tenant){
    container.innerHTML = '<div class="error-box">لا يوجد مستأجر</div>'
    return
  }

  document.getElementById('tenantName').innerText = tenant
  document.getElementById('tenantSub').innerText =
    yearParam === 'all' ? 'عرض جميع السنوات' : `السنة المختارة: ${yearParam}`

  const { data, error } = await supabase
    .from('tenant_transactions')
    .select('*')
    .eq('tenant_code', tenant)
    .order('date', { ascending: true })

  if(error){
    container.innerHTML = '<div class="error-box">خطأ في تحميل البيانات</div>'
    return
  }

  if(!data || data.length === 0){
    container.innerHTML = '<div class="empty">لا يوجد بيانات</div>'
    return
  }

  let runningBalance = 0
  const grouped = {}

  data.forEach(row => {
    const debit = Number(row.debit || 0)
    const credit = Number(row.credit || 0)
    const year = new Date(row.date).getFullYear()

    runningBalance += debit - credit

    if(!grouped[year]) grouped[year] = []

    grouped[year].push({
      ...row,
      debit,
      credit,
      balance: runningBalance
    })
  })

  let years = Object.keys(grouped).map(Number).sort((a,b) => a - b)

  if(yearParam !== 'all'){
    years = years.filter(y => String(y) === String(yearParam))
  }

  if(years.length === 0){
    container.innerHTML = '<div class="empty">لا يوجد بيانات لهذه السنة</div>'
    return
  }

  let html = ''

  years.forEach(year => {
    const rows = grouped[year]
    const yearState = getYearState(rows)

    html += `
      <div class="year-card ${yearState.cls}">
        <div class="year-header">
          <span class="year-title">${year}</span>
          <span class="year-status" style="color:${yearState.color}">${yearState.label}</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>التاريخ</th>
                <th>البيان</th>
                <th>مدين</th>
                <th>دائن</th>
                <th>الرصيد</th>
                <th>السند</th>
              </tr>
            </thead>
            <tbody>
    `

    rows.forEach(r => {
      html += `
        <tr>
          <td>${formatDate(r.date)}</td>
          <td>${r.description || '-'}</td>
          <td class="debit">${r.debit ? formatNumber(r.debit) : '-'}</td>
          <td class="credit">${r.credit ? formatNumber(r.credit) : '-'}</td>
          <td class="balance">${formatNumber(r.balance)}</td>
          <td>${r.receipt_no ? `<span class="receipt-badge">${r.receipt_no}</span>` : '-'}</td>
        </tr>
      `
    })

    html += `
            </tbody>
          </table>
        </div>
      </div>
    `
  })

  container.innerHTML = html
}
</script>

</body>
</html>
