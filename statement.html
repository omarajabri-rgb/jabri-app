<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
  padding-bottom:90px;
}

/* Header */
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Year Card */
.year-card{
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Colors */
.green{ background:#edf8f1; }
.orange{ background:#fff6ea; }
.red{ background:#fff1f1; }

/* Header */
.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.7);
  border-radius:14px;
  overflow:hidden;
}

th, td{
  padding:8px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}

th{
  background:#f1f3f7;
}

/* ===== Premium Table ===== */
tbody tr:nth-child(even){
  background:rgba(0,0,0,0.015);
}

tbody tr:hover{
  background:rgba(47,111,237,0.05);
  transition:0.2s;
}

.debit{ color:#e05252; font-weight:bold; font-size:13px; }
.credit{ color:#18a957; font-weight:bold; font-size:13px; }
.balance{ font-weight:900; font-size:13px; }

.balance-positive{ color:#e05252; }
.balance-zero{ color:#18a957; }

.receipt{
  background:#eef4ff;
  padding:5px 10px;
  border-radius:12px;
  font-size:11px;
  font-weight:900;
  color:#2f6fed;
}

td:nth-child(5){
  font-weight:700;
  color:#1d2940;
}

/* Glass Summary */
.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.summary-card{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  border-radius:16px;
  padding:12px 10px;
  text-align:center;
  animation:summaryFade .5s ease forwards;
  opacity:0;
  transform:translateY(10px);
}

.summary-card:nth-child(1){ animation-delay:.05s; }
.summary-card:nth-child(2){ animation-delay:.12s; }
.summary-card:nth-child(3){ animation-delay:.2s; }

.summary-label{
  font-size:12px;
  font-weight:800;
  color:#555;
  margin-bottom:6px;
}

.summary-value{
  font-size:22px;
  font-weight:900;
}

.summary-debit .summary-value{ color:#e05252; }
.summary-credit .summary-value{ color:#18a957; }
.summary-balance .summary-value{ color:#1d2940; }

@keyframes summaryFade{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Status Box */
.status-box{
  min-width:70px;
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
  text-align:center;
  display:inline-block;
  background:rgba(255,255,255,0.7);
  box-shadow:0 6px 14px rgba(16,24,40,0.05);
}

.status-paid{
  background:#edf8f1;
  color:#18a957;
}

/* ⭐ تعديل فقط هنا */
.status-partial{
  background:#ffffff;
  color:#d68a1d;
  border:1px solid rgba(214,138,29,0.3);
}

.status-unpaid{
  background:#fff1f1;
  color:#e05252;
}

/* Back Button Bottom */
.back-bottom{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
  z-index:1000;
}

.back-bottom button{
  width:100%;
  height:50px;
  border:none;
  border-radius:15px;
  background:#1d2940;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 10px 25px rgba(16,24,40,0.1);
  cursor:pointer;
}
</style>
