<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الحساب</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
  padding-bottom:90px;
}

/* Header */
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Year Card */
.year-card{
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* Colors */
.green{ background:#edf8f1; }
.orange{ background:#fff6ea; }
.red{ background:#fff1f1; }

/* Header */
.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.7);
  border-radius:14px;
  overflow:hidden;
}

th, td{
  padding:8px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}

th{
  background:#f1f3f7;
}

.debit{ color:#e05252; font-weight:bold; }
.credit{ color:#18a957; font-weight:bold; }
.balance{ font-weight:bold; }

.balance-positive{ color:#e05252; }
.balance-zero{ color:#18a957; }

.receipt{
  background:#eef4ff;
  padding:4px 8px;
  border-radius:10px;
  display:inline-block;
}

/* Glass Summary */
.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.summary-card{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  border-radius:16px;
  padding:12px 10px;
  text-align:center;
  animation:summaryFade .5s ease forwards;
  opacity:0;
  transform:translateY(10px);
}

.summary-card:nth-child(1){ animation-delay:.05s; }
.summary-card:nth-child(2){ animation-delay:.12s; }
.summary-card:nth-child(3){ animation-delay:.2s; }

.summary-label{
  font-size:12px;
  font-weight:800;
  color:#555;
  margin-bottom:6px;
}

.summary-value{
  font-size:22px;
  font-weight:900;
}

.summary-debit .summary-value{ color:#e05252; }
.summary-credit .summary-value{ color:#18a957; }
.summary-balance .summary-value{ color:#1d2940; }

@keyframes summaryFade{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Status Box */
.status-box{
  min-width:70px;
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
  text-align:center;
  display:inline-block;
  background:rgba(255,255,255,0.7);
  box-shadow:0 6px 14px rgba(16,24,40,0.05);
}

.status-paid{
  background:#edf8f1;
  color:#18a957;
}

.status-partial{
  background:#fff6ea;
  color:#d68a1d;
}

.status-unpaid{
  background:#fff1f1;
  color:#e05252;
}

/* Back Button Bottom */
.back-bottom{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
  z-index:1000;
}

.back-bottom button{
  width:100%;
  height:50px;
  border:none;
  border-radius:15px;
  background:#1d2940;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 10px 25px rgba(16,24,40,0.1);
  cursor:pointer;
}
</style>

</head>

<body>

<div class="app">

<div class="card">
  <h2>كشف الحساب</h2>
  <div id="tenantName"></div>
</div>

<div id="container"></div>

</div>

<div class="back-bottom">
  <button onclick="goBack()">رجوع</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

const params = new URLSearchParams(window.location.search)
const tenant = params.get("tenant")
const from = params.get("from")

window.goBack = function(){
  if(from === 'admin'){
    window.location.href = 'admin.html'
  } else if(document.referrer && document.referrer !== ''){
    window.history.back()
  } else {
    window.location.href = 'index.html'
  }
}

function format(n){
  return Number(n || 0)
}

function formatDate(dateStr){
  if(!dateStr) return "-"
  const d = new Date(dateStr)
  if(isNaN(d.getTime())) return dateStr
  return d.toLocaleDateString('en-GB')
}

function getRowOrder(desc){
  const text = String(desc || '')
  if(text.includes('ايجار')) return 1
  if(text.includes('معارف')) return 2
  if(text.includes('رصيد سابق')) return 3
  if(text.includes('دفعة')) return 4
  return 9
}

function isCarryRow(desc){
  return String(desc || '').includes('رصيد سابق')
}

document.addEventListener("DOMContentLoaded", load)

async function load(){

  if(!tenant){
    document.getElementById("container").innerHTML = "لا يوجد مستأجر"
    return
  }

  document.getElementById("tenantName").innerText = tenant

  const { data, error } = await supabase
    .from('tenant_transactions')
    .select('*')
    .eq('tenant_code', tenant)
    .order('date', { ascending: true })

  if(error || !data){
    document.getElementById("container").innerHTML = "خطأ"
    return
  }

  const grouped = {}

  data.forEach(r=>{
    const year = new Date(r.date).getFullYear()
    if(!grouped[year]) grouped[year] = []

    grouped[year].push({
      ...r,
      debit: Number(r.debit || 0),
      credit: Number(r.credit || 0)
    })
  })

  let html = ""
  let runningBalance = 0

  Object.keys(grouped).sort((a,b) => a - b).forEach(year => {

    const rows = grouped[year]

    rows.sort((a,b)=>{
      const d = new Date(a.date) - new Date(b.date)
      if(d !== 0) return d
      return getRowOrder(a.description) - getRowOrder(b.description)
    })

    let totalDebit = 0
    let totalCredit = 0

    rows.forEach(r=>{
      totalDebit += r.debit
      totalCredit += r.credit

      const carryRow = isCarryRow(r.description)

      if(!carryRow){
        runningBalance += r.debit - r.credit
      }

      r.balance = runningBalance
    })

    const endYearBalance = rows.length ? rows[rows.length - 1].balance : 0

    let color = 'red'
    let status = 'غير مسدد'
    let statusClass = 'status-unpaid'

    if(endYearBalance <= 0){
      color = 'green'
      status = 'مسدد'
      statusClass = 'status-paid'
    } else if(totalCredit > 0){
      color = 'orange'
      status = 'جزئي'
      statusClass = 'status-partial'
    }

    const statusHTML = `<span class="status-box ${statusClass}">${status}</span>`

    html += `
    <div class="year-card ${color}">

      <div class="year-header">
        <span class="year-title">${year}</span>
        ${statusHTML}
      </div>

      <table>
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>مدين</th>
            <th>دائن</th>
            <th>الرصيد</th>
            <th>البيان</th>
            <th>السند</th>
          </tr>
        </thead>
        <tbody>
    `

    rows.forEach(r=>{
      let balanceClass = r.balance > 0 ? 'balance-positive' : 'balance-zero'

      html += `
      <tr>
        <td>${formatDate(r.date)}</td>
        <td class="debit">${r.debit ? format(r.debit) : "-"}</td>
        <td class="credit">${r.credit ? format(r.credit) : "-"}</td>
        <td class="balance ${balanceClass}">${format(r.balance)}</td>
        <td>${r.description || "-"}</td>
        <td><span class="receipt">${r.receipt_no || "-"}</span></td>
      </tr>
      `
    })

    html += `
      </tbody>
      </table>

      <div class="summary">
        <div class="summary-card summary-debit">
          <div class="summary-label">مدين السنة</div>
          <div class="summary-value">${format(totalDebit)}</div>
        </div>

        <div class="summary-card summary-credit">
          <div class="summary-label">دائن السنة</div>
          <div class="summary-value">${format(totalCredit)}</div>
        </div>

        <div class="summary-card summary-balance">
          <div class="summary-label">رصيد آخر السنة</div>
          <div class="summary-value">${format(endYearBalance)}</div>
        </div>
      </div>

    </div>
    `
  })

  document.getElementById("container").innerHTML = html
}
</script>

</body>
</html>
