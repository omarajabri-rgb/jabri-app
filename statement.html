<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>كشف حساب</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  text-align:center;
}

.year-card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:8px;
  font-size:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.debit{color:#e05252;font-weight:bold;}
.credit{color:#18a957;font-weight:bold;}
.balance{font-weight:bold;}

.bottom-actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

button{
  flex:1;
  height:45px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.pdf-btn{background:#c9a46b;color:#fff;}
.back-btn{background:#1d2940;color:#fff;}

.debug{
  font-size:11px;
  color:#777;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
  <h3>كشف حساب</h3>
  <div id="tenantName"></div>
  <div id="debug" class="debug"></div>
</div>

<div id="container"></div>

<div class="bottom-actions">
  <button class="pdf-btn" onclick="savePDF()">PDF</button>
  <button class="back-btn" onclick="history.back()">رجوع</button>
</div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

// 🔥 جلب tenant code من كل مكان
function getTenantCode(){

  const params = new URLSearchParams(window.location.search)

  let code =
    params.get("tenant") ||
    params.get("tenant_code") ||
    params.get("code") ||
    localStorage.getItem("jabri_tenant_code") ||
    localStorage.getItem("tenant_code") ||
    localStorage.getItem("tenantCode")

  if(code && code.trim()) return code.trim()

  // 🔥 fallback من object
  const keys = ["tenant","user","currentTenant","loggedTenant"]

  for(const k of keys){
    try{
      const obj = JSON.parse(localStorage.getItem(k))
      if(obj){
        const c = obj.tenant_code || obj.code || obj.id
        if(c) return String(c).trim()
      }
    }catch(e){}
  }

  return ""
}

function num(v){
  const n = Number(v)
  return Number.isFinite(n) ? n : 0
}

function formatDate(d){
  const x = new Date(d)
  return isNaN(x) ? "-" : x.toLocaleDateString("en-GB")
}

async function load(){

  const container = document.getElementById("container")
  const tenantName = document.getElementById("tenantName")
  const debug = document.getElementById("debug")

  const tenant = getTenantCode()

  debug.innerText = "tenant code: " + tenant

  if(!tenant){
    container.innerHTML = "❌ لا يوجد tenant code"
    return
  }

  tenantName.innerText = tenant

  // 🔥 جلب البيانات
  const {data,error} = await supabase
    .from("tenant_transactions")
    .select("*")
    .ilike("tenant_code", tenant)

  if(error){
    container.innerHTML = error.message
    return
  }

  debug.innerText += " | rows: " + data.length

  if(!data || data.length === 0){
    container.innerHTML = "⚠️ لا يوجد بيانات"
    return
  }

  // ترتيب
  data.sort((a,b)=> new Date(a.date) - new Date(b.date))

  // تجميع حسب السنة
  const grouped = {}

  data.forEach(r=>{
    const y = new Date(r.date).getFullYear()
    if(!grouped[y]) grouped[y]=[]
    grouped[y].push(r)
  })

  let html=""

  Object.keys(grouped).forEach(year=>{

    let balance = 0
    let debitTotal = 0
    let creditTotal = 0

    const rows = grouped[year].map((r,i)=>{

      let debit = num(r.debit)
      let credit = num(r.credit)

      // 🔥 فقط لو رصيد افتتاحي
      if(i === 0 && String(r.description).includes("رصيد")){
        balance = debit
      }else{
        balance += debit - credit
      }

      debitTotal += debit
      creditTotal += credit

      return `
      <tr>
        <td>${formatDate(r.date)}</td>
        <td class="debit">${debit || "-"}</td>
        <td class="credit">${credit || "-"}</td>
        <td class="balance">${balance}</td>
        <td>${r.description || "-"}</td>
        <td>${r.receipt_no || "-"}</td>
      </tr>`
    }).join("")

    html += `
    <div class="year-card">
      <div class="year-title">سنة ${year}</div>

      <table>
        <thead>
          <tr>
            <th>تاريخ</th>
            <th>مدين</th>
            <th>دائن</th>
            <th>رصيد</th>
            <th>بيان</th>
            <th>سند</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <div style="margin-top:10px;font-weight:bold">
        مدين: ${debitTotal} | دائن: ${creditTotal} | رصيد: ${balance}
      </div>
    </div>`
  })

  container.innerHTML = html
}

window.savePDF = function(){
  html2pdf().from(document.body).save("statement.pdf")
}

load()
</script>

</body>
</html>
