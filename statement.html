<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>كشف الحساب</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:linear-gradient(135deg,#edf2f7,#f7f9fc);
}

.app{
  max-width:420px;
  margin:auto;
  padding:15px;
  padding-bottom:110px;
}

/* Cards */
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.year-card{
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.green{ background:#edf8f1; }
.orange{ background:#fff6ea; }
.red{ background:#fff1f1; }

.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.year-title{
  background:#1d2940;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.7);
  border-radius:14px;
  overflow:hidden;
}

th, td{
  padding:8px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}

th{
  background:#f1f3f7;
}

.debit{ color:#e05252; font-weight:bold; }
.credit{ color:#18a957; font-weight:bold; }

.balance{
  font-weight:900;
}

.balance-positive{ color:#e05252; }
.balance-zero{ color:#18a957; }

/* ===================== */
/* 🔥 BOTTOM BUTTONS */
/* ===================== */

.bottom-actions{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  width:100%;
  max-width:420px;
  margin:0 auto;
  display:flex;
  flex-direction:row;
  gap:10px;
  z-index:1000;

  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  box-sizing:border-box;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,0.35);
  border-radius:22px 22px 0 0;
  box-shadow:0 -8px 30px rgba(0,0,0,0.12);
  animation:fadeUp 0.4s ease;
}

.pdf-btn,
.back-btn{
  flex:1;
  height:52px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
}

.pdf-btn{
  background:linear-gradient(135deg,#c9a46b,#b89155);
  color:#fff;
}

.back-btn{
  background:linear-gradient(135deg,#1f2d4a,#2b3d63);
  color:#fff;
}

.pdf-btn:active,
.back-btn:active{
  transform:scale(0.97);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* PDF mode */
.pdf-mode .bottom-actions{
  display:none !important;
}
</style>
</head>

<body>

<div class="app">

  <div class="card">
    <h2>كشف الحساب</h2>
    <div id="tenantName"></div>
  </div>

  <div id="container"></div>

</div>

<!-- 🔥 BUTTONS -->
<div class="bottom-actions">
  <button class="pdf-btn" onclick="savePDF()">PDF</button>
  <button class="back-btn" onclick="goBack()">رجوع</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://gzukfvxcpfblzqyjzkoz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
)

window.goBack = () => window.history.back()

window.savePDF = async function(){
  try{
    document.body.classList.add("pdf-mode")

    const element = document.querySelector(".app")
    const pdfBlob = await html2pdf().from(element).outputPdf("blob")

    document.body.classList.remove("pdf-mode")

    const file = new File([pdfBlob], "statement.pdf", { type: "application/pdf" })

    if (navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
      await navigator.share({
        files:[file],
        title:"كشف حساب"
      })
    } else {
      const url = URL.createObjectURL(pdfBlob)
      const a = document.createElement("a")
      a.href = url
      a.download = "statement.pdf"
      a.click()
    }

  } catch(e){
    console.error(e)
    alert("خطأ في PDF")
    document.body.classList.remove("pdf-mode")
  }
}

document.addEventListener("DOMContentLoaded", load)

async function load(){
  const tenant = localStorage.getItem("jabri_tenant_code")

  if(!tenant){
    document.getElementById("container").innerHTML = "لا يوجد مستأجر"
    return
  }

  document.getElementById("tenantName").innerText = tenant

  const { data } = await supabase
    .from("tenant_transactions")
    .select("*")
    .eq("tenant_code", tenant)

  let balance = 0
  let html = ""

  data.forEach(r=>{
    balance += (r.debit || 0) - (r.credit || 0)

    html += `
    <div class="card">
      ${r.date} | ${r.debit || 0} | ${r.credit || 0} | ${balance}
    </div>`
  })

  document.getElementById("container").innerHTML = html
}
</script>

</body>
</html>
