<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --surface: rgba(255,255,255,0.78);
            --surface-strong: rgba(255,255,255,0.92);
            --border: rgba(201,164,107,0.22);
            --text: #2f2a24;
            --muted: #7d7468;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #cc5a50;
            --warning: #c38a2e;
            --shadow: 0 18px 40px rgba(120,95,56,0.10);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background:
                radial-gradient(circle at top left, rgba(201,164,107,0.12), transparent 24%),
                radial-gradient(circle at bottom right, rgba(177,138,82,0.10), transparent 24%),
                linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        #statement_date {
            font-size: 13px;
            font-weight: 900;
            color: var(--gold-deep);
            margin-top: 6px;
        }

        .last-payment-box {
            margin-top: 10px;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 900;
            text-align: center;
            background: rgba(201,164,107,0.10);
            color: var(--text);
        }

        .summary-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .summary-item {
            border-radius: 22px;
            padding: 16px;
            text-align: center;
        }

        .summary-item span {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 8px;
        }

        .summary-item b {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
        }

        .summary-item.is-paid b { color: var(--success); }
        .summary-item.is-balance b { color: var(--danger); }

        /* --- Updated Table & Year Card Styles --- */
        .year-card {
            border-radius: 26px;
            padding: 0;
            overflow: hidden;
            background: rgba(255,255,255,0.84);
            border: 1px solid rgba(201,164,107,0.22);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .year-card.current-year {
            box-shadow: 0 0 20px rgba(201,164,107,0.18);
            border: 1px solid rgba(201,164,107,0.35);
        }

        .year-head {
            padding: 18px 18px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .year-title {
            font-size: 34px;
            font-weight: 900;
            color: #a88349;
            line-height: 1;
        }

        .year-status {
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(201,164,107,0.10);
            border: 1px solid rgba(201,164,107,0.18);
        }

        .status-paid { color: var(--success); }
        .status-partial { color: var(--warning); }
        .status-unpaid { color: var(--danger); }

        .table-wrapper {
            overflow-x: auto;
            padding: 10px 16px 0;
        }

        .statement-table {
            width: 100%;
            min-width: 760px;
            border-collapse: collapse;
            font-size: 13px;
            background: rgba(255,255,255,0.96);
            overflow: hidden;
            border-radius: 20px;
        }

        .statement-table th {
            background: linear-gradient(135deg, rgba(201,164,107,0.90), rgba(177,138,82,0.90));
            color: #fffdf8;
            padding: 12px 10px;
            font-weight: 900;
            border: 1px solid rgba(255,255,255,0.14);
            white-space: nowrap;
            font-size: 13px;
            letter-spacing: 0.2px;
        }

        .statement-table td {
            padding: 10px 8px;
            border: 1px solid rgba(201,164,107,0.10);
            text-align: center;
            color: var(--text);
            background: rgba(255,255,255,0.90);
            vertical-align: middle;
        }

        .statement-table tbody tr:nth-child(even) td {
            background: rgba(201,164,107,0.05);
        }

        .statement-table td:first-child { color: var(--gold-deep); font-weight: 900; white-space: nowrap; }
        .statement-table td:nth-child(2) { color: var(--danger); font-weight: 900; }
        .statement-table td:nth-child(3) { color: var(--success); font-weight: 900; }
        .statement-table td:nth-child(4) { color: var(--text); font-weight: 900; }
        .statement-table td:nth-child(5) { font-weight: 800; }
        .statement-table td:nth-child(6) { color: var(--gold-deep); font-weight: 900; white-space: nowrap; }

        .table-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(201,164,107,0.12);
            color: var(--gold-deep);
            border: 1px solid rgba(201,164,107,0.18);
            min-width: 118px;
        }

        .year-footer {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .year-summary-box {
            background: rgba(201,164,107,0.08);
            border: 1px solid rgba(201,164,107,0.16);
            border-radius: 18px;
            padding: 14px;
            text-align: center;
        }

        .year-summary-box span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 7px;
        }

        .year-summary-box b {
            display: block;
            font-size: 18px;
            font-weight: 900;
        }

        .year-summary-box.debit-box b { color: var(--danger); }
        .year-summary-box.balance-box b { color: var(--text); }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .back-btn {
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.74);
            color: var(--text);
            padding: 10px 15px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            min-width: 145px;
        }

        .save-btn {
            color: #fff;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
            z-index: 9999;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid rgba(201,164,107,0.18);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
            body { background: #fff !important; color: #000 !important; padding: 0; opacity: 1 !important; transform: none !important; }
            #loader, .bottom-actions { display: none !important; }
            .year-card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }
            .statement-table { min-width: auto; }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="statement-header glass">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">اسم المستأجر</h2>
            <p id="statement_date">—</p>
        </div>

        <div id="last_payment_box" class="last-payment-box glass">—</div>

        <div class="summary-box">
            <div class="summary-item glass">
                <span>إجمالي المستحق</span>
                <b id="sum_due">0 د.أ</b>
            </div>
            <div class="summary-item glass is-paid">
                <span>إجمالي المدفوع</span>
                <b id="sum_paid">0 د.أ</b>
            </div>
            <div class="summary-item glass is-balance">
                <span>الرصيد المتبقي</span>
                <b id="sum_balance">0 د.أ</b>
            </div>
        </div>

        <div id="years_container" class="years-stack"></div>

        <div class="bottom-actions">
            <button class="back-btn" onclick="goBack()"><i data-lucide="arrow-right"></i> رجوع</button>
            <button class="back-btn save-btn" onclick="savePDF()"><i data-lucide="download"></i> حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const adminSession = localStorage.getItem('jabri_admin_session');
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        const isAdminViewer = adminSession === 'active';

        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function toNumber(value) {
            const n = parseFloat(value);
            return isNaN(n) ? 0 : n;
        }

        function formatCurrency(v) {
            return `${toNumber(v).toLocaleString('en-US', {
                minimumFractionDigits: 3,
                maximumFractionDigits: 3
            })} د.أ`;
        }

        function formatDate(value) {
            if (!value) return '-';
            const d = new Date(value);
            if (isNaN(d.getTime())) return value;
            return d.toLocaleDateString('en-GB');
        }

        function formatDateTime(value) {
            const d = new Date(value);
            if (isNaN(d.getTime())) return '-';
            return d.toLocaleString('en-GB', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: 'numeric', minute: '2-digit'
            });
        }

        function goBack() {
            window.location.href = isAdminViewer ? 'admin.html' : 'tenant.html';
        }

        function savePDF() {
            const element = document.querySelector('.wrap');
            const tenantName = (document.getElementById('statement_tenant_name').innerText || 'مستأجر').replace(/\s+/g, '_');
            html2pdf().set({
                margin: 5,
                filename: `كشف_حساب_${tenantName}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        }

        window.goBack = goBack;
        window.savePDF = savePDF;

        function txRowHTML({ date, description, debit, credit, balance, receipt_no }) {
            return `
                <tr>
                    <td><span class="table-chip">${date || '-'}</span></td>
                    <td>${debit ? formatCurrency(debit) : ''}</td>
                    <td>${credit ? formatCurrency(credit) : ''}</td>
                    <td>${formatCurrency(balance)}</td>
                    <td style="text-align:right">${description || '-'}</td>
                    <td><span class="table-chip">${receipt_no || '-'}</span></td>
                </tr>
            `;
        }

        function renderYears(previousBalance, transactions) {
            const container = document.getElementById('years_container');
            container.innerHTML = '';
            const grouped = {};
            
            transactions.forEach(r => {
                const year = new Date(r.date).getFullYear();
                if (!grouped[year]) grouped[year] = [];
                grouped[year].push(r);
            });

            const years = Object.keys(grouped).sort((a,b) => a - b);
            let carryBalance = toNumber(previousBalance);
            const currentYear = new Date().getFullYear();

            (years.length ? years : [currentYear]).forEach((year, idx) => {
                const yearRows = (grouped[year] || []).sort((a,b) => new Date(a.date) - new Date(b.date));
                const openingBalance = carryBalance;
                const renderedItems = [];

                if (openingBalance > 0) {
                    renderedItems.push({
                        date: '-', description: `رصيد مدور من سنة سابقة`,
                        debit: openingBalance, credit: 0, balance: openingBalance, receipt_no: '-'
                    });
                }

                let running = openingBalance;
                yearRows.forEach(r => {
                    running += toNumber(r.debit) - toNumber(r.credit);
                    renderedItems.push({...r, date: formatDate(r.date), balance: Math.max(0, running)});
                });

                const closingBalance = Math.max(0, running);
                const yearStatus = getStatus(closingBalance, yearRows);
                carryBalance = closingBalance;

                const card = document.createElement('section');
                card.className = `year-card ${Number(year) === currentYear ? 'current-year' : ''}`;
                card.innerHTML = `
                    <div class="year-head">
                        <div class="year-title">${year}</div>
                        <div class="year-status ${yearStatus.className}">حالة السنة: ${yearStatus.text}</div>
                    </div>

                    <div class="table-wrapper">
                        <table class="statement-table">
                            <thead>
                                <tr>
                                    <th>التاريخ</th>
                                    <th>مدين (+)</th>
                                    <th>دائن (-)</th>
                                    <th>الرصيد</th>
                                    <th>البيان</th>
                                    <th>رقم السند</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${renderedItems.length ? renderedItems.map(txRowHTML).join('') : '<tr><td colspan="6">لا توجد حركات</td></tr>'}
                            </tbody>
                        </table>
                    </div>

                    <div class="year-footer">
                        <div class="year-summary-box debit-box">
                            <span>إجمالي مدين</span>
                            <b>${formatCurrency(yearRows.reduce((s, r) => s + toNumber(r.debit), 0) + openingBalance)}</b>
                        </div>
                        <div class="year-summary-box balance-box">
                            <span>الرصيد</span>
                            <b>${formatCurrency(closingBalance)}</b>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function getStatus(closing, rows) {
            const hasPayment = rows.some(r => toNumber(r.credit) > 0);
            if (closing <= 0) return { text: 'مسدد', className: 'status-paid' };
            if (hasPayment) return { text: 'جزئي', className: 'status-partial' };
            return { text: 'غير مسدد', className: 'status-unpaid' };
        }

        window.onload = async () => {
            if (!tenantCode) return;
            try {
                const { data: tenant } = await supabaseClient.from('tenants').select('*').eq('tenant_code', tenantCode).maybeSingle();
                if (!tenant) return;

                const { data: tx } = await supabaseClient.from('tenant_transactions')
                    .select('*').eq('tenant_code', tenantCode).order('date', { ascending: true });

                const rows = tx || [];
                const prev = toNumber(tenant.previous_balance);
                const totalDebits = rows.reduce((s,r) => s + toNumber(r.debit), 0);
                const totalCredits = rows.reduce((s,r) => s + toNumber(r.credit), 0);
                const totalDue = prev + totalDebits;

                document.getElementById('statement_tenant_name').innerText = tenant.tenant_name;
                document.getElementById('statement_date').innerText = `تاريخ الإصدار: ${formatDateTime(new Date())}`;
                document.getElementById('sum_due').innerText = formatCurrency(totalDue);
                document.getElementById('sum_paid').innerText = formatCurrency(totalCredits);
                document.getElementById('sum_balance').innerText = formatCurrency(totalDue - totalCredits);

                renderYears(prev, rows);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                if (window.lucide) lucide.createIcons();
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
