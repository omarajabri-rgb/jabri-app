<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع جبري | كشف الحساب التفصيلي</title>

    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #f7f4ed;
            --bg-2: #fdfbf6;
            --text: #2f2a24;
            --muted: #7a6c59;
            --gold: #c9a46b;
            --gold-deep: #b18a52;
            --success: #2f9e6f;
            --danger: #c95a52;
            --warning: #c38a2e;
            --info: #5e7fd8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            color: var(--text);
            padding: 16px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.45s ease;
            background: linear-gradient(135deg, var(--bg), var(--bg-2));
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding-bottom: 42px;
            width: 100%;
        }

        .statement-header {
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(247,244,237,0.82));
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .statement-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold-deep);
        }

        .statement-header h2 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        .header-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            background: rgba(201,164,107,0.14);
            color: var(--text);
            border: 1px solid rgba(201,164,107,0.24);
            min-height: 32px;
        }

        .controls-bar {
            display: flex;
            gap: 12px;
            align-items: stretch;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-card,
        .summary-strip,
        .search-card,
        .year-card,
        .search-results-card,
        .smart-note {
            background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(247,244,237,0.74));
            border: 1px solid rgba(201,164,107,0.16);
            border-radius: 22px;
            box-shadow: 0 10px 24px rgba(120,95,56,0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .filter-card {
            padding: 14px;
            min-width: 240px;
            flex: 0 0 260px;
        }

        .filter-card label,
        .search-title {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 900;
            color: var(--muted);
        }

        .year-filter,
        .search-input {
            width: 100%;
            height: 46px;
            border-radius: 16px;
            border: 1px solid rgba(201,164,107,0.20);
            background: rgba(255,255,255,0.72);
            color: var(--text);
            font-size: 15px;
            font-weight: 900;
            padding: 0 14px;
            outline: none;
        }

        .year-filter {
            cursor: pointer;
        }

        .summary-strip {
            flex: 1;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .summary-box {
            padding: 14px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(201,164,107,0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 18px rgba(120,95,56,0.08);
        }

        .summary-box span {
            display: block;
            color: #7a6c59;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .summary-box b {
            display: block;
            font-size: 18px;
            font-weight: 900;
        }

        .summary-opening {
            background: linear-gradient(135deg, rgba(201,164,107,0.14), rgba(255,255,255,0.25));
        }

        .summary-debit {
            background: linear-gradient(135deg, rgba(204,90,80,0.14), rgba(255,255,255,0.25));
        }

        .summary-debit b { color: var(--danger); }

        .summary-credit {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
        }

        .summary-credit b { color: var(--success); }

        .summary-balance.ok {
            background: linear-gradient(135deg, rgba(47,158,111,0.16), rgba(255,255,255,0.25));
        }

        .summary-balance.due {
            background: linear-gradient(135deg, rgba(204,90,80,0.14), rgba(255,255,255,0.25));
        }

        .summary-balance.ok b { color: var(--success); }
        .summary-balance.due b { color: var(--danger); }

        .smart-note {
            margin-bottom: 18px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .smart-note .note-main {
            font-size: 13px;
            font-weight: 900;
            color: var(--text);
        }

        .smart-note .note-sub {
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
        }

        .search-card {
            margin-bottom: 18px;
            padding: 14px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input-wrap {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

        .search-input {
            padding-right: 16px;
            padding-left: 16px;
        }

        .search-btn,
        .clear-btn,
        .back-btn,
        .save-btn {
            height: 46px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 10px 22px rgba(120,95,56,0.10);
            transition: all 0.25s ease;
        }

        .search-btn,
        .save-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            color: #fff;
            border: none;
            padding: 0 18px;
        }

        .clear-btn,
        .back-btn {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text);
            padding: 0 18px;
        }

        .search-btn:hover,
        .clear-btn:hover,
        .back-btn:hover,
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(120,95,56,0.15);
        }

        .search-hint {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
        }

        .search-results-card {
            display: none;
            margin-bottom: 18px;
            padding: 16px;
        }

        .search-results-card.active {
            display: block;
        }

        .search-results-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .search-results-title {
            font-size: 14px;
            font-weight: 900;
            color: var(--text);
        }

        .search-status-badge {
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            border: 1px solid transparent;
        }

        .search-status-badge.found {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border-color: rgba(47,158,111,0.24);
        }

        .search-status-badge.not-found {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border-color: rgba(204,90,80,0.22);
        }

        .search-status-badge.multi {
            background: rgba(94,127,216,0.12);
            color: var(--info);
            border-color: rgba(94,127,216,0.22);
        }

        .search-empty {
            text-align: center;
            padding: 16px 10px 4px;
            color: var(--muted);
            font-weight: 800;
        }

        .search-results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .result-item {
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(201,164,107,0.16);
            background: linear-gradient(135deg, rgba(255,255,255,0.70), rgba(247,244,237,0.62));
            box-shadow: 0 8px 18px rgba(120,95,56,0.05);
        }

        .result-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 14px;
            font-weight: 900;
            color: var(--text);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .result-cell {
            border-radius: 14px;
            padding: 10px;
            background: rgba(255,255,255,0.60);
            border: 1px solid rgba(201,164,107,0.12);
            text-align: center;
        }

        .result-cell span {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .result-cell b {
            display: block;
            font-size: 13px;
            font-weight: 900;
            color: var(--text);
            word-break: break-word;
        }

        .money-credit { color: var(--success) !important; }
        .money-debit { color: var(--danger) !important; }

        .year-card {
            border-radius: 26px;
            margin-bottom: 18px;
            overflow: hidden;
            border: 1px solid rgba(201,164,107,0.18);
            box-shadow: 0 12px 28px rgba(120,95,56,0.08);
            background: linear-gradient(135deg, rgba(252,251,246,0.98), rgba(247,244,237,0.85));
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .year-card.status-paid { border-color: rgba(47,158,111,0.18); }
        .year-card.status-partial { border-color: rgba(195,138,46,0.18); }
        .year-card.status-late { border-color: rgba(204,90,80,0.16); }

        .year-head {
            position: relative;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 66px;
        }

        .year-status {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px rgba(120,95,56,0.08);
        }

        .status-paid {
            background: rgba(47,158,111,0.12);
            color: var(--success);
            border: 1px solid rgba(47,158,111,0.24);
        }

        .status-partial {
            background: rgba(195,138,46,0.12);
            color: var(--warning);
            border: 1px solid rgba(195,138,46,0.24);
        }

        .status-late {
            background: rgba(204,90,80,0.12);
            color: var(--danger);
            border: 1px solid rgba(204,90,80,0.22);
        }

        .year-title {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .year-chip {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 20px;
            font-weight: 900;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 1px;
        }

        .year-chip.paid {
            color: var(--success);
            background: linear-gradient(135deg, rgba(47,158,111,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(47,158,111,0.35);
        }

        .year-chip.partial {
            color: var(--warning);
            background: linear-gradient(135deg, rgba(195,138,46,0.15), rgba(255,255,255,0.25));
            border: 1px solid rgba(195,138,46,0.30);
        }

        .year-chip.late {
            color: var(--danger);
            background: linear-gradient(135deg, rgba(204,90,80,0.12), rgba(255,255,255,0.25));
            border: 1px solid rgba(204,90,80,0.30);
        }

        .year-body {
            padding: 0 16px 16px;
        }

        .year-summary-only {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .empty-state {
            border-radius: 24px;
            padding: 28px 18px;
            text-align: center;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(201,164,107,0.16);
            color: var(--muted);
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(120,95,56,0.05);
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: nowrap;
        }

        .back-btn,
        .save-btn {
            flex: 1;
            max-width: 200px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-size: 15px;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: var(--gold-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media screen and (max-width: 980px) {
            .controls-bar {
                flex-direction: column;
            }

            .filter-card {
                min-width: 100%;
                flex: 1 1 auto;
            }

            .summary-strip,
            .year-summary-only,
            .result-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            .statement-header h1 { font-size: 22px; }
            .year-head { min-height: 58px; padding: 14px 12px; }
            .year-status {
                left: 12px;
                font-size: 11px;
                padding: 7px 12px;
            }
            .year-chip { font-size: 17px; }
            .bottom-actions { flex-wrap: nowrap; }
            .back-btn, .save-btn { width: auto; flex: 1; font-size: 14px; }
        }

        @media screen and (max-width: 560px) {
            .summary-strip,
            .year-summary-only,
            .result-grid {
                grid-template-columns: 1fr;
            }

            .header-meta,
            .search-row {
                flex-direction: column;
            }

            .search-input-wrap,
            .search-btn,
            .clear-btn {
                width: 100%;
            }
        }

        @page {
            size: A4 portrait;
            margin: 10mm;
        }

        @media print {
            body {
                background: white !important;
                opacity: 1 !important;
                transform: none !important;
                padding: 0 !important;
                color: var(--text) !important;
            }

            .bottom-actions,
            #loader,
            .search-card,
            .search-results-card {
                display: none !important;
            }

            .wrap {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .controls-bar,
            .year-card,
            .statement-header {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="statement-header">
            <h1>مجمع جبري الصناعي التجاري</h1>
            <h2 id="statement_tenant_name">-</h2>
            <div class="header-meta">
                <span class="chip" id="statement_tenant_code">-</span>
                <span class="chip" id="statement_date">-</span>
            </div>
        </div>

        <div class="smart-note">
            <div>
                <div class="note-main">كشف الحساب الذكي السنوي</div>
                <div class="note-sub">الملخص السنوي معتمد من النظام، ويمكنك البحث عن أي سند للتأكد أنه موجود ومحتسب.</div>
            </div>
            <span class="chip" id="smart_note_status">جاهز</span>
        </div>

        <div class="controls-bar">
            <div class="filter-card">
                <label for="year_filter">عرض السنة</label>
                <select id="year_filter" class="year-filter">
                    <option value="all">كل السنوات</option>
                </select>
            </div>

            <div class="summary-strip" id="summary_strip"></div>
        </div>

        <div class="search-card">
            <div class="search-title">بحث ذكي عن السند أو الدفعة</div>
            <div class="search-row">
                <div class="search-input-wrap">
                    <input
                        id="receipt_search"
                        class="search-input"
                        type="text"
                        placeholder="ابحث برقم السند أو البيان أو المبلغ أو التاريخ"
                    />
                </div>
                <button id="search_btn" class="search-btn" type="button">بحث</button>
                <button id="clear_search_btn" class="clear-btn" type="button">مسح</button>
            </div>
            <div class="search-hint">
                مثال: 1718 أو دفعة من الايجار أو 150 أو 26/01/2025
            </div>
        </div>

        <div id="search_results_card" class="search-results-card">
            <div class="search-results-head">
                <div class="search-results-title" id="search_results_title">نتائج البحث</div>
                <div id="search_status_badge" class="search-status-badge found">موجود</div>
            </div>
            <div id="search_results_body"></div>
        </div>

        <div id="years_container"></div>

        <div class="bottom-actions">
            <button class="back-btn" onclick="window.history.back()">رجوع</button>
            <button class="save-btn" type="button" onclick="window.print()">حفظ PDF</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const tenantCode = localStorage.getItem('jabri_tenant_code');

        const supabase = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let ALL_TRANSACTIONS = [];
        let ALL_SUMMARIES = [];
        let YEARS = [];

        function toNumber(v) {
            return parseFloat(String(v ?? '').replace(/,/g, '')) || 0;
        }

        function formatCurrency(v) {
            return String(Number(toNumber(v).toFixed(2)).toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }));
        }

        function formatShortDate(dateValue) {
            if (!dateValue) return '-';
            const d = new Date(dateValue);
            if (isNaN(d)) return dateValue;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function formatLastUpdate() {
            const now = new Date();
            return `تاريخ الإصدار: ${now.toLocaleDateString('en-GB')} - ${now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            })}`;
        }

        function escapeHtml(text = '') {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getStatus(totalCredit, finalBalance) {
            if (toNumber(finalBalance) <= 0) {
                return { text: 'مسدد', className: 'status-paid', chip: 'paid' };
            }
            if (toNumber(totalCredit) > 0) {
                return { text: 'جزئي', className: 'status-partial', chip: 'partial' };
            }
            return { text: 'متأخر', className: 'status-late', chip: 'late' };
        }

        function getBalanceBoxClass(balance) {
            return toNumber(balance) <= 0 ? 'ok' : 'due';
        }

        function getSummaryByYear(year) {
            return ALL_SUMMARIES.find(s => Number(s.year) === Number(year)) || null;
        }

        function normalizeSearchText(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .replace(/\s+/g, ' ');
        }

        function transactionMatchesQuery(item, rawQuery) {
            const q = normalizeSearchText(rawQuery);
            if (!q) return false;

            const dateText = formatShortDate(item.date);
            const fields = [
                item.receipt_no,
                item.description,
                item.debit,
                item.credit,
                item.balance,
                item.date,
                dateText
            ]
                .map(v => normalizeSearchText(v))
                .filter(Boolean);

            return fields.some(field => field.includes(q));
        }

        function getTransactionsByYear(year) {
            return ALL_TRANSACTIONS.filter(t => {
                const y = new Date(t.date).getFullYear();
                return Number(y) === Number(year);
            });
        }

        function populateYearFilter() {
            const select = document.getElementById('year_filter');
            select.innerHTML = `<option value="all">كل السنوات</option>`;

            YEARS.forEach(year => {
                const option = document.createElement('option');
                option.value = String(year);
                option.textContent = year;
                select.appendChild(option);
            });

            select.addEventListener('change', renderView);
        }

        function updateSummaryStrip(selectedYear) {
            const summaryStrip = document.getElementById('summary_strip');

            if (selectedYear === 'all') {
                const totalOpening = ALL_SUMMARIES.reduce((sum, s) => sum + toNumber(s.opening_balance), 0);
                const totalDebit = ALL_SUMMARIES.reduce((sum, s) => sum + toNumber(s.total_debit), 0);
                const totalCredit = ALL_SUMMARIES.reduce((sum, s) => sum + toNumber(s.total_credit), 0);
                const latestSummary = [...ALL_SUMMARIES].sort((a, b) => Number(b.year) - Number(a.year))[0];
                const finalBalance = latestSummary ? toNumber(latestSummary.final_balance) : 0;

                summaryStrip.innerHTML = `
                    <div class="summary-box summary-opening">
                        <span>إجمالي الأرصدة السابقة</span>
                        <b>${formatCurrency(totalOpening)}</b>
                    </div>
                    <div class="summary-box summary-debit">
                        <span>إجمالي المدين</span>
                        <b>${formatCurrency(totalDebit)}</b>
                    </div>
                    <div class="summary-box summary-credit">
                        <span>إجمالي الدائن</span>
                        <b>${formatCurrency(totalCredit)}</b>
                    </div>
                    <div class="summary-box summary-balance ${getBalanceBoxClass(finalBalance)}">
                        <span>الرصيد الحالي</span>
                        <b>${formatCurrency(finalBalance)}</b>
                    </div>
                `;
                return;
            }

            const summary = getSummaryByYear(selectedYear);

            summaryStrip.innerHTML = `
                <div class="summary-box summary-opening">
                    <span>الرصيد السابق</span>
                    <b>${formatCurrency(summary?.opening_balance || 0)}</b>
                </div>
                <div class="summary-box summary-debit">
                    <span>مدين السنة</span>
                    <b>${formatCurrency(summary?.total_debit || 0)}</b>
                </div>
                <div class="summary-box summary-credit">
                    <span>دائن السنة</span>
                    <b>${formatCurrency(summary?.total_credit || 0)}</b>
                </div>
                <div class="summary-box summary-balance ${getBalanceBoxClass(summary?.final_balance || 0)}">
                    <span>رصيد آخر السنة</span>
                    <b>${formatCurrency(summary?.final_balance || 0)}</b>
                </div>
            `;
        }

        function buildYearCard(summary) {
            const totalCredit = toNumber(summary?.total_credit || 0);
            const finalBalance = toNumber(summary?.final_balance || 0);
            const status = getStatus(totalCredit, finalBalance);

            return `
                <div class="year-card ${status.className}">
                    <div class="year-head">
                        <div class="year-status ${status.className}">${status.text}</div>
                        <div class="year-title">
                            <span class="year-chip ${status.chip}">${summary.year}</span>
                        </div>
                    </div>

                    <div class="year-body">
                        <div class="year-summary-only">
                            <div class="summary-box summary-opening">
                                <span>الرصيد السابق</span>
                                <b>${formatCurrency(summary.opening_balance)}</b>
                            </div>
                            <div class="summary-box summary-debit">
                                <span>مدين السنة</span>
                                <b>${formatCurrency(summary.total_debit)}</b>
                            </div>
                            <div class="summary-box summary-credit">
                                <span>دائن السنة</span>
                                <b>${formatCurrency(summary.total_credit)}</b>
                            </div>
                            <div class="summary-box summary-balance ${getBalanceBoxClass(summary.final_balance)}">
                                <span>رصيد آخر السنة</span>
                                <b>${formatCurrency(summary.final_balance)}</b>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderView() {
            const container = document.getElementById('years_container');
            const selectedYear = document.getElementById('year_filter').value;

            updateSummaryStrip(selectedYear);
            container.innerHTML = '';

            if (selectedYear === 'all') {
                if (!ALL_SUMMARIES.length) {
                    container.innerHTML = `<div class="empty-state">لا توجد بيانات لعرض كشف الحساب.</div>`;
                    return;
                }

                container.innerHTML = ALL_SUMMARIES
                    .sort((a, b) => Number(a.year) - Number(b.year))
                    .map(summary => buildYearCard(summary))
                    .join('');
                return;
            }

            const summary = getSummaryByYear(selectedYear);
            if (!summary) {
                container.innerHTML = `<div class="empty-state">لا توجد بيانات لهذه السنة.</div>`;
                return;
            }

            container.innerHTML = buildYearCard(summary);
        }

        function setSearchStatus(type, text) {
            const badge = document.getElementById('search_status_badge');
            badge.className = `search-status-badge ${type}`;
            badge.textContent = text;
        }

        function clearSearchResults() {
            const card = document.getElementById('search_results_card');
            const body = document.getElementById('search_results_body');
            const title = document.getElementById('search_results_title');

            title.textContent = 'نتائج البحث';
            body.innerHTML = '';
            card.classList.remove('active');
        }

        function renderSearchResults(query) {
            const q = normalizeSearchText(query);
            const card = document.getElementById('search_results_card');
            const body = document.getElementById('search_results_body');
            const title = document.getElementById('search_results_title');
            const selectedYear = document.getElementById('year_filter').value;

            if (!q) {
                clearSearchResults();
                return;
            }

            let pool = ALL_TRANSACTIONS;
            if (selectedYear !== 'all') {
                pool = getTransactionsByYear(Number(selectedYear));
            }

            const results = pool.filter(item => transactionMatchesQuery(item, q));

            title.textContent = `نتائج البحث عن: ${query}`;

            if (!results.length) {
                setSearchStatus('not-found', 'غير موجود');
                body.innerHTML = `
                    <div class="search-empty">
                        لم يتم العثور على أي حركة مطابقة. هذا يعني أن السند أو البيان غير موجود حاليًا ضمن الحركات المحتسبة.
                    </div>
                `;
                card.classList.add('active');
                return;
            }

            if (results.length === 1) {
                setSearchStatus('found', 'موجود ومحتسب');
            } else {
                setSearchStatus('multi', `${results.length} نتائج`);
            }

            body.innerHTML = `
                <div class="search-results-grid">
                    ${results.map(item => {
                        const year = new Date(item.date).getFullYear();
                        return `
                            <div class="result-item">
                                <div class="result-top">
                                    <div class="result-title">${escapeHtml(item.description || 'حركة مالية')}</div>
                                    <span class="chip">سنة ${year}</span>
                                </div>

                                <div class="result-grid">
                                    <div class="result-cell">
                                        <span>التاريخ</span>
                                        <b>${escapeHtml(formatShortDate(item.date))}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>رقم السند</span>
                                        <b>${escapeHtml(item.receipt_no || '—')}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>مدين</span>
                                        <b class="money-debit">${toNumber(item.debit) ? formatCurrency(item.debit) : '—'}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>دائن</span>
                                        <b class="money-credit">${toNumber(item.credit) ? formatCurrency(item.credit) : '—'}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>الرصيد</span>
                                        <b>${item.balance !== null && item.balance !== undefined && String(item.balance).trim() !== '' ? formatCurrency(item.balance) : '—'}</b>
                                    </div>
                                    <div class="result-cell">
                                        <span>الحالة</span>
                                        <b>${selectedYear === 'all' ? 'محتسب ضمن النظام' : 'موجود في هذه السنة'}</b>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            card.classList.add('active');
        }

        function bindSearchEvents() {
            const input = document.getElementById('receipt_search');
            const searchBtn = document.getElementById('search_btn');
            const clearBtn = document.getElementById('clear_search_btn');

            searchBtn.addEventListener('click', () => {
                renderSearchResults(input.value);
            });

            clearBtn.addEventListener('click', () => {
                input.value = '';
                clearSearchResults();
                input.focus();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    renderSearchResults(input.value);
                }
            });

            input.addEventListener('input', () => {
                if (!input.value.trim()) {
                    clearSearchResults();
                }
            });
        }

        async function init() {
            if (!tenantCode) {
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.getElementById('years_container').innerHTML = `<div class="empty-state">لم يتم العثور على كود المستأجر.</div>`;
                return;
            }

            try {
                const [{ data: tenant, error: tenantError }, { data: tx, error: txError }, { data: summaries, error: summariesError }] = await Promise.all([
                    supabase
                        .from('tenants')
                        .select('*')
                        .eq('tenant_code', tenantCode)
                        .single(),
                    supabase
                        .from('tenant_transactions')
                        .select('*')
                        .eq('tenant_code', tenantCode)
                        .order('date', { ascending: true }),
                    supabase
                        .from('tenant_yearly_summary')
                        .select('*')
                        .eq('tenant_code', tenantCode)
                        .order('year', { ascending: true })
                ]);

                if (tenantError) throw tenantError;
                if (txError) throw txError;
                if (summariesError) throw summariesError;

                ALL_TRANSACTIONS = tx || [];
                ALL_SUMMARIES = summaries || [];

                YEARS = [...new Set(ALL_SUMMARIES.map(s => Number(s.year)))]
                    .filter(Boolean)
                    .sort((a, b) => a - b);

                document.getElementById('statement_tenant_name').innerText = tenant?.tenant_name || '-';
                document.getElementById('statement_tenant_code').innerText = `كود المستأجر: ${tenantCode}`;
                document.getElementById('statement_date').innerText = formatLastUpdate();

                populateYearFilter();
                bindSearchEvents();
                renderView();

                document.getElementById('smart_note_status').textContent = ALL_SUMMARIES.length ? 'محدث' : 'لا توجد بيانات';

                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                document.getElementById('years_container').innerHTML = `
                    <div class="empty-state">
                        حدث خطأ أثناء تحميل كشف الحساب.
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
