<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | كشف الحساب التفصيلي</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #08111f;
            --navy: #0f172a;
            --gold: #d4af37;
            --text: #ffffff;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --card-bg: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            --success: #4ade80;
            --danger: #f87171;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            padding: 15px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }

        body.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 12px;
        }

        .header-area img {
            height: 35px;
            width: auto;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.25s;
        }

        .save-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            font-weight: 900;
        }

        .statement-header {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 18px;
            text-align: center;
        }

        .statement-header img {
            height: 60px;
            margin-bottom: 15px;
        }

        .statement-header h2 {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 900;
            color: #fff;
        }

        .statement-header p {
            margin: 0;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.8;
            font-weight: 700;
        }

        .summary-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 16px;
            margin-bottom: 18px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .summary-item {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 12px 10px;
            text-align: center;
        }

        .summary-item b {
            font-size: 12px;
            font-weight: 900;
            color: #fff;
        }

        .statement-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
        }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            min-width: 760px;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: rgba(255,255,255,0.05);
            color: var(--gold);
            text-align: right;
            padding: 15px 12px;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #e2e8f0;
            font-weight: 600;
        }

        .amt-debit { color: var(--danger); font-weight: 800; }
        .amt-credit { color: var(--success); font-weight: 800; }
        .amt-balance { color: #fff; font-weight: 900; }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
            body { background: #fff; color: #000; opacity: 1 !important; }
            .header-actions, #loader { display: none !important; }
            .statement-header, .statement-container, .summary-box { border: 1px solid #ccc; background: #fff; }
            th { background: #f2f2f2; color: #000; }
            td, .summary-item b { color: #000 !important; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <div class="header-area">
            <div class="header-actions">
                <button class="back-btn" onclick="goBack()"><i data-lucide="arrow-right"></i> رجوع</button>
                <button class="back-btn save-btn" onclick="savePDF()"><i data-lucide="download"></i> حفظ PDF</button>
            </div>
            <img src="logo_complex.png" alt="Jabri Complex">
        </div>

        <div class="statement-header">
            <img src="logo_complex.png" alt="Jabri Complex Logo">
            <h2 id="statement_tenant_name">اسم المستأجر</h2>
            <p id="statement_meta">التاريخ والوقت</p>
        </div>

        <div class="summary-box">
            <div class="summary-item"><span>إجمالي المستحق</span><b id="sum_due">0 د.أ</b></div>
            <div class="summary-item"><span>إجمالي المدفوع</span><b id="sum_paid">0 د.أ</b></div>
            <div class="summary-item"><span>الرصيد المتبقي</span><b id="sum_balance">0 د.أ</b></div>
        </div>

        <div class="statement-container">
            <div class="table-wrap">
                <table id="statement_table">
                    <thead>
                        <tr>
                            <th>تاريخ الدفعة</th>
                            <th>دائن</th>
                            <th>مدين</th>
                            <th>الرصيد</th>
                            <th>البيان</th>
                            <th>رقم السند</th>
                        </tr>
                    </thead>
                    <tbody id="statement_body"></tbody>
                </table>
            </div>
        </div>

        <div class="footer-note" style="text-align:center; margin-top:30px; font-size:10px; color:var(--muted);">
            هذا الكشف مستخرج آليًا من نظام مجمع الجبري الرقمي لإدارة العقارات.
            <br>
            © <span id="footer_year"></span> JABRI INDUSTRIAL COMPLEX
        </div>
    </div>

    <script>
        const tenantCode = localStorage.getItem('jabri_tenant_code');
        if (!tenantCode) { window.location.href = "index.html"; }

        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        function formatCurrency(v) { return `${Number(v || 0).toLocaleString('en-US')} د.أ`; }
        function formatDate(value) { return value ? new Date(value).toLocaleDateString('ar-JO') : '-'; }
        function goBack() { window.location.href = 'tenant.html'; }

        function savePDF() {
            const element = document.body;
            const tName = document.getElementById('statement_tenant_name').innerText;
            html2pdf().set({
                margin: 5,
                filename: `كشف_حساب_${tName}.pdf`,
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        }

        window.onload = async () => {
            try {
                // MATCHED: tenant_name, shop_no, previous_balance from Supabase
                const [{ data: tenant }, { data: transactions }] = await Promise.all([
                    supabaseClient.from('tenants').select('*').eq('tenant_code', tenantCode).single(),
                    supabaseClient.from('tenant_transactions').select('*').eq('tenant_code', tenantCode).order('date', { ascending: true })
                ]);

                const tenantName = tenant?.tenant_name || 'مستأجر';
                const tenantUnit = tenant?.shop_no || '-';
                const previousBalance = Number(tenant?.previous_balance) || 0;

                document.getElementById('statement_tenant_name').innerText = tenantName;
                document.getElementById('statement_meta').innerText = `الوحدة: ${tenantUnit} | تاريخ الإصدار: ${new Date().toLocaleString('ar-JO')}`;
                document.getElementById('footer_year').innerText = new Date().getFullYear();

                let runningBal = previousBalance;
                let totalDeb = previousBalance;
                let totalCre = 0;
                const tbody = document.getElementById('statement_body');

                if (previousBalance > 0) {
                    tbody.innerHTML += `<tr style="background:rgba(255,255,255,0.02)"><td>-</td><td>-</td><td class="amt-debit">${formatCurrency(previousBalance)}</td><td class="amt-balance">${formatCurrency(previousBalance)}</td><td>رصيد مدور سابق</td><td>-</td></tr>`;
                }

                transactions.forEach(row => {
                    const deb = Number(row.debit || 0);
                    const cre = Number(row.credit || 0);
                    runningBal += deb - cre;
                    totalDeb += deb; totalCre += cre;

                    tbody.innerHTML += `<tr><td>${formatDate(row.date)}</td><td class="amt-credit">${cre ? formatCurrency(cre) : '-'}</td><td class="amt-debit">${deb ? formatCurrency(deb) : '-'}</td><td class="amt-balance">${formatCurrency(Math.max(0, runningBal))}</td><td>${row.description || '-'}</td><td>${row.receipt_no || '-'}</td></tr>`;
                });

                document.getElementById('sum_due').innerText = formatCurrency(totalDeb);
                document.getElementById('sum_paid').innerText = formatCurrency(totalCre);
                document.getElementById('sum_balance').innerText = formatCurrency(Math.max(0, runningBal));
                document.getElementById('loader').style.display = 'none';
                document.body.classList.add('loaded');
                if (window.lucide) lucide.createIcons();
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
