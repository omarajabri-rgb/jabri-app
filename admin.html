<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدخال دفعة</title>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://gzukfvxcpfblzqyjzkoz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
    )

    async function loadTenants() {
      const select = document.getElementById('tenant')
      select.innerHTML = '<option value="">اختر المستأجر</option>'

      const { data, error } = await supabase
        .from('tenants')
        .select('*')
        .order('tenant_code', { ascending: true })

      if (error) {
        console.log(error)
        return
      }

      ;(data || []).forEach(t => {
        const code = t.tenant_code || t["رمز_المستأجر"] || ''
        const name = t.tenant_name || t["اسم_المستأجر"] || code

        const option = document.createElement('option')
        option.value = code
        option.textContent = `${name} (${code})`
        select.appendChild(option)
      })
    }

    async function updateTenantSummary(tenantCode, year) {
      const startDate = `${year}-01-01`
      const endDate = `${year}-12-31`

      const { data: tx, error: txError } = await supabase
        .from('tenant_transactions')
        .select('*')
        .eq('tenant_code', tenantCode)
        .gte('date', startDate)
        .lte('date', endDate)
        .order('date', { ascending: true })

      if (txError) {
        console.log('txError', txError)
        return
      }

      const totalDebit = (tx || []).reduce((sum, row) => sum + Number(row.debit || 0), 0)
      const totalCredit = (tx || []).reduce((sum, row) => sum + Number(row.credit || 0), 0)
      const balance = totalDebit - totalCredit

      const { data: existing, error: existingError } = await supabase
        .from('tenant_summary')
        .select('*')
        .eq('رمز_المستأجر', tenantCode)
        .eq('year', year)
        .maybeSingle()

      if (existingError) {
        console.log('existingError', existingError)
        return
      }

      if (existing) {
        const { error: updateError } = await supabase
          .from('tenant_summary')
          .update({
            "إجمالي_المدين": totalDebit,
            "إجمالي_الدائن": totalCredit,
            "الرصيد": balance
          })
          .eq('id', existing.id)

        if (updateError) {
          console.log('updateError', updateError)
        }
      }
    }

    async function addPayment() {
      const tenant = document.getElementById('tenant').value
      const amount = Number(document.getElementById('amount').value)
      const receipt = document.getElementById('receipt').value.trim()
      const date = document.getElementById('date').value || new Date().toISOString().split('T')[0]
      const statusBox = document.getElementById('statusBox')
      const year = new Date(date).getFullYear()

      statusBox.className = 'status hidden'
      statusBox.textContent = ''

      if (!tenant || !amount || !receipt || !date) {
        statusBox.className = 'status error'
        statusBox.textContent = 'الرجاء تعبئة جميع الحقول، بما فيها رقم السند.'
        return
      }

      if (amount <= 0) {
        statusBox.className = 'status error'
        statusBox.textContent = 'المبلغ يجب أن يكون أكبر من صفر.'
        return
      }

      const { data: duplicate, error: duplicateError } = await supabase
        .from('tenant_transactions')
        .select('id')
        .eq('receipt_no', receipt)
        .maybeSingle()

      if (duplicateError) {
        console.log(duplicateError)
        statusBox.className = 'status error'
        statusBox.textContent = 'حدث خطأ أثناء فحص رقم السند.'
        return
      }

      if (duplicate) {
        statusBox.className = 'status error'
        statusBox.textContent = 'رقم السند مكرر. الرجاء إدخال رقم مختلف.'
        return
      }

      const addBtn = document.getElementById('addBtn')
      addBtn.disabled = true
      addBtn.textContent = 'جاري الحفظ...'

      const { error } = await supabase
        .from('tenant_transactions')
        .insert([
          {
            tenant_code: tenant,
            date: date,
            description: 'دفعة',
            debit: 0,
            credit: amount,
            receipt_no: receipt
          }
        ])

      if (error) {
        console.log(error)
        statusBox.className = 'status error'
        statusBox.textContent = 'حدث خطأ أثناء حفظ الدفعة.'
        addBtn.disabled = false
        addBtn.textContent = 'إضافة'
        return
      }

      await updateTenantSummary(tenant, year)

      statusBox.className = 'status success'
      statusBox.textContent = 'تمت إضافة الدفعة وتحديث الملخص بنجاح.'

      document.getElementById('amount').value = ''
      document.getElementById('receipt').value = ''
      document.getElementById('date').value = ''

      addBtn.disabled = false
      addBtn.textContent = 'إضافة'
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadTenants()
      document.getElementById('date').value = new Date().toISOString().split('T')[0]
      document.getElementById('addBtn').addEventListener('click', addPayment)
    })
  </script>

  <style>
    :root{
      --bg:#f6f7fb;
      --text:#1a2238;
      --muted:#7b8497;
      --primary:#1d2940;
      --glass:rgba(255,255,255,0.60);
      --glass-border:rgba(255,255,255,0.62);
      --glass-shadow:0 10px 28px rgba(16,24,40,0.08);
      --success-bg:#edf8f1;
      --success-text:#18a957;
      --error-bg:#fff1f1;
      --error-text:#c62828;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(47,111,237,0.10), transparent 25%),
        radial-gradient(circle at top left, rgba(24,169,87,0.08), transparent 22%),
        linear-gradient(135deg,#edf2f7 0%, #eef2f7 45%, #f7f9fc 100%);
      color:var(--text);
    }

    .container{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:20px 16px;
    }

    .card{
      background:var(--glass);
      border:1px solid var(--glass-border);
      border-radius:24px;
      padding:20px;
      box-shadow:var(--glass-shadow);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      animation:fadeIn .5s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h2{
      margin:0 0 8px;
      font-size:24px;
      font-weight:900;
      color:var(--primary);
    }

    .subtitle{
      margin:0 0 16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      font-weight:700;
    }

    label{
      display:block;
      margin:0 0 6px;
      font-size:14px;
      font-weight:800;
      color:var(--primary);
    }

    input, select{
      width:100%;
      height:48px;
      margin-bottom:14px;
      border-radius:14px;
      border:1px solid #d9dfeb;
      padding:0 12px;
      background:rgba(255,255,255,0.90);
      font-size:14px;
      color:var(--text);
      outline:none;
    }

    input:focus, select:focus{
      border-color:#b9c5d7;
      box-shadow:0 0 0 4px rgba(29,41,64,0.05);
    }

    button{
      width:100%;
      height:50px;
      border:none;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 24px rgba(29,41,64,0.16);
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .status{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      font-size:14px;
      font-weight:800;
      line-height:1.8;
    }

    .status.success{
      background:var(--success-bg);
      color:var(--success-text);
    }

    .status.error{
      background:var(--error-bg);
      color:var(--error-text);
    }

    .hidden{
      display:none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>إدخال دفعة</h2>
      <p class="subtitle">أدخل بيانات الدفعة مع رقم السند. سيتم حفظها في كشف الحساب وتحديث الملخص تلقائياً.</p>

      <label for="tenant">المستأجر</label>
      <select id="tenant">
        <option value="">اختر المستأجر</option>
      </select>

      <label for="amount">المبلغ</label>
      <input id="amount" type="number" step="0.01" placeholder="أدخل قيمة الدفعة" />

      <label for="receipt">رقم السند</label>
      <input id="receipt" type="text" placeholder="رقم السند" />

      <label for="date">التاريخ</label>
      <input id="date" type="date" />

      <button id="addBtn" type="button">إضافة</button>

      <div id="statusBox" class="status hidden"></div>
    </div>
  </div>
</body>
</html>
