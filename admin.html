<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Tajawal;
  background:#f8f5f0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.panel{
  background:#fff;
  padding:15px;
  border-radius:16px;
  margin-bottom:15px;
}

select{
  width:100%;
  height:45px;
  border-radius:10px;
  border:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.mini-stat{
  background:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.03);
}

.mini-stat span{
  font-size:12px;
  color:#777;
}

.mini-stat b{
  display:block;
  font-size:18px;
}

.good{color:#159a6f}
.warn{color:#c9a46b}
.bad{color:#d14d4d}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-gold{background:#c9a46b;color:#fff}
.btn-danger{background:#d14d4d;color:#fff}

canvas{
  background:#fff;
  border-radius:12px;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>لوحة الإدارة</h2>

<div class="panel">
<select id="tenant_select"></select>
</div>

<div class="panel grid">

<div class="mini-stat"><span>الرصيد</span><b id="selected_balance">0</b></div>
<div class="mini-stat"><span>المدفوع</span><b id="selected_paid">0</b></div>
<div class="mini-stat"><span>الحركات</span><b id="selected_tx_count">0</b></div>
<div class="mini-stat"><span>التوقع</span><b id="selected_prediction">-</b></div>
<div class="mini-stat"><span>الإجراء</span><b id="selected_action">-</b></div>

</div>

<div class="panel">
<button class="btn-gold" onclick="runSmartAction()">تنفيذ الإجراء الذكي</button>
<button class="btn-danger" onclick="sendLegalWarning()">إنذار قانوني</button>
</div>

<div class="panel">
<canvas id="collectionChart"></canvas>
</div>

<div class="panel">
<canvas id="monthlyChart"></canvas>
</div>

</div>

<script>

// 🔗 ضع بياناتك هنا
eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU

let allTransactions = [];
let tenantBalances = [];
let collectionChart;

// utils
const toNumber = x => parseFloat(x)||0;
const formatCurrency = x => `${Math.round(x)} د.أ`;

// 🔥 تحميل البيانات
async function loadData(){

  const { data: tx } = await supabaseClient
    .from('tenant_transactions')
    .select('*');

  const { data: tenants } = await supabaseClient
    .from('tenants')
    .select('*');

  allTransactions = tx || [];

  tenantBalances = tenants.map(t => {

    const tenantTx = allTransactions.filter(x => x.tenant_code === t.tenant_code);

    const totalDebit = tenantTx.reduce((s,x)=>s+toNumber(x.debit),0);
    const totalCredit = tenantTx.reduce((s,x)=>s+toNumber(x.credit),0);

    return {
      ...t,
      totalDebit,
      totalCredit,
      currentBalance: totalDebit - totalCredit
    };
  });

  fillSelect();
}

// 🔽 dropdown
function fillSelect(){
  const select = document.getElementById('tenant_select');

  select.innerHTML = tenantBalances.map(t =>
    `<option value="${t.tenant_code}">
      ${t.tenant_name || t.tenant_code}
    </option>`
  ).join('');

  select.addEventListener('change', ()=>{
    const t = tenantBalances.find(x => x.tenant_code === select.value);
    updateUI(t);
  });

  // load first tenant
  if(tenantBalances.length){
    updateUI(tenantBalances[0]);
  }
}

// 🧠 prediction
function calculatePrediction(t){

  if(t.currentBalance <= 0) return {text:'منتظم',cls:'good'};
  if(t.currentBalance < 300) return {text:'تنبيه',cls:'warn'};
  return {text:'متعثر',cls:'bad'};
}

// تحديث
function updateUI(t){

  document.getElementById('selected_balance').innerText = formatCurrency(t.currentBalance);
  document.getElementById('selected_paid').innerText = formatCurrency(t.totalCredit);

  const txCount = allTransactions.filter(x=>x.tenant_code===t.tenant_code).length;
  document.getElementById('selected_tx_count').innerText = txCount;

  const p = calculatePrediction(t);

  const pred = document.getElementById('selected_prediction');
  pred.innerText = p.text;
  pred.className = p.cls;

  document.getElementById('selected_action').innerText =
    p.cls === 'bad' ? 'إنذار' :
    p.cls === 'warn' ? 'تذكير' : 'لا يوجد';

  drawChart(t);
}

// 📊 chart
function drawChart(t){

  if(collectionChart) collectionChart.destroy();

  collectionChart = new Chart(document.getElementById('collectionChart'),{
    type:'doughnut',
    data:{
      datasets:[{
        data:[t.totalCredit, t.currentBalance],
        backgroundColor:[
          'rgba(21,154,111,0.6)',
          'rgba(209,77,77,0.4)'
        ],
        borderColor:'#fff',
        borderWidth:6
      }]
    },
    options:{
      cutout:'78%'
    }
  });
}

// ⚡ smart action
async function runSmartAction(){

  const code = document.getElementById('tenant_select').value;

  await supabaseClient.from('notifications').insert([{
    tenant_code:code,
    message:'تذكير دفع',
    is_read:false
  }]);

  alert('تم الإرسال');
}

// ⚖️ legal
async function sendLegalWarning(){

  const code = document.getElementById('tenant_select').value;

  await supabaseClient.from('notifications').insert([{
    tenant_code:code,
    message:'إنذار قانوني',
    is_legal:true,
    is_read:false
  }]);

  alert('تم إرسال إنذار قانوني');
}

// 🚀 start
loadData();

</script>

</body>
</html>
