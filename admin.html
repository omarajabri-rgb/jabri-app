<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>مجمع جبري | لوحة الإدارة الذكية v2.5</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root{
            --bg:#f7f4ed;
            --card:rgba(255,255,255,0.72);
            --text:#1f2937;
            --muted:#7a7469;
            --gold:#c9a46b;
            --gold-deep:#b78e54;
            --line:rgba(91,73,42,0.10);
            --success:#159a6f;
            --warning:#d7921f;
            --danger:#d14d4d;
            --shadow:0 18px 45px rgba(87,68,37,0.10);
            --soft-shadow:0 12px 28px rgba(87,68,37,0.08);
        }

        *{
            box-sizing:border-box;
            -webkit-tap-highlight-color:transparent;
            font-family:'Tajawal',sans-serif;
        }

        body{
            margin:0;
            color:var(--text);
            background:
                radial-gradient(circle at top right, rgba(201,164,107,0.11), transparent 22%),
                linear-gradient(135deg, #f8f4eb 0%, #f2ede3 100%);
            min-height:100vh;
            opacity:0;
            transition:opacity .45s ease;
        }

        .shell{
            max-width:1400px;
            margin:0 auto;
            padding:18px;
            padding-bottom:70px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:18px;
            flex-wrap:wrap;
        }

        .brand{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .brand-badge{
            width:46px;
            height:46px;
            border-radius:15px;
            background:linear-gradient(135deg, var(--gold), var(--gold-deep));
            box-shadow:0 12px 24px rgba(201,164,107,0.22);
        }

        .brand h1{
            margin:0;
            font-size:24px;
            font-weight:900;
            color:#544128;
        }

        .brand p{
            margin:4px 0 0;
            font-size:12px;
            color:var(--muted);
            font-weight:700;
        }

        .btn{
            border:none;
            cursor:pointer;
            border-radius:16px;
            padding:13px 18px;
            font-size:14px;
            font-weight:900;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            transition:.25s ease;
            text-decoration:none;
        }

        .btn:hover{ transform:translateY(-1px); }

        .btn-gold{
            background:linear-gradient(135deg, var(--gold), var(--gold-deep));
            color:#fff;
            box-shadow:0 12px 24px rgba(201,164,107,0.22);
        }

        .btn-danger{
            background:rgba(209,77,77,0.12);
            color:var(--danger);
            border:1px solid rgba(209,77,77,0.18);
        }

        .btn-soft{
            background:#fff;
            border:1px solid var(--line);
            color:var(--text);
        }

        .panel{
            background:var(--card);
            backdrop-filter:blur(14px);
            border:1px solid rgba(255,255,255,0.72);
            box-shadow:var(--shadow);
            border-radius:28px;
            padding:16px;
            margin-bottom:18px;
        }

        .chip-header{
            display:flex;
            justify-content:flex-start;
            width:100%;
            margin-bottom:12px;
        }

        .chip-title{
            display:inline-flex;
            align-items:center;
            padding:8px 16px;
            border-radius:999px;
            font-size:12px;
            font-weight:900;
            color:var(--gold-deep);
            background:rgba(201,164,107,0.12);
            border:1px solid rgba(201,164,107,0.22);
        }

        .field{ display:flex; flex-direction:column; gap:8px; }

        .field label{
            font-size:11px;
            font-weight:800;
            color:#8b6a3a;
            padding-right:4px;
        }

        input, select, textarea{
            width:100%;
            border-radius:16px;
            border:1px solid var(--line);
            background:rgba(255,255,255,0.84);
            padding:14px 15px;
            font-size:14px;
            font-weight:700;
            outline:none;
        }

        textarea{ min-height:120px; line-height:1.6; }

        .select-with-chip{ display:flex; gap:8px; align-items:flex-start; }
        .select-with-chip select{ flex:1; }

        .tenant-mini-chips{ display:flex; flex-direction:column; gap:6px; }

        .mini-chip{
            padding:4px 10px;
            border-radius:999px;
            font-size:10px;
            font-weight:900;
            text-align:center;
        }

        .status-chip{ background:rgba(209,77,77,0.12); color:var(--danger); border:1px solid rgba(209,77,77,0.18); }
        .status-chip.paid{ background:rgba(21,154,111,0.12); color:var(--success); border:1px solid rgba(21,154,111,0.18); }
        .last-seen-chip{ background:rgba(201,164,107,0.12); color:#6b4f2b; border:1px solid rgba(201,164,107,0.25); }

        .smart-ai-box{
            margin-top:14px;
            padding:16px;
            border-radius:22px;
            background:rgba(255,255,255,0.76);
            border:1px solid var(--line);
        }

        .hero-ai-card{
            border-radius:24px;
            padding:20px;
            margin-bottom:14px;
            background:linear-gradient(135deg, rgba(255,255,255,0.95), rgba(247,244,236,0.92));
            border:1px solid rgba(201,164,107,0.20);
            display:grid;
            grid-template-columns:1.2fr .8fr;
            gap:14px;
        }

        .hero-ai-score{ font-size:36px; font-weight:900; color:#4e3c24; margin:8px 0; }

        .quick-ai-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
            margin-bottom:14px;
        }

        .quick-ai-card{
            border-radius:20px;
            padding:16px;
            text-align:center;
            background:#fff;
            border:1px solid var(--line);
            aspect-ratio:1/1;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .quick-ai-card b{ font-size:20px; display:block; margin:4px 0; color:#4e3c24; }

        .chart-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
        .chart-wrap{ background:#fff; border-radius:22px; padding:16px; height:280px; border:1px solid var(--line); }

        .tx-actions{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }

        #loader{ position:fixed; inset:0; background:#f8f4ec; display:flex; align-items:center; justify-content:center; z-index:9999; }
        .spinner{ width:40px; height:40px; border:3px solid rgba(201,164,107,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin{ to{ transform:rotate(360deg); } }

        @media (max-width: 900px){ .chart-grid, .hero-ai-card{ grid-template-columns:1fr; } .quick-ai-grid{ grid-template-columns:repeat(2,1fr); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="shell">
        <div class="topbar">
            <div class="brand">
                <div class="brand-badge"></div>
                <div>
                    <h1>مجمع جبري الصناعي التجاري</h1>
                    <p>لوحة الإدارة الذكية v2.5</p>
                </div>
            </div>
            <button class="btn btn-danger" onclick="logoutAdmin()">خروج الإدارة</button>
        </div>

        <section class="panel">
            <div class="chip-header"><div class="chip-title">اختيار المستأجر</div></div>
            <div class="select-with-chip">
                <select id="tenant_select">
                    <option value="">اختر المستأجر</option>
                </select>
                <div class="tenant-mini-chips">
                    <div class="mini-chip status-chip" id="tenant_status_chip">تحميل...</div>
                    <div class="mini-chip last-seen-chip" id="last_seen_chip">—</div>
                </div>
            </div>

            <div class="smart-ai-box">
                <div class="hero-ai-card">
                    <div>
                        <div style="font-size:12px; font-weight:800; color:var(--muted)">التقييم العام للسلوك المالي</div>
                        <div class="hero-ai-score" id="ai_score_value">0/100</div>
                        <div id="ai_badge" class="mini-chip" style="display:inline-block; padding:6px 12px">جاري التحليل...</div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <div class="mini-chip last-seen-chip" style="background:#fff">احتمال سداد: <b id="ai_next_payment_probability">0%</b></div>
                        <div class="mini-chip last-seen-chip" style="background:#fff">احتمال تعثر: <b id="ai_default_probability">0%</b></div>
                    </div>
                </div>

                <div class="quick-ai-grid">
                    <div class="quick-ai-card"><span>أشهر بلا دفع</span><b id="ai_months_without_payment">0</b></div>
                    <div class="quick-ai-card"><span>إجمالي التحصيل</span><b id="kpi_total_credit">0</b></div>
                    <div class="quick-ai-card"><span>الرصيد المتبقي</span><b id="kpi_total_balance">0</b></div>
                </div>
            </div>
        </section>

        <section class="chart-grid">
            <div class="chart-wrap"><canvas id="collectionChart"></canvas></div>
            <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
        </section>

        <section class="panel">
            <div class="chip-header"><div class="chip-title">إرسال إشعار للمستأجر</div></div>
            <div class="field" style="margin-bottom:10px;">
                <select id="notification_type">
                    <option value="">اختر موضوع الإشعار</option>
                    <option value="first">المطالبة الأولى (تذكير)</option>
                    <option value="second">المطالبة الثانية (تحذير)</option>
                    <option value="third">المطالبة الثالثة (إنذار نهائي)</option>
                    <option value="legal">إنذار عدلي</option>
                    <option value="lawyer">تحويل للمحامي</option>
                    <option value="general">رسالة عامة</option>
                </select>
            </div>
            <textarea id="notification_message" placeholder="سيتم توليد النص تلقائياً عند الاختيار..."></textarea>
            <button class="btn btn-gold" style="width:100%; margin-top:10px;" onclick="sendNotification()">إرسال الإشعار فوراً</button>
        </section>

        <section class="panel">
            <div class="chip-header"><div class="chip-title">تعديل أو إدخال دفعة</div></div>
            <div class="field" style="margin-bottom:10px;">
                <label>بحث برقم السند للتعديل</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="search_receipt" placeholder="أدخل رقم السند">
                    <button class="btn btn-soft" onclick="loadTransactionByReceipt()">تحميل</button>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
                <div class="field"><label>التاريخ</label><input type="date" id="tx_date"></div>
                <div class="field"><label>رقم السند</label><input type="text" id="tx_receipt"></div>
            </div>
            <div class="field" style="margin-bottom:10px;"><label>البيان</label><input type="text" id="tx_desc"></div>
            <div class="field"><label>المبلغ (دينار)</label><input type="number" id="tx_amount"></div>
            <div class="tx-actions">
                <button class="btn btn-gold" id="save_tx_btn" onclick="submitTransaction()">حفظ الحركة</button>
                <button class="btn btn-soft" onclick="cancelEditTransaction()">إلغاء / تفريغ</button>
            </div>
            <div id="status_msg" style="display:none; margin-top:10px; padding:10px; border-radius:10px; font-weight:800;"></div>
        </section>

        <button id="statementBtn" class="btn btn-gold" style="width:100%; height:50px;" onclick="openTenantStatement()" disabled>عرض كشف الحساب التفصيلي</button>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        let allTenants = [], allTransactions = [], allSummaries = [], tenantBalances = [];
        let collectionChart = null, monthlyChart = null, editingTransactionId = null;

        const toNumber = v => parseFloat(String(v ?? 0).replace(/,/g, '')) || 0;

        async function loadData() {
            const [t, tx, sum] = await Promise.all([
                supabaseClient.from('tenants').select('*').order('tenant_name'),
                supabaseClient.from('tenant_transactions').select('*').order('date', {ascending: false}),
                supabaseClient.from('tenant_yearly_summary').select('*').order('year')
            ]);
            allTenants = t.data || [];
            allTransactions = tx.data || [];
            allSummaries = sum.data || [];
            
            // ربط البيانات وحساب الأرصدة والذكاء الاصطناعي
            tenantBalances = allTenants.map(tn => {
                const summary = allSummaries.filter(s => s.tenant_code === tn.tenant_code).sort((a,b) => b.year - a.year)[0];
                const txs = allTransactions.filter(x => x.tenant_code === tn.tenant_code);
                const lastPay = txs.find(x => toNumber(x.credit) > 0);
                
                let monthsDiff = 12;
                if(lastPay) {
                    const d = new Date(lastPay.date);
                    monthsDiff = Math.max(0, (new Date().getFullYear() - d.getFullYear()) * 12 + (new Date().getMonth() - d.getMonth()));
                }

                return {
                    ...tn,
                    currentBalance: Math.max(0, toNumber(summary?.final_balance)),
                    totalCredit: toNumber(summary?.total_credit),
                    monthsWithoutPayment: monthsDiff,
                    lastSeen: tn.last_seen
                };
            });
        }

        function formatLastSeen(dateStr) {
            if(!dateStr) return 'لم يظهر أبداً';
            const d = new Date(dateStr);
            const now = new Date();
            const diffMin = Math.floor((now - d) / 60000);
            if(diffMin < 1) return 'الآن';
            if(diffMin < 60) return `${diffMin} د`;
            const diffHour = Math.floor(diffMin / 60);
            if(diffHour < 24) return `${diffHour} س`;
            return d.toLocaleDateString('en-GB');
        }

        async function renderSelectedTenant(code) {
            const tenant = tenantBalances.find(x => x.tenant_code === code);
            if(!tenant) return;

            document.getElementById('last_seen_chip').innerText = formatLastSeen(tenant.lastSeen);
            document.getElementById('tenant_status_chip').innerText = tenant.currentBalance <= 0 ? 'ملتزم' : 'متبقي ذمم';
            document.getElementById('tenant_status_chip').className = `mini-chip status-chip ${tenant.currentBalance <= 0 ? 'paid' : ''}`;
            
            // تحديث أرقام الـ AI
            document.getElementById('ai_score_value').innerText = `${Math.min(100, Math.round((tenant.totalCredit / (tenant.totalCredit + tenant.currentBalance || 1)) * 100))}/100`;
            document.getElementById('ai_months_without_payment').innerText = tenant.monthsWithoutPayment;
            document.getElementById('kpi_total_credit').innerText = Math.round(tenant.totalCredit);
            document.getElementById('kpi_total_balance').innerText = Math.round(tenant.currentBalance);
            
            const prob = tenant.monthsWithoutPayment <= 1 ? 95 : tenant.monthsWithoutPayment <= 3 ? 60 : 20;
            document.getElementById('ai_next_payment_probability').innerText = `${prob}%`;
            document.getElementById('ai_default_probability').innerText = `${100 - prob}%`;

            drawCharts(tenant);
            document.getElementById('statementBtn').disabled = false;
        }

        function drawCharts(tenant) {
            const ctx1 = document.getElementById('collectionChart').getContext('2d');
            if(collectionChart) collectionChart.destroy();
            collectionChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['مسدد', 'متبقي'],
                    datasets: [{ data: [tenant.totalCredit, tenant.currentBalance], backgroundColor: ['#159a6f', '#d14d4d'] }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function sendNotification() {
            const code = document.getElementById('tenant_select').value;
            const type = document.getElementById('notification_type').value;
            const msg = document.getElementById('notification_message').value;

            if(!code || !msg) return alert('اختر المستأجر واكتب الرسالة');

            const { error } = await supabaseClient.from('tenant_notifications').insert([{
                tenant_code: code,
                title: document.getElementById('notification_type').options[document.getElementById('notification_type').selectedIndex].text,
                message: msg,
                type: type,
                is_active: true,
                is_read: false,
                expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
            }]);

            if(error) alert('خطأ: ' + error.message);
            else alert('تم إرسال الإشعار بنجاح');
        }

        async function submitTransaction() {
            const code = document.getElementById('tenant_select').value;
            const amount = toNumber(document.getElementById('tx_amount').value);
            const receipt = document.getElementById('tx_receipt').value;
            const date = document.getElementById('tx_date').value;

            if(!code || amount <= 0 || !receipt) return alert('أكمل بيانات الحركة');

            const payload = {
                tenant_code: code,
                date: date,
                receipt_no: receipt,
                description: document.getElementById('tx_desc').value,
                credit: amount,
                debit: 0
            };

            let res;
            if(editingTransactionId) {
                res = await supabaseClient.from('tenant_transactions').update(payload).eq('id', editingTransactionId);
            } else {
                res = await supabaseClient.from('tenant_transactions').insert([payload]);
            }

            if(res.error) alert('خطأ في الحفظ');
            else {
                alert('تم الحفظ وتحديث الأرصدة');
                location.reload(); // لإعادة حساب الملخص السنوي تلقائياً عبر السيرفر أو الـ Triggers
            }
        }

        function openTenantStatement() {
            const code = document.getElementById('tenant_select').value;
            window.open(`statement.html?tenant=${code}`, '_blank');
        }

        function logoutAdmin() {
            localStorage.removeItem('jabri_admin_session');
            location.href = 'index.html';
        }

        window.onload = async () => {
            await loadData();
            const sel = document.getElementById('tenant_select');
            allTenants.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.tenant_code;
                opt.text = t.tenant_name || t.tenant_code;
                sel.add(opt);
            });
            sel.addEventListener('change', e => renderSelectedTenant(e.target.value));
            
            document.getElementById('notification_type').addEventListener('change', function() {
                const t = tenantBalances.find(x => x.tenant_code === sel.value);
                if(!t) return;
                const amt = Math.round(t.currentBalance);
                const texts = {
                    first: `نرجو التكرم بالعلم بأن رصيدكم المستحق هو ${amt} دينار. يرجى السداد لتجنب التراكم.`,
                    second: `تذكير ثاني: يرجى سداد المبلغ المستحق ${amt} دينار في أقرب وقت ممكن.`,
                    third: `إنذار نهائي: نرجو سداد مبلغ ${amt} دينار خلال 48 ساعة لتجنب الإجراءات القانونية.`,
                    legal: `إنذار عدلي رسمي: بخصوص ذمتكم البالغة ${amt} دينار، يرجى مراجعة الإدارة فوراً.`,
                    lawyer: `تم تحويل ملفكم للمحامي لتحصيل مبلغ ${amt} دينار قانونياً.`
                };
                document.getElementById('notification_message').value = texts[this.value] || "";
            });

            document.getElementById('loader').style.display = 'none';
            document.body.style.opacity = '1';
        };
    </script>
</body>
</html>
