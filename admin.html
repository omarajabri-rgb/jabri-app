<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jabri Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f7f4ec;
  padding:15px;
}

/* Panels */
.panel{
  background:#fff;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpi{
  padding:18px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
  transition:.3s;
}

.good{background:#e7f7ef;}
.warn{background:#fff4cc;}
.bad{background:#ffd6d6;}

/* Buttons */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

.btn-good{background:#159a6f;color:#fff;}
.btn-warn{background:#d7921f;color:#fff;}
.btn-danger{
  background:#d14d4d;
  color:#fff;
  animation:shake .4s infinite;
}

@keyframes shake{
  0%{transform:translateX(0)}
  50%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}

/* Alert */
.alert{
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- Tenant -->
<div class="panel">
<select id="tenant_select"></select>
</div>

<!-- KPI -->
<div class="kpi-grid">
<div id="kpi_debit" class="kpi">0</div>
<div id="kpi_credit" class="kpi">0</div>
<div id="kpi_balance" class="kpi">0</div>
<div id="kpi_ratio" class="kpi">0%</div>
</div>

<!-- Pie -->
<div class="panel">
<div id="collectionRiskAlert" class="alert"></div>
<canvas id="collectionChart"></canvas>
</div>

<!-- Prediction -->
<div class="panel">
<canvas id="predictionChart"></canvas>
</div>

<!-- Notification -->
<div class="panel">
<select id="notification_type">
<option value="">نوع الإشعار</option>
<option value="friendly">تذكير</option>
<option value="due">استحقاق</option>
<option value="final">إنذار</option>
</select>

<button id="notifyBtn" onclick="sendNotification()">إرسال الإشعار</button>
</div>

<!-- Statement -->
<button onclick="openStatement()">كشف الحساب</button>

<script>
const supabaseClient = supabase.createClient(
'https://gzukfvxcpfblzqyjzkoz.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
);

let tenants=[], transactions=[];

/* Load */
async function load(){
const {data:t}=await supabaseClient.from('tenants').select('*');
const {data:tr}=await supabaseClient.from('tenant_transactions').select('*');

tenants=t; transactions=tr;

const sel=document.getElementById('tenant_select');
sel.innerHTML=t.map(x=>`<option value="${x.tenant_code}">${x.tenant_name}</option>`);

selectTenant(t[0]?.tenant_code);
}

/* Select Tenant */
function selectTenant(code){
const tenant=tenants.find(t=>t.tenant_code==code);
const tx=transactions.filter(t=>t.tenant_code==code);

let debit=tx.reduce((s,x)=>s+(x.debit||0),0);
let credit=tx.reduce((s,x)=>s+(x.credit||0),0);
let balance=(tenant.previous_balance||0)+debit-credit;
let ratio=debit?Math.round((credit/debit)*100):0;

/* KPI */
kpi_debit.innerText='مدين '+debit;
kpi_credit.innerText='دائن '+credit;
kpi_balance.innerText='رصيد '+balance;
kpi_ratio.innerText=ratio+'%';

/* Colors */
let cls=ratio>70?'good':ratio>40?'warn':'bad';
document.querySelectorAll('.kpi').forEach(x=>x.className='kpi '+cls);

/* Charts */
drawPie(credit,balance,ratio);
drawPrediction(tx);

/* Button */
updateBtn(ratio);

/* Save tenant */
localStorage.setItem('jabri_tenant_code',code);
}

/* Pie */
let pieChart;
function drawPie(credit,balance,ratio){
if(pieChart) pieChart.destroy();

pieChart=new Chart(collectionChart,{
type:'doughnut',
data:{
labels:['مدفوع','متبقي'],
datasets:[{
data:[credit,balance],
backgroundColor:['green','red']
}]
},
options:{
cutout:'70%',
plugins:{
title:{display:true,text:'نسبة التحصيل'}
}
}
});

/* Alert */
const a=collectionRiskAlert;
a.innerText=ratio>70?'ممتاز':'متوسط';
a.style.background=ratio>70?'#d4f5e1':ratio>40?'#fff4cc':'#ffd6d6';
}

/* Prediction */
let predChart;
function drawPrediction(tx){
if(predChart) predChart.destroy();

let years={};

tx.forEach(t=>{
let y=new Date(t.date).getFullYear();
if(!years[y]) years[y]={d:0,c:0};
years[y].d+=t.debit||0;
years[y].c+=t.credit||0;
});

let labels=[],data=[];

Object.keys(years).sort().forEach(y=>{
labels.push(y);
data.push(Math.round((years[y].c/years[y].d)*100)||0);
});

predChart=new Chart(predictionChart,{
type:'line',
data:{
labels,
datasets:[{
data,
borderColor:'#159a6f',
fill:true
}]
}
});
}

/* Button */
function updateBtn(r){
const b=document.getElementById('notifyBtn');

b.className='';

if(r>70){
b.classList.add('btn-good');
b.innerText='✔ إشعار';
}
else if(r>40){
b.classList.add('btn-warn');
b.innerText='⚠ متابعة';
}
else{
b.classList.add('btn-danger');
b.innerText='🚨 إنذار';
}
}

/* Send */
async function sendNotification(){
const code=tenant_select.value;
const type=notification_type.value;

await supabaseClient
.from('tenant_notifications')
.insert([{tenant_code:code,type}]);

alert('تم الإرسال');
}

/* Statement */
function openStatement(){
window.open('statement.html');
}

/* Event */
tenant_select.onchange=e=>selectTenant(e.target.value);

/* Start */
load();
</script>

</body>
</html>
