<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Jabri</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f7f4ec;
  padding:15px;
}

.panel{
  background:#fff;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpi{
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.good{background:#e7f7ef;}
.warn{background:#fff4cc;}
.bad{background:#ffd6d6;}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.btn-danger{
  background:red;
  color:#fff;
  animation:shake .4s infinite;
}

@keyframes shake{
  0%{transform:translateX(0)}
  50%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}

.alert{
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="panel">
<select id="tenant_select"></select>
</div>

<div class="kpi-grid">
<div id="kpi_debit" class="kpi">0</div>
<div id="kpi_credit" class="kpi">0</div>
<div id="kpi_balance" class="kpi">0</div>
<div id="kpi_ratio" class="kpi">0%</div>
</div>

<div class="panel">
<div id="collectionRiskAlert" class="alert"></div>
<canvas id="collectionChart"></canvas>
</div>

<div class="panel">
<canvas id="predictionChart"></canvas>
</div>

<div class="panel">
<select id="notification_type">
<option value="">نوع الإشعار</option>
<option value="friendly">تذكير</option>
<option value="due">استحقاق</option>
<option value="final">إنذار</option>
</select>

<button id="notifyBtn" onclick="sendNotification()">إرسال الإشعار</button>
</div>

<button onclick="openStatement()">كشف الحساب</button>

<script>
const supabaseClient = supabase.createClient(
'https://gzukfvxcpfblzqyjzkoz.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...' // نفس المفتاح تبعك
);

let tenants=[], transactions=[];

/* تحميل */
async function load(){
const {data:t}=await supabaseClient.from('tenants').select('*');
const {data:tr}=await supabaseClient.from('tenant_transactions').select('*');

tenants=t; transactions=tr;

const sel=document.getElementById('tenant_select');
sel.innerHTML=t.map(x=>`<option value="${x.tenant_code}">${x.tenant_name}</option>`);

selectTenant(t[0]?.tenant_code);
}

/* اختيار مستأجر */
function selectTenant(code){
const tenant=tenants.find(t=>t.tenant_code==code);
const tx=transactions.filter(t=>t.tenant_code==code);

let debit=tx.reduce((s,x)=>s+(x.debit||0),0);
let credit=tx.reduce((s,x)=>s+(x.credit||0),0);
let balance=(tenant.previous_balance||0)+debit-credit;

let ratio=debit?Math.round((credit/debit)*100):0;

/* KPI */
document.getElementById('kpi_debit').innerText='مدين '+debit;
document.getElementById('kpi_credit').innerText='دائن '+credit;
document.getElementById('kpi_balance').innerText='رصيد '+balance;
document.getElementById('kpi_ratio').innerText=ratio+'%';

/* لون */
let cls=ratio>70?'good':ratio>40?'warn':'bad';
document.querySelectorAll('.kpi').forEach(x=>x.className='kpi '+cls);

/* charts */
drawChart(credit,balance,ratio);
drawPrediction(tx);

/* زر */
updateBtn(ratio);

localStorage.setItem('jabri_tenant_code',code);
}

/* Pie */
function drawChart(credit,balance,ratio){
new Chart(collectionChart,{
type:'doughnut',
data:{labels:['مدفوع','متبقي'],datasets:[{data:[credit,balance],backgroundColor:['green','red']}]},
options:{cutout:'70%'}
});

const alert=document.getElementById('collectionRiskAlert');
alert.innerText=ratio>70?'جيد':ratio>40?'متوسط':'خطر';
alert.style.background=ratio>70?'#d4f5e1':ratio>40?'#fff4cc':'#ffd6d6';
}

/* Prediction */
function drawPrediction(tx){
let years={};
tx.forEach(t=>{
let y=new Date(t.date).getFullYear();
if(!years[y])years[y]={d:0,c:0};
years[y].d+=t.debit||0;
years[y].c+=t.credit||0;
});

let labels=[],data=[];
Object.keys(years).sort().forEach(y=>{
labels.push(y);
data.push(Math.round((years[y].c/years[y].d)*100)||0);
});

new Chart(predictionChart,{
type:'line',
data:{labels,datasets:[{data,borderColor:'green'}]}
});
}

/* زر */
function updateBtn(r){
const b=document.getElementById('notifyBtn');

if(r>70){
b.style.background='green';
b.innerText='✔ إشعار';
}
else if(r>40){
b.style.background='orange';
b.innerText='⚠ متابعة';
}
else{
b.classList.add('btn-danger');
b.innerText='🚨 إنذار';
}
}

/* إشعار */
async function sendNotification(){
const code=document.getElementById('tenant_select').value;
const type=document.getElementById('notification_type').value;

await supabaseClient.from('tenant_notifications').insert([{tenant_code:code,type}]);

alert('تم الإرسال');
}

/* كشف */
function openStatement(){
window.open('statement.html');
}

tenant_select.onchange=e=>selectTenant(e.target.value);

load();
</script>

</body>
</html>
