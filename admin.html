<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إدارة مجمع الجبري | تسجيل الحركات</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #08111f;
            --navy: #0f172a;
            --gold: #d4af37;
            --text: #ffffff;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --card-bg: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            padding: 15px;
            opacity: 0;
            transition: 0.5s;
        }

        .wrap {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header img {
            height: 50px;
            margin-bottom: 10px;
        }

        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 11px;
            color: var(--gold);
            margin-bottom: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            outline: none;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            background: var(--gold);
            color: var(--navy);
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #loader {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg); z-index: 9999;
        }

        .spinner {
            width: 35px; height: 35px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) { .grid-inputs { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="wrap">
        <header>
            <img src="logo_complex.png" alt="Jabri Complex Logo">
            <h1 style="color:var(--gold); font-size:24px; margin:0; font-weight:900;">إدارة مجمع الجبري</h1>
        </header>

        <section class="admin-card">
            <div class="form-group">
                <label><i data-lucide="user"></i> اختيار المستأجر</label>
                <select id="tenant_select">
                    <option value="">جاري تحميل القائمة...</option>
                </select>
            </div>

            <div class="grid-inputs">
                <div class="form-group">
                    <label><i data-lucide="calendar"></i> التاريخ</label>
                    <input type="date" id="tx_date">
                </div>
                <div class="form-group">
                    <label><i data-lucide="hash"></i> رقم السند</label>
                    <input type="text" id="tx_receipt" placeholder="اختياري">
                </div>
            </div>

            <div class="form-group">
                <label><i data-lucide="file-text"></i> البيان / الوصف</label>
                <input type="text" id="tx_desc" placeholder="مثلاً: دفعة من الإيجار">
            </div>

            <div class="grid-inputs">
                <div class="form-group">
                    <label style="color: var(--danger);">مدين (Debit +)</label>
                    <input type="number" id="tx_debit" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label style="color: var(--success);">دائن (Credit -)</label>
                    <input type="number" id="tx_credit" placeholder="0.00" step="0.01">
                </div>
            </div>

            <button class="btn-submit" onclick="submitTransaction()">
                <i data-lucide="save"></i> حفظ الحركة المالية
            </button>

            <div id="status_msg" style="margin-top:20px; text-align:center; display:none; padding:12px; border-radius:12px; font-weight:800;"></div>
        </section>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        window.onload = async () => {
            document.body.style.opacity = "1";
            document.getElementById('tx_date').valueAsDate = new Date();
            await loadTenants();
            document.getElementById('loader').style.display = 'none';
            if (window.lucide) lucide.createIcons();
        };

        async function loadTenants() {
            const select = document.getElementById('tenant_select');
            try {
                // MATCHED: fetching tenant_name and shop_no
                const { data, error } = await supabaseClient
                    .from('tenants')
                    .select('tenant_code, tenant_name, shop_no')
                    .order('tenant_name', { ascending: true });

                if (error) throw error;
                select.innerHTML = '<option value="">-- اختر المستأجر --</option>';
                data.forEach(t => {
                    const unit = t.shop_no ? ` (وحدة: ${t.shop_no})` : '';
                    select.innerHTML += `<option value="${t.tenant_code}">${t.tenant_name}${unit}</option>`;
                });
            } catch (e) { select.innerHTML = '<option value="">فشل التحميل</option>'; }
        }

        async function submitTransaction() {
            const code = document.getElementById('tenant_select').value;
            const date = document.getElementById('tx_date').value;
            const desc = document.getElementById('tx_desc').value.trim();
            const deb = Number(document.getElementById('tx_debit').value) || null;
            const cre = Number(document.getElementById('tx_credit').value) || null;
            const rec = document.getElementById('tx_receipt').value.trim();

            if (!code || !desc || !date) { alert("أكمل البيانات المطلوبة"); return; }
            if (!deb && !cre) { alert("أدخل قيمة مالية"); return; }

            try {
                const { error } = await supabaseClient
                    .from('tenant_transactions')
                    .insert([{ tenant_code: code, date, description: desc, debit: deb, credit: cre, receipt_no: rec }]);

                if (error) throw error;
                alert("تم الحفظ بنجاح!");
                location.reload();
            } catch (e) { alert("فشل الحفظ: " + e.message); }
        }
    </script>
</body>
</html>
