<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>إدارة مجمع الجبري | لوحة الإدارة الذكية</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root{
            --bg:#f7f4ec;
            --card:rgba(255,255,255,0.72);
            --text:#1f2937;
            --muted:#7a7469;
            --gold:#c9a46b;
            --gold-deep:#b78e54;
            --line:rgba(91,73,42,0.10);
            --success:#159a6f;
            --warning:#d7921f;
            --danger:#d14d4d;
            --shadow:0 18px 45px rgba(87,68,37,0.10);
            --radius-xl:28px;
        }

        *{
            box-sizing:border-box;
            -webkit-tap-highlight-color:transparent;
            font-family:'Tajawal',sans-serif;
        }

        body{
            margin:0;
            color:var(--text);
            background:
                radial-gradient(circle at top right, rgba(201,164,107,0.11), transparent 22%),
                radial-gradient(circle at bottom left, rgba(201,164,107,0.08), transparent 20%),
                linear-gradient(135deg, #f8f4eb 0%, #f2ede3 100%);
            min-height:100vh;
            opacity:0;
            transition:opacity .45s ease;
        }

        .shell{
            max-width:1400px;
            margin:0 auto;
            padding:18px;
            padding-bottom:70px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:18px;
            flex-wrap:wrap;
        }

        .brand{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .brand-badge{
            width:46px;
            height:46px;
            border-radius:15px;
            background:linear-gradient(135deg, var(--gold), var(--gold-deep));
            box-shadow:0 12px 24px rgba(201,164,107,0.22);
            flex-shrink:0;
        }

        .brand h1{
            margin:0;
            font-size:24px;
            font-weight:900;
            color:#544128;
        }

        .brand p{
            margin:4px 0 0;
            font-size:12px;
            color:var(--muted);
            font-weight:700;
        }

        .top-actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn{
            border:none;
            cursor:pointer;
            border-radius:16px;
            padding:13px 18px;
            font-size:14px;
            font-weight:900;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            transition:.25s ease;
            text-decoration:none;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .btn-gold{
            background:linear-gradient(135deg, var(--gold), var(--gold-deep));
            color:#fff;
            box-shadow:0 12px 24px rgba(201,164,107,0.22);
        }

        .btn-soft{
            background:rgba(255,255,255,0.75);
            color:#58472f;
            border:1px solid var(--line);
        }

        .btn-danger{
            background:rgba(209,77,77,0.12);
            color:var(--danger);
            border:1px solid rgba(209,77,77,0.18);
        }

        .panel{
            background:var(--card);
            backdrop-filter:blur(14px);
            border:1px solid rgba(255,255,255,0.72);
            box-shadow:var(--shadow);
            border-radius:28px;
            padding:20px;
            margin-bottom:18px;
        }

        .panel-head{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            margin-bottom:16px;
            flex-wrap:wrap;
        }

        .panel-title h3{
            margin:0;
            font-size:18px;
            color:#4e3c24;
            font-weight:900;
        }

        .panel-title p{
            margin:3px 0 0;
            font-size:11px;
            color:var(--muted);
            font-weight:700;
        }

        .tenant-select-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:16px;
            align-items:start;
        }

        .tenant-stats-grid{
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:12px;
        }

        .mini-stat{
            border:1px solid var(--line);
            border-radius:20px;
            padding:16px;
            transition:.25s ease;
            aspect-ratio:1/1;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .mini-stat span{
            display:block;
            color:var(--muted);
            font-weight:700;
            font-size:11px;
            margin-bottom:8px;
        }

        .mini-stat b{
            font-size:20px;
            font-weight:900;
            color:#483621;
            display:block;
            line-height:1.5;
            word-break:break-word;
        }

        .mini-stat.good-card{
            background:linear-gradient(135deg, rgba(21,154,111,0.16), rgba(255,255,255,0.92));
            border-color:rgba(21,154,111,0.22);
        }

        .mini-stat.warn-card{
            background:linear-gradient(135deg, rgba(215,146,31,0.16), rgba(255,255,255,0.92));
            border-color:rgba(215,146,31,0.22);
        }

        .mini-stat.bad-card{
            background:linear-gradient(135deg, rgba(209,77,77,0.14), rgba(255,255,255,0.92));
            border-color:rgba(209,77,77,0.22);
        }

        .kpi-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:14px;
            margin-bottom:18px;
        }

        .kpi-card{
            backdrop-filter:blur(14px);
            border:1px solid rgba(255,255,255,0.75);
            box-shadow:0 18px 45px rgba(87,68,37,0.10);
            border-radius:24px;
            padding:18px;
            aspect-ratio:1/1;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            transition:.25s ease;
        }

        .kpi-head span{
            font-size:11px;
            color:var(--muted);
            font-weight:800;
        }

        .kpi-value{
            font-size:20px;
            font-weight:900;
            color:#4b3720;
            margin-top:8px;
            line-height:1.4;
            word-break:break-word;
        }

        .kpi-card.good-card{
            background:linear-gradient(135deg, rgba(21,154,111,0.16), rgba(255,255,255,0.90));
            border-color:rgba(21,154,111,0.20);
        }

        .kpi-card.warn-card{
            background:linear-gradient(135deg, rgba(215,146,31,0.16), rgba(255,255,255,0.90));
            border-color:rgba(215,146,31,0.20);
        }

        .kpi-card.bad-card{
            background:linear-gradient(135deg, rgba(209,77,77,0.15), rgba(255,255,255,0.90));
            border-color:rgba(209,77,77,0.20);
        }

        .chart-grid{
            display:grid;
            grid-template-columns:1.08fr .92fr;
            gap:18px;
            margin-bottom:18px;
        }

        .chart-wrap{
            background:rgba(255,255,255,0.76);
            border:1px solid var(--line);
            border-radius:22px;
            padding:16px;
            min-height:320px;
        }

        .chart-wrap canvas{
            width:100% !important;
            height:280px !important;
        }

        .field{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .field label{
            font-size:11px;
            font-weight:800;
            color:#8b6a3a;
            padding-right:4px;
        }

        input, select{
            width:100%;
            border-radius:16px;
            border:1px solid var(--line);
            background:rgba(255,255,255,0.84);
            padding:14px 15px;
            font-size:14px;
            font-weight:700;
            outline:none;
        }

        .smart-strip{
            display:none;
            grid-template-columns:1fr;
            gap:12px;
            margin-top:12px;
        }

        .smart-item{
            background:linear-gradient(135deg, rgba(201,164,107,0.12), rgba(255,255,255,0.95));
            border:1px solid var(--line);
            border-radius:18px;
            padding:14px;
            text-align:center;
        }

        .smart-item span{
            display:block;
            font-size:11px;
            color:var(--muted);
            font-weight:800;
            margin-bottom:8px;
        }

        .smart-item b{
            font-size:14px;
            font-weight:900;
            color:#47341f;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
        }

        .status-msg{
            display:none;
            margin-top:14px;
            border-radius:16px;
            padding:14px;
            font-size:13px;
            font-weight:800;
            line-height:1.8;
        }

        .footer-note{
            text-align:center;
            margin-top:20px;
            color:var(--muted);
            font-size:11px;
            font-weight:800;
        }

        #loader{
            position:fixed;
            inset:0;
            background:linear-gradient(135deg, #f8f4ec, #f2ebde);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:9999;
        }

        .spinner{
            width:42px;
            height:42px;
            border:3px solid rgba(201,164,107,0.20);
            border-top-color:var(--gold);
            border-radius:50%;
            animation:spin 1s linear infinite;
        }

        #collectionRiskAlert{
            display:none;
            margin-bottom:12px;
            padding:12px 14px;
            border-radius:14px;
            font-weight:900;
            text-align:center;
            font-size:13px;
        }

        .btn-danger-glow{
            background:linear-gradient(135deg,#d14d4d,#a83232) !important;
            color:#fff !important;
            box-shadow:0 0 12px rgba(209,77,77,0.6);
            animation:pulseGlow 1.5s infinite;
        }

        .btn-warning-glow{
            background:linear-gradient(135deg,#d7921f
