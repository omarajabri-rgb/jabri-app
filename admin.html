<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجمع الجبري | بوابة الدخول</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #08111f;
            --navy: #0f172a;
            --gold: #d4af37;
            --text: #ffffff;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --card-bg: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            --danger: #f87171;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 45px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-area { margin-bottom: 35px; }

        /* الشعار المرفوع */
        .logo-area img {
            height: 60px;
            width: auto;
            margin-bottom: 15px;
        }

        .logo-area p { 
            color: var(--muted); 
            font-size: 11px; 
            margin-top: 8px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label { 
            display: block; 
            font-size: 12px; 
            color: var(--gold); 
            margin-bottom: 10px; 
            font-weight: 800; 
            padding-right: 5px; 
        }
        
        input {
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04); 
            color: #fff; 
            font-size: 18px; 
            font-weight: 700;
            outline: none; 
            text-align: center;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }

        .btn-login {
            width: 100%; 
            padding: 18px; 
            border-radius: 18px; 
            border: none;
            background: var(--gold); 
            color: var(--navy); 
            font-size: 17px; 
            font-weight: 900;
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
        }

        .btn-login:hover { transform: translateY(-2px); }

        #error_msg { 
            margin-top: 20px; 
            color: var(--danger); 
            font-size: 13px; 
            font-weight: 800; 
            display: none;
            padding: 10px;
            background: rgba(248,113,113,0.1);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <img src="logo_complex.png" alt="Jabri Complex Logo">
            <p>بوابة المستأجرين الرقمية</p>
        </div>

        <div class="form-group">
            <label>أدخل كود الوحدة الخاص بك</label>
            <input type="text" id="tenant_code_input" placeholder="مثلاً: JC-01" autocomplete="off">
        </div>

        <button class="btn-login" id="login_btn" onclick="handleLogin()">
            دخول للمنصة
            <i data-lucide="log-in" size="18"></i>
        </button>

        <div id="error_msg"></div>
        
        <div style="margin-top: 40px; font-size: 10px; color: var(--muted); font-weight: 800;">
            © 2026 JABRI INDUSTRIAL COMPLEX
        </div>
    </div>

    <script>
        const { createClient } = supabase;

        // إعدادات Supabase الخاصة بك
        const supabaseClient = createClient(
            'https://gzukfvxcpfblzqyjzkoz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imd6dWtmdnhjcGZibHpxeWp6a296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjA3NjgsImV4cCI6MjA4OTM5Njc2OH0.7Jm1pg1MZEVj4B4IiGPU0yNmMPEPmClwUUkAv_rvGBU'
        );

        async function handleLogin() {
            const input = document.getElementById('tenant_code_input');
            const code = input.value.trim().toUpperCase(); // تنظيف وتحويل الحروف
            const errorEl = document.getElementById('error_msg');
            const loginBtn = document.getElementById('login_btn');

            if (!code) {
                showError("يرجى إدخال كود الوحدة.");
                return;
            }

            errorEl.style.display = "none";
            loginBtn.disabled = true;
            loginBtn.innerText = "جاري التحقق...";

            try {
                // البحث في عمود 'tenant_code' وجلب 'tenant_name'
                const { data, error } = await supabaseClient
                    .from('tenants')
                    .select('tenant_code, tenant_name') 
                    .eq('tenant_code', code)
                    .single();

                if (error || !data) {
                    showError("عذراً، هذا الكود غير مسجل لدينا.");
                    return;
                }

                // حفظ بيانات الجلسة
                localStorage.setItem('jabri_tenant_code', data.tenant_code);
                localStorage.setItem('jabri_tenant_name', data.tenant_name); 

                window.location.href = "tenant.html";

            } catch (err) {
                showError("خطأ في الاتصال. حاول مرة أخرى.");
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = "دخول للمنصة";
                if (window.lucide) lucide.createIcons();
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('error_msg');
            errorEl.innerText = message;
            errorEl.style.display = "block";
        }

        // تسجيل الدخول عند ضغط Enter
        document.getElementById('tenant_code_input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
